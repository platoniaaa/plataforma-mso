<!-- Vista: Hallazgos y Recomendaciones (Admin) -->
<div>
  <div class="flex-between mb-4">
    <div style="display:flex;gap:12px;">
      <select class="form-control" id="sel-programa-hall" onchange="cargarHallazgos()" style="min-width:250px;">
        <option value="">Selecciona un programa...</option>
      </select>
    </div>
    <button class="btn btn-primary" id="btn-nuevo-hallazgo" onclick="abrirModalHallazgo()" disabled>
      + Nuevo Hallazgo
    </button>
  </div>

  <div class="card">
    <div class="table-container">
      <table class="data-table" id="tabla-hallazgos">
        <thead>
          <tr>
            <th>Hallazgo</th>
            <th>Conducta</th>
            <th>Criticidad</th>
            <th>Estado Decisi&oacute;n</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody-hallazgos">
          <tr><td colspan="6" class="text-center text-muted p-4">Selecciona un programa para ver hallazgos.</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal: Crear/Editar Hallazgo -->
<div class="modal-overlay" id="modal-hallazgo">
  <div class="modal" style="max-width:650px;">
    <div class="modal-header">
      <h3 id="modal-hall-titulo">Nuevo Hallazgo</h3>
      <button class="modal-close" onclick="closeModal('modal-hallazgo')">&times;</button>
    </div>
    <div class="modal-body">
      <form id="form-hallazgo">
        <input type="hidden" id="hall-edit-id">
        <div class="form-group">
          <label>Hallazgo *</label>
          <textarea name="hallazgo" class="form-control" required placeholder="Describe el hallazgo..."></textarea>
        </div>
        <div class="form-group">
          <label>Conducta asociada</label>
          <select name="conducta_id" class="form-control" id="hall-conducta">
            <option value="">Sin conducta especifica</option>
          </select>
        </div>
        <div class="form-group">
          <label>Segmento afectado *</label>
          <input type="text" name="segmento_afectado" class="form-control" required placeholder="Ej: Equipo Operaciones, Todos los participantes...">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>Criticidad *</label>
            <select name="criticidad" class="form-control" required>
              <option value="baja">Baja</option>
              <option value="media">Media</option>
              <option value="alta">Alta</option>
              <option value="critica">Cr&iacute;tica</option>
            </select>
          </div>
          <div class="form-group">
            <label>Estado de decisi&oacute;n *</label>
            <select name="estado_decision" class="form-control" required>
              <option value="informar">Informar</option>
              <option value="monitorear">Monitorear</option>
              <option value="intervenir">Intervenir</option>
              <option value="escalar">Escalar</option>
              <option value="cerrar">Cerrar</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Interpretaci&oacute;n</label>
          <textarea name="interpretacion" class="form-control" placeholder="Interpretacion del hallazgo..."></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-hallazgo')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-hall" onclick="guardarHallazgo()">Guardar</button>
    </div>
  </div>
</div>

<!-- Modal: Detalle de Hallazgo + Recomendaciones -->
<div class="modal-overlay" id="modal-detalle-hall">
  <div class="modal" style="max-width:750px;">
    <div class="modal-header">
      <h3>Detalle del Hallazgo</h3>
      <button class="modal-close" onclick="closeModal('modal-detalle-hall')">&times;</button>
    </div>
    <div class="modal-body">
      <div id="detalle-hall-info"></div>

      <hr style="margin:16px 0;border-color:var(--color-borde);">

      <div class="flex-between mb-3">
        <h4 style="color:var(--color-primario);">Recomendaciones</h4>
      </div>
      <div id="lista-recomendaciones"></div>

      <hr style="margin:16px 0;border-color:var(--color-borde);">
      <h4 class="mb-3" style="color:var(--color-primario);">Agregar Recomendaci&oacute;n</h4>
      <div class="form-group">
        <label>Recomendaci&oacute;n *</label>
        <textarea class="form-control" id="rec-texto" placeholder="Escribe la recomendacion..."></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div class="form-group">
          <label>Prioridad *</label>
          <select class="form-control" id="rec-prioridad">
            <option value="baja">Baja</option>
            <option value="media">Media</option>
            <option value="alta">Alta</option>
          </select>
        </div>
        <div class="form-group">
          <label>Conducta asociada</label>
          <select class="form-control" id="rec-conducta">
            <option value="">Sin conducta especifica</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Responsable sugerido</label>
        <input type="text" class="form-control" id="rec-responsable" placeholder="Nombre o cargo del responsable">
      </div>
      <button class="btn btn-secondary" onclick="agregarRecomendacion()">+ Agregar Recomendaci&oacute;n</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-detalle-hall')">Cerrar</button>
    </div>
  </div>
</div>

<script>
  var hallazgosData = [];
  var conductasHall = [];
  var detalleHallazgoId = null;

  (function() {
    google.script.run.withSuccessHandler(function(r) {
      if (r.success) {
        var sel = document.getElementById('sel-programa-hall');
        r.data.forEach(function(p) {
          var opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.nombre + ' (' + p.cliente_nombre + ')';
          sel.appendChild(opt);
        });
      }
    }).listarProgramas(App.token, null);
  })();

  function cargarHallazgos() {
    var progId = document.getElementById('sel-programa-hall').value;
    document.getElementById('btn-nuevo-hallazgo').disabled = !progId;
    if (!progId) {
      document.getElementById('tbody-hallazgos').innerHTML =
        '<tr><td colspan="6" class="text-center text-muted p-4">Selecciona un programa.</td></tr>';
      return;
    }

    // Cargar conductas del programa
    google.script.run.withSuccessHandler(function(r) {
      if (r.success) conductasHall = r.data;
    }).listarConductas(App.token, progId);

    google.script.run
      .withSuccessHandler(function(r) {
        if (r.success) {
          hallazgosData = r.data;
          renderHallazgos(r.data);
        } else {
          showToast(r.error, 'error');
        }
      })
      .withFailureHandler(function() {
        showToast('Error al cargar hallazgos.', 'error');
      })
      .listarHallazgos(App.token, progId);
  }

  function getCriticidadBadge(criticidad) {
    var clases = {
      'baja': 'badge-info',
      'media': 'badge-warning',
      'alta': 'badge-danger',
      'critica': 'badge-danger'
    };
    var clase = clases[criticidad] || 'badge-secondary';
    return '<span class="badge ' + clase + '">' + escapeHtml(criticidad) + '</span>';
  }

  function getEstadoDecisionBadge(estado) {
    var clases = {
      'informar': 'badge-info',
      'monitorear': 'badge-warning',
      'intervenir': 'badge-danger',
      'escalar': 'badge-danger',
      'cerrar': 'badge-secondary'
    };
    var clase = clases[estado] || 'badge-secondary';
    return '<span class="badge ' + clase + '">' + escapeHtml(estado) + '</span>';
  }

  function renderHallazgos(hallazgos) {
    var tbody = document.getElementById('tbody-hallazgos');
    if (!hallazgos || hallazgos.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted p-4">No hay hallazgos registrados.</td></tr>';
      return;
    }

    tbody.innerHTML = hallazgos.map(function(h) {
      var textoCorto = h.hallazgo.length > 80 ? h.hallazgo.substring(0, 80) + '...' : h.hallazgo;
      return '<tr>' +
        '<td><strong>' + escapeHtml(textoCorto) + '</strong></td>' +
        '<td>' + escapeHtml(h.conducta_nombre || '-') + '</td>' +
        '<td>' + getCriticidadBadge(h.criticidad) + '</td>' +
        '<td>' + getEstadoDecisionBadge(h.estado_decision) + '</td>' +
        '<td>' + formatDate(h.fecha_creacion) + '</td>' +
        '<td>' +
          '<button class="btn btn-sm btn-outline" onclick="verDetalle(\'' + h.id + '\')">Ver</button> ' +
          '<button class="btn btn-sm btn-outline" onclick="editarHallazgo(\'' + h.id + '\')">Editar</button>' +
        '</td>' +
      '</tr>';
    }).join('');
  }

  function abrirModalHallazgo() {
    document.getElementById('modal-hall-titulo').textContent = 'Nuevo Hallazgo';
    resetForm('form-hallazgo');
    document.getElementById('hall-edit-id').value = '';
    llenarSelectorConductas('hall-conducta');
    openModal('modal-hallazgo');
  }

  function editarHallazgo(id) {
    var h = hallazgosData.find(function(x) { return x.id === id; });
    if (!h) return;
    document.getElementById('modal-hall-titulo').textContent = 'Editar Hallazgo';
    document.getElementById('hall-edit-id').value = id;
    llenarSelectorConductas('hall-conducta');
    fillForm('form-hallazgo', h);
    openModal('modal-hallazgo');
  }

  function llenarSelectorConductas(selId) {
    var sel = document.getElementById(selId);
    sel.innerHTML = '<option value="">Sin conducta especifica</option>';
    conductasHall.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.nombre;
      sel.appendChild(opt);
    });
  }

  function guardarHallazgo() {
    var datos = getFormData('form-hallazgo');
    var id = document.getElementById('hall-edit-id').value;
    var progId = document.getElementById('sel-programa-hall').value;
    datos.programa_id = progId;
    var btn = document.getElementById('btn-guardar-hall');

    if (!datos.hallazgo || !datos.segmento_afectado) {
      showToast('Completa los campos obligatorios.', 'error');
      return;
    }

    btnLoading(btn, true);

    if (id) {
      google.script.run
        .withSuccessHandler(function(r) {
          btnLoading(btn, false);
          if (r.success) {
            closeModal('modal-hallazgo');
            showToast('Hallazgo actualizado.', 'success');
            cargarHallazgos();
          } else {
            showToast(r.error, 'error');
          }
        })
        .withFailureHandler(function() {
          btnLoading(btn, false);
          showToast('Error al actualizar.', 'error');
        })
        .actualizarHallazgo(App.token, id, datos);
    } else {
      google.script.run
        .withSuccessHandler(function(r) {
          btnLoading(btn, false);
          if (r.success) {
            closeModal('modal-hallazgo');
            showToast('Hallazgo creado.', 'success');
            cargarHallazgos();
          } else {
            showToast(r.error, 'error');
          }
        })
        .withFailureHandler(function() {
          btnLoading(btn, false);
          showToast('Error al crear.', 'error');
        })
        .crearHallazgo(App.token, datos);
    }
  }

  function verDetalle(id) {
    var h = hallazgosData.find(function(x) { return x.id === id; });
    if (!h) return;
    detalleHallazgoId = id;

    var info = '<div class="mb-3">' +
      '<p><strong>Hallazgo:</strong> ' + escapeHtml(h.hallazgo) + '</p>' +
      '<p><strong>Conducta:</strong> ' + escapeHtml(h.conducta_nombre || 'N/A') + '</p>' +
      '<p><strong>Segmento afectado:</strong> ' + escapeHtml(h.segmento_afectado) + '</p>' +
      '<p><strong>Criticidad:</strong> ' + getCriticidadBadge(h.criticidad) + '</p>' +
      '<p><strong>Estado de decisi&oacute;n:</strong> ' + getEstadoDecisionBadge(h.estado_decision) + '</p>' +
      (h.interpretacion ? '<p><strong>Interpretaci&oacute;n:</strong> ' + escapeHtml(h.interpretacion) + '</p>' : '') +
      '<p class="text-sm text-muted">Creado: ' + formatDate(h.fecha_creacion) + '</p>' +
    '</div>';

    document.getElementById('detalle-hall-info').innerHTML = info;

    // Render recomendaciones
    renderRecomendaciones(h.recomendaciones || []);

    // Llenar selector conductas para recomendaciones
    llenarSelectorConductas('rec-conducta');

    // Limpiar form recomendacion
    document.getElementById('rec-texto').value = '';
    document.getElementById('rec-prioridad').value = 'media';
    document.getElementById('rec-responsable').value = '';

    openModal('modal-detalle-hall');
  }

  function renderRecomendaciones(recs) {
    var div = document.getElementById('lista-recomendaciones');
    if (!recs || recs.length === 0) {
      div.innerHTML = '<p class="text-muted text-sm">Sin recomendaciones registradas.</p>';
      return;
    }

    div.innerHTML = recs.map(function(r) {
      var prioridadBadge = getCriticidadBadge(r.prioridad);
      return '<div class="card mb-2"><div class="card-body" style="padding:12px 16px;">' +
        '<div class="flex-between">' +
          '<div>' +
            '<span>' + escapeHtml(r.recomendacion) + '</span><br>' +
            '<span class="text-xs text-muted">Prioridad: </span>' + prioridadBadge +
            (r.conducta_nombre ? ' <span class="text-xs text-muted">| Conducta: ' + escapeHtml(r.conducta_nombre) + '</span>' : '') +
            (r.responsable_sugerido ? ' <span class="text-xs text-muted">| Responsable: ' + escapeHtml(r.responsable_sugerido) + '</span>' : '') +
          '</div>' +
          '<button class="btn btn-sm btn-danger" onclick="eliminarRec(\'' + r.id + '\')">&times;</button>' +
        '</div>' +
      '</div></div>';
    }).join('');
  }

  function agregarRecomendacion() {
    var texto = document.getElementById('rec-texto').value.trim();
    var prioridad = document.getElementById('rec-prioridad').value;
    var conductaId = document.getElementById('rec-conducta').value;
    var responsable = document.getElementById('rec-responsable').value.trim();

    if (!texto) {
      showToast('Escribe la recomendacion.', 'error');
      return;
    }

    var datos = {
      hallazgo_id: detalleHallazgoId,
      recomendacion: texto,
      conducta_id: conductaId,
      prioridad: prioridad,
      responsable_sugerido: responsable
    };

    google.script.run
      .withSuccessHandler(function(r) {
        if (r.success) {
          showToast('Recomendacion agregada.', 'success');
          document.getElementById('rec-texto').value = '';
          document.getElementById('rec-responsable').value = '';
          // Recargar hallazgos y actualizar detalle
          recargarDetalle();
        } else {
          showToast(r.error, 'error');
        }
      })
      .withFailureHandler(function() {
        showToast('Error al agregar recomendacion.', 'error');
      })
      .crearRecomendacion(App.token, datos);
  }

  function eliminarRec(id) {
    if (!confirmar('Eliminar esta recomendacion?')) return;
    google.script.run
      .withSuccessHandler(function(r) {
        if (r.success) {
          showToast('Recomendacion eliminada.', 'success');
          recargarDetalle();
        } else {
          showToast(r.error, 'error');
        }
      })
      .eliminarRecomendacion(App.token, id);
  }

  function recargarDetalle() {
    var progId = document.getElementById('sel-programa-hall').value;
    google.script.run
      .withSuccessHandler(function(r) {
        if (r.success) {
          hallazgosData = r.data;
          renderHallazgos(r.data);
          // Actualizar detalle abierto
          var h = hallazgosData.find(function(x) { return x.id === detalleHallazgoId; });
          if (h) {
            renderRecomendaciones(h.recomendaciones || []);
          }
        }
      })
      .listarHallazgos(App.token, progId);
  }
</script>
