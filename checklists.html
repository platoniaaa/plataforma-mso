<!-- Vista: Checklists (Admin) -->
<div>
  <div class="flex-between mb-4">
    <div style="display:flex;gap:12px;">
      <select class="form-control" id="sel-programa-chk" onchange="cargarChecklists()" style="min-width:250px;">
        <option value="">Selecciona un programa...</option>
      </select>
    </div>
    <button class="btn btn-primary" id="btn-nuevo-checklist" onclick="abrirModalChecklist()" disabled>
      + Nuevo Checklist
    </button>
  </div>

  <div id="lista-checklists">
    <div class="empty-state"><p>Selecciona un programa para gestionar checklists.</p></div>
  </div>
</div>

<!-- Modal: Crear/Editar Checklist -->
<div class="modal-overlay" id="modal-checklist">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <h3 id="modal-chk-titulo">Nuevo Checklist</h3>
      <button class="modal-close" onclick="closeModal('modal-checklist')">&times;</button>
    </div>
    <div class="modal-body">
      <form id="form-checklist">
        <input type="hidden" id="chk-edit-id">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" name="nombre" class="form-control" required placeholder="Ej: Checklist Seguridad en Terreno">
        </div>
        <div class="form-group">
          <label>Conducta asociada *</label>
          <select name="conducta_id" class="form-control" id="chk-conducta" required>
            <option value="">Selecciona conducta...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tipo de respuesta *</label>
          <select name="tipo_respuesta" class="form-control" required>
            <option value="si_no">S&iacute; / No</option>
            <option value="logrado_parcial_no">Logrado / Parcial / No logrado</option>
            <option value="escala_1_5">Escala 1-5</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-checklist')">Cancelar</button>
      <button class="btn btn-primary" id="btn-guardar-chk" onclick="guardarChecklist()">Guardar</button>
    </div>
  </div>
</div>

<script>
  var checklistsData = [];
  var conductasChecklist = [];

  (function() {
    google.script.run.withSuccessHandler(function(r) {
      if (r.success) {
        var sel = document.getElementById('sel-programa-chk');
        r.data.forEach(function(p) {
          var opt = document.createElement('option');
          opt.value = p.id;
          opt.textContent = p.nombre + ' (' + p.cliente_nombre + ')';
          sel.appendChild(opt);
        });
      }
    }).listarProgramas(App.token, null);
  })();

  function cargarChecklists() {
    var progId = document.getElementById('sel-programa-chk').value;
    document.getElementById('btn-nuevo-checklist').disabled = !progId;
    if (!progId) {
      document.getElementById('lista-checklists').innerHTML = '<div class="empty-state"><p>Selecciona un programa.</p></div>';
      return;
    }

    google.script.run.withSuccessHandler(function(r) {
      if (r.success) {
        checklistsData = r.data;
        renderChecklists(r.data);
      } else {
        showToast(r.error, 'error');
      }
    }).listarChecklists(App.token, progId);

    // Cargar conductas del programa
    google.script.run.withSuccessHandler(function(r) {
      if (r.success) conductasChecklist = r.data;
    }).listarConductas(App.token, progId);
  }

  function renderChecklists(checklists) {
    var container = document.getElementById('lista-checklists');
    if (!checklists.length) {
      container.innerHTML = '<div class="empty-state"><p>No hay checklists. Crea el primero.</p></div>';
      return;
    }

    var tipoLabels = {
      'si_no': 'Si / No',
      'logrado_parcial_no': 'Logrado / Parcial / No',
      'escala_1_5': 'Escala 1-5'
    };

    container.innerHTML = checklists.map(function(cl) {
      var acciones = '';
      if (cl.estado === 'borrador') {
        acciones += '<button class="btn btn-sm btn-success" onclick="activarChk(\'' + cl.id + '\')">Activar</button> ';
      } else if (cl.estado === 'activa') {
        acciones += '<button class="btn btn-sm btn-warning" onclick="cerrarChk(\'' + cl.id + '\')">Cerrar</button> ';
      }

      return '<div class="card mb-3"><div class="card-body flex-between">' +
        '<div>' +
          '<strong>' + escapeHtml(cl.nombre) + '</strong><br>' +
          '<span class="text-sm text-muted">Conducta: ' + escapeHtml(cl.conducta_nombre) +
          ' | Tipo: ' + (tipoLabels[cl.tipo_respuesta] || cl.tipo_respuesta) + '</span>' +
        '</div>' +
        '<div style="display:flex;gap:8px;align-items:center;">' +
          getBadge(cl.estado) + ' ' + acciones +
        '</div>' +
      '</div></div>';
    }).join('');
  }

  function abrirModalChecklist() {
    document.getElementById('modal-chk-titulo').textContent = 'Nuevo Checklist';
    resetForm('form-checklist');
    document.getElementById('chk-edit-id').value = '';

    // Llenar selector de conductas
    var sel = document.getElementById('chk-conducta');
    sel.innerHTML = '<option value="">Selecciona conducta...</option>';
    conductasChecklist.forEach(function(c) {
      var opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.nombre;
      sel.appendChild(opt);
    });

    openModal('modal-checklist');
  }

  function guardarChecklist() {
    var datos = getFormData('form-checklist');
    var id = document.getElementById('chk-edit-id').value;
    var progId = document.getElementById('sel-programa-chk').value;
    datos.programa_id = progId;
    var btn = document.getElementById('btn-guardar-chk');
    btnLoading(btn, true);

    google.script.run.withSuccessHandler(function(r) {
      btnLoading(btn, false);
      if (r.success) {
        closeModal('modal-checklist');
        showToast('Checklist creado.', 'success');
        cargarChecklists();
      } else {
        showToast(r.error, 'error');
      }
    }).crearChecklist(App.token, datos);
  }

  function activarChk(id) {
    if (!confirmar('¿Activar este checklist? Estara disponible para observaciones de jefatura.')) return;
    google.script.run.withSuccessHandler(function(r) {
      if (r.success) {
        showToast('Checklist activado.', 'success');
        cargarChecklists();
      } else {
        showToast(r.error, 'error');
      }
    }).activarChecklist(App.token, id);
  }

  function cerrarChk(id) {
    if (!confirmar('¿Cerrar este checklist? No se podran registrar mas observaciones.')) return;
    google.script.run.withSuccessHandler(function(r) {
      if (r.success) {
        showToast('Checklist cerrado.', 'success');
        cargarChecklists();
      } else {
        showToast(r.error, 'error');
      }
    }).cerrarChecklist(App.token, id);
  }
</script>
