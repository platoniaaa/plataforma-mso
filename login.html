<!DOCTYPE html>
<html lang="es">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <?!= include('css'); ?>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="https://lh3.googleusercontent.com/d/1F6ndRSX6rNraFsdVHUV6IfDw0o8uK7mf" alt="MSO Chile" style="max-width:180px;margin:0 auto 12px;display:block;">
        <p>Transferencia al Puesto de Trabajo</p>
      </div>

      <div id="alert-container"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="email">Correo electr&oacute;nico</label>
          <input type="email" id="email" name="email" class="form-control"
                 placeholder="tu@correo.cl" required>
        </div>

        <div class="form-group">
          <label for="password">Contrase&ntilde;a</label>
          <input type="password" id="password" name="password" class="form-control"
                 placeholder="Ingresa tu contrase&ntilde;a" required minlength="6">
        </div>

        <button type="submit" id="btn-login" class="btn btn-primary btn-block btn-lg">
          Iniciar Sesi&oacute;n
        </button>
      </form>

      <div class="text-center mt-4">
        <a href="<?= ScriptApp.getService().getUrl() ?>?page=registro" class="text-link">
          &iquest;No tienes cuenta? Reg&iacute;strate aqu&iacute;
        </a>
      </div>
    </div>
  </div>

  <?!= include('js-utils'); ?>

  <script>
    function handleLogin(e) {
      e.preventDefault();

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var btn = document.getElementById('btn-login');

      if (!email || !password) {
        showAlert('Completa todos los campos.', 'error');
        return;
      }

      btnLoading(btn, true);
      clearAlert();

      google.script.run
        .withSuccessHandler(function(result) {
          btnLoading(btn, false);
          if (result.success) {
            // Guardar sesión
            sessionStorage.setItem('tpt_token', result.data.token);
            sessionStorage.setItem('tpt_usuario', JSON.stringify(result.data.usuario));
            // Redirigir a la app
            window.top.location.href = '<?= ScriptApp.getService().getUrl() ?>?page=app';
          } else {
            showAlert(result.error, 'error');
          }
        })
        .withFailureHandler(function(error) {
          btnLoading(btn, false);
          showAlert('Error de conexi\u00f3n. Verifica tu internet e intenta de nuevo.', 'error');
        })
        .loginUsuario(email, password);
    }

    function showAlert(message, type) {
      var container = document.getElementById('alert-container');
      container.innerHTML = '<div class="alert alert-' + type + '">' + escapeHtml(message) + '</div>';
    }

    function clearAlert() {
      document.getElementById('alert-container').innerHTML = '';
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
