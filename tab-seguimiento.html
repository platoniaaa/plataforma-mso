<!-- Tab: Seguimiento del Programa (Panel Programa) -->
<style>
  .seguimiento-section-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--color-primario);
    margin: 0;
  }
  .seguimiento-divider {
    border: none;
    border-top: 1px solid var(--color-borde);
    margin: 28px 0;
  }
  .seguimiento-icon-check {
    color: var(--color-exito);
  }
  .seguimiento-icon-x {
    color: var(--color-error);
  }
  .obs-card {
    border: 1px solid var(--color-borde);
    border-radius: 8px;
    padding: 14px 18px;
    margin-bottom: 10px;
    background: #fff;
    transition: box-shadow 0.15s;
  }
  .obs-card:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
  }
  .obs-card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .obs-card-lider {
    font-size: 14px;
    font-weight: 600;
    color: var(--color-texto);
  }
  .obs-card-fecha {
    font-size: 12px;
    color: var(--color-texto-sec, #64748b);
  }
  .obs-card-body {
    font-size: 13px;
    color: var(--color-texto-sec, #64748b);
    line-height: 1.5;
  }
  .obs-card-body strong {
    color: var(--color-texto);
  }
</style>

<div>
  <!-- Estado de seguimiento por lider -->
  <div class="flex-between mb-4">
    <h3 class="seguimiento-section-title">Estado de Seguimiento por L&iacute;der</h3>
  </div>

  <div class="card" style="margin-bottom: 8px;">
    <div class="table-container">
      <table class="data-table">
        <thead>
          <tr>
            <th>L&iacute;der</th>
            <th style="text-align:center;">Observaciones Realizadas</th>
            <th>&Uacute;ltima Observaci&oacute;n</th>
            <th style="text-align:center;">Feedback Entregado</th>
          </tr>
        </thead>
        <tbody id="tbody-seguimiento-lideres">
          <tr><td colspan="4" class="text-center text-muted p-4">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <hr class="seguimiento-divider">

  <!-- Observaciones recientes -->
  <div class="flex-between mb-4">
    <h3 class="seguimiento-section-title">Observaciones Recientes</h3>
    <span class="badge badge-secondary" id="obs-total-badge">0</span>
  </div>

  <div id="observaciones-recientes-container">
    <div class="text-center p-4"><div class="spinner"></div><p class="text-muted text-sm" style="margin-top:8px;">Cargando observaciones...</p></div>
  </div>
</div>

<script>
  var seguimientoObservaciones = [];
  var seguimientoChecklists = [];
  var seguimientoFeedback = [];

  (function() {
    cargarDatosSeguimiento();
  })();

  function cargarDatosSeguimiento() {
    var loaded = { obs: false, check: false, feed: false };
    var obsData = [];
    var checkData = [];
    var feedData = [];

    function tryRender() {
      if (loaded.obs && loaded.check && loaded.feed) {
        seguimientoObservaciones = obsData;
        seguimientoChecklists = checkData;
        seguimientoFeedback = feedData;
        renderSeguimientoLideres();
        renderObservacionesRecientes();
      }
    }

    // Load observations
    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          obsData = r.data || [];
        }
        loaded.obs = true;
        tryRender();
      })
      .withFailureHandler(function(err) {
        loaded.obs = true;
        tryRender();
        showToast('Error al cargar observaciones: ' + err.message, 'error');
      })
      .listarObservaciones(App.token, panelProgramaId);

    // Load checklists
    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          checkData = r.data || [];
        }
        loaded.check = true;
        tryRender();
      })
      .withFailureHandler(function(err) {
        loaded.check = true;
        tryRender();
      })
      .listarChecklists(App.token, panelProgramaId);

    // Load feedback
    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          feedData = r.data || [];
        }
        loaded.feed = true;
        tryRender();
      })
      .withFailureHandler(function(err) {
        loaded.feed = true;
        tryRender();
      })
      .listarFeedbackEquipo(App.token, panelProgramaId);
  }

  function renderSeguimientoLideres() {
    var tbody = document.getElementById('tbody-seguimiento-lideres');

    // Aggregate data per leader
    var liderMap = {};

    seguimientoObservaciones.forEach(function(obs) {
      var liderId = obs.lider_id || obs.usuario_id || '';
      var liderNombre = obs.lider_nombre || obs.lider || obs.usuario_nombre || 'Desconocido';
      if (!liderMap[liderId]) {
        liderMap[liderId] = { nombre: liderNombre, obsCount: 0, ultimaObs: null, feedbackEntregado: false };
      }
      liderMap[liderId].obsCount++;
      var fecha = obs.fecha || obs.fecha_creacion || '';
      if (fecha && (!liderMap[liderId].ultimaObs || fecha > liderMap[liderId].ultimaObs)) {
        liderMap[liderId].ultimaObs = fecha;
      }
    });

    seguimientoFeedback.forEach(function(fb) {
      var liderId = fb.lider_id || fb.usuario_id || '';
      var liderNombre = fb.lider_nombre || fb.lider || fb.usuario_nombre || 'Desconocido';
      if (!liderMap[liderId]) {
        liderMap[liderId] = { nombre: liderNombre, obsCount: 0, ultimaObs: null, feedbackEntregado: false };
      }
      liderMap[liderId].feedbackEntregado = true;
    });

    var lideres = Object.keys(liderMap).map(function(id) {
      return liderMap[id];
    });

    if (!lideres.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center text-muted p-4">No hay datos de seguimiento a&uacute;n.</td></tr>';
      return;
    }

    // Sort by name
    lideres.sort(function(a, b) {
      return (a.nombre || '').localeCompare(b.nombre || '');
    });

    tbody.innerHTML = lideres.map(function(l) {
      var ultimaFecha = l.ultimaObs ? formatDate(l.ultimaObs) : '<span class="text-muted">Sin registros</span>';
      var feedIcon = l.feedbackEntregado
        ? '<svg class="seguimiento-icon-check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
        : '<svg class="seguimiento-icon-x" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';

      return '<tr>' +
        '<td><strong>' + escapeHtml(l.nombre) + '</strong></td>' +
        '<td style="text-align:center;">' + l.obsCount + '</td>' +
        '<td>' + ultimaFecha + '</td>' +
        '<td style="text-align:center;">' + feedIcon + '</td>' +
      '</tr>';
    }).join('');
  }

  function renderObservacionesRecientes() {
    var container = document.getElementById('observaciones-recientes-container');
    var badge = document.getElementById('obs-total-badge');

    if (!seguimientoObservaciones || !seguimientoObservaciones.length) {
      badge.textContent = '0';
      container.innerHTML = '<div style="text-align:center; padding: 32px 16px; color: var(--color-texto-sec, #64748b);"><p>No hay observaciones registradas.</p></div>';
      return;
    }

    // Sort by date descending
    var sorted = seguimientoObservaciones.slice().sort(function(a, b) {
      var dateA = a.fecha || a.fecha_creacion || '';
      var dateB = b.fecha || b.fecha_creacion || '';
      return dateB.localeCompare(dateA);
    });

    badge.textContent = sorted.length;

    // Show last 20
    var toShow = sorted.slice(0, 20);

    var html = toShow.map(function(obs) {
      var lider = escapeHtml(obs.lider_nombre || obs.lider || obs.usuario_nombre || 'Desconocido');
      var fecha = obs.fecha || obs.fecha_creacion || '';
      var fechaStr = fecha ? formatDate(fecha) : '';
      var contexto = obs.contexto || obs.tipo || '';
      var resumen = obs.resumen || obs.descripcion || obs.comentario || '';

      return '<div class="obs-card">' +
        '<div class="obs-card-header">' +
          '<span class="obs-card-lider">' + lider + '</span>' +
          '<span class="obs-card-fecha">' + escapeHtml(fechaStr) + '</span>' +
        '</div>' +
        '<div class="obs-card-body">' +
          (contexto ? '<strong>' + escapeHtml(contexto) + '</strong> &middot; ' : '') +
          escapeHtml(resumen || 'Sin detalle') +
        '</div>' +
      '</div>';
    }).join('');

    if (sorted.length > 20) {
      html += '<p class="text-center text-muted text-sm" style="margin-top:12px;">Mostrando las 20 observaciones m&aacute;s recientes de ' + sorted.length + ' totales.</p>';
    }

    container.innerHTML = html;
  }
</script>
