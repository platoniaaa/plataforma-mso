<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSO Chile - Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1B4F72 0%,#8E44AD 50%,#E67E22 100%)}
.card{background:#fff;border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.logo{text-align:center;margin-bottom:32px}
.logo img{max-width:180px;margin-bottom:12px}
.logo p{color:#718096;font-size:14px}
.fg{margin-bottom:20px}
.fg label{display:block;font-size:14px;font-weight:500;color:#2D3748;margin-bottom:6px}
.fc{width:100%;padding:12px 16px;border:1px solid #E2E8F0;border-radius:8px;font-size:15px;outline:none}
.fc:focus{border-color:#2E86C1;box-shadow:0 0 0 3px rgba(46,134,193,.1)}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#E67E22,#F39C12);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
.btn:hover{opacity:.9}.btn:disabled{opacity:.6}
.al{padding:12px 16px;border-radius:8px;font-size:14px;margin-bottom:16px;background:#FEE2E2;color:#C0392B;border:1px solid #FECACA}
.dm{text-align:center;margin-top:24px;padding-top:20px;border-top:1px solid #E2E8F0}
.dm p{font-size:12px;color:#999;margin-bottom:4px}
.dm code{background:#F1F5F9;padding:2px 6px;border-radius:4px;font-size:12px;color:#1B4F72}
</style>
</head>
<body>
<div class="card">
<div class="logo">
<img src="https://lh3.googleusercontent.com/d/1F6ndRSX6rNraFsdVHUV6IfDw0o8uK7mf" alt="MSO" onerror="this.style.display='none'">
<p>Transferencia al Puesto de Trabajo</p>
</div>
<div id="al"></div>
<form id="f">
<div class="fg"><label>Correo electronico</label><input type="email" id="em" class="fc" required value="admin@mso.cl"></div>
<div class="fg"><label>Contrasena</label><input type="password" id="pw" class="fc" required value="123456"></div>
<button type="submit" id="bt" class="btn">Iniciar Sesion</button>
</form>
<div class="dm">
<p>Credenciales de prueba:</p>
<p><code>admin@mso.cl</code> / <code>123456</code> (Admin)</p>
<p><code>jcastillo@sodexo.cl</code> / <code>123456</code> (Lider)</p>
<p><code>mjose@sodexo.cl</code> / <code>123456</code> (Colaborador)</p>
</div>
</div>
<script>
var U={'admin@mso.cl':{id:'u1',nombre:'Administrador MSO',email:'admin@mso.cl',rol:'admin',cargo:'Administrador'},'admin@msochile.cl':{id:'u1',nombre:'Administrador MSO',email:'admin@msochile.cl',rol:'admin',cargo:'Administrador'},'jcastillo@sodexo.cl':{id:'u2',nombre:'Juan Castillo',email:'jcastillo@sodexo.cl',rol:'participante',cargo:'Gerente',cliente_id:'c1'},'mjose@sodexo.cl':{id:'u3',nombre:'Miguel Jose',email:'mjose@sodexo.cl',rol:'colaborador',cargo:'',cliente_id:'c1'}};
document.getElementById('f').onsubmit=function(e){e.preventDefault();var em=document.getElementById('em').value.trim().toLowerCase(),b=document.getElementById('bt');b.disabled=true;b.textContent='Ingresando...';document.getElementById('al').innerHTML='';setTimeout(function(){var u=U[em];if(u){sessionStorage.setItem('tpt_token','t-'+Date.now());sessionStorage.setItem('tpt_usuario',JSON.stringify(u));window.location.href='index.html'}else{document.getElementById('al').innerHTML='<div class="al">Credenciales invalidas.</div>';b.disabled=false;b.textContent='Iniciar Sesion'}},300)};
</script>
</body>
</html>
