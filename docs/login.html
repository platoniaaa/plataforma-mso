<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSO Chile - Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1B4F72 0%, #8E44AD 50%, #E67E22 100%); }
    .card { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo img { max-width: 180px; margin-bottom: 12px; }
    .logo p { color: #718096; font-size: 14px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: #2D3748; margin-bottom: 6px; }
    .form-control { width: 100%; padding: 12px 16px; border: 1px solid #E2E8F0; border-radius: 8px; font-size: 15px; outline: none; }
    .form-control:focus { border-color: #2E86C1; box-shadow: 0 0 0 3px rgba(46,134,193,0.1); }
    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #E67E22, #F39C12); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.6; }
    .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 16px; background: #FEE2E2; color: #C0392B; border: 1px solid #FECACA; }
    .demo { text-align: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid #E2E8F0; }
    .demo p { font-size: 12px; color: #999; margin-bottom: 4px; }
    .demo code { background: #F1F5F9; padding: 2px 6px; border-radius: 4px; font-size: 12px; color: #1B4F72; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="https://lh3.googleusercontent.com/d/1F6ndRSX6rNraFsdVHUV6IfDw0o8uK7mf" alt="MSO Chile" onerror="this.style.display='none'">
      <p>Transferencia al Puesto de Trabajo</p>
    </div>
    <div id="alert"></div>
    <form id="lf">
      <div class="form-group">
        <label>Correo electronico</label>
        <input type="email" id="email" class="form-control" placeholder="tu@correo.cl" required value="admin@mso.cl">
      </div>
      <div class="form-group">
        <label>Contrasena</label>
        <input type="password" id="pass" class="form-control" placeholder="Tu contrasena" required value="123456">
      </div>
      <button type="submit" id="btn" class="btn">Iniciar Sesion</button>
    </form>
    <div class="demo">
      <p>Credenciales de prueba:</p>
      <p><code>admin@mso.cl</code> / <code>123456</code> (Admin)</p>
      <p><code>jcastillo@sodexo.cl</code> / <code>123456</code> (Lider)</p>
      <p><code>mjose@sodexo.cl</code> / <code>123456</code> (Colaborador)</p>
    </div>
  </div>
  <script>
    var U={
      'admin@mso.cl':{id:'u1',nombre:'Administrador MSO',email:'admin@mso.cl',rol:'admin',cargo:'Administrador',cliente_id:null},
      'admin@msochile.cl':{id:'u1',nombre:'Administrador MSO',email:'admin@msochile.cl',rol:'admin',cargo:'Administrador',cliente_id:null},
      'jcastillo@sodexo.cl':{id:'u2',nombre:'Juan Castillo',email:'jcastillo@sodexo.cl',rol:'participante',cargo:'Gerente',cliente_id:'c1'},
      'mjose@sodexo.cl':{id:'u3',nombre:'Miguel Jose',email:'mjose@sodexo.cl',rol:'colaborador',cargo:'',cliente_id:'c1'}
    };
    document.getElementById('lf').onsubmit=function(e){
      e.preventDefault();
      var em=document.getElementById('email').value.trim().toLowerCase();
      var btn=document.getElementById('btn');
      btn.disabled=true;btn.textContent='Ingresando...';
      document.getElementById('alert').innerHTML='';
      setTimeout(function(){
        var u=U[em];
        if(u){
          sessionStorage.setItem('tpt_token','mock-'+Date.now());
          sessionStorage.setItem('tpt_usuario',JSON.stringify(u));
          window.location.href='index.html';
        }else{
          document.getElementById('alert').innerHTML='<div class="alert">Credenciales invalidas. Usa las de abajo.</div>';
          btn.disabled=false;btn.textContent='Iniciar Sesion';
        }
      },400);
    };
  </script>
</body>
</html>
