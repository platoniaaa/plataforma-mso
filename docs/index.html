\r\n          </div>\r\n        </div>\r\n      </div>\r\n    </div>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-agregar-lider')\">Cancelar</button>\r\n      <button class=\"btn btn-primary\" id=\"btn-agregar-lider\" onclick=\"confirmarAgregarLider()\">Agregar</button>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Modal: Asignar Colaborador -->\r\n<div class=\"modal-overlay\" id=\"modal-asignar-colaborador\">\r\n  <div class=\"modal\" style=\"max-width:550px;\">\r\n    <div class=\"modal-header\">\r\n      <h3>Asignar Colaborador</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-asignar-colaborador')\">&times;</button>\r\n    </div>\r\n    <div class=\"modal-body\">\r\n      <input type=\"hidden\" id=\"asignar-colab-lider-id\">\r\n\r\n      <!-- Opcion A: Seleccionar usuario existente -->\r\n      <div class=\"form-group\">\r\n        <label>\r\n          <input type=\"radio\" name=\"tipo-colaborador\" value=\"existente\" checked\r\n                 onchange=\"toggleColaboradorForm()\">\r\n          Seleccionar usuario existente del cliente\r\n        </label>\r\n      </div>\r\n      <div id=\"seccion-colaborador-existente\">\r\n        <div class=\"form-group\">\r\n          <select class=\"form-control\" id=\"select-colaborador-existente\">\r\n            <option value=\"\">Selecciona un usuario...</option>\r\n          </select>\r\n        </div>\r\n      </div>\r\n\r\n      <!-- Opcion B: Crear nuevo colaborador -->\r\n      <div class=\"form-group\" style=\"margin-top:12px;\">\r\n        <label>\r\n          <input type=\"radio\" name=\"tipo-colaborador\" value=\"nuevo\"\r\n                 onchange=\"toggleColaboradorForm()\">\r\n          Crear nuevo colaborador\r\n        </label>\r\n      </div>\r\n      <div id=\"seccion-colaborador-nuevo\" class=\"hidden\">\r\n        <div class=\"form-group\">\r\n          <label>Nombre completo *</label>\r\n          <input type=\"text\" class=\"form-control\" id=\"nuevo-colab-nombre\" placeholder=\"Nombre del colaborador\">\r\n        </div>\r\n        <div class=\"form-group\">\r\n          <label>Email *</label>\r\n          <input type=\"email\" class=\"form-control\" id=\"nuevo-colab-email\" placeholder=\"email@empresa.com\">\r\n        </div>\r\n        <div class=\"form-group\">\r\n          <label>Cargo</label>\r\n          <input type=\"text\" class=\"form-control\" id=\"nuevo-colab-cargo\" placeholder=\"Cargo del colaborador\">\r\n        </div>\r\n      </div>\r\n    </div>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-asignar-colaborador')\">Cancelar</button>\r\n      <button class=\"btn btn-primary\" onclick=\"confirmarAsignarColaborador()\">Asignar</button>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Modal: Importar Participantes desde Excel -->\r\n<div class=\"modal-overlay\" id=\"modal-importar-participantes\">\r\n  <div class=\"modal\" style=\"max-width:700px;\">\r\n    <div class=\"modal-header\">\r\n      <h3>Cargar Participantes desde Excel</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-importar-participantes')\">&times;</button>\r\n    </div>\r\n    <div class=\"modal-body\">\r\n      <div style=\"background:var(--color-fondo-alt);border:1px solid var(--color-borde);border-radius:8px;padding:16px;margin-bottom:16px;\">\r\n        <p style=\"font-weight:600;color:var(--color-primario);margin-bottom:10px;\">Formato esperado del archivo Excel (.xlsx):</p>\r\n        <p style=\"font-size:13px;margin-bottom:8px;\">\r\n          <strong>Columnas:</strong>\r\n          <code>Nombre</code>, <code>Email</code>, <code>Cargo</code>, <code>Password</code>, <code>Rol</code>, <code>Colaborador Nombre</code>, <code>Colaborador Email</code>\r\n        </p>\r\n        <table style=\"width:100%;font-size:12px;border-collapse:collapse;margin-top:8px;\">\r\n          <thead>\r\n            <tr style=\"background:var(--color-primario);color:white;\">\r\n              <th style=\"padding:4px 8px;text-align:left;\">Nombre</th>\r\n              <th style=\"padding:4px 8px;text-align:left;\">Email</th>\r\n              <th style=\"padding:4px 8px;text-align:left;\">Cargo</th>\r\n              <th style=\"padding:4px 8px;text-align:left;\">Password</th>\r\n              <th style=\"padding:4px 8px;text-align:left;\">Rol</th>\r\n              <th style=\"padding:4px 8px;text-align:left;\">Colab. Nombre</th>\r\n              <th style=\"padding:4px 8px;text-align:left;\">Colab. Email</th>\r\n            </tr>\r\n          </thead>\r\n          <tbody>\r\n            <tr style=\"border-bottom:1px solid #ddd;\">\r\n              <td style=\"padding:4px 8px;\">Juan Mac Cawley</td>\r\n              <td style=\"padding:4px 8px;\">jp@sodexo.cl</td>\r\n              <td style=\"padding:4px 8px;\">Gerente Ops</td>\r\n              <td style=\"padding:4px 8px;\">Juan2026</td>\r\n              <td style=\"padding:4px 8px;\">lider</td>\r\n              <td style=\"padding:4px 8px;\">Ricardo Zerpa</td>\r\n              <td style=\"padding:4px 8px;\">rzerpa@sodexo.cl</td>\r\n            </tr>\r\n            <tr>\r\n              <td style=\"padding:4px 8px;\">Jessica Villouta</td>\r\n              <td style=\"padding:4px 8px;\">jv@sodexo.cl</td>\r\n              <td style=\"padding:4px 8px;\">Sub Gerente</td>\r\n              <td style=\"padding:4px 8px;\">Jess2026</td>\r\n              <td style=\"padding:4px 8px;\">lider</td>\r\n              <td style=\"padding:4px 8px;color:#999;\">-</td>\r\n              <td style=\"padding:4px 8px;color:#999;\">-</td>\r\n            </tr>\r\n          </tbody>\r\n        </table>\r\n        <p style=\"font-size:12px;color:var(--color-texto-sec);margin-top:10px;font-style:italic;\">\r\n          &bull; La columna <strong>Rol</strong> es opcional (por defecto = lider).<br>\r\n          &bull; Las columnas de <strong>Colaborador</strong> son opcionales. Si se incluyen, se crea el colaborador y se asigna al l&iacute;der autom&aacute;ticamente.<br>\r\n          &bull; Se crear&aacute;n usuarios nuevos con la contrase&ntilde;a indicada. Si el email ya existe, se asocia el usuario existente.\r\n        </p>\r\n      </div>\r\n\r\n      <div class=\"form-group\">\r\n        <label>Selecciona el archivo Excel</label>\r\n        <input type=\"file\" id=\"input-excel-participantes\" class=\"form-control\" accept=\".xlsx,.xls\" onchange=\"handleExcelParticipantes(event)\">\r\n      </div>\r\n\r\n      <!-- Preview -->\r\n      <div id=\"preview-participantes-excel\" class=\"hidden\">\r\n        <h4 style=\"color:var(--color-primario);margin:12px 0 8px;\">Vista previa (<span id=\"preview-part-count\">0</span> participantes)</h4>\r\n        <div style=\"max-height:250px;overflow-y:auto;border:1px solid var(--color-borde);border-radius:8px;\">\r\n          <table class=\"data-table\" style=\"font-size:12px;\">\r\n            <thead>\r\n              <tr>\r\n                <th>Nombre</th><th>Email</th><th>Cargo</th><th>Rol</th><th>Colaborador</th>\r\n              </tr>\r\n            </thead>\r\n            <tbody id=\"tbody-preview-participantes\"></tbody>\r\n          </table>\r\n        </div>\r\n      </div>\r\n    </div>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-importar-participantes')\">Cancelar</button>\r\n      <button class=\"btn btn-primary hidden\" id=\"btn-confirmar-import-part\" onclick=\"confirmarImportParticipantes()\">Importar Participantes</button>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<script>\r\n  var participantesPanelData = [];\r\n  var excelParticipantesParsed = [];\r\n  var tabLiderActivo = 'existente';\r\n  var lideresDisponiblesData = [];\r\n\r\n  (function() {\r\n    cargarParticipantesPanel();\r\n  })();\r\n\r\n  function cargarParticipantesPanel() {\r\n    // Use cached data from panelData if available\r\n    if (typeof panelData !== 'undefined' && panelData.participantes) {\r\n      participantesPanelData = panelData.participantes;\r\n      renderParticipantesPanel(participantesPanelData);\r\n      return;\r\n    }\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          participantesPanelData = r.data.participantes || [];\r\n          if (typeof panelData !== 'undefined') panelData.participantes = participantesPanelData;\r\n          renderParticipantesPanel(participantesPanelData);\r\n        } else {\r\n          document.getElementById('tbody-participantes-panel').innerHTML =\r\n            '<tr><td colspan=\"7\" class=\"text-center text-danger p-4\">' +\r\n            (r ? r.error : 'Error al cargar participantes') + '</td></tr>';\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        document.getElementById('tbody-participantes-panel').innerHTML =\r\n          '<tr><td colspan=\"7\" class=\"text-center text-danger p-4\">Error de conexion.</td></tr>';\r\n      })\r\n      .obtenerPanelPrograma(App.token, panelProgramaId);\r\n  }\r\n\r\n  function renderParticipantesPanel(participantes) {\r\n    var tbody = document.getElementById('tbody-participantes-panel');\r\n    if (!participantes || !participantes.length) {\r\n      tbody.innerHTML = '<tr><td colspan=\"7\" class=\"text-center text-muted p-4\">No hay participantes asociados a este programa.</td></tr>';\r\n      return;\r\n    }\r\n\r\n    // Separar lideres y colaboradores\r\n    var lideres = participantes.filter(function(p) { return p.rol_programa === 'lider'; });\r\n    var colaboradores = participantes.filter(function(p) { return p.rol_programa === 'colaborador'; });\r\n\r\n    // Crear mapa de colaborador por lider_id\r\n    var colabMap = {};\r\n    colaboradores.forEach(function(c) {\r\n      if (c.lider_id) colabMap[c.lider_id] = c;\r\n    });\r\n\r\n    if (!lideres.length) {\r\n      tbody.innerHTML = '<tr><td colspan=\"7\" class=\"text-center text-muted p-4\">No hay lideres asociados a este programa.</td></tr>';\r\n      return;\r\n    }\r\n\r\n    tbody.innerHTML = lideres.map(function(p) {\r\n      var colab = colabMap[p.usuario_id];\r\n      var tieneColab = !!colab;\r\n      var colabInfo = tieneColab\r\n        ? escapeHtml(colab.nombre) + '<br><span class=\"text-xs text-muted\">' + escapeHtml(colab.email) + '</span>' +\r\n          '<br><span id=\"pass-display-' + colab.usuario_id + '\" class=\"text-muted\" style=\"font-size:11px;\">****** </span>' +\r\n          '<button class=\"btn btn-sm btn-outline\" style=\"font-size:10px;padding:1px 6px;margin-top:2px;\" onclick=\"resetPassword(\\'' + colab.usuario_id + '\\',\\'' + escapeHtml(colab.nombre) + '\\')\">Pass</button>'\r\n        : '<span class=\"text-muted\">Sin asignar</span><br><button class=\"btn btn-sm btn-outline\" style=\"margin-top:4px;\" onclick=\"abrirAsignarColaborador(\\'' + p.usuario_id + '\\')\">+ Asignar</button>';\r\n      var estadoBadge = tieneColab\r\n        ? '<span class=\"badge badge-success\">Completo</span>'\r\n        : '<span class=\"badge badge-warning\">Pendiente</span>';\r\n\r\n      var passwordCol = '<span id=\"pass-display-' + p.usuario_id + '\" class=\"text-muted\">******</span> ' +\r\n        '<button class=\"btn btn-sm btn-outline\" style=\"font-size:11px;padding:2px 8px;\" onclick=\"resetPassword(\\'' + p.usuario_id + '\\',\\'' + escapeHtml(p.nombre) + '\\')\">Cambiar</button>';\r\n\r\n      var acciones = '';\r\n      if (tieneColab) {\r\n        acciones += '<button class=\"btn btn-sm btn-outline\" onclick=\"abrirAsignarColaborador(\\'' + p.usuario_id + '\\')\">Cambiar colab.</button> ';\r\n      }\r\n      acciones += '<button class=\"btn btn-sm btn-outline\" style=\"color:#c0392b;\" onclick=\"quitarParticipantePanel(\\'' + p.usuario_id + '\\')\">Quitar</button>';\r\n\r\n      return '<tr>' +\r\n        '<td><strong>' + escapeHtml(p.nombre) + '</strong></td>' +\r\n        '<td>' + escapeHtml(p.cargo || '-') + '</td>' +\r\n        '<td style=\"font-size:13px;\">' + escapeHtml(p.email || '-') + '</td>' +\r\n        '<td>' + passwordCol + '</td>' +\r\n        '<td>' + colabInfo + '</td>' +\r\n        '<td>' + estadoBadge + '</td>' +\r\n        '<td>' + acciones + '</td>' +\r\n      '</tr>';\r\n    }).join('');\r\n  }\r\n\r\n  /* ---- Modal: Agregar Lider ---- */\r\n\r\n  function abrirModalAgregarLider() {\r\n    var container = document.getElementById('lista-lideres-disponibles');\r\n    container.innerHTML = '<div class=\"text-center p-3\"><div class=\"spinner\"></div></div>';\r\n    document.getElementById('buscar-lider-disponible').value = '';\r\n    openModal('modal-agregar-lider');\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          lideresDisponiblesData = r.data;\r\n          renderLideresDisponibles(lideresDisponiblesData);\r\n        } else {\r\n          container.innerHTML = '<p class=\"text-center text-danger\">No se pudieron cargar los usuarios disponibles.</p>';\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        console.error('Error obtenerUsuariosDisponibles:', err);\r\n        container.innerHTML = '<p class=\"text-center text-danger\">Error de conexi&oacute;n.</p>';\r\n      })\r\n      .obtenerUsuariosDisponibles(App.token, panelProgramaId);\r\n  }\r\n\r\n  function renderLideresDisponibles(usuarios) {\r\n    var container = document.getElementById('lista-lideres-disponibles');\r\n    if (!usuarios || !usuarios.length) {\r\n      container.innerHTML = '<p class=\"text-center text-muted p-3\">No hay usuarios disponibles para agregar.</p>';\r\n      return;\r\n    }\r\n\r\n    container.innerHTML = usuarios.map(function(u) {\r\n      return '<label style=\"display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid #eee;cursor:pointer;\" class=\"item-lider-disponible\">' +\r\n        '<input type=\"checkbox\" value=\"' + u.id + '\" class=\"check-lider\">' +\r\n        '<div>' +\r\n          '<strong>' + escapeHtml(u.nombre_completo || u.nombre) + '</strong>' +\r\n          '<div class=\"text-sm text-muted\">' + escapeHtml(u.email) + (u.cargo ? ' &middot; ' + escapeHtml(u.cargo) : '') + '</div>' +\r\n        '</div>' +\r\n      '</label>';\r\n    }).join('');\r\n  }\r\n\r\n  function filtrarLideresDisponibles() {\r\n    var busqueda = document.getElementById('buscar-lider-disponible').value.toLowerCase();\r\n    var items = document.querySelectorAll('.item-lider-disponible');\r\n    items.forEach(function(item) {\r\n      var texto = item.textContent.toLowerCase();\r\n      item.style.display = texto.indexOf(busqueda) !== -1 ? '' : 'none';\r\n    });\r\n  }\r\n\r\n  function toggleTabLider(tab) {\r\n    tabLiderActivo = tab;\r\n    var tabExistente = document.getElementById('tab-lider-existente');\r\n    var tabNuevo = document.getElementById('tab-lider-nuevo');\r\n    var secExistente = document.getElementById('seccion-lider-existente');\r\n    var secNuevo = document.getElementById('seccion-lider-nuevo');\r\n\r\n    if (tab === 'existente') {\r\n      tabExistente.style.borderBottomColor = 'var(--color-secundario)';\r\n      tabExistente.style.color = 'var(--color-primario)';\r\n      tabExistente.style.fontWeight = '600';\r\n      tabNuevo.style.borderBottomColor = 'transparent';\r\n      tabNuevo.style.color = 'var(--color-texto-sec)';\r\n      tabNuevo.style.fontWeight = '400';\r\n      secExistente.classList.remove('hidden');\r\n      secNuevo.classList.add('hidden');\r\n    } else {\r\n      tabNuevo.style.borderBottomColor = 'var(--color-secundario)';\r\n      tabNuevo.style.color = 'var(--color-primario)';\r\n      tabNuevo.style.fontWeight = '600';\r\n      tabExistente.style.borderBottomColor = 'transparent';\r\n      tabExistente.style.color = 'var(--color-texto-sec)';\r\n      tabExistente.style.fontWeight = '400';\r\n      secNuevo.classList.remove('hidden');\r\n      secExistente.classList.add('hidden');\r\n    }\r\n  }\r\n\r\n  function confirmarAgregarLider() {\r\n    if (tabLiderActivo === 'existente') {\r\n      // Agregar usuarios existentes seleccionados\r\n      var checks = document.querySelectorAll('.check-lider:checked');\r\n      if (!checks.length) {\r\n        showToast('Selecciona al menos un usuario.', 'warning');\r\n        return;\r\n      }\r\n      var userIds = [];\r\n      checks.forEach(function(c) { userIds.push(c.value); });\r\n\r\n      var btn = document.getElementById('btn-agregar-lider');\r\n      btnLoading(btn, true);\r\n\r\n      google.script.run\r\n        .withSuccessHandler(function(r) {\r\n          btnLoading(btn, false);\r\n          if (r && r.success) {\r\n            showToast(r.data.count + ' lider(es) agregado(s).', 'success');\r\n            closeModal('modal-agregar-lider');\r\n            if (typeof panelData !== 'undefined') panelData.participantes = null;\r\n            cargarParticipantesPanel();\r\n          } else {\r\n            showToast(r ? r.error : 'Error.', 'error');\r\n          }\r\n        })\r\n        .withFailureHandler(function() { btnLoading(btn, false); showToast('Error de conexion.', 'error'); })\r\n        .asociarParticipantes(App.token, panelProgramaId, userIds, 'lider');\r\n\r\n    } else {\r\n      // Crear nuevo usuario y agregarlo como lider\r\n      var nombre = document.getElementById('nuevo-lider-nombre').value.trim();\r\n      var email = document.getElementById('nuevo-lider-email').value.trim();\r\n      var cargo = document.getElementById('nuevo-lider-cargo').value.trim();\r\n      var password = document.getElementById('nuevo-lider-password').value.trim();\r\n\r\n      if (!nombre) { showToast('El nombre es obligatorio.', 'warning'); return; }\r\n      if (!email) { showToast('El email es obligatorio.', 'warning'); return; }\r\n      if (!password || password.length < 6) { showToast('La contrasena debe tener al menos 6 caracteres.', 'warning'); return; }\r\n\r\n      var btn = document.getElementById('btn-agregar-lider');\r\n      btnLoading(btn, true);\r\n\r\n      // Usar importarParticipantesExcel con un solo participante (reutiliza la logica de crear usuario + asociar)\r\n      google.script.run\r\n        .withSuccessHandler(function(r) {\r\n          btnLoading(btn, false);\r\n          if (r && r.success) {\r\n            showToast('Lider \"' + nombre + '\" creado y agregado al programa.', 'success');\r\n            closeModal('modal-agregar-lider');\r\n            if (typeof panelData !== 'undefined') panelData.participantes = null;\r\n            cargarParticipantesPanel();\r\n          } else {\r\n            showToast(r ? r.error : 'Error.', 'error');\r\n          }\r\n        })\r\n        .withFailureHandler(function(err) { btnLoading(btn, false); showToast('Error: ' + err.message, 'error'); })\r\n        .importarParticipantesExcel(App.token, panelProgramaId, [{\r\n          nombre: nombre,\r\n          email: email,\r\n          cargo: cargo,\r\n          password: password,\r\n          rol: 'lider',\r\n          colaborador_nombre: '',\r\n          colaborador_email: ''\r\n        }]);\r\n    }\r\n  }\r\n\r\n  /* ---- Modal: Asignar Colaborador ---- */\r\n\r\n  function abrirAsignarColaborador(liderId) {\r\n    document.getElementById('asignar-colab-lider-id').value = liderId;\r\n\r\n    // Reset form\r\n    var radios = document.querySelectorAll('input[name=\"tipo-colaborador\"]');\r\n    radios[0].checked = true;\r\n    toggleColaboradorForm();\r\n    document.getElementById('nuevo-colab-nombre').value = '';\r\n    document.getElementById('nuevo-colab-email').value = '';\r\n    document.getElementById('nuevo-colab-cargo').value = '';\r\n\r\n    var select = document.getElementById('select-colaborador-existente');\r\n    select.innerHTML = '<option value=\"\">Cargando...</option>';\r\n\r\n    openModal('modal-asignar-colaborador');\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          select.innerHTML = '<option value=\"\">Selecciona un usuario...</option>';\r\n          r.data.forEach(function(u) {\r\n            var opt = document.createElement('option');\r\n            opt.value = u.id;\r\n            opt.textContent = (u.nombre_completo || u.nombre) + ' (' + u.email + ')';\r\n            select.appendChild(opt);\r\n          });\r\n        } else {\r\n          select.innerHTML = '<option value=\"\">Error al cargar usuarios</option>';\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        console.error('Error obtenerUsuariosDisponibles (colab):', err);\r\n        select.innerHTML = '<option value=\"\">Error de conexi&oacute;n</option>';\r\n      })\r\n      .obtenerUsuariosDisponibles(App.token, panelProgramaId);\r\n  }\r\n\r\n  function toggleColaboradorForm() {\r\n    var tipo = document.querySelector('input[name=\"tipo-colaborador\"]:checked').value;\r\n    var secExistente = document.getElementById('seccion-colaborador-existente');\r\n    var secNuevo = document.getElementById('seccion-colaborador-nuevo');\r\n\r\n    if (tipo === 'existente') {\r\n      secExistente.classList.remove('hidden');\r\n      secNuevo.classList.add('hidden');\r\n    } else {\r\n      secExistente.classList.add('hidden');\r\n      secNuevo.classList.remove('hidden');\r\n    }\r\n  }\r\n\r\n  function confirmarAsignarColaborador() {\r\n    var liderId = document.getElementById('asignar-colab-lider-id').value;\r\n    var tipo = document.querySelector('input[name=\"tipo-colaborador\"]:checked').value;\r\n    var colaboradorUserId = null;\r\n    var colaboradorData = null;\r\n\r\n    if (tipo === 'existente') {\r\n      colaboradorUserId = document.getElementById('select-colaborador-existente').value;\r\n      if (!colaboradorUserId) {\r\n        showToast('Selecciona un usuario.', 'warning');\r\n        return;\r\n      }\r\n    } else {\r\n      var nombre = document.getElementById('nuevo-colab-nombre').value.trim();\r\n      var email = document.getElementById('nuevo-colab-email').value.trim();\r\n      var cargo = document.getElementById('nuevo-colab-cargo').value.trim();\r\n\r\n      if (!nombre || !email) {\r\n        showToast('Nombre y email son obligatorios.', 'warning');\r\n        return;\r\n      }\r\n\r\n      colaboradorData = {\r\n        nombre: nombre,\r\n        email: email,\r\n        cargo: cargo\r\n      };\r\n    }\r\n\r\n    showToast('Asignando colaborador...', 'info');\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          showToast('Colaborador asignado correctamente.', 'success');\r\n          closeModal('modal-asignar-colaborador');\r\n          // Clear cached data to force reload\r\n          if (typeof panelData !== 'undefined') {\r\n            panelData.participantes = null;\r\n          }\r\n          cargarParticipantesPanel();\r\n        } else {\r\n          showToast(r ? r.error : 'Error al asignar colaborador.', 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        console.error('Error asignarColaborador:', err);\r\n        showToast('Error de conexi&oacute;n al asignar colaborador.', 'error');\r\n      })\r\n      .asignarColaborador(App.token, panelProgramaId, liderId, colaboradorUserId, colaboradorData);\r\n  }\r\n\r\n  /* ---- Quitar participante ---- */\r\n\r\n  function quitarParticipantePanel(userId) {\r\n    if (!confirm('¿Est\\u00e1s seguro de quitar a este participante del programa?')) return;\r\n\r\n    showToast('Quitando participante...', 'info');\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          showToast('Participante quitado correctamente.', 'success');\r\n          // Clear cached data to force reload\r\n          if (typeof panelData !== 'undefined') {\r\n            panelData.participantes = null;\r\n          }\r\n          cargarParticipantesPanel();\r\n        } else {\r\n          showToast(r ? r.error : 'Error al quitar participante.', 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        console.error('Error desasociarParticipante:', err);\r\n        showToast('Error de conexi&oacute;n al quitar participante.', 'error');\r\n      })\r\n      .desasociarParticipante(App.token, panelProgramaId, userId);\r\n  }\r\n\r\n  /* ---- Reset Password ---- */\r\n\r\n  function resetPassword(userId, nombre) {\r\n    var nuevaPass = prompt('Nueva contrasena para ' + nombre + ':', '');\r\n    if (!nuevaPass) return;\r\n    if (nuevaPass.length < 6) { showToast('La contrasena debe tener al menos 6 caracteres.', 'warning'); return; }\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          // Mostrar la nueva contraseña visible\r\n          var el = document.getElementById('pass-display-' + userId);\r\n          if (el) {\r\n            el.innerHTML = '<span style=\"color:var(--color-exito);font-weight:600;font-family:monospace;font-size:14px;\">' + escapeHtml(nuevaPass) + '</span>';\r\n          }\r\n          showToast('Contrasena actualizada para ' + nombre + '.', 'success');\r\n        } else {\r\n          showToast(r ? r.error : 'Error.', 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) { showToast('Error: ' + err.message, 'error'); })\r\n      .resetearPassword(App.token, userId, nuevaPass);\r\n  }\r\n\r\n  /* ---- Importar desde Excel ---- */\r\n\r\n  function handleExcelParticipantes(event) {\r\n    var file = event.target.files[0];\r\n    if (!file) return;\r\n\r\n    var reader = new FileReader();\r\n    reader.onload = function(e) {\r\n      try {\r\n        var data = new Uint8Array(e.target.result);\r\n        var workbook = XLSX.read(data, { type: 'array' });\r\n        var sheet = workbook.Sheets[workbook.SheetNames[0]];\r\n        var rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });\r\n\r\n        if (!rows.length) {\r\n          showToast('El archivo esta vacio.', 'error');\r\n          return;\r\n        }\r\n\r\n        // Normalizar claves\r\n        function norm(row) {\r\n          var n = {};\r\n          Object.keys(row).forEach(function(k) {\r\n            var key = k.trim().toLowerCase()\r\n              .replace(/á/g,'a').replace(/é/g,'e').replace(/í/g,'i').replace(/ó/g,'o').replace(/ú/g,'u')\r\n              .replace(/ñ/g,'n');\r\n            n[key] = (row[k] || '').toString().trim();\r\n          });\r\n          return n;\r\n        }\r\n\r\n        function getV(r, opts) {\r\n          for (var i = 0; i < opts.length; i++) { if (r[opts[i]]) return r[opts[i]]; }\r\n          return '';\r\n        }\r\n\r\n        excelParticipantesParsed = rows.map(function(raw) {\r\n          var r = norm(raw);\r\n          return {\r\n            nombre: getV(r, ['nombre', 'nombre completo', 'name']),\r\n            email: getV(r, ['email', 'correo', 'mail', 'e-mail']),\r\n            cargo: getV(r, ['cargo', 'puesto', 'position', 'rol empresa']),\r\n            password: getV(r, ['password', 'contrasena', 'clave', 'pass']),\r\n            rol: getV(r, ['rol', 'role', 'tipo']) || 'lider',\r\n            colaborador_nombre: getV(r, ['colaborador nombre', 'colaborador', 'colab. nombre', 'colab nombre', 'nombre colaborador']),\r\n            colaborador_email: getV(r, ['colaborador email', 'colab. email', 'colab email', 'email colaborador'])\r\n          };\r\n        }).filter(function(p) { return p.nombre && p.email; });\r\n\r\n        if (!excelParticipantesParsed.length) {\r\n          showToast('No se encontraron participantes validos (requiere Nombre y Email).', 'error');\r\n          return;\r\n        }\r\n\r\n        // Render preview\r\n        document.getElementById('preview-part-count').textContent = excelParticipantesParsed.length;\r\n        var tbody = document.getElementById('tbody-preview-participantes');\r\n        tbody.innerHTML = excelParticipantesParsed.map(function(p) {\r\n          var colabInfo = p.colaborador_nombre ? escapeHtml(p.colaborador_nombre) + ' (' + escapeHtml(p.colaborador_email) + ')' : '<span class=\"text-muted\">-</span>';\r\n          return '<tr>' +\r\n            '<td>' + escapeHtml(p.nombre) + '</td>' +\r\n            '<td>' + escapeHtml(p.email) + '</td>' +\r\n            '<td>' + escapeHtml(p.cargo) + '</td>' +\r\n            '<td><span class=\"badge badge-info\">' + escapeHtml(p.rol) + '</span></td>' +\r\n            '<td>' + colabInfo + '</td>' +\r\n          '</tr>';\r\n        }).join('');\r\n\r\n        document.getElementById('preview-participantes-excel').classList.remove('hidden');\r\n        document.getElementById('btn-confirmar-import-part').classList.remove('hidden');\r\n\r\n      } catch (err) {\r\n        showToast('Error al leer el archivo: ' + err.message, 'error');\r\n      }\r\n    };\r\n    reader.readAsArrayBuffer(file);\r\n  }\r\n\r\n  function confirmarImportParticipantes() {\r\n    if (!excelParticipantesParsed.length) return;\r\n\r\n    var btn = document.getElementById('btn-confirmar-import-part');\r\n    btnLoading(btn, true);\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        btnLoading(btn, false);\r\n        if (r && r.success) {\r\n          showToast(r.data.message, 'success');\r\n          closeModal('modal-importar-participantes');\r\n          if (typeof panelData !== 'undefined') panelData.participantes = null;\r\n          cargarParticipantesPanel();\r\n        } else {\r\n          showToast(r ? r.error : 'Error al importar.', 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        btnLoading(btn, false);\r\n        showToast('Error de conexion: ' + err.message, 'error');\r\n      })\r\n      .importarParticipantesExcel(App.token, panelProgramaId, excelParticipantesParsed);\r\n  }\r\n<\/script>\r\n","tab-encuestas-programa":"<!-- Tab: Encuestas del Programa -->\r\n<style>\r\n  .encuestas-header {\r\n    display: flex;\r\n    justify-content: space-between;\r\n    align-items: center;\r\n    margin-bottom: 20px;\r\n  }\r\n  .encuestas-header .header-left {\r\n    display: flex;\r\n    align-items: center;\r\n    gap: 12px;\r\n  }\r\n  .encuestas-header h3 {\r\n    margin: 0;\r\n    font-size: 18px;\r\n    font-weight: 600;\r\n    color: var(--color-primario);\r\n  }\r\n  .encuestas-header .count-badge {\r\n    background: var(--color-secundario);\r\n    color: #fff;\r\n    font-size: 12px;\r\n    font-weight: 600;\r\n    padding: 2px 10px;\r\n    border-radius: 12px;\r\n  }\r\n\r\n  /* Survey Grid 2x2 */\r\n  .encuestas-grid {\r\n    display: grid;\r\n    grid-template-columns: 1fr 1fr;\r\n    gap: 16px;\r\n    margin-bottom: 20px;\r\n  }\r\n\r\n  .encuesta-slot {\r\n    background: var(--color-fondo, #fff);\r\n    border: 1px solid var(--color-borde);\r\n    border-radius: 8px;\r\n    overflow: hidden;\r\n    transition: box-shadow 0.2s ease;\r\n  }\r\n  .encuesta-slot:hover {\r\n    box-shadow: 0 2px 8px rgba(0,0,0,0.06);\r\n  }\r\n\r\n  .encuesta-slot-header {\r\n    display: flex;\r\n    justify-content: space-between;\r\n    align-items: center;\r\n    padding: 12px 16px;\r\n    background: var(--color-fondo-alt);\r\n    border-bottom: 1px solid var(--color-borde);\r\n  }\r\n  .encuesta-slot-header .slot-title {\r\n    font-size: 13px;\r\n    font-weight: 600;\r\n    color: var(--color-texto);\r\n    text-transform: uppercase;\r\n    letter-spacing: 0.3px;\r\n  }\r\n  .encuesta-slot-header .slot-badges {\r\n    display: flex;\r\n    gap: 6px;\r\n    align-items: center;\r\n  }\r\n\r\n  .encuesta-slot-body {\r\n    padding: 16px;\r\n  }\r\n\r\n  .encuesta-slot-body .enc-nombre {\r\n    font-size: 15px;\r\n    font-weight: 600;\r\n    color: var(--color-texto);\r\n    margin-bottom: 8px;\r\n  }\r\n\r\n  .encuesta-slot-body .enc-meta {\r\n    display: flex;\r\n    gap: 12px;\r\n    align-items: center;\r\n    flex-wrap: wrap;\r\n    margin-bottom: 12px;\r\n    font-size: 13px;\r\n    color: var(--color-texto-sec);\r\n  }\r\n  .encuesta-slot-body .enc-meta .meta-item {\r\n    display: flex;\r\n    align-items: center;\r\n    gap: 4px;\r\n  }\r\n\r\n  .encuesta-slot-body .enc-progress {\r\n    margin-bottom: 12px;\r\n  }\r\n  .encuesta-slot-body .enc-progress .progress-bar-bg {\r\n    background: var(--color-borde);\r\n    border-radius: 4px;\r\n    height: 6px;\r\n    overflow: hidden;\r\n    margin-top: 4px;\r\n  }\r\n  .encuesta-slot-body .enc-progress .progress-bar-fill {\r\n    background: var(--color-exito, #27ae60);\r\n    height: 100%;\r\n    border-radius: 4px;\r\n    transition: width 0.3s ease;\r\n  }\r\n  .encuesta-slot-body .enc-progress .progress-label {\r\n    font-size: 12px;\r\n    color: var(--color-texto-sec);\r\n  }\r\n\r\n  .encuesta-slot-actions {\r\n    display: flex;\r\n    gap: 8px;\r\n    flex-wrap: wrap;\r\n  }\r\n\r\n  /* Placeholder (no creada) */\r\n  .encuesta-placeholder {\r\n    display: flex;\r\n    flex-direction: column;\r\n    align-items: center;\r\n    justify-content: center;\r\n    padding: 32px 16px;\r\n    text-align: center;\r\n  }\r\n  .encuesta-placeholder .placeholder-icon {\r\n    font-size: 32px;\r\n    color: var(--color-borde);\r\n    margin-bottom: 8px;\r\n  }\r\n  .encuesta-placeholder .placeholder-text {\r\n    font-size: 13px;\r\n    color: var(--color-texto-sec);\r\n    margin-bottom: 12px;\r\n  }\r\n\r\n  /* Preguntas en modal */\r\n  .pregunta-card {\r\n    background: var(--color-fondo-alt);\r\n    border: 1px solid var(--color-borde);\r\n    border-radius: 6px;\r\n    padding: 14px;\r\n    margin-bottom: 12px;\r\n  }\r\n  .pregunta-card .pregunta-header {\r\n    display: flex;\r\n    justify-content: space-between;\r\n    align-items: flex-start;\r\n    margin-bottom: 10px;\r\n  }\r\n  .pregunta-card .pregunta-header .pregunta-competencia {\r\n    font-size: 12px;\r\n    font-weight: 600;\r\n    color: var(--color-primario);\r\n    text-transform: uppercase;\r\n    letter-spacing: 0.3px;\r\n  }\r\n  .pregunta-card .pregunta-header .pregunta-foco {\r\n    font-size: 11px;\r\n    color: var(--color-texto-sec);\r\n    background: #EDE7F6;\r\n    padding: 2px 8px;\r\n    border-radius: 4px;\r\n  }\r\n  .pregunta-card .opciones-grid {\r\n    display: grid;\r\n    grid-template-columns: 1fr 1fr;\r\n    gap: 8px;\r\n  }\r\n  .pregunta-card .opciones-grid .opcion-item {\r\n    display: flex;\r\n    flex-direction: column;\r\n    gap: 4px;\r\n  }\r\n  .pregunta-card .opciones-grid .opcion-item label {\r\n    font-size: 11px;\r\n    font-weight: 600;\r\n    color: var(--color-texto-sec);\r\n    text-transform: uppercase;\r\n  }\r\n  .pregunta-card .opciones-grid .opcion-item textarea {\r\n    font-size: 12px;\r\n    min-height: 48px;\r\n    resize: vertical;\r\n  }\r\n\r\n  /* Respuestas table */\r\n  .respuestas-table-container {\r\n    max-height: 420px;\r\n    overflow-y: auto;\r\n    border: 1px solid var(--color-borde);\r\n    border-radius: 6px;\r\n  }\r\n  .respuestas-table-container table {\r\n    width: 100%;\r\n    font-size: 13px;\r\n    border-collapse: collapse;\r\n  }\r\n  .respuestas-table-container th {\r\n    position: sticky;\r\n    top: 0;\r\n    background: var(--color-primario);\r\n    color: #fff;\r\n    padding: 8px 10px;\r\n    text-align: left;\r\n    font-weight: 600;\r\n    font-size: 12px;\r\n  }\r\n  .respuestas-table-container td {\r\n    padding: 8px 10px;\r\n    border-bottom: 1px solid var(--color-borde);\r\n    vertical-align: middle;\r\n  }\r\n  .respuestas-table-container tr:nth-child(even) {\r\n    background: var(--color-fondo-alt);\r\n  }\r\n  .respuestas-table-container .nivel-cell {\r\n    font-weight: 600;\r\n    text-align: center;\r\n    min-width: 40px;\r\n  }\r\n  .respuestas-table-container .sin-respuesta {\r\n    color: var(--color-texto-sec);\r\n    font-style: italic;\r\n  }\r\n\r\n  /* Radio group styling in modal */\r\n  .radio-group {\r\n    display: flex;\r\n    gap: 16px;\r\n    margin-bottom: 4px;\r\n  }\r\n  .radio-group label {\r\n    display: flex;\r\n    align-items: center;\r\n    gap: 6px;\r\n    cursor: pointer;\r\n    font-size: 14px;\r\n    color: var(--color-texto);\r\n  }\r\n\r\n  @media (max-width: 600px) {\r\n    .encuestas-grid {\r\n      grid-template-columns: 1fr;\r\n    }\r\n    .encuestas-header {\r\n      flex-direction: column;\r\n      align-items: flex-start;\r\n      gap: 10px;\r\n    }\r\n    .pregunta-card .opciones-grid {\r\n      grid-template-columns: 1fr;\r\n    }\r\n  }\r\n</style>\r\n\r\n<div>\r\n  <!-- Header -->\r\n  <div class=\"encuestas-header\">\r\n    <div class=\"header-left\">\r\n      <h3>Encuestas del Programa</h3>\r\n      <span class=\"count-badge\" id=\"encuestas-prog-count\">0</span>\r\n    </div>\r\n    <div>\r\n      <button class=\"btn btn-primary\" onclick=\"abrirModalCrearEncuestaProg()\">+ Crear Encuesta</button>\r\n    </div>\r\n  </div>\r\n\r\n  <!-- Grid 2x2 de encuestas -->\r\n  <div class=\"encuestas-grid\" id=\"encuestas-prog-grid\">\r\n    <div class=\"encuesta-slot\">\r\n      <div class=\"encuesta-placeholder\">\r\n        <div class=\"spinner\"></div>\r\n        <div class=\"placeholder-text\">Cargando encuestas...</div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Modal: Crear Encuesta -->\r\n<div class=\"modal-overlay\" id=\"modal-crear-encuesta-prog\">\r\n  <div class=\"modal\" style=\"max-width:520px;\">\r\n    <div class=\"modal-header\">\r\n      <h3>Crear Encuesta</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-crear-encuesta-prog')\">&times;</button>\r\n    </div>\r\n    <div class=\"modal-body\">\r\n      <form id=\"form-crear-encuesta-prog\">\r\n        <div class=\"form-group\">\r\n          <label>Tipo de cuestionario *</label>\r\n          <div class=\"radio-group\">\r\n            <label>\r\n              <input type=\"radio\" name=\"tipo_cuestionario\" value=\"autoevaluacion\" checked>\r\n              Autoevaluaci&oacute;n\r\n            </label>\r\n            <label>\r\n              <input type=\"radio\" name=\"tipo_cuestionario\" value=\"coevaluacion\">\r\n              Coevaluaci&oacute;n\r\n            </label>\r\n          </div>\r\n        </div>\r\n\r\n        <div class=\"form-group\">\r\n          <label>Momento *</label>\r\n          <div class=\"radio-group\">\r\n            <label>\r\n              <input type=\"radio\" name=\"tipo\" value=\"pre\" checked>\r\n              PRE (antes de capacitaci&oacute;n)\r\n            </label>\r\n            <label>\r\n              <input type=\"radio\" name=\"tipo\" value=\"post\">\r\n              POST (despu&eacute;s de capacitaci&oacute;n)\r\n            </label>\r\n          </div>\r\n        </div>\r\n\r\n        <div class=\"form-group\">\r\n          <label>Instrucciones</label>\r\n          <textarea name=\"instrucciones\" class=\"form-control\" rows=\"3\" placeholder=\"Instrucciones para los participantes al responder esta encuesta...\"></textarea>\r\n        </div>\r\n\r\n        <div class=\"form-group\">\r\n          <label>Fecha l&iacute;mite de respuesta</label>\r\n          <input type=\"date\" name=\"fecha_cierre\" class=\"form-control\">\r\n        </div>\r\n      </form>\r\n    </div>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-crear-encuesta-prog')\">Cancelar</button>\r\n      <button class=\"btn btn-primary\" id=\"btn-guardar-encuesta-prog\" onclick=\"crearEncuestaPrograma()\">Crear y Generar Preguntas</button>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Modal: Ver/Editar Preguntas -->\r\n<div class=\"modal-overlay\" id=\"modal-preguntas-encuesta\">\r\n  <div class=\"modal\" style=\"max-width:780px;\">\r\n    <div class=\"modal-header\">\r\n      <h3 id=\"modal-preguntas-titulo\">Preguntas de la Encuesta</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-preguntas-encuesta')\">&times;</button>\r\n    </div>\r\n    <div class=\"modal-body\" style=\"max-height:70vh;overflow-y:auto;\">\r\n      <div id=\"preguntas-encuesta-container\">\r\n        <div class=\"text-center p-4\"><div class=\"spinner\"></div></div>\r\n      </div>\r\n    </div>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-preguntas-encuesta')\">Cancelar</button>\r\n      <button class=\"btn btn-primary\" id=\"btn-guardar-preguntas\" onclick=\"guardarPreguntasEncuesta()\">Guardar Cambios</button>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Modal: Ver Respuestas -->\r\n<div class=\"modal-overlay\" id=\"modal-respuestas-encuesta\">\r\n  <div class=\"modal\" style=\"max-width:850px;\">\r\n    <div class=\"modal-header\">\r\n      <h3 id=\"modal-respuestas-titulo\">Respuestas de la Encuesta</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-respuestas-encuesta')\">&times;</button>\r\n    </div>\r\n    <div class=\"modal-body\" style=\"max-height:70vh;overflow-y:auto;\">\r\n      <div id=\"respuestas-resumen\" style=\"margin-bottom:16px;\"></div>\r\n      <div id=\"respuestas-encuesta-container\">\r\n        <div class=\"text-center p-4\"><div class=\"spinner\"></div></div>\r\n      </div>\r\n    </div>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-respuestas-encuesta')\">Cerrar</button>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<script>\r\n  var encuestasProgData = [];\r\n  var preguntasEditData = [];\r\n  var preguntasEncuestaIdActual = null;\r\n\r\n  // Slots definition for the 4 possible surveys\r\n  var encuestaSlots = [\r\n    { tipo_cuestionario: 'autoevaluacion', tipo: 'pre',  label: 'Autoevaluaci\\u00f3n PRE' },\r\n    { tipo_cuestionario: 'coevaluacion',   tipo: 'pre',  label: 'Coevaluaci\\u00f3n PRE' },\r\n    { tipo_cuestionario: 'autoevaluacion', tipo: 'post', label: 'Autoevaluaci\\u00f3n POST' },\r\n    { tipo_cuestionario: 'coevaluacion',   tipo: 'post', label: 'Coevaluaci\\u00f3n POST' }\r\n  ];\r\n\r\n  // Auto-load on tab include\r\n  (function() {\r\n    cargarEncuestasPrograma();\r\n  })();\r\n\r\n  /**\r\n   * Loads surveys for the current program and maps them to the 4 slots\r\n   */\r\n  function cargarEncuestasPrograma() {\r\n    var grid = document.getElementById('encuestas-prog-grid');\r\n    grid.innerHTML = '<div class=\"encuesta-slot\"><div class=\"encuesta-placeholder\">' +\r\n      '<div class=\"spinner\"></div><div class=\"placeholder-text\">Cargando encuestas...</div>' +\r\n      '</div></div>';\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          encuestasProgData = r.data || [];\r\n          document.getElementById('encuestas-prog-count').textContent = encuestasProgData.length;\r\n          renderEncuestasGrid(encuestasProgData);\r\n        } else {\r\n          grid.innerHTML = '<div class=\"encuesta-slot\"><div class=\"encuesta-placeholder\">' +\r\n            '<div class=\"placeholder-text\">Error al cargar: ' + escapeHtml(r ? r.error : 'Error desconocido') + '</div>' +\r\n            '</div></div>';\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        grid.innerHTML = '<div class=\"encuesta-slot\"><div class=\"encuesta-placeholder\">' +\r\n          '<div class=\"placeholder-text\">Error de conexi\\u00f3n al cargar encuestas.</div>' +\r\n          '</div></div>';\r\n      })\r\n      .listarEncuestas(App.token, panelProgramaId);\r\n  }\r\n\r\n  /**\r\n   * Renders the 2x2 grid mapping surveys to their corresponding slots\r\n   */\r\n  function renderEncuestasGrid(encuestas) {\r\n    var grid = document.getElementById('encuestas-prog-grid');\r\n    var html = '';\r\n\r\n    encuestaSlots.forEach(function(slot) {\r\n      var enc = null;\r\n      for (var i = 0; i < encuestas.length; i++) {\r\n        var tipoCuest = (encuestas[i].tipo_cuestionario || '').toLowerCase();\r\n        var tipoMom = (encuestas[i].tipo || '').toLowerCase();\r\n        if (tipoCuest === slot.tipo_cuestionario && tipoMom === slot.tipo) {\r\n          enc = encuestas[i];\r\n          break;\r\n        }\r\n      }\r\n\r\n      html += renderEncuestaSlot(slot, enc);\r\n    });\r\n\r\n    grid.innerHTML = html;\r\n  }\r\n\r\n  /**\r\n   * Renders a single slot card (either with survey data or as a placeholder)\r\n   */\r\n  function renderEncuestaSlot(slot, enc) {\r\n    var tipoBadgeClass = slot.tipo === 'pre' ? 'badge-info' : 'badge-warning';\r\n    var cuestionarioBadgeClass = slot.tipo_cuestionario === 'autoevaluacion' ? 'badge-primary' : 'badge-secondary';\r\n    var cuestionarioLabel = slot.tipo_cuestionario === 'autoevaluacion' ? 'Autoevaluaci\\u00f3n' : 'Coevaluaci\\u00f3n';\r\n\r\n    var headerHtml = '<div class=\"encuesta-slot-header\">' +\r\n      '<span class=\"slot-title\">' + escapeHtml(slot.label) + '</span>' +\r\n      '<div class=\"slot-badges\">' +\r\n        '<span class=\"badge ' + cuestionarioBadgeClass + '\" style=\"font-size:11px;\">' + cuestionarioLabel + '</span>' +\r\n        '<span class=\"badge ' + tipoBadgeClass + '\" style=\"font-size:11px;\">' + slot.tipo.toUpperCase() + '</span>' +\r\n      '</div>' +\r\n    '</div>';\r\n\r\n    if (!enc) {\r\n      // Placeholder: not created yet\r\n      return '<div class=\"encuesta-slot\">' +\r\n        headerHtml +\r\n        '<div class=\"encuesta-placeholder\">' +\r\n          '<div class=\"placeholder-icon\">&#9634;</div>' +\r\n          '<div class=\"placeholder-text\">No creada</div>' +\r\n          '<button class=\"btn btn-sm btn-primary\" onclick=\"abrirModalCrearEncuestaProg(\\'' +\r\n            slot.tipo_cuestionario + '\\', \\'' + slot.tipo + '\\')\">Crear</button>' +\r\n        '</div>' +\r\n      '</div>';\r\n    }\r\n\r\n    // Encuesta exists - render card\r\n    var estadoHtml = getBadge(enc.estado || 'borrador');\r\n    var totalResp = enc.total_respuestas || 0;\r\n    var totalEsperadas = enc.total_esperadas || 0;\r\n    var pctResp = totalEsperadas > 0 ? Math.round((totalResp / totalEsperadas) * 100) : 0;\r\n    var numPreguntas = enc.num_preguntas || 0;\r\n    var fechaCierre = enc.fecha_cierre ? formatDate(enc.fecha_cierre) : 'Sin fecha';\r\n\r\n    // Actions\r\n    var accionesHtml = '<button class=\"btn btn-sm btn-outline\" onclick=\"verRespuestasEncuesta(\\'' + enc.id + '\\')\">Ver respuestas</button>';\r\n    accionesHtml += '<button class=\"btn btn-sm btn-outline\" onclick=\"abrirEditorEncuesta(\\'' + enc.id + '\\')\">Editar</button>';\r\n    accionesHtml += '<button class=\"btn btn-sm btn-outline\" style=\"color:#c0392b;\" onclick=\"eliminarEncuestaPrograma(\\'' + enc.id + '\\')\" title=\"Eliminar\">&times;</button>';\r\n\r\n    var estado = (enc.estado || 'borrador').toLowerCase();\r\n    if (estado === 'borrador') {\r\n      accionesHtml += '<button class=\"btn btn-sm btn-success\" onclick=\"activarEncuestaPrograma(\\'' + enc.id + '\\')\">Activar</button>';\r\n    } else if (estado === 'activa') {\r\n      accionesHtml += '<button class=\"btn btn-sm btn-warning\" onclick=\"cerrarEncuestaPrograma(\\'' + enc.id + '\\')\">Cerrar</button>';\r\n    }\r\n\r\n    return '<div class=\"encuesta-slot\">' +\r\n      headerHtml +\r\n      '<div class=\"encuesta-slot-body\">' +\r\n        '<div class=\"enc-nombre\">' + escapeHtml(enc.nombre || slot.label) + '</div>' +\r\n        '<div class=\"enc-meta\">' +\r\n          '<div class=\"meta-item\">' + estadoHtml + '</div>' +\r\n          '<div class=\"meta-item\"><span style=\"color:var(--color-texto-sec);\">Preguntas: ' + numPreguntas + '</span></div>' +\r\n          '<div class=\"meta-item\"><span style=\"color:var(--color-texto-sec);\">L\\u00edmite: ' + escapeHtml(fechaCierre) + '</span></div>' +\r\n        '</div>' +\r\n        '<div class=\"enc-progress\">' +\r\n          '<div class=\"progress-label\">' + totalResp + '/' + totalEsperadas + ' completadas (' + pctResp + '%)</div>' +\r\n          '<div class=\"progress-bar-bg\">' +\r\n            '<div class=\"progress-bar-fill\" style=\"width:' + pctResp + '%;\"></div>' +\r\n          '</div>' +\r\n        '</div>' +\r\n        '<div class=\"encuesta-slot-actions\">' + accionesHtml + '</div>' +\r\n      '</div>' +\r\n    '</div>';\r\n  }\r\n\r\n  /**\r\n   * Opens the create survey modal, optionally pre-selecting type and momento\r\n   */\r\n  function abrirModalCrearEncuestaProg(tipoCuestionario, tipo) {\r\n    resetForm('form-crear-encuesta-prog');\r\n\r\n    if (tipoCuestionario) {\r\n      var radios = document.querySelectorAll('input[name=\"tipo_cuestionario\"]');\r\n      for (var i = 0; i < radios.length; i++) {\r\n        radios[i].checked = (radios[i].value === tipoCuestionario);\r\n      }\r\n    }\r\n\r\n    if (tipo) {\r\n      var tipoRadios = document.querySelectorAll('input[name=\"tipo\"]');\r\n      for (var j = 0; j < tipoRadios.length; j++) {\r\n        tipoRadios[j].checked = (tipoRadios[j].value === tipo);\r\n      }\r\n    }\r\n\r\n    openModal('modal-crear-encuesta-prog');\r\n  }\r\n\r\n  /**\r\n   * Creates a survey and auto-generates questions from program competencias\r\n   */\r\n  function crearEncuestaPrograma() {\r\n    var tipoCuestionario = document.querySelector('input[name=\"tipo_cuestionario\"]:checked').value;\r\n    var tipo = document.querySelector('input[name=\"tipo\"]:checked').value;\r\n    var instrucciones = document.querySelector('#form-crear-encuesta-prog textarea[name=\"instrucciones\"]').value.trim();\r\n    var fechaCierre = document.querySelector('#form-crear-encuesta-prog input[name=\"fecha_cierre\"]').value;\r\n\r\n    // Check if this slot is already taken\r\n    var yaExiste = false;\r\n    for (var i = 0; i < encuestasProgData.length; i++) {\r\n      var tc = (encuestasProgData[i].tipo_cuestionario || '').toLowerCase();\r\n      var tm = (encuestasProgData[i].tipo || '').toLowerCase();\r\n      if (tc === tipoCuestionario && tm === tipo) {\r\n        yaExiste = true;\r\n        break;\r\n      }\r\n    }\r\n\r\n    if (yaExiste) {\r\n      showToast('Ya existe una encuesta de tipo ' + tipoCuestionario + ' ' + tipo.toUpperCase() + ' en este programa.', 'error');\r\n      return;\r\n    }\r\n\r\n    var cuestionarioLabel = tipoCuestionario === 'autoevaluacion' ? 'Autoevaluaci\\u00f3n' : 'Coevaluaci\\u00f3n';\r\n    var nombre = cuestionarioLabel + ' ' + tipo.toUpperCase() + ' - Programa';\r\n\r\n    var datos = {\r\n      programa_id: panelProgramaId,\r\n      nombre: nombre,\r\n      tipo_cuestionario: tipoCuestionario,\r\n      tipo: tipo,\r\n      instrucciones: instrucciones,\r\n      fecha_cierre: fechaCierre\r\n    };\r\n\r\n    var btn = document.getElementById('btn-guardar-encuesta-prog');\r\n    btnLoading(btn, true);\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          var encuestaId = r.data ? (r.data.id || r.data.encuestaId) : null;\r\n          // Auto-generate questions from competencias\r\n          btnLoading(btn, false);\r\n          closeModal('modal-crear-encuesta-prog');\r\n          showToast('Encuesta creada.', 'success');\r\n          var eid = encuestaId || (r.data ? r.data.id : null);\r\n          if (eid) {\r\n            abrirEditorEncuesta(eid);\r\n          } else {\r\n            cargarEncuestasPrograma();\r\n          }\r\n        } else {\r\n          btnLoading(btn, false);\r\n          showToast(r ? r.error : 'Error al crear encuesta.', 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        btnLoading(btn, false);\r\n        showToast('Error de conexi\\u00f3n al crear encuesta.', 'error');\r\n      })\r\n      .crearEncuesta(App.token, datos);\r\n  }\r\n\r\n  /**\r\n   * Auto-generates survey questions from the program's competencias\r\n   */\r\n  function generarPreguntasDesdeCompetencias(encuestaId, callback) {\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          if (typeof callback === 'function') callback();\r\n        } else {\r\n          showToast('Encuesta creada, pero hubo un error al generar preguntas: ' + (r ? r.error : ''), 'warning');\r\n          if (typeof callback === 'function') callback();\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        showToast('Encuesta creada, pero fall\\u00f3 la generaci\\u00f3n de preguntas.', 'warning');\r\n        if (typeof callback === 'function') callback();\r\n      })\r\n      .generarPreguntasDesdeCompetencias(App.token, encuestaId, panelProgramaId);\r\n  }\r\n\r\n  /**\r\n   * Activates a draft survey\r\n   */\r\n  function activarEncuestaPrograma(id) {\r\n    if (!confirmar('\\u00bfActivar esta encuesta? Se notificar\\u00e1 a los participantes.')) return;\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          showToast('Encuesta activada.', 'success');\r\n          cargarEncuestasPrograma();\r\n        } else {\r\n          showToast(r ? r.error : 'Error al activar.', 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        showToast('Error de conexi\\u00f3n al activar encuesta.', 'error');\r\n      })\r\n      .activarEncuesta(App.token, id);\r\n  }\r\n\r\n  /**\r\n   * Closes an active survey\r\n   */\r\n  function cerrarEncuestaPrograma(id) {\r\n    if (!confirmar('\\u00bfCerrar esta encuesta? No aceptar\\u00e1 m\\u00e1s respuestas.')) return;\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          showToast('Encuesta cerrada.', 'success');\r\n          cargarEncuestasPrograma();\r\n        } else {\r\n          showToast(r ? r.error : 'Error al cerrar.', 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        showToast('Error de conexi\\u00f3n al cerrar encuesta.', 'error');\r\n      })\r\n      .cerrarEncuesta(App.token, id);\r\n  }\r\n\r\n  function eliminarEncuestaPrograma(id) {\r\n    if (!confirm('Eliminar esta encuesta? Se perderan las preguntas y respuestas asociadas.')) return;\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          showToast('Encuesta eliminada.', 'success');\r\n          cargarEncuestasPrograma();\r\n        } else {\r\n          showToast(r ? r.error : 'Error.', 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function() { showToast('Error de conexion.', 'error'); })\r\n      .eliminarEncuesta(App.token, id);\r\n  }\r\n\r\n  /**\r\n   * Abre el editor tipo Forms para una encuesta\r\n   */\r\n  function abrirEditorEncuesta(encuestaId) {\r\n    // Setear variable global para que el editor la lea\r\n    window.editorEncuestaIdPendiente = encuestaId;\r\n\r\n    // Cargar el editor como tab\r\n    var contentArea = document.getElementById('panel-tab-content');\r\n    contentArea.innerHTML = '<div class=\"text-center\" style=\"padding:48px;\"><div class=\"spinner spinner-lg\"></div><p class=\"text-muted mt-3\">Cargando editor...</p></div>';\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(html) {\r\n        contentArea.innerHTML = html || '';\r\n        var scripts = contentArea.querySelectorAll('script');\r\n        scripts.forEach(function(oldScript) {\r\n          var newScript = document.createElement('script');\r\n          newScript.textContent = oldScript.textContent;\r\n          oldScript.parentNode.replaceChild(newScript, oldScript);\r\n        });\r\n      })\r\n      .withFailureHandler(function() {\r\n        contentArea.innerHTML = '<div class=\"text-center text-danger p-4\">Error al cargar el editor.</div>';\r\n      })\r\n      .getVistaHTML('tab-encuesta-editor');\r\n  }\r\n\r\n  /**\r\n   * Opens the questions modal for a survey, loading all questions with editable options\r\n   */\r\n  function verPreguntasEncuesta(encuestaId) {\r\n    preguntasEncuestaIdActual = encuestaId;\r\n    var enc = encuestasProgData.find(function(e) { return e.id === encuestaId; });\r\n    document.getElementById('modal-preguntas-titulo').textContent = 'Preguntas: ' + (enc ? escapeHtml(enc.nombre) : 'Encuesta');\r\n\r\n    var container = document.getElementById('preguntas-encuesta-container');\r\n    container.innerHTML = '<div class=\"text-center p-4\"><div class=\"spinner\"></div></div>';\r\n    openModal('modal-preguntas-encuesta');\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          var datos = r.data || {};\r\n          var preguntas = datos.preguntas || [];\r\n          preguntasEditData = preguntas;\r\n          renderPreguntasEditable(preguntas);\r\n        } else {\r\n          container.innerHTML = '<div class=\"text-center text-danger p-4\">Error al cargar preguntas: ' +\r\n            escapeHtml(r ? r.error : 'Error desconocido') + '</div>';\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        container.innerHTML = '<div class=\"text-center text-danger p-4\">Error de conexi\\u00f3n al cargar preguntas.</div>';\r\n      })\r\n      .obtenerEncuestaCompleta(App.token, encuestaId);\r\n  }\r\n\r\n  /**\r\n   * Renders all questions with editable option textareas\r\n   */\r\n  function renderPreguntasEditable(preguntas) {\r\n    var container = document.getElementById('preguntas-encuesta-container');\r\n\r\n    if (!preguntas || !preguntas.length) {\r\n      container.innerHTML = '<div class=\"text-center text-muted p-4\">No hay preguntas. Las preguntas se generan autom\\u00e1ticamente al crear la encuesta desde las competencias del programa.</div>';\r\n      return;\r\n    }\r\n\r\n    var html = preguntas.map(function(p, idx) {\r\n      var competenciaNombre = escapeHtml(p.competencia_nombre || p.conducta_nombre || 'Sin competencia');\r\n      var foco = escapeHtml(p.foco || '');\r\n\r\n      return '<div class=\"pregunta-card\" data-pregunta-id=\"' + (p.id || idx) + '\">' +\r\n        '<div class=\"pregunta-header\">' +\r\n          '<div>' +\r\n            '<span class=\"pregunta-competencia\">' + competenciaNombre + '</span>' +\r\n            (foco ? ' <span class=\"pregunta-foco\">' + foco + '</span>' : '') +\r\n          '</div>' +\r\n          '<span class=\"text-xs text-muted\">#' + (idx + 1) + '</span>' +\r\n        '</div>' +\r\n        '<div class=\"opciones-grid\">' +\r\n          '<div class=\"opcion-item\">' +\r\n            '<label>Nivel 1</label>' +\r\n            '<textarea class=\"form-control opcion-text\" data-idx=\"' + idx + '\" data-nivel=\"1\">' +\r\n              escapeHtml(p.nivel_1_texto || p.opcion_1 || '') + '</textarea>' +\r\n          '</div>' +\r\n          '<div class=\"opcion-item\">' +\r\n            '<label>Nivel 2</label>' +\r\n            '<textarea class=\"form-control opcion-text\" data-idx=\"' + idx + '\" data-nivel=\"2\">' +\r\n              escapeHtml(p.nivel_2_texto || p.opcion_2 || '') + '</textarea>' +\r\n          '</div>' +\r\n          '<div class=\"opcion-item\">' +\r\n            '<label>Nivel 3</label>' +\r\n            '<textarea class=\"form-control opcion-text\" data-idx=\"' + idx + '\" data-nivel=\"3\">' +\r\n              escapeHtml(p.nivel_3_texto || p.opcion_3 || '') + '</textarea>' +\r\n          '</div>' +\r\n          '<div class=\"opcion-item\">' +\r\n            '<label>Nivel 4</label>' +\r\n            '<textarea class=\"form-control opcion-text\" data-idx=\"' + idx + '\" data-nivel=\"4\">' +\r\n              escapeHtml(p.nivel_4_texto || p.opcion_4 || '') + '</textarea>' +\r\n          '</div>' +\r\n        '</div>' +\r\n      '</div>';\r\n    }).join('');\r\n\r\n    container.innerHTML = html;\r\n  }\r\n\r\n  /**\r\n   * Saves edited questions back to the server\r\n   */\r\n  function guardarPreguntasEncuesta() {\r\n    if (!preguntasEncuestaIdActual || !preguntasEditData.length) {\r\n      showToast('No hay preguntas para guardar.', 'warning');\r\n      return;\r\n    }\r\n\r\n    // Collect edited values from textareas\r\n    var textareas = document.querySelectorAll('.opcion-text');\r\n    var actualizaciones = {};\r\n\r\n    for (var i = 0; i < textareas.length; i++) {\r\n      var ta = textareas[i];\r\n      var idx = parseInt(ta.getAttribute('data-idx'));\r\n      var nivel = ta.getAttribute('data-nivel');\r\n\r\n      if (!actualizaciones[idx]) {\r\n        actualizaciones[idx] = {\r\n          id: preguntasEditData[idx].id\r\n        };\r\n      }\r\n      actualizaciones[idx]['nivel_' + nivel + '_texto'] = ta.value.trim();\r\n    }\r\n\r\n    var preguntasActualizadas = [];\r\n    for (var key in actualizaciones) {\r\n      if (actualizaciones.hasOwnProperty(key)) {\r\n        preguntasActualizadas.push(actualizaciones[key]);\r\n      }\r\n    }\r\n\r\n    var btn = document.getElementById('btn-guardar-preguntas');\r\n    btnLoading(btn, true);\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        btnLoading(btn, false);\r\n        if (r && r.success) {\r\n          showToast('Preguntas actualizadas correctamente.', 'success');\r\n          closeModal('modal-preguntas-encuesta');\r\n          cargarEncuestasPrograma();\r\n        } else {\r\n          showToast(r ? r.error : 'Error al guardar preguntas.', 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        btnLoading(btn, false);\r\n        showToast('Error de conexi\\u00f3n al guardar preguntas.', 'error');\r\n      })\r\n      .actualizarPreguntasEncuesta(App.token, preguntasEncuestaIdActual, preguntasActualizadas);\r\n  }\r\n\r\n  /**\r\n   * Opens the responses modal showing who responded and their levels per competencia\r\n   */\r\n  function verRespuestasEncuesta(encuestaId) {\r\n    var enc = encuestasProgData.find(function(e) { return e.id === encuestaId; });\r\n    document.getElementById('modal-respuestas-titulo').textContent = 'Respuestas: ' + (enc ? escapeHtml(enc.nombre) : 'Encuesta');\r\n\r\n    var resumenDiv = document.getElementById('respuestas-resumen');\r\n    resumenDiv.innerHTML = '';\r\n\r\n    var container = document.getElementById('respuestas-encuesta-container');\r\n    container.innerHTML = '<div class=\"text-center p-4\"><div class=\"spinner\"></div></div>';\r\n    openModal('modal-respuestas-encuesta');\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          var datos = r.data || {};\r\n          renderRespuestasEncuesta(datos);\r\n        } else {\r\n          container.innerHTML = '<div class=\"text-center text-danger p-4\">Error al cargar respuestas: ' +\r\n            escapeHtml(r ? r.error : 'Error desconocido') + '</div>';\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        container.innerHTML = '<div class=\"text-center text-danger p-4\">Error de conexi\\u00f3n al cargar respuestas.</div>';\r\n      })\r\n      .obtenerResultadosEncuesta(App.token, encuestaId);\r\n  }\r\n\r\n  /**\r\n   * Renders the responses table: respondents as rows, competencias as columns\r\n   */\r\n  function renderRespuestasEncuesta(datos) {\r\n    var resumenDiv = document.getElementById('respuestas-resumen');\r\n    var container = document.getElementById('respuestas-encuesta-container');\r\n\r\n    var participantes = datos.participantes || [];\r\n    var competencias = datos.competencias || [];\r\n    var respuestas = datos.respuestas || [];\r\n    var totalRespondidos = 0;\r\n\r\n    // Build lookup: participante_id -> { competencia_id -> nivel }\r\n    var respuestaMap = {};\r\n    for (var r = 0; r < respuestas.length; r++) {\r\n      var resp = respuestas[r];\r\n      if (!respuestaMap[resp.participante_id]) {\r\n        respuestaMap[resp.participante_id] = {};\r\n      }\r\n      respuestaMap[resp.participante_id][resp.competencia_id] = resp.nivel;\r\n    }\r\n\r\n    // Count respondents\r\n    for (var p = 0; p < participantes.length; p++) {\r\n      if (respuestaMap[participantes[p].id]) {\r\n        totalRespondidos++;\r\n      }\r\n    }\r\n\r\n    // Summary\r\n    resumenDiv.innerHTML = '<div style=\"display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;\">' +\r\n      '<div style=\"background:var(--color-fondo-alt);border:1px solid var(--color-borde);border-radius:6px;padding:10px 16px;\">' +\r\n        '<span class=\"text-xs text-muted\" style=\"text-transform:uppercase;\">Total participantes</span>' +\r\n        '<div style=\"font-size:20px;font-weight:700;color:var(--color-primario);\">' + participantes.length + '</div>' +\r\n      '</div>' +\r\n      '<div style=\"background:var(--color-fondo-alt);border:1px solid var(--color-borde);border-radius:6px;padding:10px 16px;\">' +\r\n        '<span class=\"text-xs text-muted\" style=\"text-transform:uppercase;\">Respondieron</span>' +\r\n        '<div style=\"font-size:20px;font-weight:700;color:var(--color-exito, #27ae60);\">' + totalRespondidos + '</div>' +\r\n      '</div>' +\r\n      '<div style=\"background:var(--color-fondo-alt);border:1px solid var(--color-borde);border-radius:6px;padding:10px 16px;\">' +\r\n        '<span class=\"text-xs text-muted\" style=\"text-transform:uppercase;\">Pendientes</span>' +\r\n        '<div style=\"font-size:20px;font-weight:700;color:var(--color-alerta, #e67e22);\">' + (participantes.length - totalRespondidos) + '</div>' +\r\n      '</div>' +\r\n    '</div>';\r\n\r\n    if (!participantes.length) {\r\n      container.innerHTML = '<div class=\"text-center text-muted p-4\">No hay participantes asociados a esta encuesta.</div>';\r\n      return;\r\n    }\r\n\r\n    // Build table\r\n    var theadHtml = '<tr><th>Participante</th><th>Estado</th>';\r\n    for (var c = 0; c < competencias.length; c++) {\r\n      theadHtml += '<th title=\"' + escapeHtml(competencias[c].nombre) + '\">' +\r\n        escapeHtml(truncarTexto(competencias[c].nombre, 20)) + '</th>';\r\n    }\r\n    theadHtml += '</tr>';\r\n\r\n    var tbodyHtml = '';\r\n    for (var pi = 0; pi < participantes.length; pi++) {\r\n      var part = participantes[pi];\r\n      var tieneRespuesta = !!respuestaMap[part.id];\r\n      var estadoCell = tieneRespuesta\r\n        ? '<span class=\"badge badge-success\">Completada</span>'\r\n        : '<span class=\"badge badge-warning\">Pendiente</span>';\r\n\r\n      tbodyHtml += '<tr>';\r\n      tbodyHtml += '<td><strong>' + escapeHtml(part.nombre || part.nombre_completo || '') + '</strong>' +\r\n        '<div class=\"text-xs text-muted\">' + escapeHtml(part.email || '') + '</div></td>';\r\n      tbodyHtml += '<td>' + estadoCell + '</td>';\r\n\r\n      for (var ci = 0; ci < competencias.length; ci++) {\r\n        var nivelVal = tieneRespuesta && respuestaMap[part.id][competencias[ci].id]\r\n          ? respuestaMap[part.id][competencias[ci].id]\r\n          : null;\r\n\r\n        if (nivelVal !== null) {\r\n          var nivelColor = nivelVal <= 1 ? '#e74c3c' : (nivelVal <= 2 ? '#e67e22' : (nivelVal <= 3 ? '#3498db' : '#27ae60'));\r\n          tbodyHtml += '<td class=\"nivel-cell\" style=\"color:' + nivelColor + ';\">' + nivelVal + '</td>';\r\n        } else {\r\n          tbodyHtml += '<td class=\"nivel-cell sin-respuesta\">-</td>';\r\n        }\r\n      }\r\n\r\n      tbodyHtml += '</tr>';\r\n    }\r\n\r\n    container.innerHTML = '<div class=\"respuestas-table-container\">' +\r\n      '<table>' +\r\n        '<thead>' + theadHtml + '</thead>' +\r\n        '<tbody>' + tbodyHtml + '</tbody>' +\r\n      '</table>' +\r\n    '</div>';\r\n  }\r\n\r\n  /**\r\n   * Truncates text to a maximum length\r\n   */\r\n  function truncarTexto(texto, max) {\r\n    if (!texto) return '';\r\n    return texto.length > max ? texto.substring(0, max) + '...' : texto;\r\n  }\r\n<\/script>\r\n","tab-cronograma":"<!-- Tab: Cronograma y Archivos del Programa -->\r\n<style>\r\n  .archivo-card {\r\n    display: flex;\r\n    align-items: center;\r\n    justify-content: space-between;\r\n    padding: 14px 18px;\r\n    border: 1px solid var(--color-borde);\r\n    border-radius: 10px;\r\n    margin-bottom: 10px;\r\n    background: #fff;\r\n    transition: box-shadow 0.15s;\r\n  }\r\n  .archivo-card:hover {\r\n    box-shadow: 0 2px 8px rgba(0,0,0,0.06);\r\n  }\r\n  .archivo-info {\r\n    display: flex;\r\n    align-items: center;\r\n    gap: 14px;\r\n    flex: 1;\r\n    min-width: 0;\r\n  }\r\n  .archivo-icono {\r\n    width: 42px;\r\n    height: 42px;\r\n    border-radius: 10px;\r\n    display: flex;\r\n    align-items: center;\r\n    justify-content: center;\r\n    flex-shrink: 0;\r\n    font-size: 18px;\r\n  }\r\n  .archivo-icono-cronograma { background: #EBF5FB; color: #2E86C1; }\r\n  .archivo-icono-material { background: #FEF9E7; color: #F39C12; }\r\n  .archivo-icono-instructivo { background: #F4ECF7; color: #8E44AD; }\r\n  .archivo-icono-presentacion { background: #FDEDEC; color: #E74C3C; }\r\n  .archivo-icono-informe { background: #E8F8F5; color: #1ABC9C; }\r\n  .archivo-icono-otro { background: var(--color-fondo-alt); color: var(--color-texto-sec); }\r\n\r\n  .archivo-nombre {\r\n    font-weight: 600;\r\n    font-size: 14px;\r\n    color: var(--color-texto);\r\n    white-space: nowrap;\r\n    overflow: hidden;\r\n    text-overflow: ellipsis;\r\n  }\r\n  .archivo-meta {\r\n    font-size: 12px;\r\n    color: var(--color-texto-sec);\r\n    margin-top: 2px;\r\n  }\r\n  .archivo-acciones {\r\n    display: flex;\r\n    align-items: center;\r\n    gap: 8px;\r\n    flex-shrink: 0;\r\n  }\r\n  .visibilidad-toggle {\r\n    display: flex;\r\n    align-items: center;\r\n    gap: 4px;\r\n    font-size: 11px;\r\n    color: var(--color-texto-sec);\r\n    cursor: pointer;\r\n  }\r\n  .empty-archivos {\r\n    text-align: center;\r\n    padding: 48px 24px;\r\n    color: var(--color-texto-sec);\r\n  }\r\n  .empty-archivos p { margin-bottom: 4px; }\r\n  .tipo-filter-btn {\r\n    padding: 6px 14px;\r\n    border: 1px solid var(--color-borde);\r\n    border-radius: 20px;\r\n    background: #fff;\r\n    font-size: 12px;\r\n    cursor: pointer;\r\n    transition: all 0.15s;\r\n  }\r\n  .tipo-filter-btn:hover, .tipo-filter-btn.active {\r\n    background: var(--color-primario);\r\n    color: #fff;\r\n    border-color: var(--color-primario);\r\n  }\r\n</style>\r\n\r\n<div>\r\n  <!-- Header -->\r\n  <div class=\"flex-between mb-4\">\r\n    <div>\r\n      <h3 style=\"margin:0;\">Actividades y Recursos</h3>\r\n      <p class=\"text-sm text-muted\" style=\"margin-top:4px;\">Sube el Gantt, links de formularios externos (Google Forms, MS Forms), materiales, instructivos y cualquier recurso del programa.</p>\r\n    </div>\r\n    <button class=\"btn btn-primary\" onclick=\"abrirSubirArchivo()\">\r\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"vertical-align:middle;margin-right:4px;\"><path d=\"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4\"/><polyline points=\"17 8 12 3 7 8\"/><line x1=\"12\" y1=\"3\" x2=\"12\" y2=\"15\"/></svg>\r\n      Subir Archivo\r\n    </button>\r\n  </div>\r\n\r\n  <!-- Filtros por tipo -->\r\n  <div style=\"display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;\">\r\n    <button class=\"tipo-filter-btn active\" onclick=\"filtrarArchivosTipo('')\">Todos</button>\r\n    <button class=\"tipo-filter-btn\" onclick=\"filtrarArchivosTipo('cronograma')\">Cronograma / Gantt</button>\r\n    <button class=\"tipo-filter-btn\" onclick=\"filtrarArchivosTipo('enlace')\">Enlace externo</button>\r\n    <button class=\"tipo-filter-btn\" onclick=\"filtrarArchivosTipo('material')\">Material</button>\r\n    <button class=\"tipo-filter-btn\" onclick=\"filtrarArchivosTipo('instructivo')\">Instructivo</button>\r\n    <button class=\"tipo-filter-btn\" onclick=\"filtrarArchivosTipo('presentacion')\">Presentaci&oacute;n</button>\r\n    <button class=\"tipo-filter-btn\" onclick=\"filtrarArchivosTipo('informe')\">Informe</button>\r\n    <button class=\"tipo-filter-btn\" onclick=\"filtrarArchivosTipo('otro')\">Otro</button>\r\n  </div>\r\n\r\n  <!-- Lista de archivos -->\r\n  <div id=\"lista-archivos-programa\">\r\n    <div class=\"text-center p-4\"><div class=\"spinner\"></div></div>\r\n  </div>\r\n</div>\r\n\r\n<!-- Modal: Subir Archivo -->\r\n<div class=\"modal-overlay\" id=\"modal-subir-archivo\">\r\n  <div class=\"modal\" style=\"max-width:500px;\">\r\n    <div class=\"modal-header\">\r\n      <h3>Subir Archivo</h3>\r\n      <button class=\"modal-close\" onclick=\"closeModal('modal-subir-archivo')\">&times;</button>\r\n    </div>\r\n    <div class=\"modal-body\">\r\n      <div class=\"form-group\">\r\n        <label>Tipo de archivo *</label>\r\n        <select class=\"form-control\" id=\"archivo-tipo\">\r\n          <option value=\"cronograma\">Cronograma / Gantt</option>\r\n          <option value=\"enlace\">Enlace externo (Google Forms, MS Forms, etc.)</option>\r\n          <option value=\"material\">Material de apoyo</option>\r\n          <option value=\"instructivo\">Instructivo</option>\r\n          <option value=\"presentacion\">Presentaci&oacute;n</option>\r\n          <option value=\"informe\">Informe</option>\r\n          <option value=\"otro\">Otro</option>\r\n        </select>\r\n      </div>\r\n      <div class=\"form-group\">\r\n        <label>Archivo *</label>\r\n        <input type=\"file\" class=\"form-control\" id=\"archivo-input\" accept=\".pdf,.pptx,.ppt,.xlsx,.xls,.docx,.doc,.jpg,.png,.mp4\">\r\n      </div>\r\n      <div class=\"form-group\">\r\n        <label>Mensaje para los participantes</label>\r\n        <textarea class=\"form-control\" id=\"archivo-mensaje\" rows=\"2\" placeholder=\"Ej: Revisen este material antes del pr&oacute;ximo taller. Es importante para la actividad pr&aacute;ctica.\"></textarea>\r\n        <small class=\"text-muted\">Este mensaje se mostrar&aacute; junto al archivo en la vista del participante.</small>\r\n      </div>\r\n      <div class=\"form-group\">\r\n        <label style=\"display:flex;align-items:center;gap:8px;cursor:pointer;\">\r\n          <input type=\"checkbox\" id=\"archivo-visible\" checked>\r\n          <span>Visible para participantes</span>\r\n        </label>\r\n        <small class=\"text-muted\">Si est&aacute; activo, los l&iacute;deres y colaboradores podr&aacute;n ver y descargar este archivo.</small>\r\n      </div>\r\n    </div>\r\n    <div class=\"modal-footer\">\r\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-subir-archivo')\">Cancelar</button>\r\n      <button class=\"btn btn-primary\" id=\"btn-subir-archivo\" onclick=\"confirmarSubirArchivo()\">Subir</button>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<script>\r\n  var archivosData = [];\r\n  var archivosFiltro = '';\r\n\r\n  (function() {\r\n    cargarArchivosPrograma();\r\n  })();\r\n\r\n  function cargarArchivosPrograma() {\r\n    document.getElementById('lista-archivos-programa').innerHTML =\r\n      '<div class=\"text-center p-4\"><div class=\"spinner\"></div></div>';\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r && r.success) {\r\n          archivosData = r.data || [];\r\n          renderArchivos();\r\n        } else {\r\n          document.getElementById('lista-archivos-programa').innerHTML =\r\n            '<div class=\"empty-archivos\"><p>Error al cargar archivos.</p></div>';\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        document.getElementById('lista-archivos-programa').innerHTML =\r\n          '<div class=\"empty-archivos\"><p>Error de conexion.</p></div>';\r\n      })\r\n      .listarArchivosPrograma(App.token, panelProgramaId);\r\n  }\r\n\r\n  function renderArchivos() {\r\n    var container = document.getElementById('lista-archivos-programa');\r\n    var filtrados = archivosFiltro\r\n      ? archivosData.filter(function(a) { return a.tipo === archivosFiltro; })\r\n      : archivosData;\r\n\r\n    if (!filtrados.length) {\r\n      container.innerHTML =\r\n        '<div class=\"empty-archivos\">' +\r\n          '<p style=\"font-size:36px;margin-bottom:8px;\">&#128193;</p>' +\r\n          '<p><strong>No hay archivos' + (archivosFiltro ? ' de este tipo' : '') + '</strong></p>' +\r\n          '<p class=\"text-sm\">Sube el Gantt, materiales o instructivos para el programa.</p>' +\r\n        '</div>';\r\n      return;\r\n    }\r\n\r\n    var iconos = {\r\n      cronograma: { icon: '&#128197;', cls: 'archivo-icono-cronograma' },\r\n      material: { icon: '&#128214;', cls: 'archivo-icono-material' },\r\n      instructivo: { icon: '&#128221;', cls: 'archivo-icono-instructivo' },\r\n      presentacion: { icon: '&#127916;', cls: 'archivo-icono-presentacion' },\r\n      informe: { icon: '&#128200;', cls: 'archivo-icono-informe' },\r\n      otro: { icon: '&#128196;', cls: 'archivo-icono-otro' }\r\n    };\r\n\r\n    var tipoLabels = {\r\n      cronograma: 'Cronograma', material: 'Material', instructivo: 'Instructivo',\r\n      presentacion: 'Presentacion', informe: 'Informe', otro: 'Otro'\r\n    };\r\n\r\n    container.innerHTML = filtrados.map(function(a) {\r\n      var ic = iconos[a.tipo] || iconos.otro;\r\n      var visibleIcon = (a.visible_participantes === true || a.visible_participantes === 'true')\r\n        ? '<span style=\"color:var(--color-exito);\" title=\"Visible para participantes\">&#128065;</span>'\r\n        : '<span style=\"color:var(--color-texto-sec);\" title=\"Solo admin\">&#128274;</span>';\r\n\r\n      return '<div class=\"archivo-card\">' +\r\n        '<div class=\"archivo-info\">' +\r\n          '<div class=\"archivo-icono ' + ic.cls + '\">' + ic.icon + '</div>' +\r\n          '<div style=\"min-width:0;\">' +\r\n            '<div class=\"archivo-nombre\" title=\"' + escapeHtml(a.nombre_archivo) + '\">' + escapeHtml(a.nombre_archivo) + '</div>' +\r\n            '<div class=\"archivo-meta\">' +\r\n              '<span class=\"badge badge-info\" style=\"font-size:10px;padding:2px 6px;\">' + (tipoLabels[a.tipo] || a.tipo) + '</span> ' +\r\n              visibleIcon + ' ' +\r\n              (a.subido_por_nombre ? escapeHtml(a.subido_por_nombre) + ' &middot; ' : '') +\r\n              (a.fecha_subida ? formatDate(a.fecha_subida) : '') +\r\n            '</div>' +\r\n            (a.mensaje ? '<div style=\"font-size:12px;color:var(--color-texto);margin-top:4px;font-style:italic;\">&ldquo;' + escapeHtml(a.mensaje) + '&rdquo;</div>' : '') +\r\n          '</div>' +\r\n        '</div>' +\r\n        '<div class=\"archivo-acciones\">' +\r\n          '<a href=\"' + escapeHtml(a.drive_url) + '\" target=\"_blank\" class=\"btn btn-sm btn-outline\" title=\"Abrir / Descargar\">Abrir</a>' +\r\n          '<button class=\"btn btn-sm btn-outline\" onclick=\"toggleVisibilidad(\\'' + a.id + '\\',' + !(a.visible_participantes === true || a.visible_participantes === 'true') + ')\" title=\"Cambiar visibilidad\">' +\r\n            ((a.visible_participantes === true || a.visible_participantes === 'true') ? 'Ocultar' : 'Mostrar') +\r\n          '</button>' +\r\n          '<button class=\"btn btn-sm btn-outline\" style=\"color:#c0392b;\" onclick=\"eliminarArchivo(\\'' + a.id + '\\')\" title=\"Eliminar\">&times;</button>' +\r\n        '</div>' +\r\n      '</div>';\r\n    }).join('');\r\n  }\r\n\r\n  function filtrarArchivosTipo(tipo) {\r\n    archivosFiltro = tipo;\r\n    // Toggle botones activos\r\n    document.querySelectorAll('.tipo-filter-btn').forEach(function(btn) {\r\n      btn.classList.remove('active');\r\n    });\r\n    event.target.classList.add('active');\r\n    renderArchivos();\r\n  }\r\n\r\n  function abrirSubirArchivo() {\r\n    document.getElementById('archivo-input').value = '';\r\n    document.getElementById('archivo-tipo').value = 'material';\r\n    document.getElementById('archivo-mensaje').value = '';\r\n    document.getElementById('archivo-visible').checked = true;\r\n    openModal('modal-subir-archivo');\r\n  }\r
