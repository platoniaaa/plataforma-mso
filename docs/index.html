\n            '<li>Observaciones de campo realizadas</li>' +\n            '<li>Feedback entregado por jefaturas</li>' +\n          '</ul>' +\n          '<p><strong>Pr\\u00f3ximos hitos:</strong></p>' +\n          '<ol>' +\n            '<li>Continuar con la pr\\u00e1ctica guiada en terreno</li>' +\n            '<li>Pr\\u00f3ximo checkpoint de seguimiento</li>' +\n            '<li>Preparaci\\u00f3n para la medici\\u00f3n POST</li>' +\n          '</ol>' +\n          '<p>Adjuntamos el detalle completo del avance.</p>' +\n          '<p>Saludos cordiales.</p>';\n      }\n    },\n    cierre: {\n      nombre: 'Cierre / Resultados',\n      color: '#D4E6F1',\n      colorText: '#2471A3',\n      asunto: function(p) { return 'Resultados Finales - ' + p.nombre; },\n      cuerpo: function(p) {\n        return '<p>Estimado/a,</p>' +\n          '<p>Nos complace compartir los resultados finales del programa <strong>' + p.nombre + '</strong>.</p>' +\n          '<p><strong>Resumen del programa:</strong></p>' +\n          '<ul>' +\n            '<li>Per\\u00edodo: ' + (p.fecha_inicio || '') + ' - ' + (p.fecha_termino || '') + '</li>' +\n            '<li>Cliente: ' + (p.cliente_nombre || '') + '</li>' +\n            '<li>Objetivo: ' + (p.objetivo || '') + '</li>' +\n          '</ul>' +\n          '<p><strong>Resultados principales:</strong></p>' +\n          '<ul>' +\n            '<li>Comparaci\\u00f3n PRE vs POST: Se evidencia evoluci\\u00f3n en las conductas cr\\u00edticas medidas</li>' +\n            '<li>Nivel de participaci\\u00f3n: Alto compromiso de los participantes durante el proceso</li>' +\n            '<li>Observaciones de campo: Se registraron observaciones que evidencian transferencia al puesto</li>' +\n            '<li>Feedback de jefaturas: Retroalimentaci\\u00f3n positiva sobre los cambios observados</li>' +\n          '</ul>' +\n          '<p><strong>Recomendaciones:</strong></p>' +\n          '<ol>' +\n            '<li>Mantener espacios de refuerzo peri\\u00f3dico para \"font-weight:500;\">' + escapeHtml(a.nombre) + '</span><br>' +\n            '<span class=\"text-xs text-muted\">' + formatFileSize(a.tamano) + '</span>' +\n          '</div>' +\n        '</div>' +\n        '<button class=\"btn btn-sm btn-danger\" onclick=\"eliminarAdjunto(' + idx + ')\" style=\"padding:4px 8px;\">&times;</button>' +\n      '</div>';\n    }).join('');\n  }\n\n  // ============================================\n  // EDITOR DE TEXTO\n  // ============================================\n\n  function formatText(command) {\n    document.execCommand(command, false, null);\n    document.getElementById('correo-cuerpo').focus();\n  }\n\n  // ============================================\n  // PREVIEW Y ENVÍO\n  // ============================================\n\n  function previsualizarCorreo() {\n    var asunto = document.getElementById('correo-asunto').value;\n    var cuerpo = document.getElementById('correo-cuerpo').innerHTML;\n    var tmpl = TEMPLATES[correoTemplateActual];\n\n    var html = '<div class=\"preview-email\">';\n\n    // Header\n    html += '<div class=\"preview-header\">';\n    html += '<div style=\"margin-bottom:8px;\"><span class=\"text-xs text-muted\">De:</span> <span class=\"text-sm\">MSO Chile - Plataforma TPT &lt;noreply@mso.cl&gt;</span></div>';\n    html += '<div style=\"margin-bottom:8px;\"><span class=\"text-xs text-muted\">Para:</span> <span class=\"text-sm\">' +\n      (correoDestinatarios.length > 0 ? correoDestinatarios.map(function(e) { return escapeHtml(e); }).join(', ') : '<em class=\"text-muted\">Sin destinatarios</em>') +\n      '</span></div>';\n    html += '<div><span class=\"text-xs text-muted\">Asunto:</span> <strong class=\"text-sm\">' + escapeHtml(asunto) + '</strong></div>';\n    html += '</div>';\n\n    // Body\n    html += '<div class=\"preview-body\">' + cuerpo + '</div>';\n\n    // Adjuntos\n    if (correoAdjuntos.length > 0) {\n      html += '<div class=\"preview-adjuntos\">';\n      html += '<div class=\"text-xs t untos: correoAdjuntos.slice(),\n        cuerpo: cuerpo\n      };\n\n      correosEnviados.unshift(nuevoCorreo);\n      renderHistorialCorreos();\n\n      showToast('Correo enviado exitosamente a ' + correoDestinatarios.length + ' destinatario(s).', 'success');\n\n      // Volver al estado inicial\n      document.getElementById('correo-compositor').classList.add('hidden');\n      document.getElementById('correo-templates').classList.add('hidden');\n      correoDestinatarios = [];\n      correoAdjuntos = [];\n      correoTemplateActual = null;\n    }, 1500);\n  }\n\n  // ============================================\n  // HISTORIAL\n  // ============================================\n\n  function cargarHistorialCorreos(progId) {\n    // Mock: agregar algunos correos de ejemplo\n    if (correosEnviados.length === 0) {\n      correosEnviados = [\n        {\n          id: 'mail-001',\n          fecha: '2026-03-15',\n          template: 'presentacion',\n          template_nombre: 'Presentaci\\u00f3n de Programa',\n          asunto: 'Presentaci\\u00f3n del Programa: Liderazgo Seguro 2026',\n          programa_id: 'prog-001',\n          programa_nombre: 'Liderazgo Seguro 2026',\n          destinatarios: ['mgonzalez@losandes.cl'],\n          adjuntos: [\n            { nombre: 'Presentaci\\u00f3n Programa.pptx', tamano: 432039, tipo: 'application/pptx' },\n            { nombre: 'Matriz de competencias.xlsx', tamano: 12406, tipo: 'application/xlsx' }\n          ],\n          cuerpo: '<p>Correo de presentaci\\u00f3n enviado al cliente.</p>'\n        },\n        {\n          id: 'mail-002',\n          fecha: '2026-01-20',\n          template: 'bienvenida',\n          template_nombre: 'Inicio / Bienvenida',\n          asunto: 'Bienvenido/a al Programa Liderazgo Seguro 2026',\n          programa_id: 'prog-001',\n          programa_nombre: 'Liderazgo Seguro 2026',\n          destinatarios: ['mgonzalez@losandes.cl', 'rrhh@losandes.cl'],\n          adjuntos: [\n            { nombre: 'Instructivo pr\\u00e1ctica.pdf', tamano: 250948, tipo: 'application/pdf' },\n            { nombre: 'Gantt del programa.xlsx', tamano: 16685, tipo: 'application/xlsx' }\n          ],\n          cuerpo: '<p>Correo de bienvenida enviado.</p>'\n        }\n      ];\n    }\n    renderHistorialCorreos();\n  }\n\n  function getTemplateBadge(tipo) {\n    var tmpl = TEMPLATES[tipo];\n    if (!tmpl) return '<span class=\"badge\">' + tipo + '</span>';\n    return '<span class=\"badge template-badge-' + tipo + '\">' + tmpl.nombre + '</span>';\n  }\n\n  function renderHistorialCorreos() {\n    var tbody = document.getElementById('tbody-correos');\n    var progId = document.getElementById('sel-programa-correo').value;\n    var filtrados = correosEnviados.filter(function(c) { return !progId || c.programa_id === progId; });\n\n    document.getElementById('correo-historial-count').textContent = filtrados.length + ' correos';\n\n    if (filtrados.length === 0) {\n      tbody.innerHTML = '<tr><td colspan=\"7\" class=\"text-center text-muted p-4\">No hay correos enviados para este programa.</td></tr>';\n      return;\n    }\n\n    tbody.innerHTML = filtrados.map(function(c) {\n      return '<tr>' +\n        '<td class=\"text-sm\">' + formatDate(c.fecha) + '</td>' +\n        '<td>' + getTemplateBadge(c.template) + '</td>' +\n        '<td><strong class=\"text-sm\">' + escapeHtml(c.asunto.length > 40 ? c.asunto.substring(0, 40) + '...' : c.asunto) + '</strong></td>' +\n        '<td class=\"text-sm\">' + escapeHtml(c.programa_nombre) + '</td>' +\n        '<td class=\"text-sm\">' + c.destinatarios.length + '</td>' +\n        '<td class=\"text-center\">' + c.adjuntos.length + '</td>' +\n        '<td><button class=\"btn btn-sm btn-outline\" onclick=\"verDetalleCorreo(\\'' + c.id + '\\')\">Ver</button></td>' +\n      '</tr>';\n    }).join('');\n  }\n\n  function verDetalleCorreo(id) {\n    var c = correosEnviados.find(function(x) { return x.id === id; });\n    if (!c) return;\n\n    document.getElementById('detalle-correo-titulo').textContent = c.asunto;\n\n    var html = '';\n    html += '<div class=\"preview-header\">';\n    html += '<div style=\"margin-bottom:6px;\">' + getTemplateBadge(c.template) + ' <span class=\"text-xs text-muted\">| ' + formatDate(c.fecha) + '</span></div>';\n    html += '<div style=\"margin-bottom:4px;\"><span class=\"text-xs text-muted\">Para:</span> <span class=\"text-sm\">' + c.destinatarios.map(function(e) { return escapeHtml(e); }).join(', ') + '</span></div>';\n    html += '<div><span class=\"text-xs text-muted\">Programa:</span> <span class=\"text-sm\">' + escapeHtml(c.programa_nombre) + '</span></div>';\n    html += '</div>';\n\n    html += '<div class=\"preview-body\">' + c.cuerpo + '</div>';\n\n    if (c.adjuntos.length > 0) {\n      html += '<div class=\"preview-adjuntos\">';\n      html += '<div class=\"text-xs text-muted mb-2\" style=\"text-transform:uppercase;\">Adjuntos (' + c.adjuntos.length + ')</div>';\n      html += c.adjuntos.map(function(a) {\n        var icon = getFileIcon(a.tipo);\n        return '<div style=\"display:inline-flex;align-items:center;gap:6px;background:var(--color-tarjeta);padding:4px 10px;border-radius:6px;border:1px solid var(--color-borde);margin:2px;\">' +\n          '<span style=\"color:' + icon.color + ';font-size:10px;font-weight:700;\">' + icon.ext + '</span>' +\n          '<span class=\"text-xs\">' + escapeHtml(a.nombre) + '</span>' +\n          '<span class=\"text-xs text-muted\">(' + formatFileSize(a.tamano) + ')</span>' +\n        '</div>';\n      }).join(' ');\n      html += '</div>';\n    }\n\n    document.getElementById('detalle-correo-body').innerHTML = html;\n    openModal('modal-detalle-correo');\n  }\n<\/script>\n","asistente-ia":"<!-- Vista: Reportes IA (Admin + Jefatura - Generador de reportes PDF) -->\n<div>\n  <div class=\"flex-between mb-4\">\n    <div style=\"display:flex;gap:12px;align-items:center;flex-wrap:wrap;\">\n      <select class=\"form-control\" id=\"sel-programa-reporte\" onchange=\"onProgramaReporteChange()\" style=\"min-width:260px;\">\n        <option value=\"\">Selecciona un programa...</option>\n      </select>\n      <select class=\"form-control\" id=\"sel-tipo-reporte\" onchange=\"onTipoReporteChange()\" style=\"min-width:200px;\" disabled>\n        <option value=\"\">Tipo de reporte...</option>\n        <option value=\"consolidado\">Informe Ejecutivo Consolidado</option>\n        <option value=\"individual\">Informe Individual de Participante</option>\n      </select>\n      <select class=\"form-control hidden\" id=\"sel-participante-reporte\" style=\"min-width:240px;\">\n        <option value=\"\">Selecciona participante...</option>\n      </select>\n    </div>\n    <div style=\"display:flex;gap:8px;\">\n      <button class=\"btn btn-primary\" id=\"btn-generar-reporte\" onclick=\"generarReporte()\" disabled>\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"display:inline;vertical-align:middle;margin-right:4px;\">\n          <path d=\"M12 2a4 4 0 014 4v2a4 4 0 01-8 0V6a4 4 0 014-4z\"/><path d=\"M6 10v1a6 6 0 0012 0v-1\"/><path d=\"M12 18v4M8 22h8\"/>\n        </svg>\n        Generar Reporte\n      </button>\n      <button class=\"btn btn-outline hidden\" id=\"btn-descargar-pdf\" onclick=\"descargarPDF()\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"display:inline;vertical-align:middle;margin-right:4px;\">\n          <path d=\"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4\"/><polyline points=\"7 10 12 15 17 10\"/><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"/>\n        </svg>\n        Descargar PDF\n      </button>\n    </div>\n  </div>\n\n  <!-- Estado vac&iacute;o -->\n  <div id=\"reporte-empty\" class=\"card\">\n    <div class=\"empty-state\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"width:64px;height:64px;margin-bottom:16px;opacity:0.4;\">\n        <path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"/><path d=\"M14 2v6h6\"/><path d=\"M9 15l2 2 4-4\"/>\n      </svg>\n      <p>Selecciona un programa y el tipo de reporte para generar un informe con IA.</p>\n      <p class=\"text-sm text-muted mt-2\"><strong>Consolidado:</strong> Resultados del grupo, brechas, hallazgos y recomendaciones.<br><strong>Individual:</strong> Evaluaci&oacute;n por participante con an&aacute;lisis personalizado.</p>\n    </div>\n  </div>\n\n  <!-- Loading -->\n  <div id=\"reporte-loading\" class=\"hidden\">\n    <div class=\"card\"><div class=\"card-body text-center\" style=\"padding:60px 20px;\">\n      <div class=\"spinner spinner-lg\"></div>\n      <p class=\"text-muted mt-3\" id=\"reporte-loading-text\">Analizando datos del programa...</p>\n      <div class=\"progress-bar-container mt-3\" style=\"max-width:400px;margin:0 auto;\">\n        <div class=\"progress-bar\" id=\"reporte-progress\" style=\"width:0%;transition:width 0.5s;\"></div>\n      </div>\n    </div></div>\n  </div>\n\n  <!-- Preview del reporte -->\n  <div id=\"reporte-preview\" class=\"hidden\">\n    <div class=\"card mb-3\"><div class=\"card-body\" style=\"padding:8px 16px;display:flex;align-items:center;justify-content:space-between;\">\n      <span class=\"text-sm text-muted\">Vista previa. Haz clic en \"Descargar PDF\" para obtener el archivo.</span>\n      <button class=\"btn btn-sm btn-primary\" onclick=\"descargarPDF()\">\n        <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"display:inline;vertical-align:middle;margin-right:3px;\"><path d=\"M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4\"/><polyline points=\"7 10 12 15 17 10\"/><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"/></svg>\n        PDF\n      </button>\n    </div></div>\n    <div id=\"reporte-contenido\" class=\"rpt-container\"></div>\n  </div>\n</div>\n\n<style>\n  .rpt-container { background: white; border-radius: 8px; box-shadow: 0 2px 16px rgba(0,0,0,0.1); overflow: hidden; }\n\n  /* ===== ESTILOS PDF REPLICANDO EJEMPLO ===== */\n  .rpt {\n    font-family: 'Segoe UI', -apple-system, sans-serif;\n    color: #2D3436;\n    line-height: 1.6;\n    font-size: 13px;\n  }\n\n  /* Header con fondo */\n  .rpt-hero {\n    background: linear-gradient(135deg, rgba(26,60,110,0.92) 0%, rgba(26,60,110,0.85) 100%),\n                url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1200&h=400&fit=crop') center/cover;\n    color: white;\n    padding: 48px 50px 40px;\n  }\n\n  .rpt-hero h1 { font-size: 28px; font-weight: 800; margin: 0 0 6px; text-transform: uppercase; letter-spacing: 1px; }\n  .rpt-hero h2 { font-size: 18px; font-weight: 400; margin: 0 0 6px; font-style: italic; opacity: 0.9; }\n  .rpt-hero .rpt-meta { font-size: 12px; opacity: 0.7; margin-top: 12px; }\n\n  .rpt-body { padding: 40px 50px; }\n\n  /* Intro text */\n  .rpt-intro { font-size: 13px; color: #555; margin-bottom: 30px; line-height: 1.7; }\n  .rpt-intro strong { color: #1A3C6E; }\n\n  /* Sección */\n  .rpt-section { margin-bottom: 36px; page-break-inside: avoid; }\n  .rpt-section-title { font-size: 22px; font-weight: 700; color: #2D3436; margin: 0 0 20px; }\n  .rpt-subsection-title { font-size: 15px; font-weight: 600; color: #1A3C6E; margin: 0 0 10px; }\n\n  /* KPIs grandes (estilo ejemplo) */\n  .rpt-kpi-row { display: flex; gap: 0; margin: 20px 0; }\n  .rpt-kpi-big { flex: 1; text-align: center; padding: 20px 16px; }\n  .rpt-kpi-big-value { font-size: 48px; font-weight: 800; color: #1A3C6E; line-height: 1; }\n  .rpt-kpi-big-label { font-size: 13px; color: #718096; margin-top: 6px; }\n\n  /* Tablas lado a lado */\n  .rpt-tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 16px 0; }\n  @media (max-width: 700px) { .rpt-tables-grid { grid-template-columns: 1fr; } }\n\n  .rpt-table { width: 100%; border-collapse: collapse; font-size: 13px; }\n  .rpt-table caption { text-align: left; font-weight: 600; color: #1A3C6E; margin-bottom: 8px; font-size: 14px; caption-side: top; }\n  .rpt-table th { background: #E8F4FD; color: #1A3C6E; padding: 10px 14px; text-align: left; font-weight: 600; border-bottom: 2px solid #B3D9F2; }\n  .rpt-table td { padding: 9px 14px; border-bottom: 1px solid #EDF2F7; }\n  .rpt-table tr:last-child td { border-bottom: none; font-weight: 600; }\n  .rpt-table-highlight { background: #E8F4FD; }\n\n  /* Gráfico de barras horizontal (estilo ejemplo) */\n  .rpt-hbar-container { margin: 20px 0; }\n  .rpt-hbar-row { display: grid; grid-template-columns: 140px 1fr 40px; gap: 8px; align-items: center; margin-bottom: 6px; }\n  .rpt-hbar-label { font-size: 12px; font-weight: 500; text-align: right; color: #555; }\n  .rpt-hbar-track { height: 28px; background: #EDF2F7; border-radius: 4px; overflow: hidden; position: relative; }\n  .rpt-hbar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 11px; font-weight: 700; color: white; transition: width 0.5s; }\n  .rpt-hbar-fill-auto { background: #1A3C6E; }\n  .rpt-hbar-fill-co { background: #5DADE2; }\n  .rpt-hbar-value { font-size: 12px; font-weight: 600; color: #555; }\n\n  /* Cards de hallazgos (grid 3 cols) */\n  .rpt-findings-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 16px 0; }\n  .rpt-finding-card { background: #F7FBFE; border: 1px solid #D4E6F1; border-top: 4px solid #5DADE2; border-radius: 8px; padding: 16px; }\n  .rpt-finding-card h4 { font-size: 14px; font-weight: 700; color: #1A3C6E; margin: 0 0 8px; }\n  .rpt-finding-card p { font-size: 12px; color: #555; margin: 0; line-height: 1.5; }\n\n  /* Perfiles grid (2x2) */\n  .rpt-profiles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 16px 0; }\n  .rpt-profile-card { background: #F7FBFE; border: 1px solid #D4E6F1; border-radius: 8px; padding: 14px 16px; }\n  .rpt-profile-card h4 { font-size: 13px; font-weight: 700; color: #1A3C6E; margin: 0 0 4px; }\n  .rpt-profile-card p { font-size: 12px; color: #718096; margin: 0; }\n\n  /* Conclusiones con flechas */\n  .rpt-conclusion-item { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 12px; }\n  .rpt-conclusion-arrow { color: #5DADE2; font-size: 16px; flex-shrink: 0; margin-top: 2px; }\n  .rpt-conclusion-text { font-size: 13px; color: #555; line-height: 1.6; }\n  .rpt-conclusion-text strong { color: #1A3C6E; }\n\n  /* Recomendaciones numeradas (grid 2x2) */\n  .rpt-recs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }\n  .rpt-rec-card { border: 1px solid #D4E6F1; border-radius: 8px; overflow: hidden; }\n  .rpt-rec-num { background: #5DADE2; color: white; text-align: center; padding: 8px; font-size: 18px; font-weight: 700; }\n  .rpt-rec-body { padding: 14px 16px; }\n  .rpt-rec-body h4 { font-size: 14px; font-weight: 700; color: #1A3C6E; margin: 0 0 6px; }\n  .rpt-rec-body p { font-size: 12px; color: #555; margin: 0; line-height: 1.5; }\n\n  /* Cierre ejecutivo */\n  .rpt-cierre { background: #F7FBFE; border-left: 4px solid #1A3C6E; padding: 20px 24px; border-radius: 0 8px 8px 0; margin: 20px 0; }\n  .rpt-cierre p { font-size: 13px; color: #555; margin: 0 0 8px; line-height: 1.7; }\n  .rpt-cierre strong { color: #1A3C6E; }\n  .rpt-cierre .rpt-cierre-highlight { font-size: 14px; font-weight: 700; color: #1A3C6E; }\n\n  /* Individual: contexto box */\n  .rpt-context-box { background: #1A3C6E; color: white; border-radius: 12px; padding: 24px; }\n  .rpt-context-box h3 { font-size: 15px; margin: 0 0 10px; }\n  .rpt-context-box ul { margin: 8px 0 0; padding-left: 20px; }\n  .rpt-context-box li { margin-bottom: 4px; font-size: 13px; opacity: 0.9; }\n\n  /* Individual: competencias */\n  .rpt-competencias { }\n  .rpt-competencia-item { padding: 10px 0; border-bottom: 2px solid #5DADE2; }\n  .rpt-competencia-num { font-size: 12px; color: #718096; }\n  .rpt-competencia-name { font-size: 15px; font-weight: 700; color: #2D3436; }\n\n  /* Individual: brecha cards */\n  .rpt-brecha-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }\n  .rpt-brecha-card { border: 1px solid #D4E6F1; border-radius: 8px; padding: 14px; }\n  .rpt-brecha-card h4 { font-size: 13px; font-weight: 700; margin: 0 0 4px; }\n  .rpt-brecha-card p { font-size: 12px; color: #555; margin: 0; }\n  .rpt-brecha-card .brecha-val { font-size: 11px; display: inline-block; padding: 2px 8px; border-radius: 4px; font-weight: 600; margin-bottom: 6px; }\n  .brecha-neg { background: #D4EFDF; color: #1E8449; }\n  .brecha-pos { background: #FDEBD0; color: #D68910; }\n  .brecha-zero { background: #D4E6F1; color: #2471A3; }\n\n  /* Individual: insight clave */\n  .rpt-insight-box { background: #F7FBFE; border: 1px solid #D4E6F1; border-radius: 12px; padding: 24px; text-align: center; margin: 20px 0; }\n  .rpt-insight-box p { font-size: 12px; color: #718096; margin: 0 0 8px; }\n  .rpt-insight-box .insight-main { font-size: 20px; font-weight: 700; color: #5DADE2; font-style: italic; margin: 0 0 16px; }\n  .rpt-insight-steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }\n  .rpt-insight-step { background: #5DADE2; color: white; padding: 10px; text-align: center; font-size: 12px; }\n  .rpt-insight-step:first-child { border-radius: 8px 0 0 8px; }\n  .rpt-insight-step:last-child { border-radius: 0 8px 8px 0; }\n  .rpt-insight-step .step-num { font-size: 16px; font-weight: 700; }\n  .rpt-insight-step .step-from { font-weight: 700; }\n  .rpt-insight-step .step-to { opacity: 0.8; }\n\n  /* Individual: compromiso */\n  .rpt-compromiso { background: #F7FBFE; border: 1px solid #D4E6F1; border-radius: 8px; padding: 20px; display: flex; gap: 12px; align-items: flex-start; margin: 20px 0; }\n  .rpt-compromiso-icon { flex-shrink: 0; color: #5DADE2; }\n  .rpt-compromiso p { font-size: 13px; color: #555; margin: 0 0 4px; }\n  .rpt-compromiso strong { color: #1A3C6E; }\n\n  /* Footer */\n  .rpt-footer { padding: 20px 50px; border-top: 2px solid #E2E8F0; text-align: center; font-size: 10px; color: #A0AEC0; }\n\n  /* Chart container */\n  .rpt-chart { position: relative; height: 260px; margin: 16px 0; }\n</style>\n\n<script>\n  var programasReporte = [];\n  var participantesReporte = [];\n  var reporteCharts = [];\n\n  (function() {\n    google.script.run.withSuccessHandler(function(r) {\n      if (r.success) {\n        programasReporte = r.data;\n        var sel = document.getElementById('sel-programa-reporte');\n        r.data.forEach(function(p) {\n          var opt = document.createElement('option');\n          opt.value = p.id;\n          opt.textContent = p.nombre + ' (' + p.cliente_nombre + ')';\n          sel.appendChild(opt);\n        });\n      }\n    }).listarProgramas(App.token, null);\n  })();\n\n  function onProgramaReporteChange() {\n    var progId = document.getElementById('sel-programa-reporte').value;\n    var selTipo = document.getElementById('sel-tipo-reporte');\n    selTipo.disabled = !progId;\n    selTipo.value = '';\n    document.getElementById('sel-participante-reporte').classList.add('hidden');\n    document.getElementById('btn-generar-reporte').disabled = true;\n    document.getElementById('btn-descargar-pdf').classList.add('hidden');\n    document.getElementById('reporte-preview').classList.add('hidden');\n    document.getElementById('reporte-empty').classList.toggle('hidden', false);\n    if (!progId) return;\n\n    // Precargar participantes\n    google.script.run.withSuccessHandler(function(r) {\n      if (r.success) {\n        participantesReporte = (r.data || []).filter(function(p) { return p.rol_programa === 'participante'; });\n      }\n    }).listarParticipantesPrograma(App.token, progId);\n  }\n\n  function onTipoReporteChange() {\n    var tipo = document.getElementById('sel-tipo-reporte').value;\n    var selPart = document.getElementById('sel-participante-reporte');\n\n    if (tipo === 'individual') {\n      selPart.classList.remove('hidden');\n      selPart.innerHTML = '<option value=\"\">Selecciona participante...</option>';\n      participantesReporte.forEach(function(p) {\n        var opt = document.createElement('option');\n        opt.value = p.id;\n        opt.textContent = p.nombre + (p.cargo ? ' - ' + p.cargo : '');\n        selPart.appendChild(opt);\n      });\n      document.getElementById('btn-generar-reporte').disabled = false;\n    } else if (tipo === 'consolidado') {\n      selPart.classList.add('hidden');\n      document.getElementById('btn-generar-reporte').disabled = false;\n    } else {\n      selPart.classList.add('hidden');\n      document.getElementById('btn-generar-reporte').disabled = true;\n    }\n  }\n\n  // ============================================\n  // GENERAR REPORTE\n  // ============================================\n\n  function generarReporte() {\n    var progId = document.getElementById('sel-programa-reporte').value;\n    var tipo = document.getElementById('sel-tipo-reporte').value;\n    if (!progId || !tipo) return;\n\n    var prog = programasReporte.find(function(p) { return p.id === progId; });\n    if (!prog) return;\n\n    var partId = document.getElementById('sel-participante-reporte').value;\n    var part = null;\n    if (tipo === 'individual') {\n      if (!partId) { showToast('Selecciona un participante.', 'error'); return; }\n      part = participantesReporte.find(function(p) { return p.id === partId; });\n    }\n\n    // Loading\n    document.getElementById('reporte-empty').classList.add('hidden');\n    document.getElementById('reporte-preview').classList.add('hidden');\n    document.getElementById('reporte-loading').classList.remove('hidden');\n    document.getElementById('btn-generar-reporte').disabled = true;\n\n    var progress = document.getElementById('reporte-progress');\n    var loadText = document.getElementById('reporte-loading-text');\n    progress.style.width = '15%'; loadText.textContent = 'Recopilando datos...';\n    setTimeout(function() { progress.style.width = '40%'; loadText.textContent = 'Consultando IA...'; }, 800);\n\n    var prompt = tipo === 'consolidado'\n      ? buildConsolidadoPrompt(prog)\n      : buildIndividualPrompt(prog, part);\n\n    fetch('/api/ai-chat', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ messages: [{ role: 'user', content: prompt }] })\n    })\n    .then(function(r) { return r.json(); })\n    .then(function(data) {\n      progress.style.width = '80%'; loadText.textContent = 'Generando informe...';\n\n      var iaData = {};\n      if (data.success && data.response) {\n        try {\n          var json = data.response.replace(/```json\\n?/g, '').replace(/```\\n?/g, '').trim();\n          iaData = JSON.parse(json);\n        } catch (e) {\n          iaData = { resumen: data.response };\n        }\n      }\n\n      setTimeout(function() {\n        progress.style.width = '100%';\n        setTimeout(function() {\n          if (tipo === 'consolidado') renderConsolidado(prog, iaData);\n          else renderIndividual(prog, part, iaData);\n          document.getElementById('reporte-loading').classList.add('hidden');\n          document.getElementById('reporte-preview').classList.remove('hidden');\n          document.getElementById('btn-descargar-pdf').classList.remove('hidden');\n          document.getElementById('btn-generar-reporte').disabled = false;\n        }, 500);\n      }, 600);\n    })\n    .catch(function(err) {\n      document.getElementById('reporte-loading').classList.add('hidden');\n      document.getElementById('reporte-empty').classList.remove('hidden');\n      document.getElementById('btn-generar-reporte').disabled = false;\n      showToast('Error: ' + err.message, 'error');\n    });\n  }\n\n  // ============================================\n  // PROMPTS\n  // ============================================\n\n  function buildConsolidadoPrompt(prog) {\n    return 'Genera el contenido para un INFORME EJECUTIVO CONSOLIDADO del programa \"' + prog.nombre + '\". ' +\n      'Responde SOLO en JSON con esta estructura exacta: ' +\n      '{\"intro\":\"<html breve describiendo el informe>\",\"hallazgos\":[{\"titulo\":\"...\",\"texto\":\"...\"},{\"titulo\":\"...\",\"texto\":\"...\"},{\"titulo\":\"...\",\"texto\":\"...\"}],' +\n      '\"lectura_global\":\"<html p\\u00e1rrafo an\\u00e1lisis global del grupo>\",' +\n      '\"conclusiones\":[\"<conclusion 1>\",\"<conclusion 2>\",\"<conclusion 3>\",\"<conclusion 4>\"],' +\n      '\"recomendaciones\":[{\"titulo\":\"...\",\"texto\":\"...\"},{\"titulo\":\"...\",\"texto\":\"...\"},{\"titulo\":\"...\",\"texto\":\"...\"},{\"titulo\":\"...\",\"texto\":\"...\"}],' +\n      '\"cierre\":\"<html cierre ejecutivo>\"}. ' +\n      'Usa <strong> para negritas. No uses markdown. SOLO el JSON.';\n  }\n\n  function buildIndividualPrompt(prog, part) {\n    return 'Genera el contenido para un INFORME INDIVIDUAL del participante \"' + (part ? part.nombre : 'Participante') + '\" en el programa \"' + prog.nombre + '\". ' +\n      'Responde SOLO en JSON con esta estructura exacta: ' +\n      '{\"lectura_global\":\"<html lectura global del perfil del l\\u00edder>\",' +\n      '\"analisis_competencias\":[{\"nombre\":\"...\",\"brecha\":\"...\",\"interpretacion\":\"...\",\"evolucion\":[\"...\",\"...\"]},{\"nombre\":\"...\",\"brecha\":\"...\",\"interpretacion\":\"...\",\"evolucion\":[\"...\",\"...\"]},{\"nombre\":\"...\",\"brecha\":\"...\",\"interpretacion\":\"...\",\"evolucion\":[\"...\",\"...\"]}],' +\n      '\"insight\":\"<frase clave del siguiente nivel de desarrollo>\",' +\n      '\"recomendaciones\":[{\"titulo\":\"...\",\"items\":[\"...\",\"...\"]},{\"titulo\":\"...\",\"items\":[\"...\",\"...\"]},{\"titulo\":\"...\",\"items\":[\"...\",\"...\"]}],' +\n      '\"compromiso\":\"<html compromiso de desarrollo>\"}. ' +\n      'Usa <strong> para negritas. No uses markdown. SOLO el JSON.';\n  }\n\n  // ============================================\n  // RENDER: CONSOLIDADO\n  // ============================================\n\n  function renderConsolidado(prog, ia) {\n    reporteCharts.forEach(function(c) { c.destroy(); }); reporteCharts = [];\n    var hoy = new Date().toLocaleDateString('es-CL', { day: '2-digit', month: 'long', year: 'numeric' });\n\n    // Mock data\n    var dims = [\n      { nombre: 'Delegaci\\u00f3n', auto: 3.50, co: 3.17, brecha: 0.33 },\n      { nombre: 'Conversaciones', auto: 3.38, co: 3.17, brecha: 0.21 },\n      { nombre: 'Colaboraci\\u00f3n', auto: 2.88, co: 3.00, brecha: -0.12 }\n    ];\n    var autoPromedio = 3.25, coPromedio = 3.11, brechaGeneral = 0.14;\n\n    var html = '<div class=\"rpt\" id=\"pdf-page\">';\n\n    // Hero\n    html += '<div class=\"rpt-hero\">';\n    html += '<h1>INFORME EJECUTIVO CONSOLIDADO</h1>';\n    html += '<h2>Evaluaci\\u00f3n de Liderazgo \\u2013 ' + escapeHtml(prog.nombre) + '</h2>';\n    html += '<div class=\"rpt-meta\">' + escapeHtml(prog.cliente_nombre) + ' | Generado el ' + hoy + '</div>';\n    html += '</div>';\n\n    html += '<div class=\"rpt-body\">';\n\n    // Intro\n    html += '<div class=\"rpt-intro\">' + (ia.intro || 'El presente informe consolida los resultados de evaluaci\\u00f3n de liderazgo, considerando las competencias del modelo aplicado. El an\\u00e1lisis considera autoevaluaciones, coevaluaciones cuando est\\u00e1n disponibles y la identificaci\\u00f3n de brechas de percepci\\u00f3n.') + '</div>';\n\n    // Cobertura KPIs\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">Cobertura de evaluaci\\u00f3n</div>';\n    html += '<div class=\"rpt-kpi-row\">';\n    html += '<div class=\"rpt-kpi-big\"><div class=\"rpt-kpi-big-value\">8</div><div class=\"rpt-kpi-big-label\">L\\u00edderes evaluados</div></div>';\n    html += '<div class=\"rpt-kpi-big\"><div class=\"rpt-kpi-big-value\">6</div><div class=\"rpt-kpi-big-label\">L\\u00edderes con coevaluaci\\u00f3n</div></div>';\n    html += '<div class=\"rpt-kpi-big\"><div class=\"rpt-kpi-big-value\">2</div><div class=\"rpt-kpi-big-label\">L\\u00edderes sin coevaluaci\\u00f3n</div></div>';\n    html += '</div></div>';\n\n    // Resultados: tablas lado a lado\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">Resultados consolidados</div>';\n    html += '<div class=\"rpt-tables-grid\">';\n\n    // Tabla autoevaluaci\\u00f3n\n    html += '<table class=\"rpt-table\"><caption>Autoevaluaci\\u00f3n promedio</caption><thead><tr><th>Dimensi\\u00f3n</th><th>Promedio</th></tr></thead><tbody>';\n    dims.forEach(function(d) { html += '<tr><td>' + d.nombre + '</td><td>' + d.auto.toFixed(2) + '</td></tr>'; });\n    html += '<tr class=\"rpt-table-highlight\"><td><strong>Promedio general</strong></td><td><strong>' + autoPromedio.toFixed(2) + '</strong></td></tr>';\n    html += '</tbody></table>';\n\n    // Tabla coevaluaci\\u00f3n + brecha\n    html += '<div>';\n    html += '<table class=\"rpt-table\"><caption>Coevaluaci\\u00f3n promedio</caption><thead><tr><th>Dimensi\\u00f3n</th><th>Promedio</th></tr></thead><tbody>';\n    dims.forEach(function(d) { html += '<tr><td>' + d.nombre + '</td><td>' + d.co.toFixed(2) + '</td></tr>'; });\n    html += '<tr class=\"rpt-table-highlight\"><td><strong>Promedio general</strong></td><td><strong>' + coPromedio.toFixed(2) + '</strong></td></tr>';\n    html += '</tbody></table>';\n\n    html += '<table class=\"rpt-table\" style=\"margin-top:16px;\"><caption>Brecha promedio</caption><thead><tr><th>Dimensi\\u00f3n</th><th>Brecha</th></tr></thead><tbody>';\n    dims.forEach(function(d) { html += '<tr><td>' + d.nombre + '</td><td>' + d.brecha.toFixed(2) + '</td></tr>'; });\n    html += '<tr class=\"rpt-table-highlight\"><td><strong>Brecha general</strong></td><td><strong>' + brechaGeneral.toFixed(2) + '</strong></td></tr>';\n    html += '</tbody></table>';\n    html += '</div></div>';\n\n    // Barras horizontales\n    html += '<div class=\"rpt-hbar-container\">';\n    html += '<div style=\"margin-bottom:8px;font-size:11px;\"><span style=\"display:inline-block;width:12px;height:12px;background:#1A3C6E;border-radius:2px;vertical-align:middle;margin-right:4px;\"></span> Autoevaluaci\\u00f3n &nbsp;&nbsp;<span style=\"display:inline-block;width:12px;height:12px;background:#5DADE2;border-radius:2px;vertical-align:middle;margin-right:4px;\"></span> Coevaluaci\\u00f3n</div>';\n    var allDims = dims.concat([{ nombre: 'Promedio general', auto: autoPromedio, co: coPromedio }]);\n    allDims.forEach(function(d) {\n      var maxVal = 5;\n      html += '<div class=\"rpt-hbar-row\"><div class=\"rpt-hbar-label\">' + d.nombre + '</div><div>' +\n        '<div class=\"rpt-hbar-track\"><div class=\"rpt-hbar-fill rpt-hbar-fill-auto\" style=\"width:' + (d.auto / maxVal * 100) + '%;\">' + d.auto.toFixed(2) + '</div></div>' +\n        '<div class=\"rpt-hbar-track\" style=\"margin-top:3px;\"><div class=\"rpt-hbar-fill rpt-hbar-fill-co\" style=\"width:' + (d.co / maxVal * 100) + '%;\">' + d.co.toFixed(2) + '</div></div>' +\n      '</div><div></div></div>';\n    });\n    html += '</div></div>';\n\n    // Hallazgos\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">Hallazgos, Conclusiones y Recomendaciones</div>';\n    html += '<div class=\"rpt-subsection-title\">Principales hallazgos</div>';\n    html += '<div class=\"rpt-findings-grid\">';\n    var hallazgos = ia.hallazgos || [\n      { titulo: 'Sobreestimaci\\u00f3n del desempe\\u00f1o', texto: 'Tendencia general a evaluarse por sobre lo percibido por el entorno.' },\n      { titulo: 'Conversaciones: punto cr\\u00edtico', texto: 'Brecha consistente en m\\u00faltiples casos individuales.' },\n      { titulo: 'Colaboraci\\u00f3n: alta variabilidad', texto: 'No es problema transversal sino focalizado en ciertos casos.' }\n    ];\n    hallazgos.forEach(function(h) {\n      html += '<div class=\"rpt-finding-card\"><h4>' + h.titulo + '</h4><p>' + h.texto + '</p></div>';\n    });\n    html += '</div>';\n\n    // Lectura global\n    html += '<div class=\"rpt-subsection-title\" style=\"margin-top:24px;\">Lectura global del grupo</div>';\n    html += '<p style=\"font-size:13px;color:#555;margin-bottom:16px;\">' + (ia.lectura_global || 'El grupo presenta un nivel de liderazgo adecuado y funcional. El principal desaf\\u00edo est\\u00e1 en la <strong>alineaci\\u00f3n entre la percepci\\u00f3n del l\\u00edder y la experiencia real del equipo</strong>.') + '</p>';\n\n    html += '<div class=\"rpt-profiles-grid\">';\n    html += '<div class=\"rpt-profile-card\"><h4>L\\u00edderes consistentes</h4><p>Con baja brecha entre autoevaluaci\\u00f3n y coevaluaci\\u00f3n</p></div>';\n    html += '<div class=\"rpt-profile-card\"><h4>L\\u00edderes con sobreestimaci\\u00f3n</h4><p>Diferencia relevante entre percepci\\u00f3n e impacto</p></div>';\n    html += '<div class=\"rpt-profile-card\"><h4>L\\u00edderes subestimados</h4><p>Mayor valoraci\\u00f3n externa que interna</p></div>';\n    html += '<div class=\"rpt-profile-card\"><h4>L\\u00edderes sin contraste</h4><p>An\\u00e1lisis limitado al autodiagn\\u00f3stico</p></div>';\n    html += '</div>';\n\n    // Conclusiones\n    html += '<div class=\"rpt-subsection-title\" style=\"margin-top:24px;\">Conclusiones generales</div>';\n    var conclusiones = ia.conclusiones || [\n      'El liderazgo del grupo es s\\u00f3lido en su base, pero a\\u00fan no alcanza impacto consistente.',\n      'Existe brecha entre intenci\\u00f3n del liderazgo y su percepci\\u00f3n por el entorno.',\n      'Las conversaciones se posicionan como la <strong>principal palanca de desarrollo</strong>.',\n      'La falta de coevaluaci\\u00f3n en algunos casos debiera corregirse.'\n    ];\n    conclusiones.forEach(function(c) {\n      html += '<div class=\"rpt-conclusion-item\"><span class=\"rpt-conclusion-arrow\">\\u2192</span><div class=\"rpt-conclusion-text\">' + c + '</div></div>';\n    });\n\n    // Recomendaciones\n    html += '<div class=\"rpt-subsection-title\" style=\"margin-top:24px;\">Recomendaciones</div>';\n    html += '<div class=\"rpt-recs-grid\">';\n    var recs = ia.recomendaciones || [\n      { titulo: 'Programa de conversaciones', texto: 'Implementar desarrollo de conversaciones enfocado en feedback y escucha activa.' },\n      { titulo: 'Intervenci\\u00f3n focalizada', texto: 'Intervenir en l\\u00edderes con mayores brechas.' },\n      { titulo: 'Evaluaci\\u00f3n continua', texto: 'Establecer sistema de medici\\u00f3n peri\\u00f3dica.' },\n      { titulo: 'Coevaluaci\\u00f3n est\\u00e1ndar', texto: 'Asegurar coevaluaci\\u00f3n en futuras mediciones.' }\n    ];\n    recs.forEach(function(r, i) {\n      html += '<div class=\"rpt-rec-card\"><div class=\"rpt-rec-num\">' + (i + 1) + '</div><div class=\"rpt-rec-body\"><h4>' + r.titulo + '</h4><p>' + r.texto + '</p></div></div>';\n    });\n    html += '</div>';\n\n    // Cierre\n    html += '<div class=\"rpt-section-title\" style=\"margin-top:28px;\">Cierre ejecutivo</div>';\n    html += '<div class=\"rpt-cierre\">' + (ia.cierre\n      ? '<p>' + ia.cierre + '</p>'\n      : '<p>El grupo evaluado cuenta con una base de liderazgo adecuada, pero requiere evolucionar hacia un modelo donde el foco no est\\u00e9 solo en la ejecuci\\u00f3n, sino en el <strong>impacto en las personas</strong>.</p><p class=\"rpt-cierre-highlight\">Ese ajuste representa la principal oportunidad de desarrollo organizacional.</p>'\n    ) + '</div>';\n\n    html += '</div>'; // rpt-body\n    html += '</div>'; // rpt-section (hallazgos)\n\n    // Footer\n    html += '<div class=\"rpt-footer\">Informe generado por MSO Chile \\u2013 Plataforma TPT | Asistido por Inteligencia Artificial | ' + hoy + '</div>';\n    html += '</div>'; // rpt\n\n    document.getElementById('reporte-contenido').innerHTML = html;\n  }\n\n  // ============================================\n  // RENDER: INDIVIDUAL\n  // ============================================\n\n  function renderIndividual(prog, part, ia) {\n    reporteCharts.forEach(function(c) { c.destroy(); }); reporteCharts = [];\n    var hoy = new Date().toLocaleDateString('es-CL', { day: '2-digit', month: 'long', year: 'numeric' });\n    var nombre = part ? part.nombre : 'Participante';\n\n    // Mock data individual\n    var dims = [\n      { nombre: 'Delegar', auto: 3, co: 4, brecha: -1 },\n      { nombre: 'Conversaciones', auto: 4, co: 3, brecha: 1 },\n      { nombre: 'Colaboraci\\u00f3n', auto: 3, co: 3, brecha: 0 }\n    ];\n    var autoP = 3.33, coP = 3.33, brechaG = 0;\n\n    var html = '<div class=\"rpt\" id=\"pdf-page\">';\n\n    // Hero\n    html += '<div class=\"rpt-hero\">';\n    html += '<h1>Informe Ejecutivo de Liderazgo</h1>';\n    html += '<h2>Evaluaci\\u00f3n Individual \\u2013 ' + escapeHtml(nombre) + '</h2>';\n    html += '<div class=\"rpt-meta\">' + escapeHtml(prog.nombre) + ' | ' + escapeHtml(prog.cliente_nombre) + ' | ' + hoy + '</div>';\n    html += '</div>';\n\n    html += '<div class=\"rpt-body\">';\n\n    // 1. Contexto + Competencias\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">1. Contexto de Evaluaci\\u00f3n</div>';\n    html += '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">';\n\n    html += '<div class=\"rpt-context-box\"><h3>Contexto</h3><p style=\"font-size:13px;opacity:0.9;\">El presente informe expone los resultados de la evaluaci\\u00f3n final del l\\u00edder, en el marco del programa de desarrollo basado en la aplicaci\\u00f3n pr\\u00e1ctica de competencias.</p>';\n    html += '<p style=\"font-size:12px;opacity:0.8;margin-top:10px;\">El an\\u00e1lisis considera:</p>';\n    html += '<ul><li>Autoevaluaci\\u00f3n del l\\u00edder</li><li>Coevaluaci\\u00f3n de su jefatura directa</li><li>Identificaci\\u00f3n de brechas de percepci\\u00f3n</li></ul></div>';\n\n    html += '<div><div class=\"rpt-subsection-title\">Competencias Evaluadas</div><div class=\"rpt-competencias\">';\n    var competencias = ['Delegar con prop\\u00f3sito estrat\\u00e9gico', 'Conversaciones que desarrollan al l\\u00edder', 'Articulaci\\u00f3n colaborativa'];\n    competencias.forEach(function(c, i) {\n      html += '<div class=\"rpt-competencia-item\"><div class=\"rpt-competencia-num\">0' + (i + 1) + '</div><div class=\"rpt-competencia-name\">' + c + '</div></div>';\n    });\n    html += '</div></div></div></div>';\n\n    // 2. Resultado General\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">2. Resultado General</div>';\n    html += '<p style=\"font-size:13px;color:#555;\">El l\\u00edder presenta un desempe\\u00f1o promedio de:</p>';\n    html += '<div class=\"rpt-kpi-row\">';\n    html += '<div class=\"rpt-kpi-big\"><div class=\"rpt-kpi-big-value\">' + autoP.toFixed(2) + '</div><div class=\"rpt-kpi-big-label\">Autoevaluaci\\u00f3n</div></div>';\n    html += '<div class=\"rpt-kpi-big\"><div class=\"rpt-kpi-big-value\">' + coP.toFixed(2) + '</div><div class=\"rpt-kpi-big-label\">Coevaluaci\\u00f3n</div></div>';\n    html += '<div class=\"rpt-kpi-big\"><div class=\"rpt-kpi-big-value\">' + brechaG + '</div><div class=\"rpt-kpi-big-label\">Brecha Global</div></div>';\n    html += '</div>';\n    html += '<p style=\"font-size:13px;color:#555;\">No existe brecha global, lo que refleja: <strong>alta coherencia entre percepci\\u00f3n propia y externa</strong>, un perfil equilibrado y buen nivel de autoconocimiento.</p>';\n    html += '</div>';\n\n    // 3. Resultados Detallados\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">3. Resultados Detallados</div>';\n    html += '<table class=\"rpt-table\"><thead><tr><th>Dimensi\\u00f3n</th>';\n    dims.forEach(function(d) { html += '<th>' + d.nombre + '</th>'; });\n    html += '<th>Promedio</th></tr></thead><tbody>';\n    html += '<tr><td>Autoevaluaci\\u00f3n</td>';\n    dims.forEach(function(d) { html += '<td>' + d.auto + '</td>'; });\n    html += '<td>' + autoP.toFixed(2) + '</td></tr>';\n    html += '<tr><td>Coevaluaci\\u00f3n</td>';\n    dims.forEach(function(d) { html += '<td>' + d.co + '</td>'; });\n    html += '<td>' + coP.toFixed(2) + '</td></tr>';\n    html += '<tr><td><strong>Brecha</strong></td>';\n    dims.forEach(function(d) { html += '<td><strong>' + (d.brecha > 0 ? '+' : '') + d.brecha + '</strong></td>'; });\n    html += '<td><strong>' + brechaG + '</strong></td></tr>';\n    html += '</tbody></table></div>';\n\n    // 4. Visualizaci\\u00f3n barras\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">4. Visualizaci\\u00f3n de Resultados</div>';\n    html += '<div class=\"rpt-hbar-container\">';\n    html += '<div style=\"margin-bottom:8px;font-size:11px;\"><span style=\"display:inline-block;width:12px;height:12px;background:#1A3C6E;border-radius:2px;vertical-align:middle;margin-right:4px;\"></span> Autoevaluaci\\u00f3n &nbsp;&nbsp;<span style=\"display:inline-block;width:12px;height:12px;background:#5DADE2;border-radius:2px;vertical-align:middle;margin-right:4px;\"></span> Coevaluaci\\u00f3n</div>';\n    dims.forEach(function(d) {\n      html += '<div class=\"rpt-hbar-row\"><div class=\"rpt-hbar-label\">' + d.nombre + '</div><div>' +\n        '<div class=\"rpt-hbar-track\"><div class=\"rpt-hbar-fill rpt-hbar-fill-auto\" style=\"width:' + (d.auto / 5 * 100) + '%;\">' + d.auto + '</div></div>' +\n        '<div class=\"rpt-hbar-track\" style=\"margin-top:3px;\"><div class=\"rpt-hbar-fill rpt-hbar-fill-co\" style=\"width:' + (d.co / 5 * 100) + '%;\">' + d.co + '</div></div>' +\n      '</div><div></div></div>';\n    });\n    html += '</div></div>';\n\n    // 5. Lectura de Resultados\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">5. Lectura de Resultados</div>';\n    html += '<div class=\"rpt-brecha-cards\">';\n    dims.forEach(function(d) {\n      var cls = d.brecha < 0 ? 'brecha-neg' : d.brecha > 0 ? 'brecha-pos' : 'brecha-zero';\n      var interp = d.brecha < 0 ? 'El entorno eval\\u00faa mejor \\u2192 <strong>fortaleza</strong>'\n        : d.brecha > 0 ? 'Se eval\\u00faa por sobre el entorno \\u2192 <strong>oportunidad</strong>'\n        : 'Competencia <strong>alineada</strong>';\n      html += '<div class=\"rpt-brecha-card\"><h4>' + d.nombre + ' (' + (d.brecha > 0 ? '+' : '') + d.brecha + ')</h4><span class=\"brecha-val ' + cls + '\">BRECHA (' + (d.brecha > 0 ? '+' : '') + d.brecha + ')</span><p>' + interp + '</p></div>';\n    });\n    html += '</div></div>';\n\n    // 6. Lectura Global\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">6. Lectura Global del Perfil</div>';\n    html += '<p style=\"font-size:13px;color:#555;\">' + (ia.lectura_global || 'Nos encontramos frente a un l\\u00edder que presenta <strong>coherencia global</strong> en su desempe\\u00f1o, posee fortalezas reconocidas por su entorno y tiene oportunidades de mejora en el impacto de sus conversaciones.') + '</p>';\n    html += '</div>';\n\n    // 7. An\\u00e1lisis por Competencia\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">7. An\\u00e1lisis por Competencia</div>';\n    html += '<div class=\"rpt-findings-grid\">';\n    var analisis = ia.analisis_competencias || [\n      { nombre: 'Delegar con prop\\u00f3sito estrat\\u00e9gico', brecha: '(-1)', interpretacion: 'Fortaleza reconocida por el entorno', evolucion: ['Mantener est\\u00e1ndar', 'Escalar delegaci\\u00f3n hacia mayor impacto'] },\n      { nombre: 'Conversaciones que desarrollan', brecha: '(+1)', interpretacion: 'Diferencia en percepci\\u00f3n del impacto', evolucion: ['Feedback m\\u00e1s espec\\u00edfico', 'Mayor escucha activa', 'Conversaciones orientadas al desarrollo'] },\n      { nombre: 'Articulaci\\u00f3n colaborativa', brecha: '(0)', interpretacion: 'Competencia estable', evolucion: ['Mantener nivel', 'Potenciar coordinaci\\u00f3n transversal'] }\n    ];\n    analisis.forEach(function(a) {\n      html += '<div class=\"rpt-finding-card\"><h4>' + a.nombre + '</h4><span class=\"brecha-val ' +\n        (a.brecha.indexOf('-') !== -1 ? 'brecha-neg' : a.brecha.indexOf('+') !== -1 || a.brecha.indexOf('1') !== -1 ? 'brecha-pos' : 'brecha-zero') +\n        '\">BRECHA ' + a.brecha + '</span>' +\n        '<p><strong>Interpretaci\\u00f3n:</strong> ' + a.interpretacion + '</p>' +\n        '<p><strong>Evoluci\\u00f3n esperada:</strong></p><ul style=\"margin:4px 0;padding-left:16px;\">' +\n        a.evolucion.map(function(e) { return '<li style=\"font-size:12px;\">' + e + '</li>'; }).join('') +\n        '</ul></div>';\n    });\n    html += '</div></div>';\n\n    // 8. Insight Clave\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">8. Insight Clave</div>';\n    html += '<div class=\"rpt-insight-box\"><p>El siguiente nivel de desarrollo del l\\u00edder est\\u00e1 en:</p>';\n    html += '<div class=\"insight-main\">' + (ia.insight || 'Ajustar el impacto de sus conversaciones con su equipo') + '</div>';\n    html += '<div class=\"rpt-insight-steps\">';\n    html += '<div class=\"rpt-insight-step\"><div class=\"step-num\">1</div><div class=\"step-from\">De comunicar</div><div class=\"step-to\">\\u2192 a desarrollar</div></div>';\n    html += '<div class=\"rpt-insight-step\"><div class=\"step-num\">2</div><div class=\"step-from\">De interacci\\u00f3n</div><div class=\"step-to\">\\u2192 a generaci\\u00f3n de valor</div></div>';\n    html += '<div class=\"rpt-insight-step\"><div class=\"step-num\">3</div><div class=\"step-from\">De percepci\\u00f3n interna</div><div class=\"step-to\">\\u2192 a validaci\\u00f3n externa</div></div>';\n    html += '</div></div></div>';\n\n    // 9. Recomendaciones\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">9. Recomendaciones de Desarrollo</div>';\n    html += '<div class=\"rpt-findings-grid\">';\n    var recs = ia.recomendaciones || [\n      { titulo: 'Conversaciones (prioridad)', items: ['Incorporar estructura (GROW)', 'Mejorar calidad del feedback', 'Validar comprensi\\u00f3n'] },\n      { titulo: 'Delegaci\\u00f3n', items: ['Mantener buenas pr\\u00e1cticas', 'Transferir aprendizajes al equipo'] },\n      { titulo: 'Colaboraci\\u00f3n', items: ['Mantener est\\u00e1ndar', 'Escalar impacto'] }\n    ];\n    recs.forEach(function(r, i) {\n      html += '<div class=\"rpt-rec-card\"><div class=\"rpt-rec-num\">' + (i + 1) + '</div><div class=\"rpt-rec-body\"><h4>' + r.titulo + '</h4><ul style=\"margin:6px 0;padding-left:16px;\">';\n      r.items.forEach(function(item) { html += '<li style=\"font-size:12px;color:#555;\">' + item + '</li>'; });\n      html += '</ul></div></div>';\n    });\n    html += '</div></div>';\n\n    // 10. Compromiso\n    html += '<div class=\"rpt-section\"><div class=\"rpt-section-title\">10. Compromiso de Desarrollo</div>';\n    html += '<div class=\"rpt-compromiso\"><div class=\"rpt-compromiso-icon\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"/><path d=\"M8 10l2 2 4-4\"/></svg></div>';\n    html += '<div><p>Desde hoy, el l\\u00edder orienta su desarrollo hacia:</p><p><strong>' + (ia.compromiso || 'Fortalecer la calidad de sus conversaciones de liderazgo, para asegurar mayor impacto en el desarrollo de su equipo y consolidar un liderazgo equilibrado.') + '</strong></p></div>';\n    html += '</div></div>';\n\n    html += '</div>'; // rpt-body\n\n    // Footer\n    html += '<div class=\"rpt-footer\">Informe generado por MSO Chile \\u2013 Plataforma TPT | Asistido por Inteligencia Artificial | ' + hoy + '</div>';\n    html += '</div>';\n\n    document.getElementById('reporte-contenido').innerHTML = html;\n  }\n\n  // ============================================\n  // DESCARGAR PDF\n  // ============================================\n\n  function descargarPDF() {\n    var element = document.getElementById('pdf-page');\n    if (!element) { showToast('Genera un reporte primero.', 'error'); return; }\n\n    var tipo = document.getElementById('sel-tipo-reporte').value;\n    var prog = programasReporte.find(function(p) { return p.id === document.getElementById('sel-programa-reporte').value; });\n    var partSel = document.getElementById('sel-participante-reporte');\n    var partName = partSel.options[partSel.selectedIndex] ? partSel.options[partSel.selectedIndex].text : '';\n\n    var filename = tipo === 'individual'\n      ? 'Informe_Individual_' + partName.replace(/[^a-zA-Z0-9]/g, '_') + '.pdf'\n      : 'Informe_Consolidado_' + (prog ? prog.nombre.replace(/[^a-zA-Z0-9]/g, '_') : 'Programa') + '.pdf';\n\n    showToast('Generando PDF...', 'success');\n\n    html2pdf().set({\n      margin: [0, 0, 0, 0],\n      filename: filename,\n      image: { type: 'jpeg', quality: 0.95 },\n      html2canvas: { scale: 2, useCORS: true, logging: false },\n      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },\n      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }\n    }).from(element).save().then(function() {\n      showToast('PDF descargado.', 'success');\n    }).catch(function() {\n      showToast('Error al generar PDF.', 'error');\n    });\n  }\n<\/script>\n","feedback-jefatura":"<!-- Vista: Feedback Jefatura (Jefatura da feedback a participantes) -->\r\n<div>\r\n  <div class=\"flex-between mb-4\">\r\n    <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\r\n      <select class=\"form-control\" id=\"sel-programa-fbj\" onchange=\"onProgramaFeedbackChange()\" style=\"min-width:250px;\">\r\n        <option value=\"\">Selecciona un programa...</option>\r\n      </select>\r\n      <select class=\"form-control\" id=\"sel-participante-fbj\" onchange=\"onParticipanteFeedbackChange()\" style=\"min-width:250px;\" disabled>\r\n        <option value=\"\">Selecciona participante...</option>\r\n      </select>\r\n    </div>\r\n  </div>\r\n\r\n  <!-- Formulario de Feedback -->\r\n  <div id=\"feedback-form-container\" class=\"hidden\">\r\n    <div class=\"card mb-4\">\r\n      <div class=\"card-header\">\r\n        <h2>Registrar Feedback</h2>\r\n        <span class=\"text-sm text-muted\" id=\"feedback-para\"></span>\r\n      </div>\r\n      <div class=\"card-body\">\r\n        <form id=\"form-feedback-jef\">\r\n          <div class=\"form-group\">\r\n            <label>Fortaleza observada *</label>\r\n            <textarea name=\"fortaleza\" class=\"form-control\" required placeholder=\"Describe las fortalezas observadas en el participante...\"></textarea>\r\n          </div>\r\n          <div class=\"form-group\">\r\n            <label>Aspecto a reforzar *</label>\r\n            <textarea name=\"aspecto_reforzar\" class=\"form-control\" required placeholder=\"Describe los aspectos que el participante debe reforzar...\"></textarea>\r\n          </div>\r\n          <div class=\"form-group\">\r\n            <label>Recomendaci&oacute;n *</label>\r\n            <textarea name=\"recomendacion\" class=\"form-control\" required placeholder=\"Escribe tu recomendacion...\"></textarea>\r\n          </div>\r\n          <div class=\"form-group\">\r\n            <label>Observaci&oacute;n vinculada (opcional)</label>\r\n            <select name=\"observacionId\" class=\"form-control\" id=\"sel-observacion-fbj\">\r\n              <option value=\"\">Sin observacion vinculada</option>\r\n            </select>\r\n          </div>\r\n        </form>\r\n        <div class=\"mt-3\">\r\n          <button class=\"btn btn-primary\" id=\"btn-enviar-feedback\" onclick=\"enviarFeedbackJef()\">Enviar Feedback</button>\r\n        </div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n\r\n  <!-- Estado vacio -->\r\n  <div id=\"feedback-empty\" class=\"card\">\r\n    <div class=\"empty-state\">\r\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"width:64px;height:64px;margin-bottom:16px;opacity:0.4;\">\r\n        <path d=\"M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z\"/>\r\n      </svg>\r\n      <p>Selecciona un programa y un participante para registrar feedback.</p>\r\n    </div>\r\n  </div>\r\n\r\n  <!-- Feedback dado previamente -->\r\n  <div class=\"mt-4\">\r\n    <div class=\"card\">\r\n      <div class=\"card-header\">\r\n        <h2>Feedback Registrado</h2>\r\n      </div>\r\n      <div class=\"card-body\">\r\n        <div id=\"lista-feedback-dado\">\r\n          <p class=\"text-muted text-sm\">Selecciona un programa para ver feedback registrado.</p>\r\n        </div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<script>\r\n  var participantesFbj = [];\r\n  var feedbackDadoData = [];\r\n\r\n  (function() {\r\n    // Cargar programas del dashboard (jefatura ve sus programas)\r\n    google.script.run.withSuccessHandler(function(r) {\r\n      if (r.success) {\r\n        var sel = document.getElementById('sel-programa-fbj');\r\n        r.data.forEach(function(p) {\r\n          var opt = document.createElement('option');\r\n          opt.value = p.id;\r\n          opt.textContent = p.nombre;\r\n          sel.appendChild(opt);\r\n        });\r\n      }\r\n    }).listarProgramasDashboard(App.token);\r\n  })();\r\n\r\n  function onProgramaFeedbackChange() {\r\n    var progId = document.getElementById('sel-programa-fbj').value;\r\n    var selPart = document.getElementById('sel-participante-fbj');\r\n    selPart.innerHTML = '<option value=\"\">Selecciona participante...</option>';\r\n    selPart.disabled = !progId;\r\n    document.getElementById('feedback-form-container').classList.add('hidden');\r\n    document.getElementById('feedback-empty').classList.remove('hidden');\r\n\r\n    if (!progId) {\r\n      document.getElementById('lista-feedback-dado').innerHTML =\r\n        '<p class=\"text-muted text-sm\">Selecciona un programa.</p>';\r\n      return;\r\n    }\r\n\r\n    // Cargar participantes asignados\r\n    google.script.run.withSuccessHandler(function(r) {\r\n      if (r.success) {\r\n        participantesFbj = r.data;\r\n        r.data.forEach(function(p) {\r\n          if (p.rol_programa === 'participante') {\r\n            var opt = document.createElement('option');\r\n            opt.value = p.id;\r\n            opt.textContent = p.nombre + (p.cargo ? ' - ' + p.cargo : '');\r\n            selPart.appendChild(opt);\r\n          }\r\n        });\r\n      }\r\n    }).listarParticipantesPrograma(App.token, progId);\r\n\r\n    // Cargar feedback dado\r\n    cargarFeedbackDado(progId);\r\n  }\r\n\r\n  function onParticipanteFeedbackChange() {\r\n    var progId = document.getElementById('sel-programa-fbj').value;\r\n    var partId = document.getElementById('sel-participante-fbj').value;\r\n\r\n    if (partId && progId) {\r\n      document.getElementById('feedback-form-container').classList.remove('hidden');\r\n      document.getElementById('feedback-empty').classList.add('hidden');\r\n\r\n      var part = participantesFbj.find(function(p) { return p.id === partId; });\r\n      document.getElementById('feedback-para').textContent = 'Para: ' + (part ? part.nombre : '');\r\n\r\n      resetForm('form-feedback-jef');\r\n\r\n      // Cargar observaciones del participante\r\n      cargarObservacionesParticipante(progId, partId);\r\n    } else {\r\n      document.getElementById('feedback-form-container').classList.add('hidden');\r\n      document.getElementById('feedback-empty').classList.remove('hidden');\r\n    }\r\n  }\r\n\r\n  function cargarObservacionesParticipante(progId, partId) {\r\n    google.script.run.withSuccessHandler(function(r) {\r\n      var sel = document.getElementById('sel-observacion-fbj');\r\n      sel.innerHTML = '<option value=\"\">Sin observacion vinculada</option>';\r\n      if (r.success && r.data) {\r\n        var obs = r.data.filter(function(o) {\r\n          return o.participante_id === partId;\r\n        });\r\n        obs.forEach(function(o) {\r\n          var opt = document.createElement('option');\r\n          opt.value = o.id;\r\n          opt.textContent = formatDate(o.fecha_observacion || o.fecha_creacion) + ' - ' + (o.conducta_nombre || 'Observacion');\r\n          sel.appendChild(opt);\r\n        });\r\n      }\r\n    }).withFailureHandler(function() {\r\n      // Silently fail - observations are optional\r\n    }).listarObservaciones(App.token, progId);\r\n  }\r\n\r\n  function enviarFeedbackJef() {\r\n    var datos = getFormData('form-feedback-jef');\r\n    var progId = document.getElementById('sel-programa-fbj').value;\r\n    var partId = document.getElementById('sel-participante-fbj').value;\r\n\r\n    if (!datos.fortaleza || !datos.aspecto_reforzar || !datos.recomendacion) {\r\n      showToast('Completa todos los campos obligatorios.', 'error');\r\n      return;\r\n    }\r\n\r\n    var btn = document.getElementById('btn-enviar-feedback');\r\n    btnLoading(btn, true);\r\n\r\n    var payload = {\r\n      programaId: progId,\r\n      participanteId: partId,\r\n      observacionId: datos.observacionId || '',\r\n      fortaleza: datos.fortaleza,\r\n      aspecto_reforzar: datos.aspecto_reforzar,\r\n      recomendacion: datos.recomendacion\r\n    };\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        btnLoading(btn, false);\r\n        if (r.success) {\r\n          showToast('Feedback enviado exitosamente.', 'success');\r\n          resetForm('form-feedback-jef');\r\n          cargarFeedbackDado(progId);\r\n        } else {\r\n          showToast(r.error, 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        btnLoading(btn, false);\r\n        showToast('Error al enviar feedback.', 'error');\r\n      })\r\n      .registrarFeedback(App.token, payload);\r\n  }\r\n\r\n  function cargarFeedbackDado(progId) {\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r.success) {\r\n          feedbackDadoData = r.data;\r\n          renderFeedbackDado(r.data);\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        document.getElementById('lista-feedback-dado').innerHTML =\r\n          '<p class=\"text-muted text-sm\">Error al cargar feedback.</p>';\r\n      })\r\n      .listarFeedbackEquipo(App.token, progId);\r\n  }\r\n\r\n  function renderFeedbackDado(feedbacks) {\r\n    var div = document.getElementById('lista-feedback-dado');\r\n\r\n    if (!feedbacks || feedbacks.length === 0) {\r\n      div.innerHTML = '<div class=\"empty-state\"><p>No has registrado feedback en este programa.</p></div>';\r\n      return;\r\n    }\r\n\r\n    div.innerHTML = feedbacks.map(function(f) {\r\n      return '<div class=\"card mb-2\"><div class=\"card-body\" style=\"padding:12px 16px;\">' +\r\n        '<div class=\"flex-between mb-2\">' +\r\n          '<strong>' + escapeHtml(f.participante_nombre) + '</strong>' +\r\n          '<span class=\"text-sm text-muted\">' + formatDate(f.fecha_feedback) + '</span>' +\r\n        '</div>' +\r\n        '<p class=\"text-sm\"><strong>Fortaleza:</strong> ' + escapeHtml(f.fortaleza) + '</p>' +\r\n        '<p class=\"text-sm\"><strong>Reforzar:</strong> ' + escapeHtml(f.aspecto_reforzar) + '</p>' +\r\n        '<p class=\"text-sm\"><strong>Recomendacion:</strong> ' + escapeHtml(f.recomendacion) + '</p>' +\r\n      '</div></div>';\r\n    }).join('');\r\n  }\r\n<\/script>\r\n","feedback-recibido":"<!-- Vista: Feedback Recibido (Participante) -->\r\n<div>\r\n  <div class=\"card\">\r\n    <div class=\"card-header\">\r\n      <h2>Feedback Recibido</h2>\r\n    </div>\r\n    <div class=\"card-body\">\r\n      <div id=\"lista-feedback-recibido\">\r\n        <div class=\"text-center p-4\"><div class=\"spinner spinner-lg\"></div><p class=\"text-muted mt-2\">Cargando...</p></div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<script>\r\n  (function() {\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r.success) {\r\n          renderFeedbackRecibido(r.data);\r\n        } else {\r\n          document.getElementById('lista-feedback-recibido').innerHTML =\r\n            '<div class=\"empty-state\"><p>' + escapeHtml(r.error) + '</p></div>';\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        document.getElementById('lista-feedback-recibido').innerHTML =\r\n          '<div class=\"empty-state\"><p>Error al cargar feedback.</p></div>';\r\n      })\r\n      .listarFeedbackRecibido(App.token);\r\n  })();\r\n\r\n  function renderFeedbackRecibido(feedbacks) {\r\n    var div = document.getElementById('lista-feedback-recibido');\r\n\r\n    if (!feedbacks || feedbacks.length === 0) {\r\n      div.innerHTML = '<div class=\"empty-state\">' +\r\n        '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"width:64px;height:64px;margin-bottom:16px;opacity:0.4;\">' +\r\n          '<path d=\"M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z\"/>' +\r\n        '</svg>' +\r\n        '<p>Aun no has recibido feedback de tu jefatura.</p>' +\r\n      '</div>';\r\n      return;\r\n    }\r\n\r\n    div.innerHTML = feedbacks.map(function(f) {\r\n      return '<div class=\"card mb-3\"><div class=\"card-body\">' +\r\n        '<div class=\"flex-between mb-2\">' +\r\n          '<div>' +\r\n            '<strong>' + escapeHtml(f.jefatura_nombre) + '</strong>' +\r\n            (f.programa_nombre ? '<span class=\"text-sm text-muted\"> | ' + escapeHtml(f.programa_nombre) + '</span>' : '') +\r\n          '</div>' +\r\n          '<span class=\"text-sm text-muted\">' + formatDate(f.fecha_feedback) + '</span>' +\r\n        '</div>' +\r\n        '<div style=\"display:grid;gap:12px;\">' +\r\n          '<div>' +\r\n            '<p class=\"text-xs text-muted\" style=\"text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;\">Fortaleza</p>' +\r\n            '<div style=\"background:var(--color-fondo-alt);padding:10px 14px;border-radius:8px;border-left:3px solid var(--color-exito);\">' +\r\n              '<p class=\"text-sm\">' + escapeHtml(f.fortaleza) + '</p>' +\r\n            '</div>' +\r\n          '</div>' +\r\n          '<div>' +\r\n            '<p class=\"text-xs text-muted\" style=\"text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;\">Aspecto a Reforzar</p>' +\r\n            '<div style=\"background:var(--color-fondo-alt);padding:10px 14px;border-radius:8px;border-left:3px solid var(--color-advertencia);\">' +\r\n              '<p class=\"text-sm\">' + escapeHtml(f.aspecto_reforzar) + '</p>' +\r\n            '</div>' +\r\n          '</div>' +\r\n          '<div>' +\r\n            '<p class=\"text-xs text-muted\" style=\"text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;\">Recomendaci&oacute;n</p>' +\r\n            '<div style=\"background:var(--color-fondo-alt);padding:10px 14px;border-radius:8px;border-left:3px solid var(--color-secundario);\">' +\r\n              '<p class=\"text-sm\">' + escapeHtml(f.recomendacion) + '</p>' +\r\n            '</div>' +\r\n          '</div>' +\r\n        '</div>' +\r\n      '</div></div>';\r\n    }).join('');\r\n  }\r\n<\/script>\r\n","mi-equipo":"<!-- Vista: Mi Equipo (Jefatura) -->\r\n<div>\r\n  <div class=\"mb-4\">\r\n    <select class=\"form-control\" id=\"sel-programa-equipo\" onchange=\"cargarEquipo()\" style=\"max-width:320px;\">\r\n      <option value=\"\">Selecciona un programa...</option>\r\n    </select>\r\n  </div>\r\n\r\n  <div id=\"equipo-empty\" class=\"card\">\r\n    <div class=\"empty-state\">\r\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"width:64px;height:64px;margin-bottom:16px;opacity:0.4;\">\r\n        <path d=\"M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2\"/><circle cx=\"9\" cy=\"7\" r=\"4\"/>\r\n        <path d=\"M23 21v-2a4 4 0 00-3-3.87\"/><path d=\"M16 3.13a4 4 0 010 7.75\"/>\r\n      </svg>\r\n      <p>Selecciona un programa para ver tu equipo asignado.</p>\r\n    </div>\r\n  </div>\r\n\r\n  <div id=\"equipo-content\" class=\"hidden\">\r\n    <div id=\"equipo-lista\"></div>\r\n  </div>\r\n</div>\r\n\r\n<script>\r\n  (function() {\r\n    google.script.run.withSuccessHandler(function(r) {\r\n      if (r.success) {\r\n        var sel = document.getElementById('sel-programa-equipo');\r\n        r.data.forEach(function(p) {\r\n          var opt = document.createElement('option');\r\n          opt.value = p.id;\r\n          opt.textContent = p.nombre;\r\n          sel.appendChild(opt);\r\n        });\r\n      }\r\n    }).listarProgramasDashboard(App.token);\r\n  })();\r\n\r\n  function cargarEquipo() {\r\n    var progId = document.getElementById('sel-programa-equipo').value;\r\n    if (!progId) {\r\n      document.getElementById('equipo-empty').classList.remove('hidden');\r\n      document.getElementById('equipo-content').classList.add('hidden');\r\n      return;\r\n    }\r\n\r\n    document.getElementById('equipo-empty').classList.add('hidden');\r\n    document.getElementById('equipo-content').classList.remove('hidden');\r\n    document.getElementById('equipo-lista').innerHTML =\r\n      '<div class=\"text-center p-4\"><div class=\"spinner spinner-lg\"></div></div>';\r\n\r\n    // Cargar participantes\r\n    google.script.run.withSuccessHandler(function(rPart) {\r\n      if (!rPart.success) {\r\n        document.getElementById('equipo-lista').innerHTML =\r\n          '<div class=\"empty-state\"><p>' + escapeHtml(rPart.error) + '</p></div>';\r\n        return;\r\n      }\r\n\r\n      var participantes = rPart.data.filter(function(p) { return p.rol_programa === 'participante'; });\r\n\r\n      if (participantes.length === 0) {\r\n        document.getElementById('equipo-lista').innerHTML =\r\n          '<div class=\"empty-state\"><p>No tienes participantes asignados en este programa.</p></div>';\r\n        return;\r\n      }\r\n\r\n      // Cargar observaciones y feedback del programa\r\n      var obsData = [];\r\n      var fbData = [];\r\n      var loaded = 0;\r\n\r\n      function renderWhenReady() {\r\n        loaded++;\r\n        if (loaded >= 2) {\r\n          renderEquipo(participantes, obsData, fbData, progId);\r\n        }\r\n      }\r\n\r\n      google.script.run.withSuccessHandler(function(rObs) {\r\n        if (rObs.success) obsData = rObs.data || [];\r\n        renderWhenReady();\r\n      }).withFailureHandler(function() { renderWhenReady(); })\r\n      .listarObservaciones(App.token, progId);\r\n\r\n      google.script.run.withSuccessHandler(function(rFb) {\r\n        if (rFb.success) fbData = rFb.data || [];\r\n        renderWhenReady();\r\n      }).withFailureHandler(function() { renderWhenReady(); })\r\n      .listarFeedbackEquipo(App.token, progId);\r\n\r\n    }).withFailureHandler(function() {\r\n      document.getElementById('equipo-lista').innerHTML =\r\n        '<div class=\"empty-state\"><p>Error al cargar equipo.</p></div>';\r\n    }).listarParticipantesPrograma(App.token, progId);\r\n  }\r\n\r\n  function renderEquipo(participantes, observaciones, feedbacks, progId) {\r\n    var div = document.getElementById('equipo-lista');\r\n\r\n    // Contar observaciones y feedback por participante\r\n    var obsCount = {};\r\n    var lastObsDate = {};\r\n    observaciones.forEach(function(o) {\r\n      var pid = o.participante_id;\r\n      obsCount[pid] = (obsCount[pid] || 0) + 1;\r\n      var fecha = o.fecha_observacion || o.fecha_creacion;\r\n      if (!lastObsDate[pid] || fecha > lastObsDate[pid]) {\r\n        lastObsDate[pid] = fecha;\r\n      }\r\n    });\r\n\r\n    var fbCount = {};\r\n    feedbacks.forEach(function(f) {\r\n      fbCount[f.participante_id] = (fbCount[f.participante_id] || 0) + 1;\r\n    });\r\n\r\n    div.innerHTML = '<div style=\"display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:16px;\">' +\r\n      participantes.map(function(p) {\r\n        var numObs = obsCount[p.id] || 0;\r\n        var numFb = fbCount[p.id] || 0;\r\n        var ultimaObs = lastObsDate[p.id] ? formatDate(lastObsDate[p.id]) : 'Sin observaciones';\r\n\r\n        return '<div class=\"card\">' +\r\n          '<div class=\"card-body\">' +\r\n            '<div class=\"mb-3\">' +\r\n              '<h3 style=\"font-size:16px;color:var(--color-primario);\">' + escapeHtml(p.nombre) + '</h3>' +\r\n              '<p class=\"text-sm text-muted\">' + escapeHtml(p.cargo || 'Sin cargo') + '</p>' +\r\n            '</div>' +\r\n            '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;\">' +\r\n              '<div style=\"background:var(--color-fondo-alt);padding:8px 12px;border-radius:6px;text-align:center;\">' +\r\n                '<div class=\"text-xs text-muted\">Observaciones</div>' +\r\n                '<div style=\"font-size:20px;font-weight:700;color:var(--color-primario);\">' + numObs + '</div>' +\r\n              '</div>' +\r\n              '<div style=\"background:var(--color-fondo-alt);padding:8px 12px;border-radius:6px;text-align:center;\">' +\r\n                '<div class=\"text-xs text-muted\">Feedback</div>' +\r\n                '<div style=\"font-size:20px;font-weight:700;color:var(--color-primario);\">' + numFb + '</div>' +\r\n              '</div>' +\r\n            '</div>' +\r\n            '<p class=\"text-xs text-muted mb-3\">Ultima observacion: ' + ultimaObs + '</p>' +\r\n            '<div style=\"display:flex;gap:8px;\">' +\r\n              '<button class=\"btn btn-sm btn-outline\" style=\"flex:1;\" onclick=\"irAObservar(\\'' + progId + '\\')\">Observar</button>' +\r\n              '<button class=\"btn btn-sm btn-secondary\" style=\"flex:1;\" onclick=\"irAFeedback(\\'' + progId + '\\', \\'' + p.id + '\\')\">Dar Feedback</button>' +\r\n            '</div>' +\r\n          '</div>' +\r\n        '</div>';\r\n      }).join('') +\r\n    '</div>';\r\n  }\r\n\r\n  function irAObservar(progId) {\r\n    // Navegar a la vista de observaciones\r\n    if (typeof cargarVista === 'function') {\r\n      cargarVista('observaciones');\r\n    }\r\n  }\r\n\r\n  function irAFeedback(progId, partId) {\r\n    // Navegar a la vista de feedback\r\n    if (typeof cargarVista === 'function') {\r\n      cargarVista('feedback');\r\n    }\r\n  }\r\n<\/script>\r\n","mi-progreso":"<!-- Vista: Mi Progreso (Participante) -->\r\n<div>\r\n  <!-- Grafico PRE vs POST -->\r\n  <div class=\"card mb-4\">\r\n    <div class=\"card-header\">\r\n      <h2>Mi Comparaci&oacute;n PRE vs POST</h2>\r\n    </div>\r\n    <div class=\"card-body\">\r\n      <div id=\"progreso-chart-container\">\r\n        <div class=\"text-center p-4\"><div class=\"spinner spinner-lg\"></div><p class=\"text-muted mt-2\">Cargando datos...</p></div>\r\n      </div>\r\n      <div style=\"position:relative;height:320px;\" id=\"progreso-chart-wrapper\" class=\"hidden\">\r\n        <canvas id=\"chart-mi-progreso\"></canvas>\r\n      </div>\r\n      <div id=\"progreso-sin-datos\" class=\"hidden\">\r\n        <div class=\"empty-state\">\r\n          <p>Aun no hay datos de comparacion. Completa tus encuestas PRE y POST para ver tu progreso.</p>\r\n        </div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n\r\n  <!-- Feedback Recibido -->\r\n  <div class=\"card\">\r\n    <div class=\"card-header\">\r\n      <h2>Feedback Recibido</h2>\r\n    </div>\r\n    <div class=\"card-body\">\r\n      <div id=\"progreso-feedback\">\r\n        <div class=\"text-center p-4\"><div class=\"spinner\"></div></div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<script>\r\n  var chartMiProgreso = null;\r\n\r\n  (function() {\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r.success) {\r\n          renderProgresoChart(r.data.comparacion || []);\r\n          renderProgresoFeedback(r.data.feedback || []);\r\n        } else {\r\n          document.getElementById('progreso-chart-container').innerHTML =\r\n            '<div class=\"empty-state\"><p>' + escapeHtml(r.error) + '</p></div>';\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        document.getElementById('progreso-chart-container').innerHTML =\r\n          '<div class=\"empty-state\"><p>Error al cargar datos de progreso.</p></div>';\r\n      })\r\n      .obtenerMiProgreso(App.token);\r\n  })();\r\n\r\n  function renderProgresoChart(comparacion) {\r\n    document.getElementById('progreso-chart-container').classList.add('hidden');\r\n\r\n    if (!comparacion || comparacion.length === 0) {\r\n      document.getElementById('progreso-sin-datos').classList.remove('hidden');\r\n      return;\r\n    }\r\n\r\n    document.getElementById('progreso-chart-wrapper').classList.remove('hidden');\r\n\r\n    var labels = comparacion.map(function(c) { return c.conducta_nombre; });\r\n    var dataPre = comparacion.map(function(c) { return c.promedioPre; });\r\n    var dataPost = comparacion.map(function(c) { return c.promedioPost; });\r\n\r\n    var ctx = document.getElementById('chart-mi-progreso').getContext('2d');\r\n\r\n    if (chartMiProgreso) chartMiProgreso.destroy();\r\n\r\n    chartMiProgreso = new Chart(ctx, {\r\n      type: 'bar',\r\n      data: {\r\n        labels: labels,\r\n        datasets: [\r\n          {\r\n            label: 'PRE',\r\n            data: dataPre,\r\n            backgroundColor: 'rgba(46, 134, 193, 0.7)',\r\n            borderColor: '#2E86C1',\r\n            borderWidth: 1\r\n          },\r\n          {\r\n            label: 'POST',\r\n            data: dataPost,\r\n            backgroundColor: 'rgba(39, 174, 96, 0.7)',\r\n            borderColor: '#27AE60',\r\n            borderWidth: 1\r\n          }\r\n        ]\r\n      },\r\n      options: {\r\n        responsive: true,\r\n        maintainAspectRatio: false,\r\n        scales: {\r\n          y: {\r\n            beginAtZero: true,\r\n            max: 5,\r\n            title: { display: true, text: 'Puntaje' }\r\n          }\r\n        },\r\n        plugins: {\r\n          legend: { position: 'top' },\r\n          title: { display: false }\r\n        }\r\n      }\r\n    });\r\n  }\r\n\r\n  function renderProgresoFeedback(feedbacks) {\r\n    var div = document.getElementById('progreso-feedback');\r\n\r\n    if (!feedbacks || feedbacks.length === 0) {\r\n      div.innerHTML = '<div class=\"empty-state\"><p>Aun no has recibido feedback.</p></div>';\r\n      return;\r\n    }\r\n\r\n    div.innerHTML = feedbacks.map(function(f) {\r\n      return '<div class=\"card mb-3\"><div class=\"card-body\">' +\r\n        '<div class=\"flex-between mb-2\">' +\r\n          '<span class=\"text-sm text-muted\">' + formatDate(f.fecha) + '</span>' +\r\n          (f.conducta_nombre ? '<span class=\"badge badge-info\">' + escapeHtml(f.conducta_nombre) + '</span>' : '') +\r\n        '</div>' +\r\n        '<p><strong>Fortaleza:</strong> ' + escapeHtml(f.fortaleza) + '</p>' +\r\n        '<p><strong>Aspecto a reforzar:</strong> ' + escapeHtml(f.aspecto_reforzar) + '</p>' +\r\n        '<p><strong>Recomendaci&oacute;n:</strong> ' + escapeHtml(f.recomendacion) + '</p>' +\r\n      '</div></div>';\r\n    }).join('');\r\n  }\r\n<\/script>\r\n","mis-actividades":"<!-- Vista: Mis Actividades (Participante + Jefatura) - Unificada: Encuestas Internas + Actividades Externas -->\n<div>\n  <!-- Actividades Pendientes -->\n  <div class=\"mb-4\">\n    <h2 style=\"color:var(--color-primario);margin-bottom:16px;\">Pendientes</h2>\n    <div id=\"actividades-pendientes\">\n      <div class=\"text-center p-4\"><div class=\"spinner spinner-lg\"></div><p class=\"text-muted mt-2\">Cargando...</p></div>\n    </div>\n  </div>\n\n  <!-- Formulario de Encuesta Interna (oculto, se muestra al responder) -->\n  <div id=\"encuesta-form-container\" class=\"hidden\">\n    <div class=\"card\">\n      <div class=\"card-header\">\n        <div>\n          <h2 id=\"enc-form-titulo\">Encuesta</h2>\n          <span class=\"text-sm text-muted\" id=\"enc-form-programa\"></span>\n        </div>\n        <button class=\"btn btn-sm btn-outline\" onclick=\"volverALista()\">Volver</button>\n      </div>\n
