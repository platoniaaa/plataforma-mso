<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta http-equiv="refresh" content="0; url=v2/index.html">
  <title>Plataforma MSO - Redirigiendo...</title>
  <script>
    // Limpiar cualquier cache previo y redirigir
    (function() {
      try {
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (var i = 0; i < names.length; i++) caches.delete(names[i]);
          });
        }
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            for (var i = 0; i < regs.length; i++) regs[i].unregister();
          });
        }
      } catch (e) {}
      window.location.replace('v2/index.html');
    })();
  </script>
</head>
<body>
  <p>Redirigiendo a la plataforma...</p>
  <p>Si no avanza automaticamente, <a href="v2/index.html">haz click aqui</a>.</p>
</body>
</html>
