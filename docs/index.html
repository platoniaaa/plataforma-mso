nombre || '-') + '</td>' +\n        '<td>' + getBadge(u.rol) + '</td>' +\n        '<td>' + getBadge(u.estado) + '</td>' +\n        '<td>' + acciones + '</td>' +\n      '</tr>';\n    }).join('');\n  }\n\n  function filtrarUsuarios() {\n    var busqueda = document.getElementById('buscar-usuario').value.toLowerCase();\n    var empresa = document.getElementById('filtro-empresa').value;\n    var rol = document.getElementById('filtro-rol').value;\n    var estado = document.getElementById('filtro-estado').value;\n\n    var filtrados = usuariosData.filter(function(u) {\n      var matchBusq = !busqueda ||\n        u.nombre_completo.toLowerCase().indexOf(busqueda) !== -1 ||\n        u.email.toLowerCase().indexOf(busqueda) !== -1;\n      var matchEmp = !empresa || u.cliente_id === empresa;\n      var matchRol = !rol || u.rol === rol;\n      var matchEst = !estado || u.estado === estado;\n      return matchBusq && matchEmp && matchRol && matchEst;\n    });\n\n    renderUsuarios(filtrados);\n  }\n\n  function cargarJefaturasEmpresa(clienteId) {\n    var sel = document.getElementById('select-jefatura');\n    sel.innerHTML = '<option value=\"\">Sin asignar</option>';\n    if (!clienteId) return;\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r && r.success) {\n          r.data.forEach(function(j) {\n            var opt = document.createElement('option');\n            opt.value = j.id;\n            opt.textContent = j.nombre + ' (' + j.email + ')';\n            sel.appendChild(opt);\n          });\n        }\n      })\n      .withFailureHandler(function() {})\n      .obtenerJefaturasCliente(App.token, clienteId);\n  }\n\n  function abrirModalUsuario() {\n    document.getElementById('modal-usuario-titulo').textContent = 'Nuevo Usuario';\n    resetForm('form-usuario');\n    document.getElementById('usuario-edit-id').value = '';\n    document.getElementById('grupo-password').classList.remove('hidden');\n    document.getElementById('input-email-usuario').readOnly = false;\n    openModal('modal-usuario');\n  }\n\n  function editarUsuario(id) {\n    var usuario = usuariosData.find(function(u) { return u.id === id; });\n    if (!usuario) return;\n\n    document.getElementById('modal-usuario-titulo').textContent = 'Editar Usuario';\n    document.getElementById('usuario-edit-id').value = id;\n    document.getElementById('grupo-password').classList.add('hidden');\n    document.getElementById('input-email-usuario').readOnly = true;\n    fillForm('form-usuario', usuario);\n    if (usuario.cliente_id) {\n      cargarJefaturasEmpresa(usuario.cliente_id);\n      // Esperar a que carguen y seleccionar la actual\n      setTimeout(function() {\n        var sel = document.getElementById('select-jefatura');\n        if (usuario.jefatura_id) sel.value = usuario.jefatura_id;\n      }, 1500);\n    }\n    openModal('modal-usuario');\n  }\n\n  function guardarUsuario() {\n    var datos = getFormData('form-usuario');\n    var id = document.getElementById('usuario-edit-id').value;\n    var btn = document.getElementById('btn-guardar-usuario');\n\n    btnLoading(btn, true);\n\n    if (id) {\n      google.script.run\n        .withSuccessHandler(function(r) {\n          btnLoading(btn, false);\n          if (r.success) { closeModal('modal-usuario'); showToast('Usuario actualizado.', 'success'); cargarUsuarios(); }\n          else showToast(r.error, 'error');\n        })\n        .withFailureHandler(function() { btnLoading(btn, false); showToast('Error.', 'error'); })\n        .actualizarUsuario(App.token, id, datos);\n    } else {\n      google.script.run\n        .withSuccessHandler(function(r) {\n          btnLoading(btn, false);\n          if (r.success) { closeModal('modal-usuario'); showToast('Usuario creado.', 'success'); cargarUsuarios(); }\n          else showToast(r.error, 'error');\n        })\n        .withFailureHandler(function() { btnLoading(btn, false); showToast('Error.', 'error'); })\n        .crearUsuarioManual(App.token, datos);\n    }\n  }\n\n  function abrirAprobar(id) {\n    var usuario = usuariosData.find(function(u) { return u.id === id; });\n    if (!usuario) return;\n\n    document.getElementById('aprobar-id').value = id;\n    document.getElementById('aprobar-nombre').textContent = usuario.nombre_completo + ' (' + usuario.email + ')';\n\n    // Cargar jefaturas del mismo cliente\n    google.script.run\n      .withSuccessHandler(function(r) {\n        var sel = document.getElementById('aprobar-jefatura');\n        sel.innerHTML = '<option value=\"\">Sin asignar</option>';\n        if (r.success) {\n          r.data.forEach(function(j) {\n            var opt = document.createElement('option');\n            opt.value = j.id;\n            opt.textContent = j.nombre;\n            sel.appendChild(opt);\n          });\n        }\n      })\n      .obtenerJefaturasCliente(App.token, usuario.cliente_id);\n\n    openModal('modal-aprobar');\n  }\n\n  function ejecutarAprobacion() {\n    var id = document.getElementById('aprobar-id').value;\n    var rol = document.getElementById('aprobar-rol').value;\n    var jefaturaId = document.getElementById('aprobar-jefatura').value;\n    var btn = document.getElementById('btn-aprobar');\n\n    btnLoading(btn, true);\n    google.script.run\n      .withSuccessHandler(function(r) {\n        btnLoading(btn, false);\n        if (r.success) { closeModal('modal-aprobar'); showToast('Usuario aprobado.', 'success'); cargarUsuarios(); }\n        else showToast(r.error, 'error');\n      })\n      .withFailureHandler(function() { btnLoading(btn, false); showToast('Error.', 'error'); })\n      .aprobarUsuario(App.token, id, rol, jefaturaId);\n  }\n\n  function confirmarDesactivarUsuario(id) {\n    if (confirmar('¿Desactivar este usuario?')) {\n      google.script.run\n        .withSuccessHandler(function(r) {\n          if (r.success) { showToast('Usuario desactivado.', 'success'); cargarUsuarios(); }\n          else showToast(r.error, 'error');\n        })\n        .desactivarUsuario(App.token, id);\n    }\n  }\n\n  // === Carga Masiva ===\n  function abrirModalCargaMasiva() {\n    document.getElementById('carga-archivo').value = '';\n    document.getElementById('preview-carga').classList.add('hidden');\n    document.getElementById('resultado-carga').classList.add('hidden');\n    document.getElementById('btn-ejecutar-carga').classList.add('hidden');\n    datosExcelParseados = [];\n    openModal('modal-carga-masiva');\n  }\n\n  function previsualizarExcel(input) {\n    var file = input.files[0];\n    if (!file) return;\n\n    var reader = new FileReader();\n    reader.onload = function(e) {\n      var workbook = XLSX.read(e.target.result, { type: 'binary' });\n      var sheet = workbook.Sheets[workbook.SheetNames[0]];\n      var json = XLSX.utils.sheet_to_json(sheet);\n\n      datosExcelParseados = json;\n      document.getElementById('preview-count').textContent = json.length;\n\n      if (json.length > 0) {\n        var headers = Object.keys(json[0]);\n        var thead = document.querySelector('#tabla-preview thead tr');\n        thead.innerHTML = headers.map(function(h) { return '<th>' + escapeHtml(h) + '</th>'; }).join('');\n\n        var tbody = document.querySelector('#tabla-preview tbody');\n        var previewRows = json.slice(0, 5);\n        tbody.innerHTML = previewRows.map(function(row) {\n          return '<tr>' + headers.map(function(h) {\n            return '<td>' + escapeHtml(String(row[h] || '')) + '</td>';\n          }).join('') + '</tr>';\n        }).join('');\n\n        if (json.length > 5) {\n          tbody.innerHTML += '<tr><td colspan=\"' + headers.length + '\" class=\"text-center text-muted\">... y ' + (json.length - 5) + ' m\\u00e1s</td></tr>';\n        }\n\n        document.getElementById('preview-carga').classList.remove('hidden');\n        document.getElementById('btn-ejecutar-carga').classList.remove('hidden');\n      }\n    };\n    reader.readAsBinaryString(file);\n  }\n\n  function ejecutarCargaMasiva() {\n    var clienteId = document.getElementById('carga-empresa').value;\n    if (!clienteId) { showToast('Selecciona una empresa.', 'error'); return; }\n    if (!datosExcelParseados.length) { showToast('No hay datos.', 'error'); return; }\n\n    var btn = document.getElementById('btn-ejecutar-carga');\n    btnLoading(btn, true);\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        btnLoading(btn, false);\n        var div = document.getElementById('resultado-carga');\n        div.classList.remove('hidden');\n\n        if (r.success) {\n          var html = '<div class=\"alert alert-success\">' + r.data.message + '</div>';\n          if (r.data.errores && r.data.errores.length) {\n            html += '<div class=\"alert alert-warning\"><strong>Errores:</strong><ul style=\"margin:8px 0 0 16px;\">';\n            r.data.errores.forEach(function(err) { html += '<li>' + escapeHtml(err) + '</li>'; });\n            html += '</ul></div>';\n          }\n          div.innerHTML = html;\n          cargarUsuarios();\n        } else {\n          div.innerHTML = '<div class=\"alert alert-error\">' + escapeHtml(r.error) + '</div>';\n        }\n      })\n      .withFailureHandler(function() { btnLoading(btn, false); showToast('Error en carga masiva.', 'error'); })\n      .cargaMasivaUsuarios(App.token, clienteId, datosExcelParseados);\n  }\n<\/script>\n","hallazgos":"<!-- Vista: Hallazgos y Recomendaciones (Admin) -->\n<div>\n  <div class=\"flex-between mb-4\">\n    <div style=\"display:flex;gap:12px;\">\n      <select class=\"form-control\" id=\"sel-programa-hall\" onchange=\"cargarHallazgos()\" style=\"min-width:250px;\">\n        <option value=\"\">Selecciona un programa...</option>\n      </select>\n    </div>\n    <button class=\"btn btn-primary\" id=\"btn-nuevo-hallazgo\" onclick=\"abrirModalHallazgo()\" disabled>\n      + Nuevo Hallazgo\n    </button>\n  </div>\n\n  <div class=\"card\">\n    <div class=\"table-container\">\n      <table class=\"data-table\" id=\"tabla-hallazgos\">\n        <thead>\n          <tr>\n            <th>Hallazgo</th>\n            <th>Conducta</th>\n            <th>Criticidad</th>\n            <th>Estado Decisi&oacute;n</th>\n            <th>Fecha</th>\n            <th>Acciones</th>\n          </tr>\n        </thead>\n        <tbody id=\"tbody-hallazgos\">\n          <tr><td colspan=\"6\" class=\"text-center text-muted p-4\">Selecciona un programa para ver hallazgos.</td></tr>\n        </tbody>\n      </table>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Crear/Editar Hallazgo -->\n<div class=\"modal-overlay\" id=\"modal-hallazgo\">\n  <div class=\"modal\" style=\"max-width:650px;\">\n    <div class=\"modal-header\">\n      <h3 id=\"modal-hall-titulo\">Nuevo Hallazgo</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-hallazgo')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <form id=\"form-hallazgo\">\n        <input type=\"hidden\" id=\"hall-edit-id\">\n        <div class=\"form-group\">\n          <label>Hallazgo *</label>\n          <textarea name=\"hallazgo\" class=\"form-control\" required placeholder=\"Describe el hallazgo...\"></textarea>\n        </div>\n        <div class=\"form-group\">\n          <label>Conducta asociada</label>\n          <select name=\"conducta_id\" class=\"form-control\" id=\"hall-conducta\">\n            <option value=\"\">Sin conducta especifica</option>\n          </select>\n        </div>\n        <div class=\"form-group\">\n          <label>Segmento afectado *</label>\n          <input type=\"text\" name=\"segmento_afectado\" class=\"form-control\" required placeholder=\"Ej: Equipo Operaciones, Todos los participantes...\">\n        </div>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n          <div class=\"form-group\">\n            <label>Criticidad *</label>\n            <select name=\"criticidad\" class=\"form-control\" required>\n              <option value=\"baja\">Baja</option>\n              <option value=\"media\">Media</option>\n              <option value=\"alta\">Alta</option>\n              <option value=\"critica\">Cr&iacute;tica</option>\n            </select>\n          </div>\n          <div class=\"form-group\">\n            <label>Estado de decisi&oacute;n *</label>\n            <select name=\"estado_decision\" class=\"form-control\" required>\n              <option value=\"informar\">Informar</option>\n              <option value=\"monitorear\">Monitorear</option>\n              <option value=\"intervenir\">Intervenir</option>\n              <option value=\"escalar\">Escalar</option>\n              <option value=\"cerrar\">Cerrar</option>\n            </select>\n          </div>\n        </div>\n        <div class=\"form-group\">\n          <label>Interpretaci&oacute;n</label>\n          <textarea name=\"interpretacion\" class=\"form-control\" placeholder=\"Interpretacion del hallazgo...\"></textarea>\n        </div>\n      </form>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-hallazgo')\">Cancelar</button>\n      <button class=\"btn btn-primary\" id=\"btn-guardar-hall\" onclick=\"guardarHallazgo()\">Guardar</button>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Detalle de Hallazgo + Recomendaciones -->\n<div class=\"modal-overlay\" id=\"modal-detalle-hall\">\n  <div class=\"modal\" style=\"max-width:750px;\">\n    <div class=\"modal-header\">\n      <h3>Detalle del Hallazgo</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-detalle-hall')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <div id=\"detalle-hall-info\"></div>\n\n      <hr style=\"margin:16px 0;border-color:var(--color-borde);\">\n\n      <div class=\"flex-between mb-3\">\n        <h4 style=\"color:var(--color-primario);\">Recomendaciones</h4>\n      </div>\n      <div id=\"lista-recomendaciones\"></div>\n\n      <hr style=\"margin:16px 0;border-color:var(--color-borde);\">\n      <h4 class=\"mb-3\" style=\"color:var(--color-primario);\">Agregar Recomendaci&oacute;n</h4>\n      <div class=\"form-group\">\n        <label>Recomendaci&oacute;n *</label>\n        <textarea class=\"form-control\" id=\"rec-texto\" placeholder=\"Escribe la recomendacion...\"></textarea>\n      </div>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;\">\n        <div class=\"form-group\">\n          <label>Prioridad *</label>\n          <select class=\"form-control\" id=\"rec-prioridad\">\n            <option value=\"baja\">Baja</option>\n            <option value=\"media\">Media</option>\n            <option value=\"alta\">Alta</option>\n          </select>\n        </div>\n        <div class=\"form-group\">\n          <label>Conducta asociada</label>\n          <select class=\"form-control\" id=\"rec-conducta\">\n            <option value=\"\">Sin conducta especifica</option>\n          </select>\n        </div>\n      </div>\n      <div class=\"form-group\">\n        <label>Responsable sugerido</label>\n        <input type=\"text\" class=\"form-control\" id=\"rec-responsable\" placeholder=\"Nombre o cargo del responsable\">\n      </div>\n      <button class=\"btn btn-secondary\" onclick=\"agregarRecomendacion()\">+ Agregar Recomendaci&oacute;n</button>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-detalle-hall')\">Cerrar</button>\n    </div>\n  </div>\n</div>\n\n<script>\n  var hallazgosData = [];\n  var conductasHall = [];\n  var detalleHallazgoId = null;\n\n  (function() {\n    google.script.run.withSuccessHandler(function(r) {\n      if (r.success) {\n        var sel = document.getElementById('sel-programa-hall');\n        r.data.forEach(function(p) {\n          var opt = document.createElement('option');\n          opt.value = p.id;\n          opt.textContent = p.nombre + ' (' + p.cliente_nombre + ')';\n          sel.appendChild(opt);\n        });\n      }\n    }).listarProgramas(App.token, null);\n  })();\n\n  function cargarHallazgos() {\n    var progId = document.getElementById('sel-programa-hall').value;\n    document.getElementById('btn-nuevo-hallazgo').disabled = !progId;\n    if (!progId) {\n      document.getElementById('tbody-hallazgos').innerHTML =\n        '<tr><td colspan=\"6\" class=\"text-center text-muted p-4\">Selecciona un programa.</td></tr>';\n      return;\n    }\n\n    // Cargar conductas del programa\n    google.script.run.withSuccessHandler(function(r) {\n      if (r.success) conductasHall = r.data;\n    }).listarConductas(App.token, progId);\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r.success) {\n          hallazgosData = r.data;\n          renderHallazgos(r.data);\n        } else {\n          showToast(r.error, 'error');\n        }\n      })\n      .withFailureHandler(function() {\n        showToast('Error al cargar hallazgos.', 'error');\n      })\n      .listarHallazgos(App.token, progId);\n  }\n\n  function getCriticidadBadge(criticidad) {\n    var clases = {\n      'baja': 'badge-info',\n      'media': 'badge-warning',\n      'alta': 'badge-danger',\n      'critica': 'badge-danger'\n    };\n    var clase = clases[criticidad] || 'badge-secondary';\n    return '<span class=\"badge ' + clase + '\">' + escapeHtml(criticidad) + '</span>';\n  }\n\n  function getEstadoDecisionBadge(estado) {\n    var clases = {\n      'informar': 'badge-info',\n      'monitorear': 'badge-warning',\n      'intervenir': 'badge-danger',\n      'escalar': 'badge-danger',\n      'cerrar': 'badge-secondary'\n    };\n    var clase = clases[estado] || 'badge-secondary';\n    return '<span class=\"badge ' + clase + '\">' + escapeHtml(estado) + '</span>';\n  }\n\n  function renderHallazgos(hallazgos) {\n    var tbody = document.getElementById('tbody-hallazgos');\n    if (!hallazgos || hallazgos.length === 0) {\n      tbody.innerHTML = '<tr><td colspan=\"6\" class=\"text-center text-muted p-4\">No hay hallazgos registrados.</td></tr>';\n      return;\n    }\n\n    tbody.innerHTML = hallazgos.map(function(h) {\n      var textoCorto = h.hallazgo.length > 80 ? h.hallazgo.substring(0, 80) + '...' : h.hallazgo;\n      return '<tr>' +\n        '<td><strong>' + escapeHtml(textoCorto) + '</strong></td>' +\n        '<td>' + escapeHtml(h.conducta_nombre || '-') + '</td>' +\n        '<td>' + getCriticidadBadge(h.criticidad) + '</td>' +\n        '<td>' + getEstadoDecisionBadge(h.estado_decision) + '</td>' +\n        '<td>' + formatDate(h.fecha_creacion) + '</td>' +\n        '<td>' +\n          '<button class=\"btn btn-sm btn-outline\" onclick=\"verDetalle(\\'' + h.id + '\\')\">Ver</button> ' +\n          '<button class=\"btn btn-sm btn-outline\" onclick=\"editarHallazgo(\\'' + h.id + '\\')\">Editar</button>' +\n        '</td>' +\n      '</tr>';\n    }).join('');\n  }\n\n  function abrirModalHallazgo() {\n    document.getElementById('modal-hall-titulo').textContent = 'Nuevo Hallazgo';\n    resetForm('form-hallazgo');\n    document.getElementById('hall-edit-id').value = '';\n    llenarSelectorConductas('hall-conducta');\n    openModal('modal-hallazgo');\n  }\n\n  function editarHallazgo(id) {\n    var h = hallazgosData.find(function(x) { return x.id === id; });\n    if (!h) return;\n    document.getElementById('modal-hall-titulo').textContent = 'Editar Hallazgo';\n    document.getElementById('hall-edit-id').value = id;\n    llenarSelectorConductas('hall-conducta');\n    fillForm('form-hallazgo', h);\n    openModal('modal-hallazgo');\n  }\n\n  function llenarSelectorConductas(selId) {\n    var sel = document.getElementById(selId);\n    sel.innerHTML = '<option value=\"\">Sin conducta especifica</option>';\n    conductasHall.forEach(function(c) {\n      var opt = document.createElement('option');\n      opt.value = c.id;\n      opt.textContent = c.nombre;\n      sel.appendChild(opt);\n    });\n  }\n\n  function guardarHallazgo() {\n    var datos = getFormData('form-hallazgo');\n    var id = document.getElementById('hall-edit-id').value;\n    var progId = document.getElementById('sel-programa-hall').value;\n    datos.programa_id = progId;\n    var btn = document.getElementById('btn-guardar-hall');\n\n    if (!datos.hallazgo || !datos.segmento_afectado) {\n      showToast('Completa los campos obligatorios.', 'error');\n      return;\n    }\n\n    btnLoading(btn, true);\n\n    if (id) {\n      google.script.run\n        .withSuccessHandler(function(r) {\n          btnLoading(btn, false);\n          if (r.success) {\n            closeModal('modal-hallazgo');\n            showToast('Hallazgo actualizado.', 'success');\n            cargarHallazgos();\n          } else {\n            showToast(r.error, 'error');\n          }\n        })\n        .withFailureHandler(function() {\n          btnLoading(btn, false);\n          showToast('Error al actualizar.', 'error');\n        })\n        .actualizarHallazgo(App.token, id, datos);\n    } else {\n      google.script.run\n        .withSuccessHandler(function(r) {\n          btnLoading(btn, false);\n          if (r.success) {\n            closeModal('modal-hallazgo');\n            showToast('Hallazgo creado.', 'success');\n            cargarHallazgos();\n          } else {\n            showToast(r.error, 'error');\n          }\n        })\n        .withFailureHandler(function() {\n          btnLoading(btn, false);\n          showToast('Error al crear.', 'error');\n        })\n        .crearHallazgo(App.token, datos);\n    }\n  }\n\n  function verDetalle(id) {\n    var h = hallazgosData.find(function(x) { return x.id === id; });\n    if (!h) return;\n    detalleHallazgoId = id;\n\n    var info = '<div class=\"mb-3\">' +\n      '<p><strong>Hallazgo:</strong> ' + escapeHtml(h.hallazgo) + '</p>' +\n      '<p><strong>Conducta:</strong> ' + escapeHtml(h.conducta_nombre || 'N/A') + '</p>' +\n      '<p><strong>Segmento afectado:</strong> ' + escapeHtml(h.segmento_afectado) + '</p>' +\n      '<p><strong>Criticidad:</strong> ' + getCriticidadBadge(h.criticidad) + '</p>' +\n      '<p><strong>Estado de decisi&oacute;n:</strong> ' + getEstadoDecisionBadge(h.estado_decision) + '</p>' +\n      (h.interpretacion ? '<p><strong>Interpretaci&oacute;n:</strong> ' + escapeHtml(h.interpretacion) + '</p>' : '') +\n      '<p class=\"text-sm text-muted\">Creado: ' + formatDate(h.fecha_creacion) + '</p>' +\n    '</div>';\n\n    document.getElementById('detalle-hall-info').innerHTML = info;\n\n    // Render recomendaciones\n    renderRecomendaciones(h.recomendaciones || []);\n\n    // Llenar selector conductas para recomendaciones\n    llenarSelectorConductas('rec-conducta');\n\n    // Limpiar form recomendacion\n    document.getElementById('rec-texto').value = '';\n    document.getElementById('rec-prioridad').value = 'media';\n    document.getElementById('rec-responsable').value = '';\n\n    openModal('modal-detalle-hall');\n  }\n\n  function renderRecomendaciones(recs) {\n    var div = document.getElementById('lista-recomendaciones');\n    if (!recs || recs.length === 0) {\n      div.innerHTML = '<p class=\"text-muted text-sm\">Sin recomendaciones registradas.</p>';\n      return;\n    }\n\n    div.innerHTML = recs.map(function(r) {\n      var prioridadBadge = getCriticidadBadge(r.prioridad);\n      return '<div class=\"card mb-2\"><div class=\"card-body\" style=\"padding:12px 16px;\">' +\n        '<div class=\"flex-between\">' +\n          '<div>' +\n            '<span>' + escapeHtml(r.recomendacion) + '</span><br>' +\n            '<span class=\"text-xs text-muted\">Prioridad: </span>' + prioridadBadge +\n            (r.conducta_nombre ? ' <span class=\"text-xs text-muted\">| Conducta: ' + escapeHtml(r.conducta_nombre) + '</span>' : '') +\n            (r.responsable_sugerido ? ' <span class=\"text-xs text-muted\">| Responsable: ' + escapeHtml(r.responsable_sugerido) + '</span>' : '') +\n          '</div>' +\n          '<button class=\"btn btn-sm btn-danger\" onclick=\"eliminarRec(\\'' + r.id + '\\')\">&times;</button>' +\n        '</div>' +\n      '</div></div>';\n    }).join('');\n  }\n\n  function agregarRecomendacion() {\n    var texto = document.getElementById('rec-texto').value.trim();\n    var prioridad = document.getElementById('rec-prioridad').value;\n    var conductaId = document.getElementById('rec-conducta').value;\n    var responsable = document.getElementById('rec-responsable').value.trim();\n\n    if (!texto) {\n      showToast('Escribe la recomendacion.', 'error');\n      return;\n    }\n\n    var datos = {\n      hallazgo_id: detalleHallazgoId,\n      recomendacion: texto,\n      conducta_id: conductaId,\n      prioridad: prioridad,\n      responsable_sugerido: responsable\n    };\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r.success) {\n          showToast('Recomendacion agregada.', 'success');\n          document.getElementById('rec-texto').value = '';\n          document.getElementById('rec-responsable').value = '';\n          // Recargar hallazgos y actualizar detalle\n          recargarDetalle();\n        } else {\n          showToast(r.error, 'error');\n        }\n      })\n      .withFailureHandler(function() {\n        showToast('Error al agregar recomendacion.', 'error');\n      })\n      .crearRecomendacion(App.token, datos);\n  }\n\n  function eliminarRec(id) {\n    if (!confirmar('Eliminar esta recomendacion?')) return;\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r.success) {\n          showToast('Recomendacion eliminada.', 'success');\n          recargarDetalle();\n        } else {\n          showToast(r.error, 'error');\n        }\n      })\n      .eliminarRecomendacion(App.token, id);\n  }\n\n  function recargarDetalle() {\n    var progId = document.getElementById('sel-programa-hall').value;\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r.success) {\n          hallazgosData = r.data;\n          renderHallazgos(r.data);\n          // Actualizar detalle abierto\n          var h = hallazgosData.find(function(x) { return x.id === detalleHallazgoId; });\n          if (h) {\n            renderRecomendaciones(h.recomendaciones || []);\n          }\n        }\n      })\n      .listarHallazgos(App.token, progId);\n  }\n<\/script>\n","gestion-observaciones":"<!-- Vista: Gestión de Observaciones (Solo Admin) -->\n<div>\n  <div class=\"flex-between mb-4\">\n    <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n      <input type=\"text\" class=\"form-control search-input\" id=\"buscar-obs-admin\"\n             placeholder=\"Buscar por t&iacute;tulo o autor...\" oninput=\"filtrarObsAdmin()\">\n      <select class=\"form-control\" id=\"filtro-programa-obs\" onchange=\"filtrarObsAdmin()\" style=\"max-width:220px;\">\n        <option value=\"\">Todos los programas</option>\n      </select>\n      <select class=\"form-control\" id=\"filtro-estado-obs\" onchange=\"filtrarObsAdmin()\" style=\"max-width:170px;\">\n        <option value=\"\">Todos los estados</option>\n        <option value=\"pendiente\">Pendiente</option>\n        <option value=\"en_revision\">En Revisi&oacute;n</option>\n        <option value=\"en_proceso\">En Proceso</option>\n        <option value=\"resuelta\">Resuelta</option>\n        <option value=\"no_resuelta\">No Resuelta</option>\n      </select>\n      <select class=\"form-control\" id=\"filtro-tipo-obs\" onchange=\"filtrarObsAdmin()\" style=\"max-width:180px;\">\n        <option value=\"\">Todas las categor&iacute;as</option>\n        <option value=\"encuesta\">Encuesta</option>\n        <option value=\"actividad\">Actividad</option>\n        <option value=\"contenido\">Contenido</option>\n        <option value=\"plataforma\">Plataforma</option>\n        <option value=\"otro\">Otro</option>\n      </select>\n    </div>\n  </div>\n\n  <!-- KPIs de resumen -->\n  <div class=\"kpi-grid mb-4\" id=\"obs-kpi-grid\">\n    <div class=\"kpi-card\">\n      <div class=\"kpi-label\">Total Incidencias</div>\n      <div class=\"kpi-value\" id=\"obs-kpi-total\">--</div>\n    </div>\n    <div class=\"kpi-card\">\n      <div class=\"kpi-label\">Pendientes</div>\n      <div class=\"kpi-value\" id=\"obs-kpi-pendientes\" style=\"color:var(--color-advertencia);\">--</div>\n    </div>\n    <div class=\"kpi-card\">\n      <div class=\"kpi-label\">En Revisi&oacute;n / Proceso</div>\n      <div class=\"kpi-value\" id=\"obs-kpi-revision\" style=\"color:var(--color-secundario);\">--</div>\n    </div>\n    <div class=\"kpi-card\">\n      <div class=\"kpi-label\">Resueltas</div>\n      <div class=\"kpi-value\" id=\"obs-kpi-resueltas\" style=\"color:var(--color-exito);\">--</div>\n    </div>\n  </div>\n\n  <!-- Tabla de observaciones -->\n  <div class=\"card\">\n    <div class=\"card-header\">\n      <h2>Incidencias Reportadas</h2>\n      <span class=\"text-sm text-muted\" id=\"obs-count-label\"></span>\n    </div>\n    <div class=\"table-container\">\n      <table class=\"data-table\">\n        <thead>\n          <tr>\n            <th>Fecha</th>\n            <th>Categor&iacute;a</th>\n            <th>T&iacute;tulo</th>\n            <th>Programa</th>\n            <th>Reportado por</th>\n            <th>Evidencia</th>\n            <th>Estado</th>\n            <th>Acciones</th>\n          </tr>\n        </thead>\n        <tbody id=\"tbody-obs-admin\">\n          <tr><td colspan=\"8\" class=\"text-center text-muted p-4\"><div class=\"spinner\"></div></td></tr>\n        </tbody>\n      </table>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Detalle + Gestión de Observación -->\n<div class=\"modal-overlay\" id=\"modal-gestion-obs\">\n  <div class=\"modal\" style=\"max-width:750px;\">\n    <div class=\"modal-header\">\n      <h3 id=\"gestion-obs-titulo\">Detalle de Observaci&oacute;n</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-gestion-obs')\">&times;</button>\n    </div>\n    <div class=\"modal-body\" id=\"gestion-obs-body\">\n      Cargando...\n    </div>\n    <div class=\"modal-footer\" id=\"gestion-obs-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-gestion-obs')\">Cerrar</button>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Cambiar Estado -->\n<div class=\"modal-overlay\" id=\"modal-cambiar-estado\">\n  <div class=\"modal\" style=\"max-width:500px;\">\n    <div class=\"modal-header\">\n      <h3 id=\"cambiar-estado-titulo\">Cambiar Estado</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-cambiar-estado')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <input type=\"hidden\" id=\"cambiar-estado-obs-id\">\n      <input type=\"hidden\" id=\"cambiar-estado-nuevo\">\n\n      <div class=\"mb-3\" id=\"cambiar-estado-info\"></div>\n\n      <div class=\"form-group\">\n        <label>Comentario obligatorio *</label>\n        <textarea class=\"form-control\" id=\"cambiar-estado-comentario\" required rows=\"3\"\n                  placeholder=\"Explica la raz&oacute;n del cambio de estado...\"></textarea>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-cambiar-estado')\">Cancelar</button>\n      <button class=\"btn btn-primary\" id=\"btn-confirmar-estado\" onclick=\"confirmarCambioEstado()\">Confirmar</button>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Ver imagen en grande -->\n<div class=\"modal-overlay\" id=\"modal-imagen-grande-admin\" onclick=\"closeModal('modal-imagen-grande-admin')\">\n  <div class=\"modal\" style=\"max-width:90vw;max-height:90vh;background:transparent;border:none;box-shadow:none;display:flex;align-items:center;justify-content:center;\">\n    <img id=\"imagen-grande-admin-src\" src=\"\" alt=\"Evidencia\" style=\"max-width:100%;max-height:85vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.4);\">\n  </div>\n</div>\n\n<style>\n  .estado-badge-pendiente { background: #FDEBD0; color: #D68910; }\n  .estado-badge-en_revision { background: #D4E6F1; color: #2471A3; }\n  .estado-badge-en_proceso { background: #E8DAEF; color: #7D3C98; }\n  .estado-badge-resuelta { background: #D4EFDF; color: #1E8449; }\n  .estado-badge-no_resuelta { background: #FADBD8; color: #C0392B; }\n\n  .cat-badge-encuesta { background: #E8DAEF; color: #7D3C98; }\n  .cat-badge-actividad { background: #D4E6F1; color: #2471A3; }\n  .cat-badge-contenido { background: #FDEBD0; color: #D68910; }\n  .cat-badge-plataforma { background: #FADBD8; color: #C0392B; }\n  .cat-badge-otro { background: #EAECEE; color: #5D6D7E; }\n\n  .estado-action-btn {\n    padding: 6px 10px;\n    border-radius: 6px;\n    font-size: 12px;\n    font-weight: 500;\n    cursor: pointer;\n    border: 1px solid;\n    transition: all 0.2s;\n    display: inline-flex;\n    align-items: center;\n    gap: 4px;\n  }\n\n  .estado-action-btn:hover {\n    transform: translateY(-1px);\n    box-shadow: 0 2px 8px rgba(0,0,0,0.1);\n  }\n\n  .btn-a-revision { background: #D4E6F1; color: #2471A3; border-color: #AED6F1; }\n  .btn-a-proceso { background: #E8DAEF; color: #7D3C98; border-color: #D2B4DE; }\n  .btn-a-resuelta { background: #D4EFDF; color: #1E8449; border-color: #A9DFBF; }\n  .btn-a-no-resuelta { background: #FADBD8; color: #C0392B; border-color: #F5B7B1; }\n\n  .historial-item {\n    display: flex;\n    gap: 12px;\n    padding: 10px 0;\n    border-bottom: 1px solid var(--color-borde);\n  }\n\n  .historial-item:last-child {\n    border-bottom: none;\n  }\n\n  .historial-dot {\n    width: 10px;\n    height: 10px;\n    border-radius: 50%;\n    flex-shrink: 0;\n    margin-top: 5px;\n  }\n\n  .detalle-evidencias-grid-admin {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));\n    gap: 8px;\n    margin-top: 8px;\n  }\n\n  .detalle-evidencias-grid-admin img {\n    width: 100%;\n    aspect-ratio: 1;\n    object-fit: cover;\n    border-radius: 6px;\n    border: 1px solid var(--color-borde);\n    cursor: pointer;\n    transition: transform 0.2s;\n  }\n\n  .detalle-evidencias-grid-admin img:hover {\n    transform: scale(1.05);\n  }\n</style>\n\n<script>\n  var obsAdminData = [];\n  var obsAdminFiltrada = [];\n\n  (function() {\n    cargarProgramasFiltro();\n    cargarObservacionesAdmin();\n  })();\n\n  function cargarProgramasFiltro() {\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r.success && r.data) {\n          var sel = document.getElementById('filtro-programa-obs');\n          r.data.forEach(function(p) {\n            var opt = document.createElement('option');\n            opt.value = p.id;\n            opt.textContent = p.nombre;\n            sel.appendChild(opt);\n          });\n        }\n      })\n      .listarProgramasDashboard(App.token);\n  }\n\n  function cargarObservacionesAdmin() {\n    document.getElementById('tbody-obs-admin').innerHTML =\n      '<tr><td colspan=\"8\" class=\"text-center p-4\"><div class=\"spinner\"></div></td></tr>';\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r.success) {\n          obsAdminData = r.data || [];\n          filtrarObsAdmin();\n          actualizarKPIs();\n        } else {\n          document.getElementById('tbody-obs-admin').innerHTML =\n            '<tr><td colspan=\"8\" class=\"text-center text-danger p-4\">Error al cargar.</td></tr>';\n        }\n      })\n      .withFailureHandler(function() {\n        document.getElementById('tbody-obs-admin').innerHTML =\n          '<tr><td colspan=\"8\" class=\"text-center text-danger p-4\">Error de conexi&oacute;n.</td></tr>';\n      })\n      .listarTodasObservacionesAdmin(App.token);\n  }\n\n  function actualizarKPIs() {\n    var total = obsAdminData.length;\n    var pendientes = obsAdminData.filter(function(o) { return o.estado_gestion === 'pendiente'; }).length;\n    var enRevision = obsAdminData.filter(function(o) {\n      return o.estado_gestion === 'en_revision' || o.estado_gestion === 'en_proceso';\n    }).length;\n    var resueltas = obsAdminData.filter(function(o) { return o.estado_gestion === 'resuelta'; }).length;\n\n    document.getElementById('obs-kpi-total').textContent = total;\n    document.getElementById('obs-kpi-pendientes').textContent = pendientes;\n    document.getElementById('obs-kpi-revision').textContent = enRevision;\n    document.getElementById('obs-kpi-resueltas').textContent = resueltas;\n  }\n\n  function filtrarObsAdmin() {\n    var busqueda = document.getElementById('buscar-obs-admin').value.toLowerCase();\n    var progId = document.getElementById('filtro-programa-obs').value;\n    var estado = document.getElementById('filtro-estado-obs').value;\n    var tipo = document.getElementById('filtro-tipo-obs').value;\n\n    obsAdminFiltrada = obsAdminData.filter(function(o) {\n      var matchBusq = !busqueda ||\n        o.titulo.toLowerCase().indexOf(busqueda) !== -1 ||\n        o.autor_nombre.toLowerCase().indexOf(busqueda) !== -1;\n      var matchProg = !progId || o.programa_id === progId;\n      var matchEstado = !estado || o.estado_gestion === estado;\n      var cat = o.categoria || o.tipo || '';\n      var matchTipo = !tipo || cat === tipo;\n      return matchBusq && matchProg && matchEstado && matchTipo;\n    });\n\n    document.getElementById('obs-count-label').textContent =\n      obsAdminFiltrada.length + ' de ' + obsAdminData.length + ' incidencias';\n\n    renderTablaAdmin(obsAdminFiltrada);\n  }\n\n  function getEstadoGestionBadge(estado) {\n    var labels = {\n      'pendiente': 'Pendiente',\n      'en_revision': 'En Revisi\\u00f3n',\n      'en_proceso': 'En Proceso',\n      'resuelta': 'Resuelta',\n      'no_resuelta': 'No Resuelta'\n    };\n    return '<span class=\"badge estado-badge-' + estado + '\">' + (labels[estado] || estado) + '</span>';\n  }\n\n  function getCatLabel(cat) {\n    var labels = {\n      'encuesta': 'Encuesta',\n      'actividad': 'Actividad',\n      'contenido': 'Contenido',\n      'plataforma': 'Plataforma',\n      'otro': 'Otro'\n    };\n    return labels[cat] || cat;\n  }\n\n  function renderTablaAdmin(observaciones) {\n    var tbody = document.getElementById('tbody-obs-admin');\n\n    if (!observaciones || observaciones.length === 0) {\n      tbody.innerHTML = '<tr><td colspan=\"8\" class=\"text-center text-muted p-4\">No hay observaciones que coincidan con los filtros.</td></tr>';\n      return;\n    }\n\n    tbody.innerHTML = observaciones.map(function(o) {\n      var numEv = (o.evidencias && o.evidencias.length) || 0;\n      var evIcon = numEv > 0\n        ? '<span style=\"display:flex;align-items:center;gap:3px;color:var(--color-secundario);\">' +\n          '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"/><circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"/><path d=\"M21 15l-5-5L5 21\"/></svg> ' +\n          numEv + '</span>'\n        : '<span class=\"text-muted\">-</span>';\n\n      return '<tr>' +\n        '<td class=\"text-sm\">' + formatDate(o.fecha) + '</td>' +\n        '<td><span class=\"badge cat-badge-' + (o.categoria || o.tipo) + '\">' + getCatLabel(o.categoria || o.tipo) + '</span></td>' +\n        '<td><strong>' + escapeHtml(o.titulo.length > 40 ? o.titulo.substring(0, 40) + '...' : o.titulo) + '</strong></td>' +\n        '<td class=\"text-sm\">' + escapeHtml(o.programa_nombre) + '</td>' +\n        '<td class=\"text-sm\">' + escapeHtml(o.autor_nombre) + '</td>' +\n        '<td class=\"text-center\">' + evIcon + '</td>' +\n        '<td>' + getEstadoGestionBadge(o.estado_gestion) + '</td>' +\n        '<td>' +\n          '<button class=\"btn btn-sm btn-outline\" onclick=\"abrirGestionObs(\\'' + o.id + '\\')\">Gestionar</button>' +\n        '</td>' +\n      '</tr>';\n    }).join('');\n  }\n\n  // ============================================\n  // MODAL: GESTIÓN DE OBSERVACIÓN\n  // ============================================\n\n  function abrirGestionObs(id) {\n    var o = obsAdminData.find(function(x) { return x.id === id; });\n    if (!o) return;\n\n    document.getElementById('gestion-obs-titulo').textContent = o.titulo;\n\n    var html = '';\n\n    // Info principal\n    html += '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;\">';\n    var cat = o.categoria || o.tipo || 'otro';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Categor&iacute;a</span><br>' +\n      '<span class=\"badge cat-badge-' + cat + '\">' + getCatLabel(cat) + '</span></div>';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Estado actual</span><br>' +\n      getEstadoGestionBadge(o.estado_gestion) + '</div>';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Programa</span><br>' +\n      '<span class=\"text-sm\">' + escapeHtml(o.programa_nombre) + '</span></div>';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Reportado por</span><br>' +\n      '<span class=\"text-sm\">' + escapeHtml(o.autor_nombre) + '</span></div>';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Fecha</span><br>' +\n      '<span class=\"text-sm\">' + formatDate(o.fecha) + '</span></div>';\n    html += '</div>';\n\n    // Descripción\n    html += '<div class=\"mb-4\">';\n    html += '<span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Descripci&oacute;n</span>';\n    html += '<div style=\"background:var(--color-fondo-alt);padding:14px 16px;border-radius:8px;margin-top:6px;border-left:3px solid var(--color-secundario);\">';\n    html += '<p class=\"text-sm\" style=\"white-space:pre-wrap;\">' + escapeHtml(o.comentario) + '</p>';\n    html += '</div></div>';\n\n    // Evidencias\n    var numEv = (o.evidencias && o.evidencias.length) || 0;\n    if (numEv > 0) {\n      html += '<div class=\"mb-4\">';\n      html += '<span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Evidencia (' + numEv + ')</span>';\n      html += '<div class=\"detalle-evidencias-grid-admin\">';\n      o.evidencias.forEach(function(ev) {\n        html += '<img src=\"' + ev.url + '\" alt=\"' + escapeHtml(ev.nombre) + '\" onclick=\"verImgAdmin(\\'' + ev.url + '\\')\" title=\"Clic para ampliar\">';\n      });\n      html += '</div></div>';\n    }\n\n    // Separador\n    html += '<hr style=\"margin:16px 0;border-color:var(--color-borde);\">';\n\n    // Acciones de estado\n    html += '<div class=\"mb-4\">';\n    html += '<span class=\"text-muted text-xs\" style=\"text-transform:uppercase;display:block;margin-bottom:10px;\">Cambiar estado</span>';\n    html += '<div style=\"display:flex;gap:8px;flex-wrap:wrap;\">';\n\n    var estado = o.estado_gestion;\n\n    if (estado === 'pendiente') {\n      html += '<button class=\"estado-action-btn btn-a-revision\" onclick=\"iniciarCambioEstado(\\'' + o.id + '\\', \\'en_revision\\')\">' +\n        '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><path d=\"M12 6v6l4 2\"/></svg>' +\n        ' Marcar en Revisi&oacute;n</button>';\n    }\n\n    if (estado === 'en_revision') {\n      html += '<button class=\"estado-action-btn btn-a-proceso\" onclick=\"iniciarCambioEstado(\\'' + o.id + '\\', \\'en_proceso\\')\">' +\n        '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83\"/></svg>' +\n        ' Pasar a En Proceso</button>';\n      html += '<button class=\"estado-action-btn btn-a-resuelta\" onclick=\"iniciarCambioEstado(\\'' + o.id + '\\', \\'resuelta\\')\">' +\n        '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"/></svg>' +\n        ' Resuelta</button>';\n      html += '<button class=\"estado-action-btn btn-a-no-resuelta\" onclick=\"iniciarCambioEstado(\\'' + o.id + '\\', \\'no_resuelta\\')\">' +\n        '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/></svg>' +\n        ' No Resuelta</button>';\n    }\n\n    if (estado === 'en_proceso') {\n      html += '<button class=\"estado-action-btn btn-a-resuelta\" onclick=\"iniciarCambioEstado(\\'' + o.id + '\\', \\'resuelta\\')\">' +\n        '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"/></svg>' +\n        ' Marcar como Resuelta</button>';\n      html += '<button class=\"estado-action-btn btn-a-no-resuelta\" onclick=\"iniciarCambioEstado(\\'' + o.id + '\\', \\'no_resuelta\\')\">' +\n        '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/></svg>' +\n        ' No Resuelta</button>';\n    }\n\n    if (estado === 'resuelta' || estado === 'no_resuelta') {\n      html += '<span class=\"text-sm text-muted\" style=\"display:flex;align-items:center;gap:6px;\">' +\n        (estado === 'resuelta'\n          ? '<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1E8449\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"/></svg> Esta observaci&oacute;n est&aacute; cerrada como <strong>Resuelta</strong>'\n          : '<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#C0392B\" stroke-width=\"2\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/></svg> Esta observaci&oacute;n est&aacute; cerrada como <strong>No Resuelta</strong>') +\n        '</span>';\n    }\n\n    html += '</div></div>';\n\n    // Historial de cambios de estado\n    html += '<div>';\n    html += '<span class=\"text-muted text-xs\" style=\"text-transform:uppercase;display:block;margin-bottom:10px;\">Historial de gesti&oacute;n</span>';\n\n    if (o.historial && o.historial.length > 0) {\n      html += o.historial.map(function(h) {\n        var dotColor = {\n          'pendiente': '#D68910',\n          'en_revision': '#2471A3',\n          'en_proceso': '#7D3C98',\n          'resuelta': '#1E8449',\n          'no_resuelta': '#C0392B'\n        }[h.estado_nuevo] || '#5D6D7E';\n\n        return '<div class=\"historial-item\">' +\n          '<div class=\"historial-dot\" style=\"background:' + dotColor + ';\"></div>' +\n          '<div style=\"flex:1;\">' +\n            '<div class=\"flex-between\">' +\n              '<span class=\"text-sm\"><strong>' + escapeHtml(h.admin_nombre) + '</strong> cambi&oacute; a ' +\n                getEstadoGestionBadge(h.estado_nuevo) + '</span>' +\n              '<span class=\"text-xs text-muted\">' + formatDate(h.fecha) + '</span>' +\n            '</div>' +\n            '<p class=\"text-sm\" style=\"color:var(--color-texto-sec);margin-top:4px;\">' + escapeHtml(h.comentario) + '</p>' +\n          '</div>' +\n        '</div>';\n      }).join('');\n    } else {\n      html += '<p class=\"text-sm text-muted\">Sin acciones de gesti&oacute;n registradas.</p>';\n    }\n\n    html += '</div>';\n\n    document.getElementById('gestion-obs-body').innerHTML = html;\n    openModal('modal-gestion-obs');\n  }\n\n  // ============================================\n  // CAMBIO DE ESTADO\n  // ============================================\n\n  function iniciarCambioEstado(obsId, nuevoEstado) {\n    document.getElementById('cambiar-estado-obs-id').value = obsId;\n    document.getElementById('cambiar-estado-nuevo').value = nuevoEstado;\n    document.getElementById('cambiar-estado-comentario').value = '';\n\n    var labels = {\n      'en_revision': 'En Revisi\\u00f3n',\n      'en_proceso': 'En Proceso',\n      'resuelta': 'Resuelta',\n      'no_resuelta': 'No Resuelta'\n    };\n\n    document.getElementById('cambiar-estado-titulo').textContent =\n      'Cambiar a: ' + (labels[nuevoEstado] || nuevoEstado);\n\n    var o = obsAdminData.find(function(x) { return x.id === obsId; });\n    document.getElementById('cambiar-estado-info').innerHTML =\n      '<div class=\"alert alert-info\">' +\n        '<strong>' + escapeHtml(o ? o.titulo : '') + '</strong><br>' +\n        '<span class=\"text-sm\">Estado actual: ' + getEstadoGestionBadge(o ? o.estado_gestion : 'pendiente') +\n        ' &rarr; Nuevo: ' + getEstadoGestionBadge(nuevoEstado) + '</span>' +\n      '</div>';\n\n    openModal('modal-cambiar-estado');\n  }\n\n  function confirmarCambioEstado() {\n    var obsId = document.getElementById('cambiar-estado-obs-id').value;\n    var nuevoEstado = document.getElementById('cambiar-estado-nuevo').value;\n    var comentario = document.getElementById('cambiar-estado-comentario').value.trim();\n\n    if (!comentario) {\n      showToast('El comentario es obligatorio para cambiar el estado.', 'error');\n      document.getElementById('cambiar-estado-comentario').focus();\n      return;\n    }\n\n    var btn = document.getElementById('btn-confirmar-estado');\n    btnLoading(btn, true);\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        btnLoading(btn, false);\n        if (r.success) {\n          closeModal('modal-cambiar-estado');\n          closeModal('modal-gestion-obs');\n          showToast('Estado actualizado exitosamente.', 'success');\n          cargarObservacionesAdmin();\n        } else {\n          showToast(r.error || 'Error al cambiar estado.', 'error');\n        }\n      })\n      .withFailureHandler(function() {\n        btnLoading(btn, false);\n        showToast('Error de conexi&oacute;n.', 'error');\n      })\n      .cambiarEstadoObservacion(App.token, obsId, nuevoEstado, comentario);\n  }\n\n  function verImgAdmin(url) {\n    document.getElementById('imagen-grande-admin-src').src = url;\n    openModal('modal-imagen-grande-admin');\n  }\n<\/script>\n","correos":"<!-- Vista: Correos (Admin - Templates de email por programa) -->\n<div>\n  <div class=\"flex-between mb-4\">\n    <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n      <select class=\"form-control\" id=\"sel-programa-correo\" onchange=\"onProgramaCorreoChange()\" style=\"min-width:250px;\">\n        <option value=\"\">Selecciona un programa...</option>\n      </select>\n    </div>\n    <button class=\"btn btn-primary\" id=\"btn-nuevo-correo\" onclick=\"abrirCompositor()\" disabled>\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"display:inline;vertical-align:middle;margin-right:4px;\">\n        <path d=\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"/><polyline points=\"22,6 12,13 2,6\"/>\n      </svg>\n      Nuevo Correo\n    </button>\n  </div>\n\n  <!-- Templates -->\n  <div id=\"correo-templates\" class=\"hidden\">\n    <h3 style=\"color:var(--color-primario);margin-bottom:16px;\">Selecciona una plantilla</h3>\n    <div class=\"templates-grid\">\n      <div class=\"template-card\" onclick=\"seleccionarTemplate('presentacion')\">\n        <div class=\"template-icon\" style=\"background:#E8DAEF;color:#7D3C98;\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"3\" width=\"20\" height=\"14\" rx=\"2\"/><line x1=\"8\" y1=\"21\" x2=\"16\" y2=\"21\"/><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"21\"/></svg>\n        </div>\n        <h4>Presentaci&oacute;n de Programa</h4>\n        <p class=\"text-xs text-muted\">Describe la metodolog&iacute;a, estructura, hitos y adjunta materiales de apoyo del programa.</p>\n      </div>\n      <div class=\"template-card\" onclick=\"seleccionarTemplate('bienvenida')\">\n        <div class=\"template-icon\" style=\"background:#D4EFDF;color:#1E8449;\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z\"/></svg>\n        </div>\n        <h4>Inicio / Bienvenida</h4>\n        <p class=\"text-xs text-muted\">Correo de bienvenida con fechas clave, instrucciones iniciales y documentos de inicio.</p>\n      </div>\n      <div class=\"template-card\" onclick=\"seleccionarTemplate('checkpoint')\">\n        <div class=\"template-icon\" style=\"background:#FDEBD0;color:#D68910;\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><polyline points=\"12 6 12 12 16 14\"/></svg>\n        </div>\n        <h4>Checkpoint / Seguimiento</h4>\n        <p class=\"text-xs text-muted\">Resumen de avance intermedio con indicadores, logros y pr&oacute;ximos pasos.</p>\n      </div>\n      <div class=\"template-card\" onclick=\"seleccionarTemplate('cierre')\">\n        <div class=\"template-icon\" style=\"background:#D4E6F1;color:#2471A3;\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M22 11.08V12a10 10 0 11-5.93-9.14\"/><polyline points=\"22 4 12 14.01 9 11.01\"/></svg>\n        </div>\n        <h4>Cierre / Resultados</h4>\n        <p class=\"text-xs text-muted\">Resultados finales, comparaci&oacute;n PRE/POST, logros destacados y recomendaciones.</p>\n      </div>\n    </div>\n  </div>\n\n  <!-- Compositor de correo -->\n  <div id=\"correo-compositor\" class=\"hidden\">\n    <div class=\"card\">\n      <div class=\"card-header\">\n        <div style=\"display:flex;align-items:center;gap:10px;\">\n          <div id=\"compositor-icon\" class=\"template-icon-sm\" style=\"background:#E8DAEF;color:#7D3C98;\">\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"/><polyline points=\"22,6 12,13 2,6\"/></svg>\n          </div>\n          <div>\n            <h2 id=\"compositor-titulo\" style=\"margin:0;\">Nuevo Correo</h2>\n            <span class=\"text-xs text-muted\" id=\"compositor-programa\"></span>\n          </div>\n        </div>\n        <button class=\"btn btn-sm btn-outline\" onclick=\"volverATemplates()\">\n          <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"19\" y1=\"12\" x2=\"5\" y2=\"12\"/><polyline points=\"12 19 5 12 12 5\"/></svg>\n          Volver\n        </button>\n      </div>\n      <div class=\"card-body\">\n        <!-- Destinatarios -->\n        <div class=\"form-group\">\n          <label>Destinatarios *</label>\n          <div id=\"destinatarios-tags\" class=\"tags-container\"></div>\n          <div style=\"display:flex;gap:8px;margin-top:8px;\">\n            <input type=\"email\" class=\"form-control\" id=\"input-destinatario\" placeholder=\"Agregar email...\" style=\"flex:1;\">\n            <button class=\"btn btn-sm btn-outline\" onclick=\"agregarDestinatario()\">+ Agregar</button>\n          </div>\n          <div id=\"destinatarios-sugeridos\" class=\"mt-2\"></div>\n        </div>\n\n        <!-- Asunto -->\n        <div class=\"form-group\">\n          <label>Asunto *</label>\n          <input type=\"text\" class=\"form-control\" id=\"correo-asunto\" placeholder=\"Asunto del correo...\">\n        </div>\n\n        <!-- Cuerpo del correo -->\n        <div class=\"form-group\">\n          <label>Contenido del correo *</label>\n          <div class=\"correo-toolbar\">\n            <button class=\"toolbar-btn\" onclick=\"formatText('bold')\" title=\"Negrita\"><strong>B</strong></button>\n            <button class=\"toolbar-btn\" onclick=\"formatText('italic')\" title=\"Cursiva\"><em>I</em></button>\n            <button class=\"toolbar-btn\" onclick=\"formatText('underline')\" title=\"Subrayado\"><u>U</u></button>\n            <span class=\"toolbar-sep\"></span>\n            <button class=\"toolbar-btn\" onclick=\"formatText('insertUnorderedList')\" title=\"Lista\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"8\" y1=\"6\" x2=\"21\" y2=\"6\"/><line x1=\"8\" y1=\"12\" x2=\"21\" y2=\"12\"/><line x1=\"8\" y1=\"18\" x2=\"21\" y2=\"18\"/><circle cx=\"3\" cy=\"6\" r=\"1\" fill=\"currentColor\"/><circle cx=\"3\" cy=\"12\" r=\"1\" fill=\"currentColor\"/><circle cx=\"3\" cy=\"18\" r=\"1\" fill=\"currentColor\"/></svg>\n            </button>\n            <button class=\"toolbar-btn\" onclick=\"formatText('insertOrderedList')\" title=\"Lista numerada\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><line x1=\"10\" y1=\"6\" x2=\"21\" y2=\"6\"/><line x1=\"10\" y1=\"12\" x2=\"21\" y2=\"12\"/><line x1=\"10\" y1=\"18\" x2=\"21\" y2=\"18\"/><text x=\"3\" y=\"8\" font-size=\"8\" fill=\"currentColor\">1</text><text x=\"3\" y=\"14\" font-size=\"8\" fill=\"currentColor\">2</text><text x=\"3\" y=\"20\" font-size=\"8\" fill=\"currentColor\">3</text></svg>\n            </button>\n          </div>\n          <div class=\"correo-editor\" id=\"correo-cuerpo\" contenteditable=\"true\"></div>\n        </div>\n\n        <!-- Archivos adjuntos -->\n        <div class=\"form-group\">\n          <label>Archivos adjuntos</label>\n          <div class=\"adjuntos-area\" id=\"adjuntos-area\" onclick=\"document.getElementById('file-input').click();\">\n            <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"opacity:0.4;\">\n              <path d=\"M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48\"/>\n            </svg>\n            <span class=\"text-sm text-muted\">Haz clic o arrastra archivos aqu&iacute;</span>\n          </div>\n          <input type=\"file\" id=\"file-input\" multiple style=\"display:none;\" onchange=\"onFilesSelected(this)\">\n          <div id=\"adjuntos-lista\" class=\"mt-2\"></div>\n        </div>\n\n        <!-- Acciones -->\n        <div style=\"display:flex;gap:12px;justify-content:flex-end;margin-top:20px;\">\n          <button class=\"btn btn-outline\" onclick=\"previsualizarCorreo()\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"display:inline;vertical-align:middle;margin-right:4px;\"><path d=\"M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z\"/><circle cx=\"12\" cy=\"12\" r=\"3\"/></svg>\n            Previsualizar\n          </button>\n          <button class=\"btn btn-primary\" id=\"btn-enviar-correo\" onclick=\"enviarCorreo()\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"display:inline;vertical-align:middle;margin-right:4px;\"><line x1=\"22\" y1=\"2\" x2=\"11\" y2=\"13\"/><polygon points=\"22 2 15 22 11 13 2 9 22 2\"/></svg>\n            Enviar Correo\n          </button>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- Historial de correos -->\n  <div id=\"correo-historial\" class=\"mt-4\">\n    <div class=\"card\">\n      <div class=\"card-header\">\n        <h2>Correos Enviados</h2>\n        <span class=\"text-sm text-muted\" id=\"correo-historial-count\"></span>\n      </div>\n      <div class=\"table-container\">\n        <table class=\"data-table\">\n          <thead>\n            <tr>\n              <th>Fecha</th>\n              <th>Plantilla</th>\n              <th>Asunto</th>\n              <th>Programa</th>\n              <th>Destinatarios</th>\n              <th>Adjuntos</th>\n              <th>Acciones</th>\n            </tr>\n          </thead>\n          <tbody id=\"tbody-correos\">\n            <tr><td colspan=\"7\" class=\"text-center text-muted p-4\">Selecciona un programa para ver correos enviados.</td></tr>\n          </tbody>\n        </table>\n      </div>\n    </div>\n  </div>\n\n  <!-- Estado vacio -->\n  <div id=\"correo-empty\" class=\"card\">\n    <div class=\"empty-state\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"width:64px;height:64px;margin-bottom:16px;opacity:0.4;\">\n        <path d=\"M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z\"/><polyline points=\"22,6 12,13 2,6\"/>\n      </svg>\n      <p>Selecciona un programa para crear y gestionar correos.</p>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Previsualización -->\n<div class=\"modal-overlay\" id=\"modal-preview-correo\">\n  <div class=\"modal\" style=\"max-width:700px;\">\n    <div class=\"modal-header\">\n      <h3>Previsualizaci&oacute;n del Correo</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-preview-correo')\">&times;</button>\n    </div>\n    <div class=\"modal-body\" id=\"preview-correo-body\" style=\"padding:0;\"></div>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-preview-correo')\">Cerrar</button>\n      <button class=\"btn btn-primary\" onclick=\"closeModal('modal-preview-correo');enviarCorreo();\">Enviar</button>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Detalle de correo enviado -->\n<div class=\"modal-overlay\" id=\"modal-detalle-correo\">\n  <div class=\"modal\" style=\"max-width:700px;\">\n    <div class=\"modal-header\">\n      <h3 id=\"detalle-correo-titulo\">Detalle del Correo</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-detalle-correo')\">&times;</button>\n    </div>\n    <div class=\"modal-body\" id=\"detalle-correo-body\"></div>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-detalle-correo')\">Cerrar</button>\n    </div>\n  </div>\n</div>\n\n<style>\n  .templates-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n    gap: 16px;\n  }\n\n  .template-card {\n    background: var(--color-tarjeta);\n    border: 2px solid var(--color-borde);\n    border-radius: 12px;\n    padding: 20px;\n    cursor: pointer;\n    transition: all 0.2s;\n    text-align: center;\n  }\n\n  .template-card:hover {\n    border-color: var(--color-primario);\n    transform: translateY(-2px);\n    box-shadow: 0 4px 16px rgba(0,0,0,0.08);\n  }\n\n  .template-card h4 {\n    margin: 12px 0 6px;\n    font-size: 14px;\n    color: var(--color-texto);\n  }\n\n  .template-icon {\n    width: 50px;\n    height: 50px;\n    border-radius: 12px;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n  }\n\n  .template-icon-sm {\n    width: 32px;\n    height: 32px;\n    border-radius: 8px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-shrink: 0;\n  }\n\n  .tags-container {\n    display: flex;\n    flex-wrap: wrap;\n    gap: 6px;\n    min-height: 32px;\n  }\n\n  .tag {\n    background: var(--color-fondo-alt);\n    border: 1px solid var(--color-borde);\n    border-radius: 20px;\n    padding: 4px 12px;\n    font-size: 12px;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n  }\n\n  .tag-remove {\n    cursor: pointer;\n    color: var(--color-peligro);\n    font-weight: bold;\n    line-height: 1;\n  }\n\n  .tag-remove:hover { opacity: 0.7; }\n\n  .correo-toolbar {\n    display: flex;\n    gap: 2px;\n    padding: 6px 8px;\n    background: var(--color-fondo-alt);\n    border: 1px solid var(--color-borde);\n    border-bottom: none;\n    border-radius: 8px 8px 0 0;\n  }\n\n  .toolbar-btn {\n    width: 30px;\n    height: 28px;\n    border: none;\n    background: none;\n    border-radius: 4px;\n    cursor: pointer;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    color: var(--color-texto-sec);\n    font-size: 13px;\n  }\n\n  .toolbar-btn:hover { background: var(--color-borde); color: var(--color-texto); }\n\n  .toolbar-sep {\n    width: 1px;\n    background: var(--color-borde);\n    margin: 2px 4px;\n  }\n\n  .correo-editor {\n    min-height: 300px;\n    padding: 16px;\n    border: 1px solid var(--color-borde);\n    border-radius: 0 0 8px 8px;\n    font-size: 14px;\n    line-height: 1.7;\n    color: var(--color-texto);\n    background: var(--color-tarjeta);\n    outline: none;\n    overflow-y: auto;\n  }\n\n  .correo-editor:focus {\n    border-color: var(--color-primario);\n  }\n\n  .correo-editor p { margin: 0 0 10px; }\n  .correo-editor ul, .correo-editor ol { margin: 4px 0 10px; padding-left: 24px; }\n\n  .adjuntos-area {\n    border: 2px dashed var(--color-borde);\n    border-radius: 10px;\n    padding: 20px;\n    text-align: center;\n    cursor: pointer;\n    transition: all 0.2s;\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 8px;\n  }\n\n  .adjuntos-area:hover {\n    border-color: var(--color-primario);\n    background: var(--color-fondo-alt);\n  }\n\n  .adjunto-item {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 8px 12px;\n    background: var(--color-fondo-alt);\n    border-radius: 8px;\n    margin-bottom: 6px;\n  }\n\n  .adjunto-info {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    font-size: 13px;\n  }\n\n  .adjunto-icon {\n    width: 28px;\n    height: 28px;\n    border-radius: 6px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-shrink: 0;\n  }\n\n  .preview-email {\n    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n    max-width: 100%;\n  }\n\n  .preview-header {\n    background: var(--color-fondo-alt);\n    padding: 16px 20px;\n    border-bottom: 1px solid var(--color-borde);\n  }\n\n  .preview-body {\n    padding: 24px 20px;\n    line-height: 1.7;\n    font-size: 14px;\n  }\n\n  .preview-adjuntos {\n    padding: 16px 20px;\n    border-top: 1px solid var(--color-borde);\n    background: var(--color-fondo-alt);\n  }\n\n  .template-badge-presentacion { background: #E8DAEF; color: #7D3C98; }\n  .template-badge-bienvenida { background: #D4EFDF; color: #1E8449; }\n  .template-badge-checkpoint { background: #FDEBD0; color: #D68910; }\n  .template-badge-cierre { background: #D4E6F1; color: #2471A3; }\n</style>\n\n<script>\n  var correoProgramaSeleccionado = null;\n  var correoDestinatarios = [];\n  var correoAdjuntos = [];\n  var correoTemplateActual = null;\n  var correosEnviados = [];\n  var programasCorreo = [];\n\n  (function() {\n    google.script.run.withSuccessHandler(function(r) {\n      if (r.success) {\n        programasCorreo = r.data;\n        var sel = document.getElementById('sel-programa-correo');\n        r.data.forEach(function(p) {\n          var opt = document.createElement('option');\n          opt.value = p.id;\n          opt.textContent = p.nombre + ' (' + p.cliente_nombre + ')';\n          sel.appendChild(opt);\n        });\n      }\n    }).listarProgramas(App.token, null);\n  })();\n\n  function onProgramaCorreoChange() {\n    var progId = document.getElementById('sel-programa-correo').value;\n    document.getElementById('btn-nuevo-correo').disabled = !progId;\n\n    if (!progId) {\n      document.getElementById('correo-empty').classList.remove('hidden');\n      document.getElementById('correo-templates').classList.add('hidden');\n      document.getElementById('correo-compositor').classList.add('hidden');\n      correoProgramaSeleccionado = null;\n      return;\n    }\n\n    correoProgramaSeleccionado = programasCorreo.find(function(p) { return p.id === progId; });\n    document.getElementById('correo-empty').classList.add('hidden');\n\n    // Cargar historial mock\n    cargarHistorialCorreos(progId);\n  }\n\n  function abrirCompositor() {\n    if (!correoProgramaSeleccionado) return;\n    document.getElementById('correo-empty').classList.add('hidden');\n    document.getElementById('correo-templates').classList.remove('hidden');\n    document.getElementById('correo-compositor').classList.add('hidden');\n  }\n\n  function volverATemplates() {\n    document.getElementById('correo-compositor').classList.add('hidden');\n    document.getElementById('correo-templates').classList.remove('hidden');\n  }\n\n  // ============================================\n  // TEMPLATES\n  // ============================================\n\n  var TEMPLATES = {\n    presentacion: {\n      nombre: 'Presentaci\\u00f3n de Programa',\n      color: '#E8DAEF',\n      colorText: '#7D3C98',\n      asunto: function(p) { return 'Presentaci\\u00f3n del Programa: ' + p.nombre; },\n      cuerpo: function(p) {\n        return '<p>Estimado/a,</p>' +\n          '<p>Comparto contigo, de forma simple, la l\\u00f3gica del programa <strong>' + p.nombre + '</strong>:</p>' +\n          '<ol>' +\n            '<li>El objetivo general del programa est\\u00e1 enfocado en ' + (p.objetivo || 'desarrollar competencias cr\\u00edticas en los participantes') + '.</li>' +\n            '<li>En t\\u00e9rminos de estructura, el programa contempla sesiones presenciales m\\u00e1s un proceso de pr\\u00e1ctica guiada en el puesto de trabajo.</li>' +\n            '<li>A nivel de dise\\u00f1o, se definieron competencias de desarrollo con sus respectivas conductas cr\\u00edticas, y a partir de eso se construyeron instrumentos de medici\\u00f3n (encuestas PRE y POST).</li>' +\n            '<li>Los instrumentos se aplican en 2 momentos del proceso: al inicio y al final, con el objetivo de contar con una foto inicial y luego levantar una foto final de cierre.</li>' +\n            '<li>Cada participante contar\\u00e1 con un seguimiento personalizado durante toda la pr\\u00e1ctica.</li>' +\n            '<li>Entre los hitos de medici\\u00f3n, el programa contempla checkpoints cuyo foco es generar aprendizaje colaborativo y monitorear el proceso.</li>' +\n          '</ol>' +\n          '<p>En s\\u00edntesis, la l\\u00f3gica del programa combina formaci\\u00f3n, pr\\u00e1ctica en terreno, acompa\\u00f1amiento, medici\\u00f3n en distintos momentos y soporte continuo.</p>' +\n          '<p><strong>Datos del programa:</strong></p>' +\n          '<ul>' +\n            '<li>Fecha inicio: ' + (p.fecha_inicio || 'Por definir') + '</li>' +\n            '<li>Fecha t\\u00e9rmino: ' + (p.fecha_termino || 'Por definir') + '</li>' +\n            '<li>Cliente: ' + (p.cliente_nombre || '') + '</li>' +\n          '</ul>' +\n          '<p>Te adjunto los materiales de apoyo del programa.</p>' +\n          '<p>Quedo atenta a cualquier consulta.</p>' +\n          '<p>Saludos cordiales.</p>';\n      }\n    },\n    bienvenida: {\n      nombre: 'Inicio / Bienvenida',\n      color: '#D4EFDF',\n      colorText: '#1E8449',\n      asunto: function(p) { return 'Bienvenido/a al Programa ' + p.nombre; },\n      cuerpo: function(p) {\n        return '<p>Estimado/a,</p>' +\n          '<p>Te damos la bienvenida al programa <strong>' + p.nombre + '</strong>.</p>' +\n          '<p>A continuaci\\u00f3n, te compartimos las fechas clave e instrucciones para el inicio:</p>' +\n          '<ul>' +\n            '<li><strong>Fecha de inicio:</strong> ' + (p.fecha_inicio || 'Por confirmar') + '</li>' +\n            '<li><strong>Medici\\u00f3n PRE:</strong> ' + (p.fecha_medicion_pre || 'Por confirmar') + '</li>' +\n            '<li><strong>Fecha de t\\u00e9rmino estimada:</strong> ' + (p.fecha_termino || 'Por confirmar') + '</li>' +\n          '</ul>' +\n          '<p><strong>Pr\\u00f3ximos pasos:</strong></p>' +\n          '<ol>' +\n            '<li>Completar la encuesta de autoevaluaci\\u00f3n PRE (se enviar\\u00e1 por la plataforma).</li>' +\n            '<li>Revisar los materiales adjuntos para familiarizarse con el programa.</li>' +\n            '<li>Confirmar asistencia a la primera sesi\\u00f3n.</li>' +\n          '</ol>' +\n          '<p>Adjuntamos la documentaci\\u00f3n inicial del programa.</p>' +\n          '<p>Ante cualquier duda, no dudes en contactarnos.</p>' +\n          '<p>Saludos cordiales.</p>';\n      }\n    },\n    checkpoint: {\n      nombre: 'Checkpoint / Seguimiento',\n      color: '#FDEBD0',\n      colorText: '#D68910',\n      asunto: function(p) { return 'Checkpoint de Avance - ' + p.nombre; },\n      cuerpo: function(p) {\n        return '<p>Estimado/a,</p>' +\n          '<p>Compartimos el resumen de avance del programa <strong>' + p.nombre + '</strong>.</p>' +\n          '<p><strong>Estado general:</strong></p>' +\n          '<ul>' +\n            '<li>Estado del programa: <strong>' + (p.estado || 'activo') + '</strong></li>' +\n            '<li>Per\\u00edodo: ' + (p.fecha_inicio || '') + ' - ' + (p.fecha_termino || '') + '</li>' +\n          '</ul>' +\n          '<p><strong>Indicadores clave:</strong></p>' +\n          '<ul>' +\n            '<li>Participantes activos en el proceso</li>' +\n            '<li>Actividades completadas seg\\u00fan calendario</li>' +\n            '<li>Observaciones de campo realizadas</li>' +\n            '<li>Feedback entregado por jefaturas</li>' +\n          '</ul>' +\n          '<p><strong>Pr\\u00f3ximos hitos:</strong></p>' +\n          '<ol>' +\n            '<li>Continuar con la pr\\u00e1ctica guiada en terreno</li>' +\n            '<li>Pr\\u00f3ximo checkpoint de seguimiento</li>' +\n            '<li>Preparaci\\u00f3n para la medici\\u00f3n POST</li>' +\n          '</ol>' +\n          '<p>Adjuntamos el detalle completo del avance.</p>' +\n          '<p>Saludos cordiales.</p>';\n      }\n    },\n    cierre: {\n      nombre: 'Cierre / Resultados',\n      color: '#D4E6F1',\n      colorText: '#2471A3',\n      asunto: function(p) { return 'Resultados Finales - ' + p.nombre; },\n      cuerpo: function(p) {\n        return '<p>Estimado/a,</p>' +\n          '<p>Nos complace compartir los resultados finales del programa <strong>' + p.nombre + '</strong>.</p>' +\n          '<p><strong>Resumen del programa:</strong></p>' +\n          '<ul>' +\n            '<li>Per\\u00edodo: ' + (p.fecha_inicio || '') + ' - ' + (p.fecha_termino || '') + '</li>' +\n            '<li>Cliente: ' + (p.cliente_nombre || '') + '</li>' +\n            '<li>Objetivo: ' + (p.objetivo || '') + '</li>' +\n          '</ul>' +\n          '<p><strong>Resultados principales:</strong></p>' +\n          '<ul>' +\n            '<li>Comparaci\\u00f3n PRE vs POST: Se evidencia evoluci\\u00f3n en las conductas cr\\u00edticas medidas</li>' +\n            '<li>Nivel de participaci\\u00f3n: Alto compromiso de los participantes durante el proceso</li>' +\n            '<li>Observaciones de campo: Se registraron observaciones que evidencian transferencia al puesto</li>' +\n            '<li>Feedback de jefaturas: Retroalimentaci\\u00f3n positiva sobre los cambios observados</li>' +\n          '</ul>' +\n          '<p><strong>Recomendaciones:</strong></p>' +\n          '<ol>' +\n            '<li>Mantener espacios de refuerzo peri\\u00f3dico para sostener los cambios logrados</li>' +\n            '<li>Implementar las acciones correctivas identificadas en los hallazgos</li>' +\n            '<li>Considerar un programa de seguimiento a 3 meses</li>' +\n          '</ol>' +\n          '<p>Adjuntamos el informe completo con el detalle de los resultados.</p>' +\n          '<p>Agradecemos la confianza y compromiso durante todo el proceso.</p>' +\n          '<p>Saludos cordiales.</p>';\n      }\n    }\n  };\n\n  function seleccionarTemplate(tipo) {\n    correoTemplateActual = tipo;\n    var tmpl = TEMPLATES[tipo];\n    var prog = correoProgramaSeleccionado;\n\n    document.getElementById('correo-templates').classList.add('hidden');\n    document.getElementById('correo-compositor').classList.remove('hidden');\n\n    document.getElementById('compositor-titulo').textContent = tmpl.nombre;\n    document.getElementById('compositor-programa').textContent = prog.nombre + ' (' + prog.cliente_nombre + ')';\n    document.getElementById('compositor-icon').style.background = tmpl.color;\n    document.getElementById('compositor-icon').style.color = tmpl.colorText;\n\n    document.getElementById('correo-asunto').value = tmpl.asunto(prog);\n    document.getElementById('correo-cuerpo').innerHTML = tmpl.cuerpo(prog);\n\n    // Reset destinatarios y adjuntos\n    correoDestinatarios = [];\n    correoAdjuntos = [];\n    renderDestinatarios();\n    renderAdjuntos();\n\n    // Sugerir contacto del cliente\n    renderSugeridos(prog);\n  }\n\n  // ============================================\n  // DESTINATARIOS\n  // ============================================\n\n  function renderSugeridos(prog) {\n    var div = document.getElementById('destinatarios-sugeridos');\n    var cliente = null;\n\n    // Buscar email del contacto del cliente\n    fetch('/api/mock', {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify({ fn: 'listarClientes', args: [App.token] })\n    })\n    .then(function(r) { return r.json(); })\n    .then(function(r) {\n      if (r.success && r.data) {\n        cliente = r.data.find(function(c) { return c.id === prog.cliente_id; });\n        if (cliente && cliente.contacto_email) {\n          div.innerHTML = '<div class=\"text-xs text-muted mb-1\">Contacto del cliente:</div>' +\n            '<button class=\"btn btn-sm btn-outline\" onclick=\"agregarDestinatarioDirecto(\\'' + cliente.contacto_email + '\\')\">' +\n            '+ ' + escapeHtml(cliente.contacto_nombre) + ' (' + escapeHtml(cliente.contacto_email) + ')' +\n            '</button>';\n        }\n      }\n    }).catch(function() {});\n  }\n\n  function agregarDestinatario() {\n    var input = document.getElementById('input-destinatario');\n    var email = input.value.trim();\n    if (!email || correoDestinatarios.indexOf(email) !== -1) return;\n    if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(email)) {\n      showToast('Email inv\\u00e1lido.', 'error');\n      return;\n    }\n    correoDestinatarios.push(email);\n    input.value = '';\n    renderDestinatarios();\n  }\n\n  function agregarDestinatarioDirecto(email) {\n    if (correoDestinatarios.indexOf(email) !== -1) return;\n    correoDestinatarios.push(email);\n    renderDestinatarios();\n  }\n\n  function eliminarDestinatario(email) {\n    correoDestinatarios = correoDestinatarios.filter(function(e) { return e !== email; });\n    renderDestinatarios();\n  }\n\n  function renderDestinatarios() {\n    var div = document.getElementById('destinatarios-tags');\n    div.innerHTML = correoDestinatarios.map(function(email) {\n      return '<span class=\"tag\">' + escapeHtml(email) +\n        ' <span class=\"tag-remove\" onclick=\"eliminarDestinatario(\\'' + escapeHtml(email) + '\\')\">&times;</span></span>';\n    }).join('');\n  }\n\n  // ============================================\n  // ARCHIVOS ADJUNTOS\n  // ============================================\n\n  function onFilesSelected(input) {\n    var files = Array.from(input.files);\n    files.forEach(function(f) {\n      correoAdjuntos.push({\n        nombre: f.name,\n        tamano: f.size,\n        tipo: f.type || 'application/octet-stream'\n      });\n    });\n    input.value = '';\n    renderAdjuntos();\n  }\n\n  function eliminarAdjunto(idx) {\n    correoAdjuntos.splice(idx, 1);\n    renderAdjuntos();\n  }\n\n  function getFileIcon(tipo) {\n    if (tipo.indexOf('pdf') !== -1) return { bg: '#FADBD8', color: '#C0392B', ext: 'PDF' };\n    if (tipo.indexOf('spreadsheet') !== -1 || tipo.indexOf('xlsx') !== -1 || tipo.indexOf('excel') !== -1) return { bg: '#D4EFDF', color: '#1E8449', ext: 'XLS' };\n    if (tipo.indexOf('presentat
