bs) : '<span class=\"text-muted\">Sin registros</span>';\n      var feedIcon = l.feedbackEntregado\n        ? '<svg class=\"seguimiento-icon-check\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"/></svg>'\n        : '<svg class=\"seguimiento-icon-x\" width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\"/><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\"/></svg>';\n\n      return '<tr>' +\n        '<td><strong>' + escapeHtml(l.nombre) + '</strong></td>' +\n        '<td style=\"text-align:center;\">' + l.obsCount + '</td>' +\n        '<td>' + ultimaFecha + '</td>' +\n        '<td style=\"text-align:center;\">' + feedIcon + '</td>' +\n      '</tr>';\n    }).join('');\n  }\n\n  function renderObservacionesRecientes() {\n    var container = document.getElementById('observaciones-recientes-container');\n    var badge = document.getElementById('obs-total-badge');\n\n    if (!seguimientoObservaciones || !seguimientoObservaciones.length) {\n      badge.textContent = '0';\n      container.innerHTML = '<div style=\"text-align:center; padding: 32px 16px; color: var(--color-texto-sec, #64748b);\"><p>No hay observaciones registradas.</p></div>';\n      return;\n    }\n\n    // Sort by date descending\n    var sorted = seguimientoObservaciones.slice().sort(function(a, b) {\n      var dateA = a.fecha || a.fecha_creacion || '';\n      var dateB = b.fecha || b.fecha_creacion || '';\n      return dateB.localeCompare(dateA);\n    });\n\n    badge.textContent = sorted.length;\n\n    // Show last 20\n    var toShow = sorted.slice(0, 20);\n\n    var html = toShow.map(function(obs) {\n      var lider = escapeHtml(obs.lider_nombre || obs.lider || obs.usuario_nombre || 'Desconocido');\n      var fecha = obs.fecha || obs.fecha_creacion || '';\n      var fechaStr = fecha ? formatDate(fecha) : '';\n      var contexto = obs.contexto || obs.tipo || '';\n      var resumen = obs.resumen || obs.descripcion || obs.comentario || '';\n\n      return '<div class=\"obs-card\">' +\n        '<div class=\"obs-card-header\">' +\n          '<span class=\"obs-card-lider\">' + lider + '</span>' +\n          '<span class=\"obs-card-fecha\">' + escapeHtml(fechaStr) + '</span>' +\n        '</div>' +\n        '<div class=\"obs-card-body\">' +\n          (contexto ? '<strong>' + escapeHtml(contexto) + '</strong> &middot; ' : '') +\n          escapeHtml(resumen || 'Sin detalle') +\n        '</div>' +\n      '</div>';\n    }).join('');\n\n    if (sorted.length > 20) {\n      html += '<p class=\"text-center text-muted text-sm\" style=\"margin-top:12px;\">Mostrando las 20 observaciones m&aacute;s recientes de ' + sorted.length + ' totales.</p>';\n    }\n\n    container.innerHTML = html;\n  }\n<\/script>\n","tab-informes":"<!-- Tab: Informes del Programa (Panel Programa) -->\n<style>\n  .informes-section-title {\n    font-size: 16px;\n    font-weight: 600;\n    color: var(--color-primario);\n    margin: 0;\n  }\n  .informes-actions-grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));\n    gap: 14px;\n    margin-bottom: 28px;\n  }\n  .informe-action-card {\n    border: 1px solid var(--color-borde);\n    border-radius: 10px;\n    padding: 22px 18px;\n    background: #fff;\n    text-align: center;\n    cursor: pointer;\n    transition: box-shadow 0.2s, border-color 0.2s;\n  }\n  .informe-action-card:hover {\n    box-shadow: 0 4px 14px rgba(0,0,0,0.07);\n    border-color: var(--color-secundario);\n  }\n  .informe-action-card .action-icon {\n    width: 40px;\n    height: 40px;\n    margin: 0 auto 12px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    background: var(--color-fondo-alt);\n    border-radius: 10px;\n    color: var(--color-secundario);\n  }\n  .informe-action-card .action-title {\n    font-size: 14px;\n    font-weight: 600;\n    color: var(--color-texto);\n    margin-bottom: 4px;\n  }\n  .informe-action-card .action-desc {\n    font-size: 12px;\n    color: var(--color-texto-sec, #64748b);\n  }\n  .informe-row {\n    display: flex;\n    align-items: center;\n    gap: 12px;\n    padding: 12px 16px;\n    border: 1px solid var(--color-borde);\n    border-radius: 8px;\n    margin-bottom: 8px;\n    background: #fff;\n    transition: box-shadow 0.15s;\n  }\n  .informe-row:hover {\n    box-shadow: 0 2px 8px rgba(0,0,0,0.05);\n  }\n  .informe-row-info {\n    flex: 1;\n    min-width: 0;\n  }\n  .informe-row-nombre {\n    font-size: 14px;\n    font-weight: 600;\n    color: var(--color-texto);\n    word-break: break-word;\n  }\n  .informe-row-meta {\n    font-size: 12px;\n    color: var(--color-texto-sec, #64748b);\n    margin-top: 2px;\n  }\n  .informe-row-actions {\n    flex-shrink: 0;\n  }\n  .participante-selector-item {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 10px 8px;\n    border-bottom: 1px solid var(--color-borde);\n    cursor: pointer;\n    transition: background 0.15s;\n  }\n  .participante-selector-item:hover {\n    background: var(--color-fondo-alt);\n  }\n  .participante-selector-item:last-child {\n    border-bottom: none;\n  }\n</style>\n\n<div>\n  <!-- Action cards -->\n  <div class=\"flex-between mb-4\">\n    <h3 class=\"informes-section-title\">Generar Informes</h3>\n  </div>\n\n  <div class=\"informes-actions-grid\">\n    <!-- Informe Individual -->\n    <div class=\"informe-action-card\" onclick=\"abrirSelectorParticipante()\">\n      <div class=\"action-icon\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2\"/><circle cx=\"12\" cy=\"7\" r=\"4\"/></svg>\n      </div>\n      <div class=\"action-title\">Generar Informe Individual</div>\n      <div class=\"action-desc\">Selecciona un participante para generar su informe personalizado.</div>\n    </div>\n\n    <!-- Informe Consolidado -->\n    <div class=\"informe-action-card\" onclick=\"generarInformeConsolidado()\">\n      <div class=\"action-icon\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z\"/><polyline points=\"14 2 14 8 20 8\"/><line x1=\"16\" y1=\"13\" x2=\"8\" y2=\"13\"/><line x1=\"16\" y1=\"17\" x2=\"8\" y2=\"17\"/></svg>\n      </div>\n      <div class=\"action-title\">Generar Informe Consolidado</div>\n      <div class=\"action-desc\">Informe global con resultados de todo el programa.</div>\n    </div>\n\n    <!-- Exportar Datos -->\n    <div class=\"informe-action-card\" onclick=\"exportarDatosExcel()\">\n      <div class=\"action-icon\">\n        <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"/><polyline points=\"7 10 12 15 17 10\"/><line x1=\"12\" y1=\"15\" x2=\"12\" y2=\"3\"/></svg>\n      </div>\n      <div class=\"action-title\">Exportar Datos Excel</div>\n      <div class=\"action-desc\">Descarga los datos crudos del programa en formato Excel.</div>\n    </div>\n  </div>\n\n  <!-- Previously generated reports -->\n  <div class=\"flex-between mb-4\">\n    <h3 class=\"informes-section-title\">Informes Generados</h3>\n    <button class=\"btn btn-outline btn-sm\" onclick=\"cargarInformesGenerados()\">\n      <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"23 4 23 10 17 10\"/><path d=\"M20.49 15a9 9 0 1 1-2.12-9.36L23 10\"/></svg>\n      Actualizar\n    </button>\n  </div>\n\n  <div id=\"informes-lista-container\">\n    <div class=\"text-center p-4\"><div class=\"spinner\"></div><p class=\"text-muted text-sm\" style=\"margin-top:8px;\">Cargando informes...</p></div>\n  </div>\n</div>\n\n<!-- Modal: Selector de Participante -->\n<div class=\"modal-overlay\" id=\"modal-selector-participante\">\n  <div class=\"modal\" style=\"max-width: 520px;\">\n    <div class=\"modal-header\">\n      <h3>Seleccionar Participante</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-selector-participante')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <p class=\"text-sm text-muted mb-3\">Selecciona el participante para generar su informe individual.</p>\n      <input type=\"text\" class=\"form-control mb-3\" id=\"buscar-participante-informe\"\n             placeholder=\"Buscar por nombre o email...\" oninput=\"filtrarParticipantesInforme()\">\n      <div id=\"lista-participantes-informe\" style=\"max-height: 350px; overflow-y: auto;\">\n        <div class=\"text-center p-3\"><div class=\"spinner\"></div></div>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-selector-participante')\">Cancelar</button>\n    </div>\n  </div>\n</div>\n\n<script>\n  var informesGenerados = [];\n  var participantesInforme = [];\n\n  (function() {\n    cargarInformesGenerados();\n  })();\n\n  /* ==========================================\n     INFORMES GENERADOS\n     ========================================== */\n\n  function cargarInformesGenerados() {\n    var container = document.getElementById('informes-lista-container');\n    container.innerHTML = '<div class=\"text-center p-4\"><div class=\"spinner\"></div><p class=\"text-muted text-sm\" style=\"margin-top:8px;\">Cargando informes...</p></div>';\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r && r.success) {\n          informesGenerados = r.data || [];\n          renderInformesGenerados(informesGenerados);\n        } else {\n          container.innerHTML = '<p class=\"text-center text-danger p-4\">' + (r ? escapeHtml(r.error) : 'Error al cargar informes') + '</p>';\n        }\n      })\n      .withFailureHandler(function(err) {\n        container.innerHTML = '<p class=\"text-center text-danger p-4\">Error de conexi&oacute;n al cargar informes.</p>';\n      })\n      .listarInformesGenerados(App.token, panelProgramaId);\n  }\n\n  function renderInformesGenerados(informes) {\n    var container = document.getElementById('informes-lista-container');\n\n    if (!informes || !informes.length) {\n      container.innerHTML = '<div style=\"text-align:center; padding: 32px 16px; color: var(--color-texto-sec, #64748b);\"><p>No hay informes generados a&uacute;n.</p><p class=\"text-sm\">Genera un informe utilizando las opciones de arriba.</p></div>';\n      return;\n    }\n\n    var html = informes.map(function(inf) {\n      var tipoBadge = getTipoInformeBadge(inf.tipo);\n      var fecha = inf.fecha || inf.fecha_creacion || '';\n      var fechaStr = fecha ? formatDate(fecha) : '';\n\n      return '<div class=\"informe-row\">' +\n        '<div class=\"informe-row-info\">' +\n          '<div class=\"informe-row-nombre\">' + escapeHtml(inf.nombre || 'Informe sin nombre') + '</div>' +\n          '<div class=\"informe-row-meta\">' + tipoBadge + (fechaStr ? ' &middot; ' + escapeHtml(fechaStr) : '') + '</div>' +\n        '</div>' +\n        '<div class=\"informe-row-actions\">' +\n          (inf.url ? '<a href=\"' + escapeHtml(inf.url) + '\" target=\"_blank\" class=\"btn btn-sm btn-primary\">Descargar</a>' : '<span class=\"badge badge-warning\">Procesando</span>') +\n        '</div>' +\n      '</div>';\n    }).join('');\n\n    container.innerHTML = html;\n  }\n\n  function getTipoInformeBadge(tipo) {\n    var map = {\n      'individual':   { cls: 'badge-info',      label: 'Individual' },\n      'consolidado':  { cls: 'badge-success',   label: 'Consolidado' },\n      'exportacion':  { cls: 'badge-secondary', label: 'Exportaci&oacute;n' }\n    };\n    var info = map[(tipo || '').toLowerCase()] || { cls: 'badge-secondary', label: tipo || 'Informe' };\n    return '<span class=\"badge ' + info.cls + '\">' + info.label + '</span>';\n  }\n\n  /* ==========================================\n     GENERAR INFORME INDIVIDUAL\n     ========================================== */\n\n  function abrirSelectorParticipante() {\n    var container = document.getElementById('lista-participantes-informe');\n    container.innerHTML = '<div class=\"text-center p-3\"><div class=\"spinner\"></div></div>';\n    document.getElementById('buscar-participante-informe').value = '';\n    openModal('modal-selector-participante');\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r && r.success) {\n          participantesInforme = r.data || [];\n          renderParticipantesInforme(participantesInforme);\n        } else {\n          container.innerHTML = '<p class=\"text-center text-danger p-3\">Error al cargar participantes.</p>';\n        }\n      })\n      .withFailureHandler(function(err) {\n        container.innerHTML = '<p class=\"text-center text-danger p-3\">Error de conexi&oacute;n.</p>';\n      })\n      .listarParticipantesPrograma(App.token, panelProgramaId);\n  }\n\n  function renderParticipantesInforme(participantes) {\n    var container = document.getElementById('lista-participantes-informe');\n\n    if (!participantes || !participantes.length) {\n      container.innerHTML = '<p class=\"text-center text-muted p-3\">No hay participantes en este programa.</p>';\n      return;\n    }\n\n    container.innerHTML = participantes.map(function(p) {\n      var nombre = escapeHtml(p.nombre_completo || p.nombre || '');\n      var email = escapeHtml(p.email || '');\n      var rol = p.rol ? escapeHtml(p.rol) : '';\n\n      return '<div class=\"participante-selector-item item-participante-informe\" onclick=\"seleccionarParticipanteInforme(\\'' + (p.id || p.user_id || '') + '\\')\">' +\n        '<div style=\"flex:1;\">' +\n          '<div style=\"font-size:14px;font-weight:600;color:var(--color-texto);\">' + nombre + '</div>' +\n          '<div class=\"text-sm text-muted\">' + email + (rol ? ' &middot; ' + rol : '') + '</div>' +\n        '</div>' +\n        '<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--color-texto-sec, #94a3b8)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"9 18 15 12 9 6\"/></svg>' +\n      '</div>';\n    }).join('');\n  }\n\n  function filtrarParticipantesInforme() {\n    var busqueda = document.getElementById('buscar-participante-informe').value.toLowerCase();\n    var items = document.querySelectorAll('.item-participante-informe');\n    items.forEach(function(item) {\n      var texto = item.textContent.toLowerCase();\n      item.style.display = texto.indexOf(busqueda) !== -1 ? '' : 'none';\n    });\n  }\n\n  function seleccionarParticipanteInforme(participanteId) {\n    if (!participanteId) return;\n    closeModal('modal-selector-participante');\n    showToast('Generando informe individual...', 'info');\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r && r.success) {\n          showToast('Informe individual generado correctamente.', 'success');\n          if (r.url) {\n            window.open(r.url, '_blank');\n          }\n          cargarInformesGenerados();\n        } else {\n          showToast(r ? r.error : 'Error al generar informe individual.', 'error');\n        }\n      })\n      .withFailureHandler(function(err) {\n        showToast('Error de conexi&oacute;n: ' + err.message, 'error');\n      })\n      .generarInformeIndividual(App.token, panelProgramaId, participanteId);\n  }\n\n  /* ==========================================\n     GENERAR INFORME CONSOLIDADO\n     ========================================== */\n\n  function generarInformeConsolidado() {\n    if (!confirm('&iquest;Deseas generar el informe consolidado del programa? Este proceso puede tardar algunos segundos.')) return;\n\n    showToast('Generando informe consolidado...', 'info');\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r && r.success) {\n          showToast('Informe consolidado generado correctamente.', 'success');\n          if (r.url) {\n            window.open(r.url, '_blank');\n          }\n          cargarInformesGenerados();\n        } else {\n          showToast(r ? r.error : 'Error al generar informe consolidado.', 'error');\n        }\n      })\n      .withFailureHandler(function(err) {\n        showToast('Error de conexi&oacute;n: ' + err.message, 'error');\n      })\n      .generarInformeConsolidado(App.token, panelProgramaId);\n  }\n\n  /* ==========================================\n     EXPORTAR DATOS EXCEL\n     ========================================== */\n\n  function exportarDatosExcel() {\n    showToast('Preparando exportaci&oacute;n de datos...', 'info');\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r && r.success) {\n          showToast('Exportaci&oacute;n lista.', 'success');\n          if (r.url) {\n            window.open(r.url, '_blank');\n          }\n          cargarInformesGenerados();\n        } else {\n          showToast(r ? r.error : 'Error al exportar datos.', 'error');\n        }\n      })\n      .withFailureHandler(function(err) {\n        showToast('Error de conexi&oacute;n: ' + err.message, 'error');\n      })\n      .exportarDatosExcel(App.token, panelProgramaId);\n  }\n<\/script>\n","tab-encuesta-editor":"<!-- Editor de Encuesta — UX tipo Google Forms -->\n<style>\n  .fe { max-width: 720px; margin: 0 auto; }\n  .fe-header { background: white; border: 1px solid var(--color-borde); border-top: 8px solid var(--color-primario); border-radius: 10px; padding: 24px 28px; margin-bottom: 16px; }\n  .fe-header-title { font-size: 28px; border: none; width: 100%; padding: 0 0 8px; margin: 0; border-bottom: 1px solid transparent; outline: none; color: var(--color-texto); font-weight: 400; }\n  .fe-header-title:focus { border-bottom-color: var(--color-primario); }\n  .fe-header-desc { font-size: 14px; border: none; width: 100%; padding: 4px 0; margin-top: 4px; outline: none; color: var(--color-texto-sec); resize: none; }\n  .fe-header-desc:focus { border-bottom: 1px solid var(--color-primario); }\n\n  .fe-card { background: white; border: 1px solid var(--color-borde); border-radius: 10px; padding: 20px 24px; margin-bottom: 12px; transition: border-color 0.2s, box-shadow 0.2s; position: relative; }\n  .fe-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.05); }\n  .fe-card.fe-card-active { border-left: 4px solid var(--color-secundario); }\n\n  .fe-card-top { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 16px; }\n  .fe-card-top-left { flex: 1; }\n  .fe-card-top-right { flex-shrink: 0; }\n\n  .fe-q-input { font-size: 15px; border: none; border-bottom: 1px solid var(--color-borde); width: 100%; padding: 8px 0; outline: none; background: transparent; color: var(--color-texto); }\n  .fe-q-input:focus { border-bottom-color: var(--color-primario); border-bottom-width: 2px; }\n  .fe-q-input::placeholder { color: #bbb; }\n\n  .fe-tipo-select { padding: 8px 12px; border: 1px solid var(--color-borde); border-radius: 6px; font-size: 13px; color: var(--color-texto); background: white; cursor: pointer; min-width: 160px; }\n  .fe-tipo-select:focus { border-color: var(--color-primario); outline: none; }\n\n  .fe-opciones { margin-top: 12px; }\n  .fe-opcion-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; padding: 4px 0; }\n  .fe-opcion-icon { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #bbb; flex-shrink: 0; }\n  .fe-opcion-icon-cb { border-radius: 3px; }\n  .fe-opcion-input { flex: 1; border: none; border-bottom: 1px solid var(--color-borde); padding: 6px 0; font-size: 14px; outline: none; }\n  .fe-opcion-input:focus { border-bottom-color: var(--color-primario); }\n  .fe-opcion-input::placeholder { color: #ccc; }\n  .fe-opcion-del { background: none; border: none; color: #bbb; font-size: 20px; cursor: pointer; padding: 0 4px; line-height: 1; }\n  .fe-opcion-del:hover { color: #c0392b; }\n\n  .fe-add-opcion { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding: 4px 0; }\n  .fe-add-opcion-icon { width: 20px; height: 20px; border-radius: 50%; border: 2px dashed #ccc; flex-shrink: 0; }\n  .fe-add-opcion span { color: var(--color-texto-sec); font-size: 14px; cursor: pointer; }\n  .fe-add-opcion span:hover { color: var(--color-primario); }\n\n  .fe-escala { display: flex; align-items: center; gap: 8px; margin-top: 12px; flex-wrap: wrap; }\n  .fe-escala-dot { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--color-borde); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--color-texto-sec); }\n  .fe-escala-label { margin-top: 8px; }\n  .fe-escala-label input { border: none; border-bottom: 1px solid var(--color-borde); padding: 4px 0; font-size: 13px; width: 120px; outline: none; }\n  .fe-escala-label input:focus { border-bottom-color: var(--color-primario); }\n\n  .fe-texto-preview { border-bottom: 1px dotted var(--color-borde); padding: 10px 0; color: #999; font-size: 14px; margin-top: 12px; }\n\n  .fe-card-bottom { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--color-borde); }\n  .fe-card-btn { background: none; border: none; color: var(--color-texto-sec); cursor: pointer; padding: 6px 8px; border-radius: 4px; font-size: 18px; transition: all 0.15s; }\n  .fe-card-btn:hover { background: var(--color-fondo-alt); color: var(--color-texto); }\n  .fe-card-btn svg { width: 20px; height: 20px; vertical-align: middle; }\n\n  .fe-separator { display: flex; align-items: center; gap: 8px; padding: 2px 0; }\n  .fe-separator span { font-size: 13px; color: var(--color-texto-sec); }\n  .fe-toggle { position: relative; width: 40px; height: 22px; background: #ccc; border-radius: 11px; cursor: pointer; transition: background 0.2s; }\n  .fe-toggle.on { background: var(--color-secundario); }\n  .fe-toggle::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: white; top: 2px; left: 2px; transition: left 0.2s; }\n  .fe-toggle.on::after { left: 20px; }\n\n  .fe-add-card { border: 1px dashed var(--color-borde); border-radius: 10px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 16px; }\n  .fe-add-card:hover { border-color: var(--color-secundario); background: rgba(46,134,193,0.03); }\n\n  .fe-footer { background: white; border: 1px solid var(--color-borde); border-radius: 10px; padding: 20px; margin-bottom: 16px; text-align: center; }\n  .fe-back { display: inline-flex; align-items: center; gap: 6px; color: var(--color-secundario); font-size: 14px; cursor: pointer; margin-bottom: 12px; }\n  .fe-back:hover { text-decoration: underline; }\n  .fe-badges { display: flex; gap: 6px; margin-bottom: 12px; }\n</style>\n\n<div class=\"fe\">\n  <div class=\"fe-back\" onclick=\"switchTab('encuestas')\">&#8249; Volver a Encuestas</div>\n\n  <div id=\"fe-loading\" class=\"text-center p-4\"><div class=\"spinner spinner-lg\"></div><p class=\"text-muted mt-3\">Cargando...</p></div>\n\n  <div id=\"fe-content\" class=\"hidden\">\n    <!-- Header -->\n    <div class=\"fe-header\">\n      <div class=\"fe-badges\">\n        <span class=\"badge badge-info\" id=\"fe-b1\"></span>\n        <span class=\"badge badge-warning\" id=\"fe-b2\"></span>\n        <span class=\"badge badge-secondary\" id=\"fe-b3\"></span>\n      </div>\n      <input class=\"fe-header-title\" id=\"fe-titulo\" placeholder=\"Titulo de la encuesta\" onblur=\"saveEncField('nombre',this.value)\">\n      <textarea class=\"fe-header-desc\" id=\"fe-desc\" rows=\"2\" placeholder=\"Descripcion / instrucciones para los participantes\" onblur=\"saveEncField('instrucciones',this.value)\"></textarea>\n    </div>\n\n    <!-- Preguntas -->\n    <div id=\"fe-preguntas\"></div>\n\n    <!-- Agregar -->\n    <div class=\"fe-add-card\" onclick=\"addPregunta()\">\n      <span style=\"font-size:24px;color:var(--color-secundario);\">+</span>\n      <p style=\"margin:4px 0 0;color:var(--color-secundario);font-weight:500;\">Agregar pregunta</p>\n    </div>\n\n    <!-- Footer -->\n    <div class=\"fe-footer\">\n      <div style=\"display:flex;gap:12px;justify-content:center;flex-wrap:wrap;\">\n        <button class=\"btn btn-outline\" onclick=\"switchTab('encuestas')\">Volver</button>\n        <button class=\"btn btn-primary\" id=\"fe-btn-activar\" onclick=\"feActivar()\">Activar Encuesta</button>\n        <button class=\"btn btn-outline hidden\" style=\"color:#c0392b;\" id=\"fe-btn-cerrar\" onclick=\"feCerrar()\">Cerrar Encuesta</button>\n      </div>\n      <p class=\"text-sm text-muted mt-2\" id=\"fe-estado\"></p>\n    </div>\n  </div>\n</div>\n\n<script>\nvar feId=null, feEnc=null, fePregs=[], feCompMap={};\n\n(function(){\n  if(typeof editorEncuestaIdPendiente!=='undefined'&&editorEncuestaIdPendiente){\n    feId=editorEncuestaIdPendiente; feLoad(feId);\n  } else {\n    document.getElementById('fe-loading').innerHTML='<p class=\"text-muted\">No se especifico encuesta.</p>';\n  }\n})();\n\nfunction feLoad(id){\n  feId=id;\n  google.script.run.withSuccessHandler(function(r){\n    if(r&&r.success){\n      var d=r.data;\n      if(d.encuesta){feEnc=d.encuesta;fePregs=d.preguntas||d.encuesta.preguntas||[];}\n      else{feEnc=d;fePregs=d.preguntas||[];}\n      if(typeof panelData!=='undefined'&&panelData.competencias)\n        panelData.competencias.forEach(function(c){feCompMap[c.id]=c;});\n      feRender();\n    } else {\n      document.getElementById('fe-loading').innerHTML='<p class=\"text-danger\">'+(r?r.error:'Error')+'</p>';\n    }\n  }).withFailureHandler(function(e){\n    document.getElementById('fe-loading').innerHTML='<p class=\"text-danger\">Error: '+(e?e.message:'')+'</p>';\n  }).obtenerEncuestaCompleta(App.token,id);\n}\n\nfunction feRender(){\n  document.getElementById('fe-loading').classList.add('hidden');\n  document.getElementById('fe-content').classList.remove('hidden');\n  var tc=feEnc.tipo_cuestionario||'autoevaluacion';\n  document.getElementById('fe-titulo').value=feEnc.nombre||'';\n  document.getElementById('fe-desc').value=feEnc.instrucciones||'';\n  document.getElementById('fe-b1').textContent=tc==='autoevaluacion'?'Autoevaluacion':'Coevaluacion';\n  document.getElementById('fe-b2').textContent=(feEnc.tipo||'pre').toUpperCase();\n  document.getElementById('fe-b3').textContent=(feEnc.estado||'borrador');\n  document.getElementById('fe-estado').textContent='Estado: '+(feEnc.estado||'borrador');\n  if(feEnc.estado==='activa'){document.getElementById('fe-btn-activar').classList.add('hidden');document.getElementById('fe-btn-cerrar').classList.remove('hidden');}\n  else if(feEnc.estado==='cerrada'){document.getElementById('fe-btn-activar').classList.add('hidden');}\n  feRenderPregs();\n}\n\nfunction feRenderPregs(){\n  var c=document.getElementById('fe-preguntas');\n  if(!fePregs.length){c.innerHTML='';return;}\n\n  c.innerHTML=fePregs.map(function(p,i){\n    var comp=feCompMap[p.competencia_id]||{};\n    var tipo=p.tipo_respuesta||'alternativas';\n\n    // Tipo select\n    var sel='<select class=\"fe-tipo-select\" onchange=\"feSetTipo(\\''+p.id+'\\',this.value)\">'+\n      '<option value=\"niveles_competencia\"'+(tipo==='niveles_competencia'?' selected':'')+'>Niveles de competencia (1-4)</option>'+\n      '<option value=\"alternativas\"'+(tipo==='alternativas'?' selected':'')+'>Varias opciones</option>'+\n      '<option value=\"casillas\"'+(tipo==='casillas'?' selected':'')+'>Casillas</option>'+\n      '<option value=\"desplegable\"'+(tipo==='desplegable'?' selected':'')+'>Desplegable</option>'+\n      '<option value=\"texto_breve\"'+(tipo==='texto_breve'?' selected':'')+'>Respuesta corta</option>'+\n      '<option value=\"parrafo\"'+(tipo==='parrafo'?' selected':'')+'>Parrafo</option>'+\n      '<option value=\"escala_1_5\"'+(tipo==='escala_1_5'?' selected':'')+'>Escala lineal</option>'+\n    '</select>';\n\n    // Opciones\n    var optsHtml='';\n    if(tipo==='alternativas'||tipo==='niveles_competencia'||tipo==='casillas'||tipo==='desplegable'){\n      var iconCls=tipo==='casillas'?'fe-opcion-icon fe-opcion-icon-cb':'fe-opcion-icon';\n      var prefix=tipo==='desplegable';\n      var isNiveles=tipo==='niveles_competencia';\n      for(var n=1;n<=4;n++){\n        var txt=p['opcion_nivel_'+n]||'';\n        var nivelLabel=isNiveles?'<span style=\"font-size:11px;font-weight:700;color:var(--color-secundario);min-width:50px;\">Nivel '+n+'</span>':'';\n        optsHtml+='<div class=\"fe-opcion-row\">'+\n          (prefix?'<span style=\"color:#999;font-size:13px;\">'+n+'.</span>':'<div class=\"'+iconCls+'\"></div>')+\n          nivelLabel+\n          '<input class=\"fe-opcion-input\" value=\"'+escapeHtml(txt)+'\" placeholder=\"'+(isNiveles?'Descripcion del nivel '+n+'...':'Opcion '+n)+'\" '+\n            'onblur=\"feSaveOpt(\\''+p.id+'\\','+n+',this.value)\">'+\n          '<button class=\"fe-opcion-del\" onclick=\"feClearOpt(\\''+p.id+'\\','+n+',this)\" title=\"Quitar\">&times;</button>'+\n        '</div>';\n      }\n      if(!isNiveles){\n        optsHtml+='<div class=\"fe-add-opcion\">'+\n          (prefix?'<span style=\"color:#999;font-size:13px;\">5.</span>':'<div class=\"fe-add-opcion-icon\"></div>')+\n          '<span onclick=\"showToast(\\'Puedes usar hasta 4 opciones.\\',\\'info\\')\">Agregar opcion</span>'+\n        '</div>';\n      }\n    } else if(tipo==='escala_1_5'){\n      optsHtml='<div class=\"fe-escala\">';\n      for(var s=1;s<=5;s++) optsHtml+='<div class=\"fe-escala-dot\">'+s+'</div>';\n      optsHtml+='</div>';\n      optsHtml+='<div style=\"display:flex;gap:24px;margin-top:8px;\">'+\n        '<div class=\"fe-escala-label\"><span style=\"font-size:12px;color:#999;\">1</span> <input placeholder=\"Etiqueta (opcional)\" onblur=\"feSaveOpt(\\''+p.id+'\\',1,this.value)\" value=\"'+escapeHtml(p.opcion_nivel_1||'')+'\"></div>'+\n        '<div class=\"fe-escala-label\"><span style=\"font-size:12px;color:#999;\">5</span> <input placeholder=\"Etiqueta (opcional)\" onblur=\"feSaveOpt(\\''+p.id+'\\',4,this.value)\" value=\"'+escapeHtml(p.opcion_nivel_4||'')+'\"></div>'+\n      '</div>';\n    } else if(tipo==='texto_breve'){\n      optsHtml='<div class=\"fe-texto-preview\">Texto de respuesta corta</div>';\n    } else if(tipo==='parrafo'){\n      optsHtml='<div class=\"fe-texto-preview\">Texto de respuesta larga</div>';\n    }\n\n    // Competencia selector\n    var compKeys=Object.keys(feCompMap);\n    var compSelect='<div style=\"display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;\">'+\n      '<select class=\"fe-tipo-select\" style=\"min-width:auto;font-size:12px;padding:4px 8px;color:var(--color-secundario);\" onchange=\"feSetComp(\\''+p.id+'\\',this.value)\">'+\n        '<option value=\"\"'+((!p.competencia_id)?' selected':'')+'>Sin competencia</option>';\n    compKeys.forEach(function(cid){\n      var cn=feCompMap[cid];\n      compSelect+='<option value=\"'+cid+'\"'+(p.competencia_id===cid?' selected':'')+'>'+escapeHtml(cn.nombre)+'</option>';\n    });\n    compSelect+='</select>';\n    if(p.foco_desarrollo||comp.foco_desarrollo){\n      compSelect+='<span style=\"font-size:11px;color:var(--color-texto-sec);font-style:italic;\">'+escapeHtml(p.foco_desarrollo||comp.foco_desarrollo)+'</span>';\n    }\n    compSelect+='</div>';\n\n    // Obligatorio toggle\n    var oblig=p.obligatoria!==false&&p.obligatoria!=='false';\n\n    return '<div class=\"fe-card\" id=\"fec-'+p.id+'\">'+\n      '<div class=\"fe-card-top\">'+\n        '<div class=\"fe-card-top-left\">'+compSelect+\n          '<input class=\"fe-q-input\" value=\"'+escapeHtml(p.texto_pregunta||'')+'\" placeholder=\"Pregunta sin titulo\" onblur=\"feSaveTxt(\\''+p.id+'\\',this.value)\">'+\n        '</div>'+\n        '<div class=\"fe-card-top-right\">'+sel+'</div>'+\n      '</div>'+\n      '<div class=\"fe-opciones\">'+optsHtml+'</div>'+\n      '<div class=\"fe-card-bottom\">'+\n        '<button class=\"fe-card-btn\" onclick=\"feDuplicar(\\''+p.id+'\\')\" title=\"Duplicar\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"/><path d=\"M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1\"/></svg></button>'+\n        '<button class=\"fe-card-btn\" onclick=\"feEliminar(\\''+p.id+'\\')\" title=\"Eliminar\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><polyline points=\"3 6 5 6 21 6\"/><path d=\"M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2\"/></svg></button>'+\n        '<div class=\"fe-separator\" style=\"margin-left:12px;border-left:1px solid var(--color-borde);padding-left:12px;\">'+\n          '<span>Obligatorio</span>'+\n          '<div class=\"fe-toggle'+(oblig?' on':'')+'\" onclick=\"feToggleOblig(\\''+p.id+'\\',this)\"></div>'+\n        '</div>'+\n      '</div>'+\n    '</div>';\n  }).join('');\n}\n\n/* ---- Guardar campos ---- */\nfunction saveEncField(campo,val){\n  val=val.trim();\n  if(feEnc[campo]===val)return;\n  feEnc[campo]=val;\n  var d={};d[campo]=val;\n  google.script.run.actualizarEncuesta(App.token,feId,d);\n}\n\nfunction feSaveTxt(pid,val){\n  var p=fePregs.find(function(x){return x.id===pid;});\n  if(p&&p.texto_pregunta!==val){p.texto_pregunta=val;google.script.run.actualizarPregunta(App.token,pid,{texto_pregunta:val});}\n}\n\nfunction feSaveOpt(pid,n,val){\n  var p=fePregs.find(function(x){return x.id===pid;});\n  if(!p)return;var campo='opcion_nivel_'+n;\n  if(p[campo]!==val){p[campo]=val;var d={};d[campo]=val;google.script.run.actualizarPregunta(App.token,pid,d);}\n}\n\nfunction feClearOpt(pid,n,btn){\n  var row=btn.parentElement;\n  var inp=row.querySelector('.fe-opcion-input');\n  if(inp){inp.value='';feSaveOpt(pid,n,'');}\n}\n\nfunction feSetComp(pid,compId){\n  var p=fePregs.find(function(x){return x.id===pid;});\n  if(!p)return;\n  p.competencia_id=compId;\n  var comp=feCompMap[compId]||{};\n  p.foco_desarrollo=comp.foco_desarrollo||'';\n\n  // Auto-cargar los 4 niveles de la competencia como opciones\n  var datos={competencia_id:compId, foco_desarrollo:p.foco_desarrollo};\n  if(comp.nivel_1_texto){datos.opcion_nivel_1=comp.nivel_1_texto; p.opcion_nivel_1=comp.nivel_1_texto;}\n  if(comp.nivel_2_texto){datos.opcion_nivel_2=comp.nivel_2_texto; p.opcion_nivel_2=comp.nivel_2_texto;}\n  if(comp.nivel_3_texto){datos.opcion_nivel_3=comp.nivel_3_texto; p.opcion_nivel_3=comp.nivel_3_texto;}\n  if(comp.nivel_4_texto){datos.opcion_nivel_4=comp.nivel_4_texto; p.opcion_nivel_4=comp.nivel_4_texto;}\n\n  // Cambiar tipo a niveles_competencia\n  datos.tipo_respuesta='niveles_competencia';\n  p.tipo_respuesta='niveles_competencia';\n\n  google.script.run.actualizarPregunta(App.token,pid,datos);\n  feRenderPregs();\n}\n\nfunction feSetTipo(pid,tipo){\n  var p=fePregs.find(function(x){return x.id===pid;});\n  if(!p||p.tipo_respuesta===tipo)return;\n  p.tipo_respuesta=tipo;\n  google.script.run.actualizarPregunta(App.token,pid,{tipo_respuesta:tipo});\n  feRenderPregs();\n}\n\nfunction feToggleOblig(pid,el){\n  var p=fePregs.find(function(x){return x.id===pid;});\n  if(!p)return;\n  var nv=!(p.obligatoria!==false&&p.obligatoria!=='false');\n  p.obligatoria=nv;\n  el.classList.toggle('on',nv);\n  google.script.run.actualizarPregunta(App.token,pid,{obligatoria:nv});\n}\n\n/* ---- Acciones ---- */\nfunction addPregunta(){\n  showToast('Agregando...','info');\n  google.script.run.withSuccessHandler(function(r){\n    if(r&&r.success){showToast('Pregunta agregada.','success');feLoad(feId);}\n    else showToast(r?r.error:'Error','error');\n  }).withFailureHandler(function(e){showToast('Error: '+(e?e.message:''),'error');\n  }).agregarPregunta(App.token,{\n    encuesta_id:feId,texto_pregunta:'',tipo_respuesta:'alternativas',\n    conducta_id:'',competencia_id:'',foco_desarrollo:'',\n    opcion_nivel_1:'',opcion_nivel_2:'',opcion_nivel_3:'',opcion_nivel_4:''\n  });\n}\n\nfunction feDuplicar(pid){\n  var p=fePregs.find(function(x){return x.id===pid;});\n  if(!p)return;\n  showToast('Duplicando...','info');\n  google.script.run.withSuccessHandler(function(r){\n    if(r&&r.success){showToast('Pregunta duplicada.','success');feLoad(feId);}\n    else showToast(r?r.error:'Error','error');\n  }).agregarPregunta(App.token,{\n    encuesta_id:feId,texto_pregunta:p.texto_pregunta||'',tipo_respuesta:p.tipo_respuesta||'alternativas',\n    conducta_id:p.conducta_id||'',competencia_id:p.competencia_id||'',foco_desarrollo:p.foco_desarrollo||'',\n    opcion_nivel_1:p.opcion_nivel_1||'',opcion_nivel_2:p.opcion_nivel_2||'',\n    opcion_nivel_3:p.opcion_nivel_3||'',opcion_nivel_4:p.opcion_nivel_4||''\n  });\n}\n\nfunction feEliminar(pid){\n  if(!confirm('Eliminar esta pregunta?'))return;\n  google.script.run.withSuccessHandler(function(r){\n    if(r&&r.success){fePregs=fePregs.filter(function(x){return x.id!==pid;});feRenderPregs();showToast('Eliminada.','success');}\n  }).eliminarPregunta(App.token,pid);\n}\n\nfunction feActivar(){\n  if(!confirm('Activar encuesta?'))return;\n  google.script.run.withSuccessHandler(function(r){\n    if(r&&r.success){showToast('Activada.','success');feEnc.estado='activa';feRender();}\n    else showToast(r?r.error:'Error','error');\n  }).activarEncuesta(App.token,feId);\n}\n\nfunction feCerrar(){\n  if(!confirm('Cerrar encuesta?'))return;\n  google.script.run.withSuccessHandler(functio         div.innerHTML = (ICONOS[item.icon] || '') + '<span>' + item.label + '</span>';

        nav.appendChild(div);

          closeSidebar();

    /**
     * Ejecuta los scripts dentro de un contenedor cargado dinámicamente
     */
    function ejecutarScripts(container) {
      var scripts = container.querySelectorAll('script');
      scripts.forEach(function(oldScript) {
        var newScript = document.createElement('script');
        if (oldScript.src) {
          newScript.src = oldScript.src;
        } else {
          newScript.textContent = oldScript.textContent;
        }
        oldScript.parentNode.replaceChild(newScript, oldScript);
      });
    }

    // NOTIFICACIONES
    // ============================================
    function cargarContadorNotificaciones() {
      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success && result.data) {
            var count = result.data.count || 0;
            var badge = document.getElementById('notif-count');
            if (count > 0) {
              badge.textContent = count > 99 ? '99+' : count;
              badge.classList.remove('hidden');
            } else {
              badge.classList.add('hidden');
            }
          }
        })
        .withFailureHandler(function() {})
        .contarNotificacionesPendientes(App.token);
    }

    // Recargar notificaciones cada 60 segundos
    setInterval(cargarContadorNotificaciones, 60000);

    // ============================================
    // SIDEBAR MOBILE
    // ============================================
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }

    function closeSidebar() {
      document.getElementById('sidebar').classList.remove('open');
    }

    // Cerrar sidebar al hacer clic fuera
    document.addEventListener('click', function(e) {
      var sidebar = document.getElementById('sidebar');
      var menuBtn = document.querySelector('.mobile-menu-btn');
      if (window.innerWidth <= 768 &&
          !sidebar.contains(e.target) &&
          !menuBtn.contains(e.target)) {
        closeSidebar();
      }
    });

    // ============================================
    // NAVEGACIÓN AL PANEL DE PROGRAMA
    // ============================================
    function loadView(vistaId) {
      cargarVista(vistaId);
    }

    function abrirPanelPrograma(programaId) {
      App.vistaActual = 'panel-programa';
      setActiveNav('programas');
      document.getElementById('page-title').textContent = 'Programa';

      document.getElementById('content-area').innerHTML =
        '<div class="text-center" style="padding:60px 20px;"><div class="spinner spinner-lg"></div><p class="text-muted mt-3">Cargando programa...</p></div>';

      google.script.run
        .withSuccessHandler(function(html) {
          document.getElementById('content-area').innerHTML = html;
          ejecutarScripts(document.getElementById('content-area'));
          closeSidebar();
          // Inicializar el panel con el ID del programa
          if (typeof initPanel === 'function') {
            initPanel(programaId);
          }
        })
        .withFailureHandler(function(error) {
          document.getElementById('content-area').innerHTML =
            '<div class="empty-state"><p>Error al cargar el panel del programa.</p></div>';
        })
        .getVistaHTML('panel-programa');
    }

    // ============================================
    // LOGOUT
    // ============================================
    function handleLogout() {
      google.script.run
        .withSuccessHandler(function() {
          App.clearSession();
          window.location.href = 'login.html';
        })
        .withFailureHandler(function() {
          App.clearSession();
          window.location.href = 'login.html';
        })
        .cerrarSesion(App.token);
    }
  </script>
</body>
</html>
