<div class=\"card-body\">\n        <div id=\"enc-instrucciones\" class=\"alert alert-info mb-3 hidden\"></div>\n\n        <div class=\"progress-bar-container mb-3\">\n          <div class=\"progress-bar\" id=\"enc-progress\" style=\"width:0%;\"></div>\n        </div>\n        <p class=\"text-sm text-muted mb-3\" id=\"enc-progress-text\">Pregunta 0 de 0</p>\n\n        <div id=\"enc-preguntas\"></div>\n\n        <div class=\"mt-4\">\n          <button class=\"btn btn-primary btn-block\" id=\"btn-enviar-respuestas\" onclick=\"enviarRespuestasEncuesta()\">\n            Enviar Respuestas\n          </button>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- Completadas -->\n  <div id=\"seccion-completadas\">\n    <h2 style=\"color:var(--color-primario);margin-bottom:16px;\">Completadas</h2>\n    <div id=\"actividades-completadas\">\n      <p class=\"text-muted text-sm\">Cargando...</p>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Detalle de actividad -->\n<div class=\"modal-overlay\" id=\"modal-ver-actividad\">\n  <div class=\"modal\" style=\"max-width:600px;\">\n    <div class=\"modal-header\">\n      <h3 id=\"ver-act-titulo\">Actividad</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-ver-actividad')\">&times;</button>\n    </div>\n    <div class=\"modal-body\" id=\"ver-act-body\">\n      Cargando...\n    </div>\n    <div class=\"modal-footer\" id=\"ver-act-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-ver-actividad')\">Cerrar</button>\n    </div>\n  </div>\n</div>\n\n<style>\n  .actividad-card {\n    border: 1px solid var(--color-borde);\n    border-radius: 12px;\n    padding: 20px;\n    margin-bottom: 16px;\n    background: var(--color-tarjeta);\n    transition: box-shadow 0.2s;\n  }\n\n  .actividad-card:hover {\n    box-shadow: 0 4px 16px rgba(0,0,0,0.06);\n  }\n\n  .actividad-card-completada {\n    opacity: 0.75;\n    border-left: 3px solid var(--color-exito);\n  }\n\n  .tipo-icon {\n    width: 40px;\n    height: 40px;\n    border-radius: 10px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-shrink: 0;\n  }\n\n  .tipo-icon-ms_forms { background: #E8DAEF; color: #7D3C98; }\n  .tipo-icon-enlace_externo { background: #D4E6F1; color: #2471A3; }\n  .tipo-icon-contenido { background: #FDEBD0; color: #D68910; }\n  .tipo-icon-tarea { background: #D4EFDF; color: #1E8449; }\n  .tipo-icon-encuesta_interna { background: #FADBD8; color: #C0392B; }\n  .tipo-icon-encuesta_pre { background: #D4E6F1; color: #2471A3; }\n  .tipo-icon-encuesta_post { background: #D4EFDF; color: #1E8449; }\n\n  .btn-abrir-enlace {\n    background: var(--color-secundario);\n    color: white;\n    border: none;\n    padding: 8px 16px;\n    border-radius: 8px;\n    font-size: 13px;\n    font-weight: 500;\n    cursor: pointer;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    transition: all 0.2s;\n  }\n\n  .btn-abrir-enlace:hover {\n    opacity: 0.85;\n    transform: translateY(-1px);\n  }\n\n  .btn-completar-act {\n    background: var(--color-exito);\n    color: white;\n    border: none;\n    padding: 8px 16px;\n    border-radius: 8px;\n    font-size: 13px;\n    font-weight: 500;\n    cursor: pointer;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    transition: all 0.2s;\n  }\n\n  .btn-completar-act:hover {\n    opacity: 0.85;\n    transform: translateY(-1px);\n  }\n\n  .btn-responder-enc {\n    background: var(--color-primario);\n    color: white;\n    border: none;\n    padding: 8px 16px;\n    border-radius: 8px;\n    font-size: 13px;\n    font-weight: 500;\n    cursor: pointer;\n    display: inline-flex;\n    align-items: center;\n    gap: 6px;\n    transition: all 0.2s;\n  }\n\n  .btn-responder-enc:hover {\n    opacity: 0.85;\n    transform: translateY(-1px);\n  }\n\n  .fecha-limite-warning {\n    background: #FEF9E7;\n    color: #D68910;\n    padding: 2px 8px;\n    border-radius: 4px;\n    font-size: 11px;\n    font-weight: 500;\n  }\n\n  .fecha-limite-danger {\n    background: #FDEDEC;\n    color: #C0392B;\n    padding: 2px 8px;\n    border-radius: 4px;\n    font-size: 11px;\n    font-weight: 500;\n  }\n</style>\n\n<script>\n  var misActividadesData = [];   // actividades externas\n  var encuestasPendientes = [];  // encuestas internas\n  var todasPendientes = [];      // unificado\n  var todasCompletadas = [];\n  var encuestaActualId = null;\n  var preguntasActuales = [];\n  var dataLoaded = { actividades: false, encuestas: false };\n\n  (function() {\n    cargarTodo();\n  })();\n\n  function cargarTodo() {\n    dataLoaded = { actividades: false, encuestas: false };\n\n    // Cargar actividades externas\n    google.script.run\n      .withSuccessHandler(function(r) {\n        misActividadesData = (r.success ? r.data : []) || [];\n        dataLoaded.actividades = true;\n        mergeYRender();\n      })\n      .withFailureHandler(function() {\n        misActividadesData = [];\n        dataLoaded.actividades = true;\n        mergeYRender();\n      })\n      .listarMisActividades(App.token);\n\n    // Cargar encuestas internas pendientes\n    google.script.run\n      .withSuccessHandler(function(r) {\n        encuestasPendientes = (r.success ? r.data : []) || [];\n        dataLoaded.encuestas = true;\n        mergeYRender();\n      })\n      .withFailureHandler(function() {\n        encuestasPendientes = [];\n        dataLoaded.encuestas = true;\n        mergeYRender();\n      })\n      .obtenerEncuestaPendiente(App.token);\n  }\n\n  function mergeYRender() {\n    if (!dataLoaded.actividades || !dataLoaded.encuestas) return;\n\n    // Convertir encuestas internas a formato unificado (pendientes)\n    var encItems = encuestasPendientes.map(function(e) {\n      return {\n        id: e.id,\n        nombre: e.nombre,\n        tipo: 'encuesta_' + e.tipo, // encuesta_pre o encuesta_post\n        tipo_original: e.tipo,\n        programa_nombre: e.programa_nombre,\n        descripcion: e.instrucciones || '',\n        fecha_limite: e.fecha_cierre,\n        enlace: null,\n        completada: false,\n        es_encuesta_interna: true\n      };\n    });\n\n    // Actividades externas pendientes\n    var actPendientes = misActividadesData.filter(function(a) { return !a.completada; });\n    var actCompletadas = misActividadesData.filter(function(a) { return a.completada; });\n\n    // Merge: encuestas internas pendientes + actividades externas pendientes\n    todasPendientes = encItems.concat(actPendientes);\n\n    // Ordenar por fecha limite (las que vencen antes, primero)\n    todasPendientes.sort(function(a, b) {\n      if (!a.fecha_limite && !b.fecha_limite) return 0;\n      if (!a.fecha_limite) return 1;\n      if (!b.fecha_limite) return -1;\n      return a.fecha_limite.localeCompare(b.fecha_limite);\n    });\n\n    todasCompletadas = actCompletadas;\n\n    renderPendientesUnificado();\n    renderCompletadasUnificado();\n  }\n\n  // ============================================\n  // RENDER: PENDIENTES UNIFICADO\n  // ============================================\n\n  function getTipoIcon(tipo) {\n    var icons = {\n      'ms_forms': '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"/><path d=\"M14 2v6h6\"/><path d=\"M9 15l2 2 4-4\"/></svg>',\n      'enlace_externo': '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71\"/><path d=\"M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71\"/></svg>',\n      'contenido': '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 19.5A2.5 2.5 0 016.5 17H20\"/><path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z\"/></svg>',\n      'tarea': '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"/><path d=\"M8 10l2 2 4-4\"/><path d=\"M8 16h8\"/></svg>',\n      'encuesta_pre': '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"/><path d=\"M14 2v6h6\"/><path d=\"M9 15l2 2 4-4\"/></svg>',\n      'encuesta_post': '<svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z\"/><path d=\"M14 2v6h6\"/><path d=\"M9 15l2 2 4-4\"/></svg>'\n    };\n    return icons[tipo] || icons['tarea'];\n  }\n\n  function getTipoLabel(tipo) {\n    var labels = {\n      'ms_forms': 'Encuesta (MS Forms)',\n      'enlace_externo': 'Formulario Externo',\n      'contenido': 'Material / Contenido',\n      'tarea': 'Tarea / Entregable',\n      'encuesta_pre': 'Encuesta PRE',\n      'encuesta_post': 'Encuesta POST'\n    };\n    return labels[tipo] || tipo;\n  }\n\n  function getFechaLimiteTag(fecha) {\n    if (!fecha) return '';\n    var hoy = new Date();\n    var limite = new Date(fecha + 'T23:59:59');\n    var diffDias = Math.ceil((limite - hoy) / (1000 * 60 * 60 * 24));\n\n    if (diffDias < 0) {\n      return '<span class=\"fecha-limite-danger\">Vencida</span>';\n    } else if (diffDias <= 3) {\n      return '<span class=\"fecha-limite-warning\">Vence en ' + diffDias + ' d&iacute;a' + (diffDias !== 1 ? 's' : '') + '</span>';\n    }\n    return '<span class=\"text-xs text-muted\">Vence: ' + formatDate(fecha) + '</span>';\n  }\n\n  function renderPendientesUnificado() {\n    var div = document.getElementById('actividades-pendientes');\n\n    if (todasPendientes.length === 0) {\n      div.innerHTML = '<div class=\"empty-state\">' +\n        '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"width:64px;height:64px;margin-bottom:16px;opacity:0.4;\">' +\n          '<rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"/><path d=\"M8 10l2 2 4-4\"/><path d=\"M8 16h8\"/>' +\n        '</svg>' +\n        '<p>No tienes actividades pendientes. &#161;Buen trabajo!</p>' +\n      '</div>';\n      return;\n    }\n\n    div.innerHTML = todasPendientes.map(function(a) {\n      var fechaTag = getFechaLimiteTag(a.fecha_limite);\n      var esEncuesta = a.es_encuesta_interna;\n\n      // Botones de accion\n      var botones = '';\n      if (esEncuesta) {\n        botones += '<button class=\"btn-responder-enc\" onclick=\"abrirEncuesta(\\'' + a.id + '\\')\">' +\n          '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7\"/><path d=\"M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z\"/></svg>' +\n          ' Responder</button>';\n      } else {\n        if (a.enlace) {\n          botones += '<button class=\"btn-abrir-enlace\" onclick=\"window.open(\\'' + escapeHtml(a.enlace) + '\\', \\'_blank\\')\">' +\n            '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6\"/><polyline points=\"15 3 21 3 21 9\"/><line x1=\"10\" y1=\"14\" x2=\"21\" y2=\"3\"/></svg>' +\n            ' Abrir Enlace</button>';\n        }\n        botones += '<button class=\"btn-completar-act\" onclick=\"marcarCompletada(\\'' + a.id + '\\')\">' +\n          '<svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M20 6L9 17l-5-5\"/></svg>' +\n          ' Marcar Completada</button>';\n      }\n\n      var tipoBadge = esEncuesta\n        ? (a.tipo_original === 'pre'\n          ? '<span class=\"badge badge-info\">PRE</span>'\n          : '<span class=\"badge badge-success\">POST</span>')\n        : '';\n\n      return '<div class=\"actividad-card\">' +\n        '<div style=\"display:flex;gap:16px;align-items:flex-start;\">' +\n          '<div class=\"tipo-icon tipo-icon-' + a.tipo + '\">' + getTipoIcon(a.tipo) + '</div>' +\n          '<div style=\"flex:1;min-width:0;\">' +\n            '<div class=\"flex-between mb-2\">' +\n              '<div>' +\n                '<strong style=\"font-size:15px;\">' + escapeHtml(a.nombre) + '</strong> ' + tipoBadge +\n                '<div style=\"display:flex;gap:8px;align-items:center;margin-top:4px;\">' +\n                  '<span class=\"text-xs text-muted\">' + getTipoLabel(a.tipo) + '</span>' +\n                  '<span class=\"text-xs text-muted\">&bull;</span>' +\n                  '<span class=\"text-xs text-muted\">' + escapeHtml(a.programa_nombre) + '</span>' +\n                  (fechaTag ? '<span class=\"text-xs text-muted\">&bull;</span>' + fechaTag : '') +\n                '</div>' +\n              '</div>' +\n            '</div>' +\n            (a.descripcion ? '<p class=\"text-sm\" style=\"color:var(--color-texto-sec);margin-bottom:12px;\">' + escapeHtml(a.descripcion.length > 150 ? a.descripcion.substring(0, 150) + '...' : a.descripcion) + '</p>' : '') +\n            '<div style=\"display:flex;gap:10px;flex-wrap:wrap;\">' +\n              botones +\n              (!esEncuesta ? '<button class=\"btn btn-sm btn-outline\" onclick=\"verDetalleActPart(\\'' + a.id + '\\')\" style=\"margin-left:auto;\">Ver detalle</button>' : '') +\n            '</div>' +\n          '</div>' +\n        '</div>' +\n      '</div>';\n    }).join('');\n  }\n\n  function renderCompletadasUnificado() {\n    var div = document.getElementById('actividades-completadas');\n\n    // Combinar: encuestas completadas (del progreso) + actividades completadas\n    var items = todasCompletadas.slice();\n\n    if (items.length === 0) {\n      div.innerHTML = '<div class=\"empty-state\"><p>A&uacute;n no has completado ninguna actividad.</p></div>';\n      return;\n    }\n\n    div.innerHTML = items.map(function(a) {\n      var tipoLabel = getTipoLabel(a.tipo);\n      return '<div class=\"actividad-card actividad-card-completada\">' +\n        '<div style=\"display:flex;gap:16px;align-items:center;\">' +\n          '<svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#1E8449\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><path d=\"M9 12l2 2 4-4\"/></svg>' +\n          '<div style=\"flex:1;\">' +\n            '<strong class=\"text-sm\">' + escapeHtml(a.nombre) + '</strong>' +\n            '<div style=\"display:flex;gap:8px;align-items:center;margin-top:2px;\">' +\n              '<span class=\"text-xs text-muted\">' + tipoLabel + '</span>' +\n              '<span class=\"text-xs text-muted\">&bull;</span>' +\n              '<span class=\"text-xs text-muted\">' + escapeHtml(a.programa_nombre) + '</span>' +\n              '<span class=\"text-xs text-muted\">&bull;</span>' +\n              '<span class=\"text-xs\" style=\"color:#1E8449;\">Completada ' + (a.fecha_completada ? formatDate(a.fecha_completada) : '') + '</span>' +\n            '</div>' +\n          '</div>' +\n          (a.enlace ? '<a href=\"' + escapeHtml(a.enlace) + '\" target=\"_blank\" rel=\"noopener\" class=\"btn btn-sm btn-outline\" style=\"flex-shrink:0;\">Abrir</a>' : '') +\n        '</div>' +\n      '</div>';\n    }).join('');\n  }\n\n  // ============================================\n  // MARCAR ACTIVIDAD COMO COMPLETADA\n  // ============================================\n\n  function marcarCompletada(actId) {\n    if (!confirmar('\\u00bfConfirmas que completaste esta actividad?')) return;\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r.success) {\n          showToast('Actividad marcada como completada.', 'success');\n          cargarTodo();\n        } else {\n          showToast(r.error || 'Error al marcar.', 'error');\n        }\n      })\n      .withFailureHandler(function() {\n        showToast('Error de conexi&oacute;n.', 'error');\n      })\n      .marcarActividadCompletada(App.token, actId);\n  }\n\n  // ============================================\n  // ENCUESTA INTERNA: RESPONDER\n  // ============================================\n\n  function abrirEncuesta(encuestaId) {\n    encuestaActualId = encuestaId;\n\n    // Ocultar listas, mostrar formulario\n    document.getElementById('actividades-pendientes').parentElement.style.display = 'none';\n    document.getElementById('seccion-completadas').style.display = 'none';\n    document.getElementById('encuesta-form-container').classList.remove('hidden');\n\n    var enc = encuestasPendientes.find(function(e) { return e.id === encuestaId; });\n    if (enc) {\n      document.getElementById('enc-form-titulo').textContent = enc.nombre;\n      document.getElementById('enc-form-programa').textContent = 'Programa: ' + enc.programa_nombre;\n    }\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        if (r.success) {\n          var encData = r.data;\n          preguntasActuales = encData.preguntas || [];\n\n          if (encData.instrucciones) {\n            var instrDiv = document.getElementById('enc-instrucciones');\n            instrDiv.textContent = encData.instrucciones;\n            instrDiv.classList.remove('hidden');\n          } else {\n            document.getElementById('enc-instrucciones').classList.add('hidden');\n          }\n\n          renderPreguntas(preguntasActuales);\n        } else {\n          showToast(r.error, 'error');\n        }\n      })\n      .withFailureHandler(function() {\n        showToast('Error al cargar encuesta.', 'error');\n      })\n      .obtenerEncuestaCompleta(App.token, encuestaId);\n  }\n\n  function renderPreguntas(preguntas) {\n    var div = document.getElementById('enc-preguntas');\n    var total = preguntas.length;\n    document.getElementById('enc-progress-text').textContent = 'Pregunta 0 de ' + total;\n    document.getElementById('enc-progress').style.width = '0%';\n\n    div.innerHTML = preguntas.map(function(p, idx) {\n      var obligTag = p.obligatoria !== false ? ' <span class=\"text-danger\">*</span>' : '';\n      var html = '<div class=\"card mb-3\"><div class=\"card-body\">';\n      html += '<p class=\"mb-2\"><strong>' + (idx + 1) + '. ' + escapeHtml(p.texto_pregunta) + '</strong>' + obligTag + '</p>';\n\n      if (p.conducta_nombre) {\n        html += '<p class=\"text-xs text-muted mb-2\">Conducta: ' + escapeHtml(p.conducta_nombre) + '</p>';\n      }\n\n      html += renderInputPorTipo(p.id, p.tipo_respuesta);\n      html += '</div></div>';\n      return html;\n    }).join('');\n\n    setTimeout(function() {\n      var inputs = div.querySelectorAll('input, textarea');\n      inputs.forEach(function(input) {\n        input.addEventListener('change', actualizarProgreso);\n        input.addEventListener('input', actualizarProgreso);\n      });\n    }, 100);\n  }\n\n  function renderInputPorTipo(preguntaId, tipo) {\n    var name = 'resp_' + preguntaId;\n\n    switch (tipo) {\n      case 'escala_1_5':\n        var html = '<div style=\"display:flex;gap:16px;flex-wrap:wrap;\">';\n        for (var i = 1; i <= 5; i++) {\n          html += '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\n            '<input type=\"radio\" name=\"' + name + '\" value=\"' + i + '\"> ' +\n            '<span>' + i + '</span>' +\n          '</label>';\n        }\n        html += '</div>';\n        html += '<div style=\"display:flex;justify-content:space-between;margin-top:4px;\">' +\n          '<span class=\"text-xs text-muted\">Muy bajo</span>' +\n          '<span class=\"text-xs text-muted\">Muy alto</span></div>';\n        return html;\n\n      case 'si_no':\n        return '<div style=\"display:flex;gap:16px;\">' +\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\n            '<input type=\"radio\" name=\"' + name + '\" value=\"si\"> S&iacute;</label>' +\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\n            '<input type=\"radio\" name=\"' + name + '\" value=\"no\"> No</label>' +\n        '</div>';\n\n      case 'logrado_parcial_no':\n        return '<div style=\"display:flex;gap:16px;flex-wrap:wrap;\">' +\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\n            '<input type=\"radio\" name=\"' + name + '\" value=\"logrado\"> Logrado</label>' +\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\n            '<input type=\"radio\" name=\"' + name + '\" value=\"parcial\"> Parcial</label>' +\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\n            '<input type=\"radio\" name=\"' + name + '\" value=\"no\"> No logrado</label>' +\n        '</div>';\n\n      case 'texto_breve':\n        return '<textarea name=\"' + name + '\" class=\"form-control\" placeholder=\"Escribe tu respuesta...\" rows=\"3\"></textarea>';\n\n      default:\n        return '<input type=\"text\" name=\"' + name + '\" class=\"form-control\" placeholder=\"Respuesta...\">';\n    }\n  }\n\n  function actualizarProgreso() {\n    var total = preguntasActuales.length;\n    if (total === 0) return;\n\n    var respondidas = 0;\n    preguntasActuales.forEach(function(p) {\n      var name = 'resp_' + p.id;\n      var inputs = document.querySelectorAll('[name=\"' + name + '\"]');\n      var tieneValor = false;\n      inputs.forEach(function(input) {\n        if (input.type === 'radio' && input.checked) tieneValor = true;\n        if (input.type === 'textarea' && input.value.trim()) tieneValor = true;\n        if (input.type === 'text' && input.value.trim()) tieneValor = true;\n      });\n      if (tieneValor) respondidas++;\n    });\n\n    var pct = Math.round(respondidas / total * 100);\n    document.getElementById('enc-progress').style.width = pct + '%';\n    document.getElementById('enc-progress-text').textContent = 'Pregunta ' + respondidas + ' de ' + total + ' (' + pct + '%)';\n  }\n\n  function enviarRespuestasEncuesta() {\n    var respuestas = [];\n    preguntasActuales.forEach(function(p) {\n      var name = 'resp_' + p.id;\n      var inputs = document.querySelectorAll('[name=\"' + name + '\"]');\n      var valor = null;\n      inputs.forEach(function(input) {\n        if (input.type === 'radio' && input.checked) valor = input.value;\n        if (input.type === 'textarea' || input.type === 'text') {\n          if (input.value.trim()) valor = input.value.trim();\n        }\n      });\n      if (valor !== null) {\n        respuestas.push({ preguntaId: p.id, valor: valor });\n      }\n    });\n\n    var btn = document.getElementById('btn-enviar-respuestas');\n    btnLoading(btn, true);\n\n    google.script.run\n      .withSuccessHandler(function(r) {\n        btnLoading(btn, false);\n        if (r.success) {\n          showToast(r.data.message || 'Respuestas enviadas.', 'success');\n          volverALista();\n          cargarTodo();\n        } else {\n          showToast(r.error, 'error');\n        }\n      })\n      .withFailureHandler(function(err) {\n        btnLoading(btn, false);\n        showToast('Error al enviar respuestas.', 'error');\n      })\n      .enviarRespuestas(App.token, encuestaActualId, respuestas);\n  }\n\n  function volverALista() {\n    document.getElementById('encuesta-form-container').classList.add('hidden');\n    document.getElementById('actividades-pendientes').parentElement.style.display = '';\n    document.getElementById('seccion-completadas').style.display = '';\n    encuestaActualId = null;\n    preguntasActuales = [];\n  }\n\n  // ============================================\n  // DETALLE DE ACTIVIDAD EXTERNA\n  // ============================================\n\n  function verDetalleActPart(id) {\n    var a = misActividadesData.find(function(x) { return x.id === id; });\n    if (!a) return;\n\n    document.getElementById('ver-act-titulo').textContent = a.nombre;\n\n    var html = '';\n\n    html += '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;\">';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Tipo</span><br>' +\n      '<span class=\"text-sm\">' + getTipoLabel(a.tipo) + '</span></div>';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Programa</span><br>' +\n      '<span class=\"text-sm\">' + escapeHtml(a.programa_nombre) + '</span></div>';\n    if (a.fecha_limite) {\n      html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Fecha l&iacute;mite</span><br>' +\n        '<span class=\"text-sm\">' + formatDate(a.fecha_limite) + '</span> ' + getFechaLimiteTag(a.fecha_limite) + '</div>';\n    }\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Estado</span><br>' +\n      (a.completada\n        ? '<span class=\"text-sm\" style=\"color:#1E8449;font-weight:500;\">Completada</span>'\n        : '<span class=\"text-sm\" style=\"color:#D68910;font-weight:500;\">Pendiente</span>') +\n    '</div>';\n    html += '</div>';\n\n    if (a.descripcion) {\n      html += '<div class=\"mb-3\">';\n      html += '<span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Instrucciones</span>';\n      html += '<div style=\"background:var(--color-fondo-alt);padding:14px 16px;border-radius:8px;margin-top:6px;\">';\n      html += '<p class=\"text-sm\" style=\"white-space:pre-wrap;\">' + escapeHtml(a.descripcion) + '</p>';\n      html += '</div></div>';\n    }\n\n    if (a.enlace) {\n      html += '<div class=\"mb-3\">';\n      html += '<span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Enlace</span>';\n      html += '<div style=\"background:var(--color-fondo-alt);padding:10px 14px;border-radius:8px;margin-top:4px;display:flex;align-items:center;justify-content:space-between;\">';\n      html += '<a href=\"' + escapeHtml(a.enlace) + '\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--color-secundario);word-break:break-all;font-size:13px;\">' +\n        escapeHtml(a.enlace.length > 60 ? a.enlace.substring(0, 60) + '...' : a.enlace) + '</a>';\n      html += '<button class=\"btn-abrir-enlace\" onclick=\"window.open(\\'' + escapeHtml(a.enlace) + '\\', \\'_blank\\')\" style=\"flex-shrink:0;margin-left:8px;\">Abrir</button>';\n      html += '</div></div>';\n    }\n\n    var footer = '<button class=\"btn btn-outline\" onclick=\"closeModal(\\'modal-ver-actividad\\')\">Cerrar</button>';\n    if (!a.completada) {\n      footer += ' <button class=\"btn btn-primary\" onclick=\"marcarCompletada(\\'' + a.id + '\\');closeModal(\\'modal-ver-actividad\\');\">Marcar Completada</button>';\n    }\n\n    document.getElementById('ver-act-body').innerHTML = html;\n    document.getElementById('ver-act-footer').innerHTML = footer;\n    openModal('modal-ver-actividad');\n  }\n<\/script>\n","mis-encuestas":"<!-- Vista: Mis Encuestas (Participante) -->\r\n<div>\r\n  <!-- Encuestas Pendientes -->\r\n  <div class=\"mb-4\">\r\n    <h2 style=\"color:var(--color-primario);margin-bottom:16px;\">Encuestas Pendientes</h2>\r\n    <div id=\"encuestas-pendientes\">\r\n      <div class=\"text-center p-4\"><div class=\"spinner spinner-lg\"></div><p class=\"text-muted mt-2\">Cargando...</p></div>\r\n    </div>\r\n  </div>\r\n\r\n  <!-- Formulario de Encuesta (oculto) -->\r\n  <div id=\"encuesta-form-container\" class=\"hidden\">\r\n    <div class=\"card\">\r\n      <div class=\"card-header\">\r\n        <div>\r\n          <h2 id=\"enc-form-titulo\">Encuesta</h2>\r\n          <span class=\"text-sm text-muted\" id=\"enc-form-programa\"></span>\r\n        </div>\r\n        <button class=\"btn btn-sm btn-outline\" onclick=\"volverALista()\">Volver</button>\r\n      </div>\r\n      <div class=\"card-body\">\r\n        <div id=\"enc-instrucciones\" class=\"alert alert-info mb-3 hidden\"></div>\r\n\r\n        <div class=\"progress-bar-container mb-3\">\r\n          <div class=\"progress-bar\" id=\"enc-progress\" style=\"width:0%;\"></div>\r\n        </div>\r\n        <p class=\"text-sm text-muted mb-3\" id=\"enc-progress-text\">Pregunta 0 de 0</p>\r\n\r\n        <div id=\"enc-preguntas\"></div>\r\n\r\n        <div class=\"mt-4\">\r\n          <button class=\"btn btn-primary btn-block\" id=\"btn-enviar-respuestas\" onclick=\"enviarRespuestasEncuesta()\">\r\n            Enviar Respuestas\r\n          </button>\r\n        </div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n\r\n  <!-- Encuestas Completadas -->\r\n  <div class=\"mt-4\">\r\n    <h2 style=\"color:var(--color-primario);margin-bottom:16px;\">Encuestas Completadas</h2>\r\n    <div id=\"encuestas-completadas\">\r\n      <p class=\"text-muted text-sm\">Cargando...</p>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<script>\r\n  var encuestasPendientes = [];\r\n  var encuestaActualId = null;\r\n  var preguntasActuales = [];\r\n\r\n  (function() {\r\n    cargarMisEncuestas();\r\n  })();\r\n\r\n  function cargarMisEncuestas() {\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r.success) {\r\n          encuestasPendientes = r.data || [];\r\n          renderPendientes(encuestasPendientes);\r\n          renderCompletadas();\r\n        } else {\r\n          document.getElementById('encuestas-pendientes').innerHTML =\r\n            '<div class=\"empty-state\"><p>' + escapeHtml(r.error) + '</p></div>';\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        document.getElementById('encuestas-pendientes').innerHTML =\r\n          '<div class=\"empty-state\"><p>Error al cargar encuestas.</p></div>';\r\n      })\r\n      .obtenerEncuestaPendiente(App.token);\r\n  }\r\n\r\n  function renderPendientes(encuestas) {\r\n    var div = document.getElementById('encuestas-pendientes');\r\n    if (!encuestas || encuestas.length === 0) {\r\n      div.innerHTML = '<div class=\"empty-state\"><p>No tienes encuestas pendientes. Buen trabajo.</p></div>';\r\n      return;\r\n    }\r\n\r\n    div.innerHTML = encuestas.map(function(e) {\r\n      var tipoBadge = e.tipo === 'pre'\r\n        ? '<span class=\"badge badge-info\">PRE</span>'\r\n        : '<span class=\"badge badge-success\">POST</span>';\r\n      var fechaLimite = e.fecha_cierre ? '<span class=\"text-xs text-muted\">Fecha limite: ' + formatDate(e.fecha_cierre) + '</span>' : '';\r\n\r\n      var liderInfo = e.lider_nombre\r\n        ? '<br><span class=\"text-sm\" style=\"color:var(--color-primario);font-weight:500;\">Evaluando a: ' + escapeHtml(e.lider_nombre) + '</span>'\r\n        : '';\r\n\r\n      return '<div class=\"card mb-3\"><div class=\"card-body flex-between\">' +\r\n        '<div>' +\r\n          '<strong>' + escapeHtml(e.nombre) + '</strong> ' + tipoBadge + '<br>' +\r\n          '<span class=\"text-sm text-muted\">Programa: ' + escapeHtml(e.programa_nombre) + '</span>' +\r\n          liderInfo + '<br>' +\r\n          fechaLimite +\r\n        '</div>' +\r\n        '<button class=\"btn btn-primary\" onclick=\"abrirEncuesta(\\'' + e.id + '\\')\">Responder</button>' +\r\n      '</div></div>';\r\n    }).join('');\r\n  }\r\n\r\n  function renderCompletadas() {\r\n    // Las encuestas completadas se obtienen comparando: las que estan en el programa pero no en pendientes\r\n    // Simplemente mostramos un mensaje si ya no hay pendientes\r\n    var div = document.getElementById('encuestas-completadas');\r\n    div.innerHTML = '<div class=\"empty-state\"><p>Las encuestas que hayas completado apareceran aqui una vez cargadas.</p></div>';\r\n\r\n    // Intentamos cargar el progreso para mostrar encuestas ya respondidas\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r.success && r.data && r.data.comparacion && r.data.comparacion.length > 0) {\r\n          div.innerHTML = '<div class=\"card\"><div class=\"card-body\">' +\r\n            '<p class=\"text-sm text-muted\">Has respondido encuestas en tus programas asignados. ' +\r\n            'Revisa tu progreso en la seccion \"Mi Progreso\".</p>' +\r\n          '</div></div>';\r\n        } else {\r\n          div.innerHTML = '<div class=\"empty-state\"><p>Aun no has completado ninguna encuesta.</p></div>';\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        div.innerHTML = '';\r\n      })\r\n      .obtenerMiProgreso(App.token);\r\n  }\r\n\r\n  function abrirEncuesta(encuestaId) {\r\n    encuestaActualId = encuestaId;\r\n\r\n    // Ocultar lista, mostrar formulario\r\n    document.getElementById('encuestas-pendientes').parentElement.classList.add('hidden');\r\n    document.getElementById('encuestas-completadas').parentElement.classList.add('hidden');\r\n    document.getElementById('encuesta-form-container').classList.remove('hidden');\r\n\r\n    var enc = encuestasPendientes.find(function(e) { return e.id === encuestaId; });\r\n    if (enc) {\r\n      document.getElementById('enc-form-titulo').textContent = enc.nombre;\r\n      var subtexto = 'Programa: ' + enc.programa_nombre;\r\n      if (enc.lider_nombre) {\r\n        subtexto += '  |  Estas evaluando a: ' + enc.lider_nombre;\r\n      }\r\n      document.getElementById('enc-form-programa').textContent = subtexto;\r\n    }\r\n\r\n    // Cargar preguntas\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r.success) {\r\n          var d = r.data;\r\n          var encData = d.encuesta || d;\r\n          preguntasActuales = d.preguntas || encData.preguntas || [];\r\n\r\n          // Instrucciones\r\n          if (encData.instrucciones) {\r\n            var instrDiv = document.getElementById('enc-instrucciones');\r\n            instrDiv.textContent = encData.instrucciones;\r\n            instrDiv.classList.remove('hidden');\r\n          } else {\r\n            document.getElementById('enc-instrucciones').classList.add('hidden');\r\n          }\r\n\r\n          renderPreguntas(preguntasActuales);\r\n        } else {\r\n          showToast(r.error, 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        showToast('Error al cargar encuesta.', 'error');\r\n      })\r\n      .obtenerEncuestaCompleta(App.token, encuestaId);\r\n  }\r\n\r\n  function renderPreguntas(preguntas) {\r\n    var div = document.getElementById('enc-preguntas');\r\n    var total = preguntas.length;\r\n    document.getElementById('enc-progress-text').textContent = 'Pregunta 0 de ' + total;\r\n    document.getElementById('enc-progress').style.width = '0%';\r\n\r\n    div.innerHTML = preguntas.map(function(p, idx) {\r\n      var obligTag = p.obligatoria !== false ? ' <span class=\"text-danger\">*</span>' : '';\r\n      var html = '<div class=\"card mb-3\"><div class=\"card-body\">';\r\n      // Competencia y foco\r\n      if (p.competencia_nombre) {\r\n        html += '<div style=\"font-size:12px;font-weight:600;color:var(--color-secundario);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:4px;\">' + escapeHtml(p.competencia_nombre) + '</div>';\r\n      }\r\n      if (p.foco_desarrollo) {\r\n        html += '<div style=\"font-size:12px;color:var(--color-texto-sec);font-style:italic;margin-bottom:8px;\">' + escapeHtml(p.foco_desarrollo) + '</div>';\r\n      }\r\n      html += '<p class=\"mb-2\"><strong>' + (idx + 1) + '. ' + escapeHtml(p.texto_pregunta || 'Selecciona una opcion') + '</strong>' + obligTag + '</p>';\r\n\r\n      html += renderInputPorTipo(p.id, p.tipo_respuesta, p);\r\n      html += '</div></div>';\r\n      return html;\r\n    }).join('');\r\n\r\n    // Agregar listeners para actualizar progreso\r\n    setTimeout(function() {\r\n      var inputs = div.querySelectorAll('input, textarea');\r\n      inputs.forEach(function(input) {\r\n        input.addEventListener('change', actualizarProgreso);\r\n        input.addEventListener('input', actualizarProgreso);\r\n      });\r\n    }, 100);\r\n  }\r\n\r\n  function renderInputPorTipo(preguntaId, tipo, pregunta) {\r\n    var name = 'resp_' + preguntaId;\r\n\r\n    switch (tipo) {\r\n      case 'niveles_competencia':\r\n      case 'alternativas':\r\n        var optsHtml = '';\r\n        for (var n = 1; n <= 4; n++) {\r\n          var optTexto = pregunta ? (pregunta['opcion_nivel_' + n] || '') : '';\r\n          if (!optTexto && tipo !== 'niveles_competencia') continue;\r\n          if (!optTexto) optTexto = 'Nivel ' + n;\r\n          var nivelLabel = tipo === 'niveles_competencia' ? '<span style=\"font-weight:700;color:var(--color-secundario);min-width:55px;display:inline-block;\">Nivel ' + n + '</span> ' : '';\r\n          optsHtml += '<label style=\"display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border:1px solid var(--color-borde);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all 0.15s;\" ' +\r\n            'onmouseover=\"this.style.background=\\'var(--color-fondo-alt)\\'\" onmouseout=\"this.style.background=\\'white\\'\">' +\r\n            '<input type=\"radio\" name=\"' + name + '\" value=\"' + n + '\" style=\"margin-top:3px;flex-shrink:0;\"> ' +\r\n            '<span style=\"font-size:14px;line-height:1.5;\">' + nivelLabel + escapeHtml(optTexto) + '</span>' +\r\n          '</label>';\r\n        }\r\n        return optsHtml || '<p class=\"text-muted\">Sin opciones configuradas.</p>';\r\n\r\n      case 'escala_1_5':\r\n        var html = '<div style=\"display:flex;gap:16px;flex-wrap:wrap;\">';\r\n        for (var i = 1; i <= 5; i++) {\r\n          html += '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\r\n            '<input type=\"radio\" name=\"' + name + '\" value=\"' + i + '\"> ' +\r\n            '<span>' + i + '</span>' +\r\n          '</label>';\r\n        }\r\n        html += '</div>';\r\n        html += '<div style=\"display:flex;justify-content:space-between;margin-top:4px;\">' +\r\n          '<span class=\"text-xs text-muted\">Muy bajo</span>' +\r\n          '<span class=\"text-xs text-muted\">Muy alto</span></div>';\r\n        return html;\r\n\r\n      case 'si_no':\r\n        return '<div style=\"display:flex;gap:16px;\">' +\r\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\r\n            '<input type=\"radio\" name=\"' + name + '\" value=\"si\"> Si</label>' +\r\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\r\n            '<input type=\"radio\" name=\"' + name + '\" value=\"no\"> No</label>' +\r\n        '</div>';\r\n\r\n      case 'logrado_parcial_no':\r\n        return '<div style=\"display:flex;gap:16px;flex-wrap:wrap;\">' +\r\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\r\n            '<input type=\"radio\" name=\"' + name + '\" value=\"logrado\"> Logrado</label>' +\r\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\r\n            '<input type=\"radio\" name=\"' + name + '\" value=\"parcial\"> Parcial</label>' +\r\n          '<label style=\"display:flex;align-items:center;gap:4px;cursor:pointer;\">' +\r\n            '<input type=\"radio\" name=\"' + name + '\" value=\"no\"> No logrado</label>' +\r\n        '</div>';\r\n\r\n      case 'texto_breve':\r\n        return '<input type=\"text\" name=\"' + name + '\" class=\"form-control\" placeholder=\"Escribe tu respuesta...\">';\r\n\r\n      case 'parrafo':\r\n        return '<textarea name=\"' + name + '\" class=\"form-control\" placeholder=\"Escribe tu respuesta...\" rows=\"4\"></textarea>';\r\n\r\n      case 'casillas':\r\n        var cbHtml = '';\r\n        for (var cb = 1; cb <= 4; cb++) {\r\n          var cbTxt = pregunta ? (pregunta['opcion_nivel_' + cb] || '') : '';\r\n          if (!cbTxt) continue;\r\n          cbHtml += '<label style=\"display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--color-borde);border-radius:8px;margin-bottom:6px;cursor:pointer;\">' +\r\n            '<input type=\"checkbox\" name=\"' + name + '\" value=\"' + cb + '\"> ' +\r\n            '<span style=\"font-size:14px;\">' + escapeHtml(cbTxt) + '</span></label>';\r\n        }\r\n        return cbHtml || '<p class=\"text-muted\">Sin opciones.</p>';\r\n\r\n      case 'desplegable':\r\n        var selHtml = '<select name=\"' + name + '\" class=\"form-control\"><option value=\"\">Selecciona...</option>';\r\n        for (var dp = 1; dp <= 4; dp++) {\r\n          var dpTxt = pregunta ? (pregunta['opcion_nivel_' + dp] || '') : '';\r\n          if (!dpTxt) continue;\r\n          selHtml += '<option value=\"' + dp + '\">' + escapeHtml(dpTxt) + '</option>';\r\n        }\r\n        selHtml += '</select>';\r\n        return selHtml;\r\n\r\n      default:\r\n        return '<input type=\"text\" name=\"' + name + '\" class=\"form-control\" placeholder=\"Respuesta...\">';\r\n    }\r\n  }\r\n\r\n  function actualizarProgreso() {\r\n    var total = preguntasActuales.length;\r\n    if (total === 0) return;\r\n\r\n    var respondidas = 0;\r\n    preguntasActuales.forEach(function(p) {\r\n      var name = 'resp_' + p.id;\r\n      var inputs = document.querySelectorAll('[name=\"' + name + '\"]');\r\n      var tieneValor = false;\r\n      inputs.forEach(function(input) {\r\n        if (input.type === 'radio' && input.checked) tieneValor = true;\r\n        if (input.type === 'textarea' && input.value.trim()) tieneValor = true;\r\n        if (input.type === 'text' && input.value.trim()) tieneValor = true;\r\n      });\r\n      if (tieneValor) respondidas++;\r\n    });\r\n\r\n    var pct = Math.round(respondidas / total * 100);\r\n    document.getElementById('enc-progress').style.width = pct + '%';\r\n    document.getElementById('enc-progress-text').textContent = 'Pregunta ' + respondidas + ' de ' + total + ' (' + pct + '%)';\r\n  }\r\n\r\n  function enviarRespuestasEncuesta() {\r\n    var respuestas = [];\r\n    preguntasActuales.forEach(function(p) {\r\n      var name = 'resp_' + p.id;\r\n      var inputs = document.querySelectorAll('[name=\"' + name + '\"]');\r\n      var valor = null;\r\n      inputs.forEach(function(input) {\r\n        if (input.type === 'radio' && input.checked) valor = input.value;\r\n        if (input.type === 'textarea' || input.type === 'text') {\r\n          if (input.value.trim()) valor = input.value.trim();\r\n        }\r\n      });\r\n      if (valor !== null) {\r\n        respuestas.push({ preguntaId: p.id, valor: valor });\r\n      }\r\n    });\r\n\r\n    var btn = document.getElementById('btn-enviar-respuestas');\r\n    btnLoading(btn, true);\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        btnLoading(btn, false);\r\n        if (r.success) {\r\n          showToast(r.data.message || 'Respuestas enviadas.', 'success');\r\n          volverALista();\r\n          cargarMisEncuestas();\r\n        } else {\r\n          showToast(r.error, 'error');\r\n        }\r\n      })\r\n      .withFailureHandler(function(err) {\r\n        btnLoading(btn, false);\r\n        showToast('Error al enviar respuestas.', 'error');\r\n      })\r\n      .enviarRespuestas(App.token, encuestaActualId, respuestas);\r\n  }\r\n\r\n  function volverALista() {\r\n    document.getElementById('encuesta-form-container').classList.add('hidden');\r\n    document.getElementById('encuestas-pendientes').parentElement.classList.remove('hidden');\r\n    document.getElementById('encuestas-completadas').parentElement.classList.remove('hidden');\r\n    encuestaActualId = null;\r\n    preguntasActuales = [];\r\n  }\r\n<\/script>\r\n","mis-recursos":"<!-- Vista: Archivos y Recursos del Participante -->\r\n<style>\r\n  .recurso-card {\r\n    background: white;\r\n    border: 1px solid var(--color-borde);\r\n    border-radius: 12px;\r\n    padding: 20px 24px;\r\n    margin-bottom: 14px;\r\n    transition: box-shadow 0.2s;\r\n  }\r\n  .recurso-card:hover {\r\n    box-shadow: 0 3px 12px rgba(0,0,0,0.06);\r\n  }\r\n  .recurso-header {\r\n    display: flex;\r\n    align-items: flex-start;\r\n    gap: 16px;\r\n  }\r\n  .recurso-icono {\r\n    width: 48px; height: 48px; border-radius: 12px;\r\n    display: flex; align-items: center; justify-content: center;\r\n    font-size: 22px; flex-shrink: 0;\r\n  }\r\n  .recurso-icono-cronograma { background: #EBF5FB; }\r\n  .recurso-icono-material { background: #FEF9E7; }\r\n  .recurso-icono-instructivo { background: #F4ECF7; }\r\n  .recurso-icono-presentacion { background: #FDEDEC; }\r\n  .recurso-icono-enlace { background: #E8F8F5; }\r\n  .recurso-icono-informe { background: #E8F8F5; }\r\n  .recurso-icono-otro { background: var(--color-fondo-alt); }\r\n\r\n  .recurso-info { flex: 1; min-width: 0; }\r\n  .recurso-nombre {\r\n    font-size: 16px; font-weight: 600; color: var(--color-texto);\r\n    margin-bottom: 4px;\r\n  }\r\n  .recurso-meta {\r\n    font-size: 12px; color: var(--color-texto-sec); margin-bottom: 2px;\r\n  }\r\n  .recurso-mensaje {\r\n    margin-top: 10px; padding: 12px 16px;\r\n    background: var(--color-fondo-alt); border-radius: 8px;\r\n    border-left: 3px solid var(--color-secundario);\r\n    font-size: 14px; color: var(--color-texto); line-height: 1.5;\r\n  }\r\n  .recurso-mensaje-autor {\r\n    font-size: 11px; color: var(--color-texto-sec); margin-top: 6px; font-style: italic;\r\n  }\r\n  .recurso-btn {\r\n    flex-shrink: 0; align-self: center;\r\n  }\r\n  .empty-recursos {\r\n    text-align: center; padding: 60px 24px; color: var(--color-texto-sec);\r\n  }\r\n  .empty-recursos p { margin: 4px 0; }\r\n\r\n  .tipo-badge {\r\n    display: inline-block; padding: 2px 10px; border-radius: 12px;\r\n    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;\r\n  }\r\n  .tipo-cronograma { background: #D4E6F1; color: #2471A3; }\r\n  .tipo-material { background: #FDEBD0; color: #D68910; }\r\n  .tipo-instructivo { background: #E8DAEF; color: #7D3C98; }\r\n  .tipo-presentacion { background: #FADBD8; color: #C0392B; }\r\n  .tipo-enlace { background: #D1F2EB; color: #148F77; }\r\n  .tipo-informe { background: #D1F2EB; color: #1ABC9C; }\r\n  .tipo-otro { background: #EAECEE; color: #5D6D7E; }\r\n</style>\r\n\r\n<div>\r\n  <p class=\"text-muted mb-4\" style=\"font-size:14px;\">\r\n    Materiales, recursos y actividades compartidos por el equipo del programa.\r\n  </p>\r\n\r\n  <div id=\"mis-recursos-loading\" class=\"text-center p-4\">\r\n    <div class=\"spinner spinner-lg\"></div>\r\n    <p class=\"text-muted mt-3\">Cargando recursos...</p>\r\n  </div>\r\n\r\n  <div id=\"mis-recursos-lista\"></div>\r\n</div>\r\n\r\n<script>\r\n(function() {\r\n  // Obtener los programas del participante para buscar archivos\r\n  google.script.run\r\n    .withSuccessHandler(function(r) {\r\n      if (r && r.success && r.data && r.data.length > 0) {\r\n        // Cargar archivos de todos los programas del participante\r\n        var programas = r.data;\r\n        var todosArchivos = [];\r\n        var pendientes = programas.length;\r\n\r\n        programas.forEach(function(prog) {\r\n          google.script.run\r\n            .withSuccessHandler(function(ar) {\r\n              if (ar && ar.success) {\r\n                (ar.data || []).forEach(function(a) {\r\n                  a.programa_nombre = prog.nombre;\r\n                  todosArchivos.push(a);\r\n                });\r\n              }\r\n              pendientes--;\r\n              if (pendientes === 0) {\r\n                renderRecursos(todosArchivos);\r\n              }\r\n            })\r\n            .withFailureHandler(function() {\r\n              pendientes--;\r\n              if (pendientes === 0) renderRecursos(todosArchivos);\r\n            })\r\n            .listarArchivosPrograma(App.token, prog.id);\r\n        });\r\n      } else {\r\n        renderRecursos([]);\r\n      }\r\n    })\r\n    .withFailureHandler(function() { renderRecursos([]); })\r\n    .listarProgramasDashboard(App.token);\r\n\r\n  function renderRecursos(archivos) {\r\n    document.getElementById('mis-recursos-loading').classList.add('hidden');\r\n    var container = document.getElementById('mis-recursos-lista');\r\n\r\n    if (!archivos.length) {\r\n      container.innerHTML =\r\n        '<div class=\"empty-recursos\">' +\r\n          '<p style=\"font-size:40px;margin-bottom:12px;\">&#128218;</p>' +\r\n          '<p><strong>No hay recursos disponibles</strong></p>' +\r\n          '<p class=\"text-sm\">Cuando el equipo del programa comparta materiales, apareceran aqui.</p>' +\r\n        '</div>';\r\n      return;\r\n    }\r\n\r\n    // Ordenar por fecha mas reciente\r\n    archivos.sort(function(a, b) {\r\n      return (b.fecha_subida || '').localeCompare(a.fecha_subida || '');\r\n    });\r\n\r\n    var iconos = {\r\n      cronograma: '&#128197;', material: '&#128214;', instructivo: '&#128221;',\r\n      presentacion: '&#127916;', enlace: '&#128279;', informe: '&#128200;', otro: '&#128196;'\r\n    };\r\n    var tipoLabels = {\r\n      cronograma: 'Cronograma', material: 'Material', instructivo: 'Instructivo',\r\n      presentacion: 'Presentacion', enlace: 'Enlace', informe: 'Informe', otro: 'Otro'\r\n    };\r\n\r\n    container.innerHTML = archivos.map(function(a) {\r\n      var tipo = a.tipo || 'otro';\r\n      var icono = iconos[tipo] || iconos.otro;\r\n      var label = tipoLabels[tipo] || tipo;\r\n\r\n      var mensajeHtml = '';\r\n      if (a.mensaje) {\r\n        mensajeHtml = '<div class=\"recurso-mensaje\">' +\r\n          escapeHtml(a.mensaje) +\r\n          (a.subido_por_nombre ? '<div class=\"recurso-mensaje-autor\">— ' + escapeHtml(a.subido_por_nombre) + '</div>' : '') +\r\n        '</div>';\r\n      }\r\n\r\n      return '<div class=\"recurso-card\">' +\r\n        '<div class=\"recurso-header\">' +\r\n          '<div class=\"recurso-icono recurso-icono-' + tipo + '\">' + icono + '</div>' +\r\n          '<div class=\"recurso-info\">' +\r\n            '<div class=\"recurso-nombre\">' + escapeHtml(a.nombre_archivo) + '</div>' +\r\n            '<div class=\"recurso-meta\">' +\r\n              '<span class=\"tipo-badge tipo-' + tipo + '\">' + label + '</span> ' +\r\n              (a.programa_nombre ? escapeHtml(a.programa_nombre) + ' &middot; ' : '') +\r\n              (a.fecha_subida ? formatDate(a.fecha_subida) : '') +\r\n            '</div>' +\r\n            mensajeHtml +\r\n          '</div>' +\r\n          '<div class=\"recurso-btn\">' +\r\n            '<a href=\"' + escapeHtml(a.drive_url || '#') + '\" target=\"_blank\" class=\"btn btn-primary btn-sm\">Abrir</a>' +\r\n          '</div>' +\r\n        '</div>' +\r\n      '</div>';\r\n    }).join('');\r\n  }\r\n})();\r\n<\/script>\r\n","notificaciones":"<!-- Vista: Notificaciones (Todos los roles) -->\r\n<div>\r\n  <div class=\"card\">\r\n    <div class=\"card-header\">\r\n      <h2>Mis Notificaciones</h2>\r\n      <button class=\"btn btn-sm btn-outline\" onclick=\"marcarTodasLeidas()\">Marcar todas como leidas</button>\r\n    </div>\r\n    <div class=\"card-body\">\r\n      <div id=\"lista-notificaciones\">\r\n        <div class=\"text-center p-4\"><div class=\"spinner spinner-lg\"></div><p class=\"text-muted mt-2\">Cargando...</p></div>\r\n      </div>\r\n    </div>\r\n  </div>\r\n</div>\r\n\r\n<script>\r\n  var notificacionesData = [];\r\n\r\n  (function() {\r\n    cargarNotificaciones();\r\n  })();\r\n\r\n  function cargarNotificaciones() {\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r.success) {\r\n          notificacionesData = r.data || [];\r\n          renderNotificaciones(notificacionesData);\r\n        } else {\r\n          document.getElementById('lista-notificaciones').innerHTML =\r\n            '<div class=\"empty-state\"><p>' + escapeHtml(r.error) + '</p></div>';\r\n        }\r\n      })\r\n      .withFailureHandler(function() {\r\n        document.getElementById('lista-notificaciones').innerHTML =\r\n          '<div class=\"empty-state\"><p>Error al cargar notificaciones.</p></div>';\r\n      })\r\n      .obtenerNotificaciones(App.token);\r\n  }\r\n\r\n  function renderNotificaciones(notificaciones) {\r\n    var div = document.getElementById('lista-notificaciones');\r\n\r\n    if (!notificaciones || notificaciones.length === 0) {\r\n      div.innerHTML = '<div class=\"empty-state\">' +\r\n        '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"width:64px;height:64px;margin-bottom:16px;opacity:0.4;\">' +\r\n          '<path d=\"M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9\"/><path d=\"M13.73 21a2 2 0 01-3.46 0\"/>' +\r\n        '</svg>' +\r\n        '<p>No tienes notificaciones.</p>' +\r\n      '</div>';\r\n      return;\r\n    }\r\n\r\n    div.innerHTML = notificaciones.map(function(n) {\r\n      var isUnread = n.leida === false || n.leida === 'false';\r\n      var bgStyle = isUnread ? 'background:rgba(46,134,193,0.05);border-left:3px solid var(--color-secundario);' : 'border-left:3px solid transparent;';\r\n\r\n      var tipoIcon = '';\r\n      switch (n.tipo) {\r\n        case 'encuesta_pendiente':\r\n        case 'recordatorio_encuesta':\r\n          tipoIcon = '<span class=\"badge badge-info\">Encuesta</span>';\r\n          break;\r\n        case 'feedback_recibido':\r\n          tipoIcon = '<span class=\"badge badge-success\">Feedback</span>';\r\n          break;\r\n        case 'registro_pendiente':\r\n          tipoIcon = '<span class=\"badge badge-warning\">Registro</span>';\r\n          break;\r\n        default:\r\n          tipoIcon = '<span class=\"badge badge-secondary\">' + escapeHtml(n.tipo || 'Info') + '</span>';\r\n      }\r\n\r\n      return '<div class=\"card mb-2\" style=\"cursor:pointer;' + bgStyle + '\" onclick=\"marcarNotifLeida(\\'' + n.id + '\\', this)\">' +\r\n        '<div class=\"card-body\" style=\"padding:12px 16px;\">' +\r\n          '<div class=\"flex-between mb-1\">' +\r\n            '<div style=\"display:flex;align-items:center;gap:8px;\">' +\r\n              (isUnread ? '<span style=\"width:8px;height:8px;border-radius:50%;background:var(--color-secundario);flex-shrink:0;\"></span>' : '') +\r\n              '<strong style=\"font-size:14px;\">' + escapeHtml(n.titulo) + '</strong>' +\r\n            '</div>' +\r\n            '<div style=\"display:flex;align-items:center;gap:8px;\">' +\r\n              tipoIcon +\r\n              '<span class=\"text-xs text-muted\">' + formatDate(n.fecha) + '</span>' +\r\n            '</div>' +\r\n          '</div>' +\r\n          '<p class=\"text-sm\" style=\"margin-left:' + (isUnread ? '16px' : '0') + ';\">' + escapeHtml(n.mensaje) + '</p>' +\r\n        '</div>' +\r\n      '</div>';\r\n    }).join('');\r\n  }\r\n\r\n  function marcarNotifLeida(id, el) {\r\n    var notif = notificacionesData.find(function(n) { return n.id === id; });\r\n    if (!notif || (notif.leida !== false && notif.leida !== 'false')) return;\r\n\r\n    google.script.run\r\n      .withSuccessHandler(function(r) {\r\n        if (r.success) {\r\n          // Actualizar localmente\r\n          notif.leida = true;\r\n          renderNotificaciones(notificacionesData);\r\n          // Actualizar contador en header\r\n          if (typeof cargarContadorNotificaciones === 'function') {\r\n            cargarContadorNotificaciones();\r\n          }\r\n        }\r\n      })\r\n      .marcarComoLeida(App.token, id);\r\n  }\r\n\r\n  function marcarTodasLeidas() {\r\n    var noLeidas = notificacionesData.filter(function(n) {\r\n      return n.leida === false || n.leida === 'false';\r\n    });\r\n\r\n    if (noLeidas.length === 0) {\r\n      showToast('No hay notificaciones sin leer.', 'info');\r\n      return;\r\n    }\r\n\r\n    var procesadas = 0;\r\n    noLeidas.forEach(function(n) {\r\n      google.script.run\r\n        .withSuccessHandler(function(r) {\r\n          if (r.success) n.leida = true;\r\n          procesadas++;\r\n          if (procesadas >= noLeidas.length) {\r\n            renderNotificaciones(notificacionesData);\r\n            showToast('Todas las notificaciones marcadas como leidas.', 'success');\r\n            if (typeof cargarContadorNotificaciones === 'function') {\r\n              cargarContadorNotificaciones();\r\n            }\r\n          }\r\n        })\r\n        .withFailureHandler(function() {\r\n          procesadas++;\r\n        })\r\n        .marcarComoLeida(App.token, n.id);\r\n    });\r\n  }\r\n<\/script>\r\n","reportar":"<!-- Vista: Reportar Incidencia (Participante + Jefatura) -->\n<div>\n  <div class=\"flex-between mb-4\">\n    <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n      <select class=\"form-control\" id=\"sel-programa-rep\" onchange=\"filtrarReportes()\" style=\"min-width:220px;\">\n        <option value=\"\">Todos los programas</option>\n      </select>\n      <select class=\"form-control\" id=\"filtro-estado-rep\" onchange=\"filtrarReportes()\" style=\"max-width:170px;\">\n        <option value=\"\">Todos los estados</option>\n        <option value=\"pendiente\">Pendiente</option>\n        <option value=\"en_revision\">En Revisi&oacute;n</option>\n        <option value=\"en_proceso\">En Proceso</option>\n        <option value=\"resuelta\">Resuelta</option>\n        <option value=\"no_resuelta\">No Resuelta</option>\n      </select>\n    </div>\n    <button class=\"btn btn-primary\" onclick=\"abrirModalReporte()\">\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" style=\"display:inline;vertical-align:middle;margin-right:4px;\">\n        <circle cx=\"12\" cy=\"12\" r=\"10\"/><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"/><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"/>\n      </svg>\n      Reportar Incidencia\n    </button>\n  </div>\n\n  <!-- Lista de reportes -->\n  <div id=\"reportes-lista\">\n    <div class=\"text-center p-4\"><div class=\"spinner spinner-lg\"></div><p class=\"text-muted mt-2\">Cargando...</p></div>\n  </div>\n</div>\n\n<!-- Modal: Nueva Incidencia -->\n<div class=\"modal-overlay\" id=\"modal-reporte\">\n  <div class=\"modal\" style=\"max-width:650px;\">\n    <div class=\"modal-header\">\n      <h3 id=\"modal-reporte-titulo\">Reportar Incidencia</h3>\n      <button class=\"modal-close\" onclick=\"cerrarModalReporte()\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <form id=\"form-reporte\">\n        <div class=\"form-group\">\n          <label>Programa *</label>\n          <select name=\"programa_id\" class=\"form-control\" id=\"rep-programa\" required>\n            <option value=\"\">Selecciona un programa...</option>\n          </select>\n        </div>\n\n        <div class=\"form-group\">\n          <label>&iquest;Qu&eacute; presenta el error? *</label>\n          <select name=\"categoria\" class=\"form-control\" id=\"rep-categoria\" required onchange=\"onCategoriaChange()\">\n            <option value=\"\">Selecciona...</option>\n            <option value=\"encuesta\">Encuesta (preguntas, opciones, instrucciones)</option>\n            <option value=\"actividad\">Actividad (enlace roto, archivo no carga, instrucciones err&oacute;neas)</option>\n            <option value=\"contenido\">Contenido / Material (documento, video, presentaci&oacute;n)</option>\n            <option value=\"plataforma\">Error de plataforma (pantalla, funci&oacute;n, carga)</option>\n            <option value=\"otro\">Otro</option>\n          </select>\n        </div>\n\n        <!-- Selector de elemento afectado (encuesta/actividad específica) -->\n        <div class=\"form-group hidden\" id=\"rep-elemento-group\">\n          <label id=\"rep-elemento-label\">Elemento afectado</label>\n          <select name=\"elemento_id\" class=\"form-control\" id=\"rep-elemento\">\n            <option value=\"\">Selecciona...</option>\n          </select>\n        </div>\n\n        <div class=\"form-group\">\n          <label>T&iacute;tulo del problema *</label>\n          <input type=\"text\" name=\"titulo\" class=\"form-control\" required\n                 placeholder=\"Ej: Enlace de encuesta no funciona, Pregunta 3 tiene error...\">\n        </div>\n\n        <div class=\"form-group\">\n          <label>Descripci&oacute;n detallada *</label>\n          <textarea name=\"comentario\" class=\"form-control\" required rows=\"4\"\n                    placeholder=\"Describe el error: qu&eacute; intentaste hacer, qu&eacute; ocurri&oacute;, qu&eacute; esperabas que pasara...\"></textarea>\n        </div>\n\n        <!-- Subida de evidencia -->\n        <div class=\"form-group\">\n          <label>Evidencia (capturas de pantalla, im&aacute;genes)</label>\n          <div class=\"evidencia-upload-area\" id=\"evidencia-upload-area\" onclick=\"document.getElementById('input-evidencia').click()\">\n            <svg width=\"40\" height=\"40\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#718096\" stroke-width=\"1.5\" style=\"margin-bottom:8px;\">\n              <rect x=\"3\" y=\"3\" width=\"18\" height=\"18\" rx=\"2\"/>\n              <circle cx=\"8.5\" cy=\"8.5\" r=\"1.5\"/>\n              <path d=\"M21 15l-5-5L5 21\"/>\n            </svg>\n            <p style=\"font-size:14px;color:var(--color-texto-sec);margin:0;\">Haz clic o arrastra capturas de pantalla aqu&iacute;</p>\n            <p style=\"font-size:12px;color:#A0AEC0;margin:4px 0 0;\">PNG, JPG o GIF &mdash; M&aacute;x. 5MB por archivo</p>\n          </div>\n          <input type=\"file\" id=\"input-evidencia\" accept=\"image/*\" multiple\n                 style=\"display:none;\" onchange=\"handleEvidenciaFiles(this.files)\">\n        </div>\n\n        <div id=\"evidencia-preview\" class=\"evidencia-preview-grid\"></div>\n      </form>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-outline\" onclick=\"cerrarModalReporte()\">Cancelar</button>\n      <button class=\"btn btn-primary\" id=\"btn-guardar-reporte\" onclick=\"guardarReporte()\">Enviar Reporte</button>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Detalle de Incidencia -->\n<div class=\"modal-overlay\" id=\"modal-detalle-reporte\">\n  <div class=\"modal\" style=\"max-width:700px;\">\n    <div class=\"modal-header\">\n      <h3 id=\"detalle-rep-titulo\">Detalle</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-detalle-reporte')\">&times;</button>\n    </div>\n    <div class=\"modal-body\" id=\"detalle-rep-body\"></div>\n    <div class=\"modal-footer\" id=\"detalle-rep-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-detalle-reporte')\">Cerrar</button>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Cambiar estado (solo jefatura) -->\n<div class=\"modal-overlay\" id=\"modal-jef-estado\">\n  <div class=\"modal\" style=\"max-width:500px;\">\n    <div class=\"modal-header\">\n      <h3>Marcar en Revisi&oacute;n</h3>\n      <button class=\"modal-close\" onclick=\"closeModal('modal-jef-estado')\">&times;</button>\n    </div>\n    <div class=\"modal-body\">\n      <input type=\"hidden\" id=\"jef-estado-obs-id\">\n      <div class=\"form-group\">\n        <label>Comentario obligatorio *</label>\n        <textarea class=\"form-control\" id=\"jef-estado-comentario\" required rows=\"3\"\n                  placeholder=\"Describe la acci&oacute;n que tomar&aacute;s sobre este reporte...\"></textarea>\n      </div>\n    </div>\n    <div class=\"modal-footer\">\n      <button class=\"btn btn-outline\" onclick=\"closeModal('modal-jef-estado')\">Cancelar</button>\n      <button class=\"btn btn-primary\" id=\"btn-jef-confirmar\" onclick=\"confirmarEstadoJef()\">Confirmar</button>\n    </div>\n  </div>\n</div>\n\n<!-- Modal: Ver imagen grande -->\n<div class=\"modal-overlay\" id=\"modal-imagen-grande\" onclick=\"closeModal('modal-imagen-grande')\">\n  <div class=\"modal\" style=\"max-width:90vw;max-height:90vh;background:transparent;border:none;box-shadow:none;display:flex;align-items:center;justify-content:center;\">\n    <img id=\"imagen-grande-src\" src=\"\" alt=\"Evidencia\" style=\"max-width:100%;max-height:85vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.4);\">\n  </div>\n</div>\n\n<style>\n  .evidencia-upload-area {\n    border: 2px dashed var(--color-borde);\n    border-radius: 10px;\n    padding: 28px 20px;\n    text-align: center;\n    cursor: pointer;\n    transition: all 0.2s;\n    background: var(--color-fondo-alt);\n  }\n  .evidencia-upload-area:hover { border-color: var(--color-secundario); background: rgba(245, 130, 32, 0.05); }\n\n  .evidencia-preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; margin-top: 12px; }\n  .evidencia-thumb { position: relative; border-radius: 8px; overflow: hidden; border: 1px solid var(--color-borde); aspect-ratio: 1; background: var(--color-fondo-alt); }\n  .evidencia-thumb img { width: 100%; height: 100%; object-fit: cover; }\n  .evidencia-thumb .thumb-remove { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; background: var(--color-error); color: white; border: none; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }\n  .evidencia-thumb .thumb-name { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.6); color: white; font-size: 10px; padding: 3px 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n\n  .reporte-card { border: 1px solid var(--color-borde); border-radius: 10px; background: var(--color-tarjeta); overflow: hidden; transition: box-shadow 0.2s; margin-bottom: 12px; }\n  .reporte-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }\n  .reporte-card-body { padding: 16px 20px; }\n  .reporte-evidencias-strip { display: flex; gap: 8px; overflow-x: auto; padding: 0 20px 12px; }\n  .reporte-evidencias-strip img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid var(--color-borde); cursor: pointer; flex-shrink: 0; }\n\n  .cat-badge-encuesta { background: #E8DAEF; color: #7D3C98; }\n  .cat-badge-actividad { background: #D4E6F1; color: #2471A3; }\n  .cat-badge-contenido { background: #FDEBD0; color: #D68910; }\n  .cat-badge-plataforma { background: #FADBD8; color: #C0392B; }\n  .cat-badge-otro { background: #EAECEE; color: #5D6D7E; }\n\n  .estado-badge-pendiente { background: #FDEBD0; color: #D68910; }\n  .estado-badge-en_revision { background: #D4E6F1; color: #2471A3; }\n  .estado-badge-en_proceso { background: #E8DAEF; color: #7D3C98; }\n  .estado-badge-resuelta { background: #D4EFDF; color: #1E8449; }\n  .estado-badge-no_resuelta { background: #FADBD8; color: #C0392B; }\n\n  .detalle-evidencias-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 12px; }\n  .detalle-evidencias-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid var(--color-borde); cursor: pointer; }\n\n  .historial-item { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--color-borde); }\n  .historial-item:last-child { border-bottom: none; }\n  .historial-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }\n</style>\n\n<script>\n  var reportesData = [];\n  var evidenciasTemp = [];\n  var programasReporte = [];\n  var esJefatura = App.getRol() === 'jefatura';\n\n  (function() {\n    cargarProgramasReporte();\n    cargarReportes();\n\n    var uploadArea = document.getElementById('evidencia-upload-area');\n    if (uploadArea) {\n      uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('drag-over'); });\n      uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('drag-over'); });\n      uploadArea.addEventListener('drop', function(e) {\n        e.preventDefault(); uploadArea.classList.remove('drag-over');\n        if (e.dataTransfer.files.length) handleEvidenciaFiles(e.dataTransfer.files);\n      });\n    }\n  })();\n\n  function cargarProgramasReporte() {\n    google.script.run.withSuccessHandler(function(r) {\n      if (r.success && r.data) {\n        programasReporte = r.data;\n        var selFiltro = document.getElementById('sel-programa-rep');\n        var selForm = document.getElementById('rep-programa');\n        r.data.forEach(function(p) {\n          var o1 = document.createElement('option'); o1.value = p.id; o1.textContent = p.nombre; selFiltro.appendChild(o1);\n          var o2 = document.createElement('option'); o2.value = p.id; o2.textContent = p.nombre; selForm.appendChild(o2);\n        });\n      }\n    }).listarProgramasDashboard(App.token);\n  }\n\n  function cargarReportes() {\n    document.getElementById('reportes-lista').innerHTML =\n      '<div class=\"text-center p-4\"><div class=\"spinner spinner-lg\"></div></div>';\n    google.script.run.withSuccessHandler(function(r) {\n      if (r.success) { reportesData = r.data || []; filtrarReportes(); }\n      else document.getElementById('reportes-lista').innerHTML = '<div class=\"empty-state\"><p>Error al cargar.</p></div>';\n    }).withFailureHandler(function() {\n      document.getElementById('reportes-lista').innerHTML = '<div class=\"empty-state\"><p>Error de conexi&oacute;n.</p></div>';\n    }).listarReportesObservacion(App.token);\n  }\n\n  function filtrarReportes() {\n    var progId = document.getElementById('sel-programa-rep').value;\n    var estado = document.getElementById('filtro-estado-rep').value;\n    var filtrados = reportesData.filter(function(r) {\n      return (!progId || r.programa_id === progId) && (!estado || r.estado_gestion === estado);\n    });\n    renderReportes(filtrados);\n  }\n\n  function getCatLabel(cat) {\n    return { encuesta: 'Encuesta', actividad: 'Actividad', contenido: 'Contenido', plataforma: 'Plataforma', otro: 'Otro' }[cat] || cat;\n  }\n\n  function getEstadoLabel(e) {\n    return { pendiente: 'Pendiente', en_revision: 'En Revisi\\u00f3n', en_proceso: 'En Proceso', resuelta: 'Resuelta', no_resuelta: 'No Resuelta' }[e] || e;\n  }\n\n  function renderReportes(reportes) {\n    var div = document.getElementById('reportes-lista');\n    if (!reportes || reportes.length === 0) {\n      div.innerHTML = '<div class=\"card\"><div class=\"empty-state\">' +\n        '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" style=\"width:64px;height:64px;margin-bottom:16px;opacity:0.4;\"><circle cx=\"12\" cy=\"12\" r=\"10\"/><line x1=\"12\" y1=\"8\" x2=\"12\" y2=\"12\"/><line x1=\"12\" y1=\"16\" x2=\"12.01\" y2=\"16\"/></svg>' +\n        '<p>No hay incidencias reportadas.</p>' +\n      '</div></div>';\n      return;\n    }\n\n    div.innerHTML = reportes.map(function(r) {\n      var cat = r.categoria || r.tipo || 'otro';\n      var catBadge = '<span class=\"badge cat-badge-' + cat + '\">' + getCatLabel(cat) + '</span>';\n      var estadoBadge = '<span class=\"badge estado-badge-' + (r.estado_gestion || 'pendiente') + '\">' + getEstadoLabel(r.estado_gestion || 'pendiente') + '</span>';\n      var comentarioCorto = r.comentario.length > 120 ? r.comentario.substring(0, 120) + '...' : r.comentario;\n      var numEv = (r.evidencias && r.evidencias.length) || 0;\n\n      var html = '<div class=\"reporte-card\"><div class=\"reporte-card-body\">';\n      html += '<div class=\"flex-between mb-2\">';\n      html += '<div style=\"display:flex;align-items:center;gap:10px;\">' + catBadge + '<strong style=\"font-size:15px;\">' + escapeHtml(r.titulo) + '</strong></div>';\n      html += '<div style=\"display:flex;align-items:center;gap:10px;\">' + estadoBadge + '<span class=\"text-xs text-muted\">' + formatDate(r.fecha) + '</span></div>';\n      html += '</div>';\n      html += '<p class=\"text-sm mb-2\" style=\"color:var(--color-texto-sec);\">' + escapeHtml(comentarioCorto) + '</p>';\n      html += '<div class=\"flex-between\">';\n      html += '<div style=\"display:flex;align-items:center;gap:12px;\">';\n      html += '<span class=\"text-xs text-muted\">' + escapeHtml(r.programa_nombre) + '</span>';\n      if (esJefatura) html += '<span class=\"text-xs text-muted\">' + escapeHtml(r.autor_nombre) + '</span>';\n      if (numEv > 0) html += '<span class=\"text-xs\" style=\"color:var(--color-secundario);\">' + numEv + ' evidencia' + (numEv > 1 ? 's' : '') + '</span>';\n      html += '</div>';\n      html += '<button class=\"btn btn-sm btn-outline\" onclick=\"verDetalleReporte(\\'' + r.id + '\\')\">Ver detalle</button>';\n      html += '</div></div>';\n\n      if (numEv > 0) {\n        html += '<div class=\"reporte-evidencias-strip\">';\n        r.evidencias.forEach(function(ev) { html += '<img src=\"' + ev.url + '\" onclick=\"verImagenGrande(\\'' + ev.url + '\\')\">'; });\n        html += '</div>';\n      }\n      html += '</div>';\n      return html;\n    }).join('');\n  }\n\n  // ============================================\n  // MODAL: CREAR REPORTE\n  // ============================================\n\n  function abrirModalReporte() {\n    document.getElementById('modal-reporte-titulo').textContent = 'Reportar Incidencia';\n    resetForm('form-reporte');\n    document.getElementById('rep-elemento-group').classList.add('hidden');\n    evidenciasTemp = [];\n    renderEvidenciaPreview();\n    openModal('modal-reporte');\n  }\n\n  function cerrarModalReporte() { evidenciasTemp = []; renderEvidenciaPreview(); closeModal('modal-reporte'); }\n\n  function onCategoriaChange() {\n    var cat = document.getElementById('rep-categoria').value;\n    var grupo = document.getElementById('rep-elemento-group');\n    var label = document.getElementById('rep-elemento-label');\n\n    if (cat === 'encuesta' || cat === 'actividad') {\n      grupo.classList.remove('hidden');\n      label.textContent = cat === 'encuesta' ? 'Encuesta afectada' : 'Actividad afectada';\n      cargarElementosAfectados(cat);\n    } else {\n      grupo.classList.add('hidden');\n    }\n  }\n\n  function cargarElementosAfectados(cat) {\n    var sel = document.getElementById('rep-elemento');\n    sel.innerHTML = '<option value=\"\">Selecciona... (opcional)</option>';\n    var progId = document.getElementById('rep-programa').value;\n\n    if (cat === 'encuesta') {\n      google.script.run.withSuccessHandler(function(r) {\n        if (r.success) r.data.forEach(function(e) {\n          var o = document.createElement('option'); o.value = e.id; o.textContent = e.nombre; sel.appendChild(o);\n        });\n      }).listarEncuestas(App.token, progId || null);\n    } else {\n      google.script.run.withSuccessHandler(function(r) {\n        if (r.success) r.data.forEach(function(a) {\n          var o = document.createElement('option'); o.value = a.id; o.textContent = a.nombre; sel.appendChild(o);\n        });\n      }).listarActividades(App.token);\n    }\n  }\n\n  function handleEvidenciaFiles(files) {\n    Array.prototype.forEach.call(files, function(file) {\n      if (!file.type.startsWith('image/')) { showToast('Solo im\\u00e1genes: ' + file.name, 'error'); return; }\n      if (file.size > 5 * 1024 * 1024) { showToast('M\\u00e1x 5MB: ' + file.name, 'error'); return; }\n      if (evidenciasTemp.length >= 6) { showToast('M\\u00e1ximo 6 im\\u00e1genes.', 'error'); return; }\n      var reader = new FileReader();\n      reader.onload = function(e) { evidenciasTemp.push({ file: file, dataUrl: e.target.result, name: file.name }); renderEvidenciaPreview(); };\n      reader.readAsDataURL(file);\n    });\n    document.getElementById('input-evidencia').value = '';\n  }\n\n  function renderEvidenciaPreview() {\n    var div = document.getElementById('evidencia-preview');\n    if (evidenciasTemp.length === 0) { div.innerHTML = ''; return; }\n    div.innerHTML = evidenciasTemp.map(function(ev, idx) {\n      return '<div class=\"evidencia-thumb\"><img src=\"' + ev.dataUrl + '\"><button class=\"thumb-remove\" onclick=\"quitarEvidencia(' + idx + ')\">&times;</button><div class=\"thumb-name\">' + escapeHtml(ev.name) + '</div></div>';\n    }).join('');\n  }\n\n  function quitarEvidencia(idx) { evidenciasTemp.splice(idx, 1); renderEvidenciaPreview(); }\n\n  function guardarReporte() {\n    var datos = getFormData('form-reporte');\n    var btn = document.getElementById('btn-guardar-reporte');\n    if (!datos.programa_id || !datos.categoria || !datos.titulo || !datos.comentario) {\n      showToast('Completa todos los campos obligatorios.', 'error'); return;\n    }\n    btnLoading(btn, true);\n    var payload = {\n      programa_id: datos.programa_id, tipo: datos.categoria, categoria: datos.categoria,\n      elemento_id: datos.elemento_id || '', titulo: datos.titulo, comentario: datos.comentario,\n      evidencias: evidenciasTemp.map(function(ev) { return { nombre: ev.name, tipo: ev.file.type, dataUrl: ev.dataUrl }; })\n    };\n    google.script.run.withSuccessHandler(function(r) {\n      btnLoading(btn, false);\n      if (r.success) { cerrarModalReporte(); showToast('Incidencia reportada exitosamente.', 'success'); cargarReportes(); }\n      else showToast(r.error, 'error');\n    }).withFailureHandler(function() { btnLoading(btn, false); showToast('Error al guardar.', 'error'); })\n    .crearReporteObservacion(App.token, payload);\n  }\n\n  // ============================================\n  // DETALLE + GESTIÓN JEFATURA\n  // ============================================\n\n  function verDetalleReporte(id) {\n    var r = reportesData.find(function(x) { return x.id === id; });\n    if (!r) return;\n    document.getElementById('detalle-rep-titulo').textContent = r.titulo;\n\n    var cat = r.categoria || r.tipo || 'otro';\n    var html = '';\n    html += '<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;\">';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Categor&iacute;a</span><br><span class=\"badge cat-badge-' + cat + '\">' + getCatLabel(cat) + '</span></div>';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Estado</span><br><span class=\"badge estado-badge-' + (r.estado_gestion || 'pendiente') + '\">' + getEstadoLabel(r.estado_gestion || 'pendiente') + '</span></div>';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Programa</span><br><span class=\"text-sm\">' + escapeHtml(r.programa_nombre) + '</span></div>';\n    html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Fecha</span><br><span class=\"text-sm\">' + formatDate(r.fecha) + '</span></div>';\n    if (esJefatura) html += '<div><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Reportado por</span><br><span class=\"text-sm\">' + escapeHtml(r.autor_nombre) + '</span></div>';\n    html += '</div>';\n\n    html += '<div class=\"mb-4\"><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Descripci&oacute;n</span>';\n    html += '<div style=\"background:var(--color-fondo-alt);padding:14px 16px;border-radius:8px;margin-top:6px;border-left:3px solid var(--color-secundario);\">';\n    html += '<p class=\"text-sm\" style=\"white-space:pre-wrap;\">' + escapeHtml(r.comentario) + '</p></div></div>';\n\n    var numEv = (r.evidencias && r.evidencias.length) || 0;\n    if (numEv > 0) {\n      html += '<div class=\"mb-4\"><span class=\"text-muted text-xs\" style=\"text-transform:uppercase;\">Evidencia (' + numEv + ')</span>';\n      html += '<div class=\"detalle-evidencias-grid\">';\n      r.evidencias.forEach(function(ev) { html += '<img src=\"' + ev.url + '\" onclick=\"verImagenGrande(\\'' + ev.url + '\\')\">'; });\n      html += '</div></div>';\n    }\n\n    // Historial\n    if (r.historial && r.historial.length > 0) {\n      html += '<hr style=\"margin:16px 0;border-color:var(--color-borde);\">';\n      html += '<span class=\"text-muted text-xs\" style=\"text-transform:uppercase;display:block;margin-bottom:10px;\">Hi
