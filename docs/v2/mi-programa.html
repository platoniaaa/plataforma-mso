<!-- Vista: Mi Programa (Lider / Colaborador) -->
<style>
  .mp-header {
    background: linear-gradient(135deg, var(--color-primario) 0%, #6B1D7B 100%);
    color: white;
    padding: 28px 32px;
    border-radius: 14px;
    margin-bottom: 24px;
    box-shadow: 0 4px 20px rgba(61,12,75,0.15);
  }
  .mp-header h2 { margin: 0 0 6px; font-size: 24px; font-weight: 700; }
  .mp-header p { margin: 0; opacity: 0.9; font-size: 14px; }
  .mp-meta { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 16px; font-size: 12px; opacity: 0.85; }
  .mp-meta-item span { display: block; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.4px; font-size: 10px; }
  .mp-meta-item strong { font-size: 13px; font-weight: 600; }

  .mp-section { background: white; border-radius: 12px; padding: 24px 28px; margin-bottom: 20px; border: 1px solid var(--color-borde); }
  .mp-section h3 { margin: 0 0 16px; font-size: 16px; color: var(--color-primario); font-weight: 600; }

  .mp-stepper { display: flex; flex-direction: column; gap: 0; }
  .mp-step {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    gap: 16px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--color-borde);
    position: relative;
  }
  .mp-step:last-child { border-bottom: none; }
  .mp-step-icon {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #CBD5E0; background: white;
    font-size: 14px; font-weight: 700; color: #94A3B8;
    flex-shrink: 0;
  }
  .mp-step.completada .mp-step-icon { border-color: var(--color-exito); background: var(--color-exito); color: white; }
  .mp-step.en-curso .mp-step-icon { border-color: var(--color-secundario); background: white; color: var(--color-secundario); box-shadow: 0 0 0 4px rgba(245,130,32,0.18); }
  .mp-step.pendiente .mp-step-icon { border-color: #CBD5E0; background: white; color: #94A3B8; }
  .mp-step.bloqueada .mp-step-icon { border-color: #E2E8F0; background: #F1F5F9; color: #CBD5E0; }

  .mp-step-body h4 { margin: 0 0 2px; font-size: 14px; font-weight: 600; color: var(--color-texto); }
  .mp-step-body p { margin: 0; font-size: 12px; color: var(--color-texto-sec); }
  .mp-step.bloqueada .mp-step-body h4,
  .mp-step.bloqueada .mp-step-body p { color: #CBD5E0; }

  .mp-step-action .btn { padding: 8px 14px; font-size: 12px; }
  .mp-step-badge {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 4px 10px; border-radius: 12px; font-weight: 600;
  }
  .mp-badge-completada { background: #D1FAE5; color: #065F46; }
  .mp-badge-en-curso { background: #FED7AA; color: #9A3412; }
  .mp-badge-pendiente { background: #E2E8F0; color: #475569; }
  .mp-badge-bloqueada { background: #F1F5F9; color: #94A3B8; }

  .mp-fase-divider {
    display: flex; align-items: center; gap: 12px;
    margin: 16px 0 8px;
    font-size: 11px; font-weight: 700;
    color: var(--color-secundario);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .mp-fase-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--color-borde);
  }
</style>

<div>
  <div class="mp-header">
    <h2 id="mp-programa-nombre">Cargando programa...</h2>
    <p id="mp-programa-cliente">&mdash;</p>
    <div class="mp-meta">
      <div class="mp-meta-item"><span>Inicio</span><strong id="mp-fecha-inicio">&mdash;</strong></div>
      <div class="mp-meta-item"><span>T&eacute;rmino</span><strong id="mp-fecha-termino">&mdash;</strong></div>
      <div class="mp-meta-item"><span>Tipo</span><strong id="mp-tipo">&mdash;</strong></div>
      <div class="mp-meta-item"><span>Estado</span><strong id="mp-estado">&mdash;</strong></div>
    </div>
  </div>

  <!-- Stepper detallado del programa -->
  <div class="mp-section">
    <h3>Etapas del programa</h3>
    <div id="mp-stepper" class="mp-stepper">
      <div class="text-center p-3"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Acceso a informes (lider only) -->
  <div class="mp-section hidden" id="mp-informes-section">
    <h3>Mis Informes</h3>
    <p class="text-sm text-muted mb-3">Acceso a los informes individuales generados sobre tu desempe&ntilde;o.</p>
    <div id="mp-informes-list">
      <p class="text-muted text-sm">Cargando...</p>
    </div>
  </div>
</div>

<script>
(function() {
  var userId = App.usuario ? App.usuario.id : null;
  var userRol = App.usuario ? App.usuario.rol : null;
  var esLider = userRol === 'jefatura';

  if (!userId) {
    document.getElementById('mp-programa-nombre').textContent = 'No autenticado';
    return;
  }

  // 1. Resolver el programa actual del usuario
  google.script.run
    .withSuccessHandler(function(r) {
      var progs = (r && r.data) ? r.data : [];
      if (progs.length === 0) {
        document.getElementById('mp-programa-nombre').textContent = 'No tienes programas asignados';
        document.getElementById('mp-stepper').innerHTML = '<p class="text-muted text-sm">Cuando seas asignado a un programa, aparecera aqui.</p>';
        return;
      }
      // Tomar el primero (en general el usuario solo esta en uno)
      var prog = progs[0];
      renderHeader(prog);
      cargarEtapas(prog);
      if (esLider) cargarMisInformes(prog);
    })
    .listarProgramasDashboard(App.token, userId);

  function renderHeader(p) {
    document.getElementById('mp-programa-nombre').textContent = p.nombre || 'Programa';
    document.getElementById('mp-programa-cliente').textContent = p.cliente_nombre || '';
    document.getElementById('mp-fecha-inicio').textContent = p.fecha_inicio ? formatDate(p.fecha_inicio) : 'Por definir';
    document.getElementById('mp-fecha-termino').textContent = p.fecha_termino ? formatDate(p.fecha_termino) : 'Por definir';
    document.getElementById('mp-tipo').textContent = p.tipo || '—';
    document.getElementById('mp-estado').textContent = p.estado || '—';
  }

  function cargarEtapas(prog) {
    // Necesitamos: encuestas del programa + estado de respuestas del usuario
    google.script.run
      .withSuccessHandler(function(rEnc) {
        var encs = (rEnc && rEnc.data) ? rEnc.data : [];
        google.script.run
          .withSuccessHandler(function(rPend) {
            var pendientes = (rPend && rPend.data) ? rPend.data : [];
            renderStepper(prog, encs, pendientes);
          })
          .obtenerEncuestaPendiente(App.token);
      })
      .listarEncuestas(App.token, prog.id);
  }

  function renderStepper(prog, encuestas, encuestasUsuario) {
    var container = document.getElementById('mp-stepper');

    // Mapas para resolver estado por (tipo, tipo_cuestionario)
    function findEnc(tipo, cuest) {
      return encuestas.find(function(e) { return e.tipo === tipo && e.tipo_cuestionario === cuest; });
    }
    function findUserStatus(encId) {
      var u = encuestasUsuario.find(function(e) { return e.id === encId; });
      return u ? u.estado : null; // 'pendiente' | 'completada' | null
    }
    function statusFromEnc(enc) {
      if (!enc) return { state: 'bloqueada', label: 'No creada', badge: 'mp-badge-bloqueada' };
      if (enc.estado === 'borrador') return { state: 'bloqueada', label: 'En preparaci\u00f3n', badge: 'mp-badge-bloqueada' };
      if (enc.estado === 'cerrada') return { state: 'completada', label: 'Cerrada', badge: 'mp-badge-completada' };
      // activa: depende de si el usuario respondio
      var us = findUserStatus(enc.id);
      if (us === 'completada') return { state: 'completada', label: 'Respondida', badge: 'mp-badge-completada' };
      if (us === 'pendiente') return { state: 'en-curso', label: 'Pendiente', badge: 'mp-badge-en-curso' };
      // No es para este usuario (por su rol)
      return { state: 'pendiente', label: 'Activa', badge: 'mp-badge-pendiente' };
    }

    var autoIni = findEnc('pre', 'autoevaluacion');
    var coIni = findEnc('pre', 'coevaluacion');
    var autoFin = findEnc('post', 'autoevaluacion');
    var coFin = findEnc('post', 'coevaluacion');

    var sAutoIni = statusFromEnc(autoIni);
    var sCoIni = statusFromEnc(coIni);
    var sAutoFin = statusFromEnc(autoFin);
    var sCoFin = statusFromEnc(coFin);

    // Informes: estados derivados
    // Inicial individual = disponible si autoIni cerrada o el lider respondio
    function infoStatus(autoEnc, coEnc) {
      var ambasCerradas = (autoEnc && autoEnc.estado === 'cerrada') && (coEnc && coEnc.estado === 'cerrada');
      if (ambasCerradas) return { state: 'completada', label: 'Disponible', badge: 'mp-badge-completada' };
      if ((autoEnc && autoEnc.estado === 'activa') || (coEnc && coEnc.estado === 'activa')) {
        return { state: 'pendiente', label: 'En curso', badge: 'mp-badge-pendiente' };
      }
      return { state: 'bloqueada', label: 'Pendiente', badge: 'mp-badge-bloqueada' };
    }
    var sInfoIndIni = infoStatus(autoIni, coIni);
    var sInfoConIni = infoStatus(autoIni, coIni);
    var sInfoIndFin = infoStatus(autoFin, coFin);
    var sInfoConFin = infoStatus(autoFin, coFin);
    var sInfoBrechas = (sInfoConIni.state === 'completada' && sInfoConFin.state === 'completada')
      ? { state: 'completada', label: 'Disponible', badge: 'mp-badge-completada' }
      : { state: 'bloqueada', label: 'Requiere ambas mediciones', badge: 'mp-badge-bloqueada' };

    var html = '';
    var idx = 1;

    // FASE INICIAL
    html += '<div class="mp-fase-divider">Medici\u00f3n Inicial</div>';
    html += stepHTML(idx++, 'Autoevaluaci\u00f3n Inicial', 'Tu autoevaluaci\u00f3n al inicio del programa', sAutoIni, autoIni, encuestasUsuario);
    html += stepHTML(idx++, 'Coevaluaci\u00f3n Inicial', 'Coevaluaci\u00f3n del equipo a sus l\u00edderes', sCoIni, coIni, encuestasUsuario);
    html += stepHTML(idx++, 'Informe Individual Inicial', 'Tu diagn\u00f3stico personal de l\u00ednea base', sInfoIndIni, null);
    html += stepHTML(idx++, 'Informe Consolidado Inicial', 'Resumen grupal de la l\u00ednea base', sInfoConIni, null);

    // FASE FINAL
    html += '<div class="mp-fase-divider">Medici\u00f3n Final</div>';
    html += stepHTML(idx++, 'Autoevaluaci\u00f3n Final', 'Tu autoevaluaci\u00f3n al cierre del programa', sAutoFin, autoFin, encuestasUsuario);
    html += stepHTML(idx++, 'Coevaluaci\u00f3n Final', 'Coevaluaci\u00f3n del equipo al cierre', sCoFin, coFin, encuestasUsuario);
    html += stepHTML(idx++, 'Informe Individual Final', 'Tu informe personal con evoluci\u00f3n y cierre de brecha', sInfoIndFin, null);
    html += stepHTML(idx++, 'Informe Consolidado Final', 'Resumen grupal del cierre del programa', sInfoConFin, null);

    // FASE COMPARATIVO
    html += '<div class="mp-fase-divider">Comparativo</div>';
    html += stepHTML(idx++, 'Informe de Brechas', 'An\u00e1lisis comparativo Inicial vs Final', sInfoBrechas, null);

    container.innerHTML = html;
  }

  function stepHTML(num, titulo, descripcion, status, encuesta, encuestasUsuario) {
    var actionHTML = '';
    // Si es una encuesta activa/pendiente del usuario, boton Responder
    if (encuesta && encuestasUsuario) {
      var u = encuestasUsuario.find(function(e) { return e.id === encuesta.id; });
      if (u && u.estado === 'pendiente') {
        actionHTML = '<button class="btn btn-primary btn-sm" onclick="cargarVista(\'mis-encuestas\')">Responder</button>';
      }
    }
    if (!actionHTML) {
      actionHTML = '<span class="mp-step-badge ' + status.badge + '">' + status.label + '</span>';
    }
    return '<div class="mp-step ' + status.state + '">' +
      '<div class="mp-step-icon">' + (status.state === 'completada' ? '\u2713' : num) + '</div>' +
      '<div class="mp-step-body"><h4>' + titulo + '</h4><p>' + descripcion + '</p></div>' +
      '<div class="mp-step-action">' + actionHTML + '</div>' +
    '</div>';
  }

  function cargarMisInformes(prog) {
    var section = document.getElementById('mp-informes-section');
    section.classList.remove('hidden');
    var listEl = document.getElementById('mp-informes-list');
    google.script.run
      .withSuccessHandler(function(r) {
        var todos = (r && r.data) ? r.data : [];
        // Filtrar solo los individuales del propio lider
        var mios = todos.filter(function(i) {
          return i.tipo === 'individual' && i.participante_id === userId;
        });
        if (mios.length === 0) {
          listEl.innerHTML = '<p class="text-muted text-sm">A&uacute;n no se ha generado ning&uacute;n informe individual sobre ti. Cuando tu informe est&eacute; disponible aparecer&aacute; aqu&iacute;.</p>';
          return;
        }
        listEl.innerHTML = mios.map(function(i) {
          return '<div style="padding:12px;border:1px solid var(--color-borde);border-radius:8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;">' +
            '<div>' +
              '<strong style="font-size:13px;">' + escapeHtml(i.nombre) + '</strong>' +
              '<div class="text-xs text-muted">Generado el ' + formatDate(i.fecha) + '</div>' +
            '</div>' +
            '<span class="text-xs text-muted">' + escapeHtml(i.generado_por || '') + '</span>' +
          '</div>';
        }).join('');
      })
      .listarInformesGenerados(App.token, prog.id);
  }
})();
</script>
