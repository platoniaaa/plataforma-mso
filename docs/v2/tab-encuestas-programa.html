<!-- Tab: Encuestas del Programa -->
<style>
  .encuestas-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .encuestas-header .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .encuestas-header h3 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    color: var(--color-primario);
  }
  .encuestas-header .count-badge {
    background: var(--color-secundario);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 12px;
  }

  /* Survey Grid 2x2 */
  .encuestas-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (min-width: 769px) and (max-width: 1024px) {
    .encuestas-grid {
      grid-template-columns: 1fr;
    }
  }

  .encuesta-slot {
    background: var(--color-fondo, #fff);
    border: 1px solid var(--color-borde);
    border-radius: 8px;
    overflow: hidden;
    transition: box-shadow 0.2s ease;
  }
  .encuesta-slot:hover {
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .encuesta-slot-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--color-fondo-alt);
    border-bottom: 1px solid var(--color-borde);
  }
  .encuesta-slot-header .slot-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--color-texto);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .encuesta-slot-header .slot-badges {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .encuesta-slot-body {
    padding: 16px;
  }

  .encuesta-slot-body .enc-nombre {
    font-size: 15px;
    font-weight: 600;
    color: var(--color-texto);
    margin-bottom: 8px;
  }

  .encuesta-slot-body .enc-meta {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--color-texto-sec);
  }
  .encuesta-slot-body .enc-meta .meta-item {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .encuesta-slot-body .enc-progress {
    margin-bottom: 12px;
  }
  .encuesta-slot-body .enc-progress .progress-bar-bg {
    background: var(--color-borde);
    border-radius: 4px;
    height: 6px;
    overflow: hidden;
    margin-top: 4px;
  }
  .encuesta-slot-body .enc-progress .progress-bar-fill {
    background: var(--color-exito, #27ae60);
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s ease;
  }
  .encuesta-slot-body .enc-progress .progress-label {
    font-size: 12px;
    color: var(--color-texto-sec);
  }

  .encuesta-slot-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  /* Placeholder (no creada) */
  .encuesta-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
    text-align: center;
  }
  .encuesta-placeholder .placeholder-icon {
    font-size: 32px;
    color: var(--color-borde);
    margin-bottom: 8px;
  }
  .encuesta-placeholder .placeholder-text {
    font-size: 13px;
    color: var(--color-texto-sec);
    margin-bottom: 12px;
  }

  /* Preguntas en modal */
  .pregunta-card {
    background: var(--color-fondo-alt);
    border: 1px solid var(--color-borde);
    border-radius: 6px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .pregunta-card .pregunta-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .pregunta-card .pregunta-header .pregunta-competencia {
    font-size: 12px;
    font-weight: 600;
    color: var(--color-primario);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .pregunta-card .pregunta-header .pregunta-foco {
    font-size: 11px;
    color: var(--color-texto-sec);
    background: #EDE7F6;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .pregunta-card .opciones-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .pregunta-card .opciones-grid .opcion-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .pregunta-card .opciones-grid .opcion-item label {
    font-size: 11px;
    font-weight: 600;
    color: var(--color-texto-sec);
    text-transform: uppercase;
  }
  .pregunta-card .opciones-grid .opcion-item textarea {
    font-size: 12px;
    min-height: 48px;
    resize: vertical;
  }

  /* Respuestas table */
  .respuestas-table-container {
    max-height: 420px;
    overflow-y: auto;
    border: 1px solid var(--color-borde);
    border-radius: 6px;
  }
  .respuestas-table-container table {
    width: 100%;
    font-size: 13px;
    border-collapse: collapse;
  }
  .respuestas-table-container th {
    position: sticky;
    top: 0;
    background: var(--color-primario);
    color: #fff;
    padding: 8px 10px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
  }
  .respuestas-table-container td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--color-borde);
    vertical-align: middle;
  }
  .respuestas-table-container tr:nth-child(even) {
    background: var(--color-fondo-alt);
  }
  .respuestas-table-container .nivel-cell {
    font-weight: 600;
    text-align: center;
    min-width: 40px;
  }
  .respuestas-table-container .sin-respuesta {
    color: var(--color-texto-sec);
    font-style: italic;
  }

  /* Radio group styling in modal */
  .radio-group {
    display: flex;
    gap: 16px;
    margin-bottom: 4px;
  }
  .radio-group label {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--color-texto);
  }

  @media (max-width: 600px) {
    .encuestas-grid {
      grid-template-columns: 1fr;
    }
    .encuestas-header {
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
    }
    .pregunta-card .opciones-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<script>
  var encuestasProgData = [];
  var preguntasEditData = [];
  var preguntasEncuestaIdActual = null;

  // Slots definition for the 4 possible surveys
  var encuestaSlots = [
    { tipo_cuestionario: 'autoevaluacion', tipo: 'pre',  label: 'Autoevaluaci\u00f3n PRE' },
    { tipo_cuestionario: 'coevaluacion',   tipo: 'pre',  label: 'Coevaluaci\u00f3n PRE' },
    { tipo_cuestionario: 'autoevaluacion', tipo: 'post', label: 'Autoevaluaci\u00f3n POST' },
    { tipo_cuestionario: 'coevaluacion',   tipo: 'post', label: 'Coevaluaci\u00f3n POST' }
  ];

  // Auto-load on tab include
  (function() {
    cargarEncuestasPrograma();
  })();

  /**
   * Loads surveys for the current program and maps them to the 4 slots
   */
  function cargarEncuestasPrograma() {
    var grid = document.getElementById('encuestas-prog-grid');
    grid.innerHTML = '<div class="encuesta-slot"><div class="encuesta-placeholder">' +
      '<div class="spinner"></div><div class="placeholder-text">Cargando encuestas...</div>' +
      '</div></div>';

    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          encuestasProgData = r.data || [];
          document.getElementById('encuestas-prog-count').textContent = encuestasProgData.length;
          renderEncuestasGrid(encuestasProgData);
        } else {
          grid.innerHTML = '<div class="encuesta-slot"><div class="encuesta-placeholder">' +
            '<div class="placeholder-text">Error al cargar: ' + escapeHtml(r ? r.error : 'Error desconocido') + '</div>' +
            '</div></div>';
        }
      })
      .withFailureHandler(function(err) {
        grid.innerHTML = '<div class="encuesta-slot"><div class="encuesta-placeholder">' +
          '<div class="placeholder-text">Error de conexi\u00f3n al cargar encuestas.</div>' +
          '</div></div>';
      })
      .listarEncuestas(App.token, panelProgramaId);
  }

  /**
   * Renders the 2x2 grid mapping surveys to their corresponding slots
   */
  function renderEncuestasGrid(encuestas) {
    var grid = document.getElementById('encuestas-prog-grid');
    var html = '';

    encuestaSlots.forEach(function(slot) {
      var enc = null;
      for (var i = 0; i < encuestas.length; i++) {
        var tipoCuest = (encuestas[i].tipo_cuestionario || '').toLowerCase();
        var tipoMom = (encuestas[i].tipo || '').toLowerCase();
        if (tipoCuest === slot.tipo_cuestionario && tipoMom === slot.tipo) {
          enc = encuestas[i];
          break;
        }
      }

      html += renderEncuestaSlot(slot, enc);
    });

    grid.innerHTML = html;
  }

  /**
   * Renders a single slot card (either with survey data or as a placeholder)
   */
  function renderEncuestaSlot(slot, enc) {
    var tipoBadgeClass = slot.tipo === 'pre' ? 'badge-info' : 'badge-warning';
    var cuestionarioBadgeClass = slot.tipo_cuestionario === 'autoevaluacion' ? 'badge-primary' : 'badge-secondary';
    var cuestionarioLabel = slot.tipo_cuestionario === 'autoevaluacion' ? 'Autoevaluaci\u00f3n' : 'Coevaluaci\u00f3n';

    var headerHtml = '<div class="encuesta-slot-header">' +
      '<span class="slot-title">' + escapeHtml(slot.label) + '</span>' +
      '<div class="slot-badges">' +
        '<span class="badge ' + cuestionarioBadgeClass + '" style="font-size:11px;">' + cuestionarioLabel + '</span>' +
        '<span class="badge ' + tipoBadgeClass + '" style="font-size:11px;">' + slot.tipo.toUpperCase() + '</span>' +
      '</div>' +
    '</div>';

    if (!enc) {
      // Placeholder: not created yet
      return '<div class="encuesta-slot">' +
        headerHtml +
        '<div class="encuesta-placeholder">' +
          '<div class="placeholder-icon">&#9634;</div>' +
          '<div class="placeholder-text">No creada</div>' +
          '<button class="btn btn-sm btn-primary" onclick="abrirModalCrearEncuestaProg(\'' +
            slot.tipo_cuestionario + '\', \'' + slot.tipo + '\')">Crear</button>' +
        '</div>' +
      '</div>';
    }

    // Encuesta exists - render card
    var estadoHtml = getBadge(enc.estado || 'borrador');
    var totalResp = enc.total_respuestas || 0;
    var totalEsperadas = enc.total_esperadas || 0;
    var pctResp = totalEsperadas > 0 ? Math.round((totalResp / totalEsperadas) * 100) : 0;
    var numPreguntas = enc.num_preguntas || 0;
    var fechaCierre = enc.fecha_cierre ? formatDate(enc.fecha_cierre) : 'Sin fecha';

    // Actions
    var accionesHtml = '<button class="btn btn-sm btn-outline" onclick="verRespuestasEncuesta(\'' + enc.id + '\')">Ver respuestas</button>';
    accionesHtml += '<button class="btn btn-sm btn-outline" onclick="abrirEditorEncuesta(\'' + enc.id + '\')">Editar</button>';
    accionesHtml += '<button class="btn btn-sm btn-outline" style="color:#c0392b;" onclick="eliminarEncuestaPrograma(\'' + enc.id + '\')" title="Eliminar">&times;</button>';

    var estado = (enc.estado || 'borrador').toLowerCase();
    if (estado === 'borrador') {
      accionesHtml += '<button class="btn btn-sm btn-success" onclick="activarEncuestaPrograma(\'' + enc.id + '\')">Activar</button>';
    } else if (estado === 'activa') {
      accionesHtml += '<button class="btn btn-sm btn-warning" onclick="cerrarEncuestaPrograma(\'' + enc.id + '\')">Cerrar</button>';
    }

    return '<div class="encuesta-slot">' +
      headerHtml +
      '<div class="encuesta-slot-body">' +
        '<div class="enc-nombre">' + escapeHtml(enc.nombre || slot.label) + '</div>' +
        '<div class="enc-meta">' +
          '<div class="meta-item">' + estadoHtml + '</div>' +
          '<div class="meta-item"><span style="color:var(--color-texto-sec);">Preguntas: ' + numPreguntas + '</span></div>' +
          '<div class="meta-item"><span style="color:var(--color-texto-sec);">L\u00edmite: ' + escapeHtml(fechaCierre) + '</span></div>' +
        '</div>' +
        '<div class="enc-progress">' +
          '<div class="progress-label">' + totalResp + '/' + totalEsperadas + ' completadas (' + pctResp + '%)</div>' +
          '<div class="progress-bar-bg">' +
            '<div class="progress-bar-fill" style="width:' + pctResp + '%;"></div>' +
          '</div>' +
        '</div>' +
        '<div class="encuesta-slot-actions">' + accionesHtml + '</div>' +
      '</div>' +
    '</div>';
  }

  /**
   * Opens the create survey modal, optionally pre-selecting type and momento
   */
  function abrirModalCrearEncuestaProg(tipoCuestionario, tipo) {
    // Si viene desde un slot (tipo y momento ya definidos), crear directo sin modal
    if (tipoCuestionario && tipo) {
      crearEncuestaDirecta(tipoCuestionario, tipo);
      return;
    }

    // Si viene del boton general "+ Crear Encuesta", mostrar modal
    resetForm('form-crear-encuesta-prog');
    openModal('modal-crear-encuesta-prog');
  }

  function crearEncuestaDirecta(tipoCuestionario, tipo) {
    // Verificar que no exista ya
    for (var i = 0; i < encuestasProgData.length; i++) {
      var tc = (encuestasProgData[i].tipo_cuestionario || '').toLowerCase();
      var tm = (encuestasProgData[i].tipo || '').toLowerCase();
      if (tc === tipoCuestionario && tm === tipo) {
        showToast('Ya existe una encuesta de ese tipo.', 'error');
        return;
      }
    }

    var cuestionarioLabel = tipoCuestionario === 'autoevaluacion' ? 'Autoevaluaci\u00f3n' : 'Coevaluaci\u00f3n';
    var nombre = cuestionarioLabel + ' ' + tipo.toUpperCase() + ' - Programa';

    var datos = {
      programa_id: panelProgramaId,
      nombre: nombre,
      tipo_cuestionario: tipoCuestionario,
      tipo: tipo,
      instrucciones: '',
      fecha_cierre: ''
    };

    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          var eid = r.data ? (r.data.id || r.data.encuestaId) : null;
          showToast('Encuesta creada.', 'success');
          if (eid) {
            abrirEditorEncuesta(eid);
          } else {
            cargarEncuestasPrograma();
          }
        } else {
          showToast(r ? r.error : 'Error al crear encuesta.', 'error');
        }
      })
      .withFailureHandler(function() { showToast('Error al crear encuesta.', 'error'); })
      .crearEncuesta(App.token, datos);
  }

  /**
   * Creates a survey and auto-generates questions from program competencias
   */
  function crearEncuestaPrograma() {
    var tipoCuestionario = document.querySelector('input[name="tipo_cuestionario"]:checked').value;
    var tipo = document.querySelector('input[name="tipo"]:checked').value;
    var instrucciones = document.querySelector('#form-crear-encuesta-prog textarea[name="instrucciones"]').value.trim();
    var fechaCierre = document.querySelector('#form-crear-encuesta-prog input[name="fecha_cierre"]').value;

    // Check if this slot is already taken
    var yaExiste = false;
    for (var i = 0; i < encuestasProgData.length; i++) {
      var tc = (encuestasProgData[i].tipo_cuestionario || '').toLowerCase();
      var tm = (encuestasProgData[i].tipo || '').toLowerCase();
      if (tc === tipoCuestionario && tm === tipo) {
        yaExiste = true;
        break;
      }
    }

    if (yaExiste) {
      showToast('Ya existe una encuesta de tipo ' + tipoCuestionario + ' ' + tipo.toUpperCase() + ' en este programa.', 'error');
      return;
    }

    var cuestionarioLabel = tipoCuestionario === 'autoevaluacion' ? 'Autoevaluaci\u00f3n' : 'Coevaluaci\u00f3n';
    var nombre = cuestionarioLabel + ' ' + tipo.toUpperCase() + ' - Programa';

    var datos = {
      programa_id: panelProgramaId,
      nombre: nombre,
      tipo_cuestionario: tipoCuestionario,
      tipo: tipo,
      instrucciones: instrucciones,
      fecha_cierre: fechaCierre
    };

    var btn = document.getElementById('btn-guardar-encuesta-prog');
    btnLoading(btn, true);

    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          var encuestaId = r.data ? (r.data.id || r.data.encuestaId) : null;
          // Auto-generate questions from competencias
          btnLoading(btn, false);
          closeModal('modal-crear-encuesta-prog');
          showToast('Encuesta creada.', 'success');
          var eid = encuestaId || (r.data ? r.data.id : null);
          if (eid) {
            abrirEditorEncuesta(eid);
          } else {
            cargarEncuestasPrograma();
          }
        } else {
          btnLoading(btn, false);
          showToast(r ? r.error : 'Error al crear encuesta.', 'error');
        }
      })
      .withFailureHandler(function(err) {
        btnLoading(btn, false);
        showToast('Error de conexi\u00f3n al crear encuesta.', 'error');
      })
      .crearEncuesta(App.token, datos);
  }

  /**
   * Auto-generates survey questions from the program's competencias
   */
  function generarPreguntasDesdeCompetencias(encuestaId, callback) {
    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          if (typeof callback === 'function') callback();
        } else {
          showToast('Encuesta creada, pero hubo un error al generar preguntas: ' + (r ? r.error : ''), 'warning');
          if (typeof callback === 'function') callback();
        }
      })
      .withFailureHandler(function(err) {
        showToast('Encuesta creada, pero fall\u00f3 la generaci\u00f3n de preguntas.', 'warning');
        if (typeof callback === 'function') callback();
      })
      .generarPreguntasDesdeCompetencias(App.token, encuestaId, panelProgramaId);
  }

  /**
   * Activates a draft survey
   */
  function activarEncuestaPrograma(id) {
    if (!confirmar('\u00bfActivar esta encuesta? Se notificar\u00e1 a los participantes.')) return;

    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          showToast('Encuesta activada.', 'success');
          cargarEncuestasPrograma();
        } else {
          showToast(r ? r.error : 'Error al activar.', 'error');
        }
      })
      .withFailureHandler(function() {
        showToast('Error de conexi\u00f3n al activar encuesta.', 'error');
      })
      .activarEncuesta(App.token, id);
  }

  /**
   * Closes an active survey
   */
  function cerrarEncuestaPrograma(id) {
    if (!confirmar('\u00bfCerrar esta encuesta? No aceptar\u00e1 m\u00e1s respuestas.')) return;

    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          showToast('Encuesta cerrada.', 'success');
          cargarEncuestasPrograma();
        } else {
          showToast(r ? r.error : 'Error al cerrar.', 'error');
        }
      })
      .withFailureHandler(function() {
        showToast('Error de conexi\u00f3n al cerrar encuesta.', 'error');
      })
      .cerrarEncuesta(App.token, id);
  }

  function eliminarEncuestaPrograma(id) {
    if (!confirm('Eliminar esta encuesta? Se perderan las preguntas y respuestas asociadas.')) return;

    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          showToast('Encuesta eliminada.', 'success');
          cargarEncuestasPrograma();
        } else {
          showToast(r ? r.error : 'Error.', 'error');
        }
      })
      .withFailureHandler(function() { showToast('Error de conexion.', 'error'); })
      .eliminarEncuesta(App.token, id);
  }

  /**
   * Abre el editor tipo Forms para una encuesta
   */
  function abrirEditorEncuesta(encuestaId) {
    // Setear variable global para que el editor la lea
    window.editorEncuestaIdPendiente = encuestaId;

    // Cargar el editor como tab
    var contentArea = document.getElementById('panel-tab-content');
    contentArea.innerHTML = '<div class="text-center" style="padding:48px;"><div class="spinner spinner-lg"></div><p class="text-muted mt-3">Cargando editor...</p></div>';

    google.script.run
      .withSuccessHandler(function(html) {
        contentArea.innerHTML = html || '';
        var scripts = contentArea.querySelectorAll('script');
        scripts.forEach(function(oldScript) {
          var newScript = document.createElement('script');
          newScript.textContent = oldScript.textContent;
          oldScript.parentNode.replaceChild(newScript, oldScript);
        });
      })
      .withFailureHandler(function() {
        contentArea.innerHTML = '<div class="text-center text-danger p-4">Error al cargar el editor.</div>';
      })
      .getVistaHTML('tab-encuesta-editor');
  }

  /**
   * Opens the questions modal for a survey, loading all questions with editable options
   */
  function verPreguntasEncuesta(encuestaId) {
    preguntasEncuestaIdActual = encuestaId;
    var enc = encuestasProgData.find(function(e) { return e.id === encuestaId; });
    document.getElementById('modal-preguntas-titulo').textContent = 'Preguntas: ' + (enc ? escapeHtml(enc.nombre) : 'Encuesta');

    var container = document.getElementById('preguntas-encuesta-container');
    container.innerHTML = '<div class="text-center p-4"><div class="spinner"></div></div>';
    openModal('modal-preguntas-encuesta');

    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          var datos = r.data || {};
          var preguntas = datos.preguntas || [];
          preguntasEditData = preguntas;
          renderPreguntasEditable(preguntas);
        } else {
          container.innerHTML = '<div class="text-center text-danger p-4">Error al cargar preguntas: ' +
            escapeHtml(r ? r.error : 'Error desconocido') + '</div>';
        }
      })
      .withFailureHandler(function(err) {
        container.innerHTML = '<div class="text-center text-danger p-4">Error de conexi\u00f3n al cargar preguntas.</div>';
      })
      .obtenerEncuestaCompleta(App.token, encuestaId);
  }

  /**
   * Renders all questions with editable option textareas
   */
  function renderPreguntasEditable(preguntas) {
    var container = document.getElementById('preguntas-encuesta-container');

    if (!preguntas || !preguntas.length) {
      container.innerHTML = '<div class="text-center text-muted p-4">No hay preguntas. Las preguntas se generan autom\u00e1ticamente al crear la encuesta desde las competencias del programa.</div>';
      return;
    }

    var html = preguntas.map(function(p, idx) {
      var competenciaNombre = escapeHtml(p.competencia_nombre || p.conducta_nombre || 'Sin competencia');
      var foco = escapeHtml(p.foco || '');

      return '<div class="pregunta-card" data-pregunta-id="' + (p.id || idx) + '">' +
        '<div class="pregunta-header">' +
          '<div>' +
            '<span class="pregunta-competencia">' + competenciaNombre + '</span>' +
            (foco ? ' <span class="pregunta-foco">' + foco + '</span>' : '') +
          '</div>' +
          '<span class="text-xs text-muted">#' + (idx + 1) + '</span>' +
        '</div>' +
        '<div class="opciones-grid">' +
          '<div class="opcion-item">' +
            '<label>Nivel 1</label>' +
            '<textarea class="form-control opcion-text" data-idx="' + idx + '" data-nivel="1">' +
              escapeHtml(p.nivel_1_texto || p.opcion_1 || '') + '</textarea>' +
          '</div>' +
          '<div class="opcion-item">' +
            '<label>Nivel 2</label>' +
            '<textarea class="form-control opcion-text" data-idx="' + idx + '" data-nivel="2">' +
              escapeHtml(p.nivel_2_texto || p.opcion_2 || '') + '</textarea>' +
          '</div>' +
          '<div class="opcion-item">' +
            '<label>Nivel 3</label>' +
            '<textarea class="form-control opcion-text" data-idx="' + idx + '" data-nivel="3">' +
              escapeHtml(p.nivel_3_texto || p.opcion_3 || '') + '</textarea>' +
          '</div>' +
          '<div class="opcion-item">' +
            '<label>Nivel 4</label>' +
            '<textarea class="form-control opcion-text" data-idx="' + idx + '" data-nivel="4">' +
              escapeHtml(p.nivel_4_texto || p.opcion_4 || '') + '</textarea>' +
          '</div>' +
        '</div>' +
      '</div>';
    }).join('');

    container.innerHTML = html;
  }

  /**
   * Saves edited questions back to the server
   */
  function guardarPreguntasEncuesta() {
    if (!preguntasEncuestaIdActual || !preguntasEditData.length) {
      showToast('No hay preguntas para guardar.', 'warning');
      return;
    }

    // Collect edited values from textareas
    var textareas = document.querySelectorAll('.opcion-text');
    var actualizaciones = {};

    for (var i = 0; i < textareas.length; i++) {
      var ta = textareas[i];
      var idx = parseInt(ta.getAttribute('data-idx'));
      var nivel = ta.getAttribute('data-nivel');

      if (!actualizaciones[idx]) {
        actualizaciones[idx] = {
          id: preguntasEditData[idx].id
        };
      }
      actualizaciones[idx]['nivel_' + nivel + '_texto'] = ta.value.trim();
    }

    var preguntasActualizadas = [];
    for (var key in actualizaciones) {
      if (actualizaciones.hasOwnProperty(key)) {
        preguntasActualizadas.push(actualizaciones[key]);
      }
    }

    var btn = document.getElementById('btn-guardar-preguntas');
    btnLoading(btn, true);

    google.script.run
      .withSuccessHandler(function(r) {
        btnLoading(btn, false);
        if (r && r.success) {
          showToast('Preguntas actualizadas correctamente.', 'success');
          closeModal('modal-preguntas-encuesta');
          cargarEncuestasPrograma();
        } else {
          showToast(r ? r.error : 'Error al guardar preguntas.', 'error');
        }
      })
      .withFailureHandler(function(err) {
        btnLoading(btn, false);
        showToast('Error de conexi\u00f3n al guardar preguntas.', 'error');
      })
      .actualizarPreguntasEncuesta(App.token, preguntasEncuestaIdActual, preguntasActualizadas);
  }

  /**
   * Opens the responses modal showing who responded and their levels per competencia
   */
  function verRespuestasEncuesta(encuestaId) {
    var enc = encuestasProgData.find(function(e) { return e.id === encuestaId; });
    document.getElementById('modal-respuestas-titulo').textContent = 'Respuestas: ' + (enc ? escapeHtml(enc.nombre) : 'Encuesta');

    var resumenDiv = document.getElementById('respuestas-resumen');
    resumenDiv.innerHTML = '';

    var container = document.getElementById('respuestas-encuesta-container');
    container.innerHTML = '<div class="text-center p-4"><div class="spinner"></div></div>';
    openModal('modal-respuestas-encuesta');

    google.script.run
      .withSuccessHandler(function(r) {
        if (r && r.success) {
          var datos = r.data || {};
          renderRespuestasEncuesta(datos);
        } else {
          container.innerHTML = '<div class="text-center text-danger p-4">Error al cargar respuestas: ' +
            escapeHtml(r ? r.error : 'Error desconocido') + '</div>';
        }
      })
      .withFailureHandler(function(err) {
        container.innerHTML = '<div class="text-center text-danger p-4">Error de conexi\u00f3n al cargar respuestas.</div>';
      })
      .obtenerResultadosEncuesta(App.token, encuestaId);
  }

  /**
   * Renders the responses table: respondents as rows, competencias as columns
   */
  function renderRespuestasEncuesta(datos) {
    var resumenDiv = document.getElementById('respuestas-resumen');
    var container = document.getElementById('respuestas-encuesta-container');

    var participantes = datos.participantes || [];
    var competencias = datos.competencias || [];
    var respuestas = datos.respuestas || [];
    var totalRespondidos = 0;

    // Build lookup: participante_id -> { competencia_id -> nivel }
    var respuestaMap = {};
    for (var r = 0; r < respuestas.length; r++) {
      var resp = respuestas[r];
      if (!respuestaMap[resp.participante_id]) {
        respuestaMap[resp.participante_id] = {};
      }
      respuestaMap[resp.participante_id][resp.competencia_id] = resp.nivel;
    }

    // Count respondents
    for (var p = 0; p < participantes.length; p++) {
      if (respuestaMap[participantes[p].id]) {
        totalRespondidos++;
      }
    }

    // Summary
    resumenDiv.innerHTML = '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:8px;">' +
      '<div style="background:var(--color-fondo-alt);border:1px solid var(--color-borde);border-radius:6px;padding:10px 16px;">' +
        '<span class="text-xs text-muted" style="text-transform:uppercase;">Total participantes</span>' +
        '<div style="font-size:20px;font-weight:700;color:var(--color-primario);">' + participantes.length + '</div>' +
      '</div>' +
      '<div style="background:var(--color-fondo-alt);border:1px solid var(--color-borde);border-radius:6px;padding:10px 16px;">' +
        '<span class="text-xs text-muted" style="text-transform:uppercase;">Respondieron</span>' +
        '<div style="font-size:20px;font-weight:700;color:var(--color-exito, #27ae60);">' + totalRespondidos + '</div>' +
      '</div>' +
      '<div style="background:var(--color-fondo-alt);border:1px solid var(--color-borde);border-radius:6px;padding:10px 16px;">' +
        '<span class="text-xs text-muted" style="text-transform:uppercase;">Pendientes</span>' +
        '<div style="font-size:20px;font-weight:700;color:var(--color-alerta, #e67e22);">' + (participantes.length - totalRespondidos) + '</div>' +
      '</div>' +
    '</div>';

    if (!participantes.length) {
      container.innerHTML = '<div class="text-center text-muted p-4">No hay participantes asociados a esta encuesta.</div>';
      return;
    }

    // Build table
    var theadHtml = '<tr><th>Participante</th><th>Estado</th>';
    for (var c = 0; c < competencias.length; c++) {
      theadHtml += '<th title="' + escapeHtml(competencias[c].nombre) + '">' +
        escapeHtml(truncarTexto(competencias[c].nombre, 20)) + '</th>';
    }
    theadHtml += '</tr>';

    var tbodyHtml = '';
    for (var pi = 0; pi < participantes.length; pi++) {
      var part = participantes[pi];
      var tieneRespuesta = !!respuestaMap[part.id];
      var estadoCell = tieneRespuesta
        ? '<span class="badge badge-success">Completada</span>'
        : '<span class="badge badge-warning">Pendiente</span>';

      tbodyHtml += '<tr>';
      tbodyHtml += '<td><strong>' + escapeHtml(part.nombre || part.nombre_completo || '') + '</strong>' +
        '<div class="text-xs text-muted">' + escapeHtml(part.email || '') + '</div></td>';
      tbodyHtml += '<td>' + estadoCell + '</td>';

      for (var ci = 0; ci < competencias.length; ci++) {
        var nivelVal = tieneRespuesta && respuestaMap[part.id][competencias[ci].id]
          ? respuestaMap[part.id][competencias[ci].id]
          : null;

        if (nivelVal !== null) {
          var nivelColor = nivelVal <= 1 ? '#e74c3c' : (nivelVal <= 2 ? '#e67e22' : (nivelVal <= 3 ? '#3498db' : '#27ae60'));
          tbodyHtml += '<td class="nivel-cell" style="color:' + nivelColor + ';">' + nivelVal + '</td>';
        } else {
          tbodyHtml += '<td class="nivel-cell sin-respuesta">-</td>';
        }
      }

      tbodyHtml += '</tr>';
    }

    container.innerHTML = '<div class="respuestas-table-container">' +
      '<table>' +
        '<thead>' + theadHtml + '</thead>' +
        '<tbody>' + tbodyHtml + '</tbody>' +
      '</table>' +
    '</div>';
  }

  /**
   * Truncates text to a maximum length
   */
  function truncarTexto(texto, max) {
    if (!texto) return '';
    return texto.length > max ? texto.substring(0, max) + '...' : texto;
  }
</script>
