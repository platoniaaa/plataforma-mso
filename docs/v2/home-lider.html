<!-- Vista: Home del Lider -->
<style>
  .hl-saludo {
    font-size: 28px;
    font-weight: 700;
    color: var(--color-primario);
    margin: 0 0 4px;
  }
  .hl-programa {
    font-size: 15px;
    color: var(--color-texto-sec);
    margin: 0 0 24px;
  }
  .hl-programa strong {
    color: var(--color-primario);
  }

  /* Stepper */
  .hl-stepper {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 20px 16px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--color-borde);
    margin-bottom: 24px;
  }
  .hl-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    min-width: 100px;
  }
  .hl-step-dot {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 700;
    transition: all 0.3s;
  }
  .hl-step.completada .hl-step-dot {
    background: #10B981;
    color: #fff;
  }
  .hl-step.en-progreso .hl-step-dot {
    background: #fff;
    border: 3px solid var(--color-secundario);
    color: var(--color-secundario);
    animation: hl-pulse 2s infinite;
  }
  .hl-step.pendiente .hl-step-dot {
    background: #E5E7EB;
    color: #9CA3AF;
  }
  @keyframes hl-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(245, 130, 32, 0.3); }
    50% { box-shadow: 0 0 0 8px rgba(245, 130, 32, 0); }
  }
  .hl-step-label {
    font-size: 12px;
    font-weight: 600;
    color: #6B7280;
    text-align: center;
  }
  .hl-step.en-progreso .hl-step-label { color: var(--color-secundario); }
  .hl-step.completada .hl-step-label { color: #10B981; }
  .hl-step-connector {
    flex: 1;
    height: 2px;
    background: #E5E7EB;
    min-width: 30px;
    margin: 0 4px;
    margin-bottom: 28px;
  }
  .hl-step.completada + .hl-step-connector { background: #10B981; }

  /* Seccion pendientes */
  .hl-section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--color-primario);
    margin: 0 0 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hl-section-title .hl-count {
    background: var(--color-secundario);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  /* Tarjeta de pendiente */
  .hl-card {
    background: #fff;
    border: 1px solid var(--color-borde);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  .hl-card:hover {
    box-shadow: 0 4px 12px rgba(61, 12, 75, 0.08);
    border-color: var(--color-secundario);
  }
  .hl-card-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: rgba(245, 130, 32, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .hl-card-icon svg {
    width: 24px;
    height: 24px;
    stroke: var(--color-secundario);
  }
  .hl-card-body {
    flex: 1;
    min-width: 0;
  }
  .hl-card-title {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a2e;
    margin: 0 0 4px;
  }
  .hl-card-desc {
    font-size: 13px;
    color: var(--color-texto-sec);
    margin: 0;
  }
  .hl-card-action {
    flex-shrink: 0;
  }
  .hl-card-action .btn {
    white-space: nowrap;
  }

  /* Al dia */
  .hl-aldia {
    text-align: center;
    padding: 48px 24px;
    background: #fff;
    border-radius: 12px;
    border: 1px solid var(--color-borde);
  }
  .hl-aldia-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(16, 185, 129, 0.1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 16px;
  }
  .hl-aldia h3 {
    font-size: 20px;
    font-weight: 700;
    color: var(--color-primario);
    margin: 0 0 8px;
  }
  .hl-aldia p {
    font-size: 14px;
    color: var(--color-texto-sec);
    margin: 0;
  }

  /* Sin programa */
  .hl-sin-programa {
    text-align: center;
    padding: 60px 24px;
  }
  .hl-sin-programa h3 {
    color: var(--color-primario);
    margin: 16px 0 8px;
  }

  /* Equipo rapido */
  .hl-equipo {
    margin-top: 24px;
  }
  .hl-equipo-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: #fff;
    border: 1px solid var(--color-borde);
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .hl-equipo-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--color-primario);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .hl-equipo-info {
    flex: 1;
  }
  .hl-equipo-nombre {
    font-size: 14px;
    font-weight: 600;
    color: #1a1a2e;
  }
  .hl-equipo-cargo {
    font-size: 12px;
    color: var(--color-texto-sec);
  }

  @media (max-width: 600px) {
    .hl-saludo { font-size: 22px; }
    .hl-card { flex-direction: column; text-align: center; }
    .hl-card-action { width: 100%; }
    .hl-card-action .btn { width: 100%; }
    .hl-step { min-width: 70px; }
    .hl-step-label { font-size: 10px; }
  }
</style>

<div id="hl-loading" class="text-center p-4">
  <div class="spinner spinner-lg"></div>
  <p class="text-muted mt-3">Cargando tu programa...</p>
</div>

<div id="hl-content" class="hidden">
  <!-- Saludo -->
  <h1 class="hl-saludo" id="hl-saludo">Hola</h1>
  <p class="hl-programa" id="hl-programa"></p>

  <!-- Stepper -->
  <div class="hl-stepper" id="hl-stepper"></div>

  <!-- Pendientes -->
  <div id="hl-pendientes"></div>

  <!-- Equipo -->
  <div id="hl-equipo" class="hl-equipo hidden"></div>
</div>

<div id="hl-sin-programa" class="hl-sin-programa hidden">
  <svg viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5" style="width:56px;height:56px;">
    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
  </svg>
  <h3>Aun no tienes un programa asignado</h3>
  <p class="text-muted">Tu administrador te asignara a un programa pronto. Te notificaremos cuando este listo.</p>
</div>

<script>
(function() {
  var userId = App.usuario ? App.usuario.id : null;
  if (!userId) return;

  google.script.run
    .withSuccessHandler(function(r) {
      if (!r || !r.success) {
        document.getElementById('hl-loading').classList.add('hidden');
        document.getElementById('hl-sin-programa').classList.remove('hidden');
        return;
      }

      var data = r.data;

      if (!data.programa) {
        document.getElementById('hl-loading').classList.add('hidden');
        document.getElementById('hl-sin-programa').classList.remove('hidden');
        return;
      }

      // Saludo
      var nombre = capitalizar(App.usuario.nombre || 'Usuario');
      document.getElementById('hl-saludo').textContent = 'Hola, ' + nombre.split(' ')[0];
      document.getElementById('hl-programa').innerHTML =
        '<strong>' + escapeHtml(data.programa.nombre) + '</strong>' +
        (data.programa.cliente_nombre ? ' \u2014 ' + escapeHtml(data.programa.cliente_nombre) : '');

      // Stepper
      renderStepper(data.stepper);

      // Pendientes
      renderPendientes(data.pendientes || []);

      // Equipo
      renderEquipo(data.colaboradores || []);

      document.getElementById('hl-loading').classList.add('hidden');
      document.getElementById('hl-content').classList.remove('hidden');
    })
    .withFailureHandler(function() {
      document.getElementById('hl-loading').classList.add('hidden');
      document.getElementById('hl-sin-programa').classList.remove('hidden');
    })
    .obtenerHomeLider(App.token, userId);
})();

function capitalizar(texto) {
  if (!texto) return '';
  return texto.split(' ').map(function(p) {
    return p.charAt(0).toUpperCase() + p.slice(1).toLowerCase();
  }).join(' ');
}

function renderStepper(stepper) {
  if (!stepper) return;
  var steps = [
    { key: 'autoevaluacion', label: 'Autoevaluacion' },
    { key: 'coevaluacion', label: 'Coevaluacion' },
    { key: 'informe_individual', label: 'Informe Individual' },
    { key: 'informe_ejecutivo', label: 'Informe Ejecutivo' }
  ];

  var html = '';
  steps.forEach(function(s, i) {
    var estado = stepper[s.key] || 'pendiente';
    var icon = estado === 'completada' ? '\u2713' :
               estado === 'en-progreso' ? (i + 1) : (i + 1);

    if (i > 0) html += '<div class="hl-step-connector"></div>';
    html += '<div class="hl-step ' + estado + '">' +
      '<div class="hl-step-dot">' + icon + '</div>' +
      '<span class="hl-step-label">' + s.label + '</span>' +
    '</div>';
  });

  document.getElementById('hl-stepper').innerHTML = html;
}

function renderPendientes(pendientes) {
  var container = document.getElementById('hl-pendientes');

  if (!pendientes.length) {
    container.innerHTML =
      '<div class="hl-aldia">' +
        '<div class="hl-aldia-icon">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" style="width:32px;height:32px;">' +
            '<path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>' +
          '</svg>' +
        '</div>' +
        '<h3>Estas al dia</h3>' +
        '<p>No tienes evaluaciones pendientes. Te avisaremos cuando haya una nueva actividad.</p>' +
      '</div>';
    return;
  }

  var html = '<div class="hl-section-title">Lo que tienes pendiente <span class="hl-count">' + pendientes.length + '</span></div>';

  pendientes.forEach(function(p) {
    var nombreCap = capitalizar(p.participante.nombre);
    html += '<div class="hl-card">' +
      '<div class="hl-card-icon">' +
        '<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>' +
      '</div>' +
      '<div class="hl-card-body">' +
        '<p class="hl-card-title">Coevaluacion de ' + escapeHtml(nombreCap) + '</p>' +
        '<p class="hl-card-desc">' + escapeHtml(p.descripcion) + ' \u00b7 Pendiente</p>' +
      '</div>' +
      '<div class="hl-card-action">' +
        '<button class="btn btn-primary" onclick="irACoevaluacion(\'' + p.encuesta_id + '\', \'' + p.participante.id + '\')">' +
          'Responder \u2192' +
        '</button>' +
      '</div>' +
    '</div>';
  });

  container.innerHTML = html;
}

function renderEquipo(colaboradores) {
  if (!colaboradores.length) return;

  var container = document.getElementById('hl-equipo');
  var html = '<div class="hl-section-title">Tu equipo</div>';

  colaboradores.forEach(function(c) {
    var nombre = capitalizar(c.nombre);
    var iniciales = nombre.split(' ').map(function(p) { return p.charAt(0); }).join('').substring(0, 2);
    html += '<div class="hl-equipo-item">' +
      '<div class="hl-equipo-avatar">' + iniciales + '</div>' +
      '<div class="hl-equipo-info">' +
        '<div class="hl-equipo-nombre">' + escapeHtml(nombre) + '</div>' +
        '<div class="hl-equipo-cargo">' + escapeHtml(c.cargo || c.email) + '</div>' +
      '</div>' +
    '</div>';
  });

  container.innerHTML = html;
  container.classList.remove('hidden');
}

function irACoevaluacion(encuestaId, participanteId) {
  // Navegar a la encuesta de coevaluacion
  if (typeof cargarVista === 'function') {
    cargarVista('mis-encuestas');
  }
}
</script>
